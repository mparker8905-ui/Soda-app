<!-- inventory.html -->

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Inventory - SoDa Outdoor Designs</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="header">

  <div class="brand">

    <h1>Inventory</h1>

    <div class="tagline">Materials • Costs • Stock</div>

  </div>

</div>

<div class="gold-line"></div>

<div class="row">

  <button onclick="location.href='index.html'">Calculator</button>

  <button onclick="location.href='crm.html'">CRM</button>

</div>

<!-- STANDARD -->

<div class="card">

  <div class="inventory-header">

    <span class="section-title">Standard Materials</span>

    <div class="inventory-actions">

      <button onclick="addMaterialRow('standard')">+</button>

    </div>

  </div>

  <div id="standardMaterials"></div>

</div>

<!-- PREMIUM -->

<div class="card">

  <div class="inventory-header">

    <span class="section-title">Premium Materials</span>

    <div class="inventory-actions">

      <button onclick="addMaterialRow('premium')">+</button>

    </div>

  </div>

  <div id="premiumMaterials"></div>

</div>

<!-- ADDONS -->

<div class="card">

  <div class="inventory-header">

    <span class="section-title">Add-on Materials</span>

    <div class="inventory-actions">

      <button onclick="addMaterialRow('addons')">+</button>

    </div>

  </div>

  <div id="addonMaterials"></div>

</div>

<div class="card">

  <button class="primary full" onclick="saveInventory()">

    Save Inventory

  </button>

  <button class="full" onclick="useInventoryForJob()">

    Apply Inventory To Job

  </button>

</div>

<div id="toastContainer" class="toast-container"></div>

<script src="js/core.js"></script>

<script src="js/state.js"></script>

<script src="js/inventory.js"></script>

<script src="js/crm.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

<script>

window.onload = function(){

  if(window.loadInventory) loadInventory();

};

</script>

</body>

</html>
