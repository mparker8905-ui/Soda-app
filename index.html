<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.row{display:flex;gap:8px}
.row button{flex:1}
.gold{color:#d4af37;font-size:22px}
.alert{padding:6px;border-radius:6px;margin:4px 0}
.low{background:#665500}
.out{background:#661111}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="tier" onchange="applyPremium()">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="sqft" placeholder="Square Feet">

<h3>Add Ons</h3>

<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bioHum"> Bio/Hum Blend (50/50)</label>
<label><input type="checkbox" id="bio100"> Biochar 100%</label>
<label><input type="checkbox" id="hum100"> Humic 100%</label>

<label><input type="checkbox" id="lime" onchange="toggleInput('limeAmount',this)"> Lime</label>
<input id="limeAmount" placeholder="Amount of Lime Used" style="display:none">

<label><input type="checkbox" id="sulfur" onchange="toggleInput('sulfurAmount',this)"> Sulfur</label>
<input id="sulfurAmount" placeholder="Amount of Sulfur Used" style="display:none">

<h3>Schedule</h3>
<input type="date" id="quote">

<h3>Labor</h3>
<input id="rate" placeholder="Hourly Rate">
<input id="crew" placeholder="Crew Size">
<input id="hours" placeholder="Hours">

<h3>Target Margin %</h3>
<input id="margin">

<button onclick="createJob()">Create Job</button>
<button onclick="openClient()">Client View</button>
</div>

<div class="card">
<h2>Inventory</h2>

<h3>Standard</h3>
<div id="invStandard"></div>

<h3>Premium</h3>
<div id="invPremium"></div>

<h3>Add Ons</h3>
<div id="invAdd"></div>

<button onclick="renderInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>
<div class="gold" id="totals"></div>
</div>

<script>

let inventory={
standard:[
{name:"Seed",cost:80,qty:100},
{name:"Fertilizer",cost:40,qty:100},
{name:"Mulch",cost:35,qty:100},
{name:"Tackifier",cost:25,qty:100}
],
premium:[
{name:"Seed",cost:100,qty:100},
{name:"Fertilizer",cost:50,qty:100},
{name:"Mulch",cost:40,qty:100},
{name:"Tackifier",cost:30,qty:100},
{name:"Biochar",cost:25,qty:100},
{name:"Humic Acid",cost:20,qty:100}
],
addons:[
{name:"Lime",cost:15,qty:100},
{name:"Sulfur",cost:20,qty:100},
{name:"Sprinkler Units",cost:50,qty:50}
]
}

let jobs=[]

function toggleInput(id,el){
document.getElementById(id).style.display=el.checked?"block":"none"
}

function applyPremium(){
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bioHum.checked=true
lime.checked=true
sulfur.checked=true
toggleInput('limeAmount',lime)
toggleInput('sulfurAmount',sulfur)
}
}

function createJob(){

let limeUsed=parseFloat(limeAmount.value)||0
let sulfurUsed=parseFloat(sulfurAmount.value)||0

inventory.addons[0].qty-=limeUsed
inventory.addons[1].qty-=sulfurUsed

let job={
name:customer.value,
quote:quote.value,
materials:{
lime:limeUsed,
sulfur:sulfurUsed,
bio100:bio100.checked,
hum100:hum100.checked
},
revenue:10000,
profit:3000
}

jobs.push(job)

renderJobs()
renderTotals()
renderAlerts()
}

function renderJobs(){
jobs.innerHTML=jobs.map(j=>`
<div>
<b>${j.name}</b><br>
Quote: ${j.quote||"N/A"}<br>
Materials Used:<br>
Lime: ${j.materials.lime}<br>
Sulfur: ${j.materials.sulfur}<br>
Biochar100: ${j.materials.bio100}<br>
Humic100: ${j.materials.hum100}<br>
Revenue: $${j.revenue}<br>
Profit: $${j.profit}
</div><br>
`).join("")
}

function renderTotals(){
let rev=jobs.reduce((a,b)=>a+b.revenue,0)
let prof=jobs.reduce((a,b)=>a+b.profit,0)
let margin=rev?((prof/rev)*100).toFixed(1):0

totals.innerHTML=`
Total Revenue: $${rev}<br>
Total Profit: $${prof}<br>
Avg Margin: ${margin}%
`
}

function renderAlerts(){
alerts.innerHTML=""
inventory.standard.concat(inventory.premium,inventory.addons).forEach(i=>{
if(i.qty<5) alerts.innerHTML+=`<div class="alert out">${i.name} OUT</div>`
else if(i.qty<20) alerts.innerHTML+=`<div class="alert low">${i.name} LOW</div>`
})
}

function openClient(){
let w=window.open("")
w.document.write(`
<h1>Client Proposal</h1>
<p>${customer.value}</p>
<button onclick="window.print()">Download PDF</button><br>
<a href="mailto:?subject=Proposal">Email</a><br>
<a href="sms:?body=Proposal">Text</a>
`)
}

renderAlerts()

</script>

</body>
</html>
