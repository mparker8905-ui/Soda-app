<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{width:100%;padding:16px;margin-top:10px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;margin-top:15px;}
.big{font-size:34px;font-weight:bold;}
.alert{color:red}
.good{color:lime}

#proposalModal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:none;
overflow:auto;
padding:20px;
}
.proposal-card{
background:#111;
border:2px solid gold;
padding:20px;
border-radius:20px;
}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">🔥 Premium (Best Value)</option>
</select>

<label><input type="checkbox" id="grow"> Grow System</label>

<input id="houses" value="1" placeholder="Houses">
<input id="sqft" placeholder="Sq Ft Per House">

<h3>Labor & Overhead</h3>
<input id="laborRate" value="70">
<input id="crewSize" value="1">
<input id="hours" value="8">
<input id="overhead" value="15">
<input id="margin" value="60">

<button onclick="autoFillPrice()">Auto Price</button>

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
</div>

<div id="pricingOutput"></div>

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Jobs</h2>
<div id="jobs"></div>
</div>

<div id="proposalModal">
<button onclick="closeProposal()">Close</button>
<div id="proposalContent"></div>
</div>

<script>

function n(v){return Number(v)||0}

let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inv=JSON.parse(localStorage.getItem("inv")||"{}")

function getMaterials(tier,h){

if(tier==="standard"){
return{
tttf:1.7*h,
rye:0.3*h,
mil:1.2*h,
wood:12*h,
tack:0.6*h
}
}

if(tier==="premium"){
return{
elite:1.6*h,
kbg:0.4*h,
esp:1.5*h,
bfm:12*h,
tack:0.6*h,
comp:4*h,
bio:1*h,
hum:0.5*h
}
}
}

function autoFillPrice(){

const h=n(houses.value)||1
const mats=getMaterials(tier.value,h)

let materialCost=0
let html=""

Object.keys(mats).forEach(k=>{
let qty=n(mats[k])
let cost=qty*(inv[k]?.c||0)
materialCost+=cost
html+=`${k}: ${qty.toFixed(2)} ($${cost.toFixed(0)})<br>`
})

// ===== GROW SYSTEM =====
let growCost=0
let growText=""

if(grow.checked){

if(tier.value==="standard"){
growCost = h>=10 ? (100*h)+(50*3*h) : (150+(50*3))
growText=`Grow: $${growCost}`
}

if(tier.value==="premium"){

if(h>=50){
growCost=0
growText=`<span class="good">Grow Included</span>`
}
else if(h>=10){
growCost=(50*2*h)
growText=`Grow: $${growCost}`
}
else{
growCost=50+(50*3)
growText=`Grow: $${growCost}`
}
}
}

// ===== LABOR =====
let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)

// ===== OVERHEAD =====
let overheadCost=(materialCost+labor)*(n(overhead.value)/100)

// ===== TOTAL COST =====
let totalCost=materialCost+labor+overheadCost+growCost

// ===== PRICE =====
let price=totalCost/(1-(n(margin.value)/100))

// ===== BUILDER DISCOUNT =====
let discount= h<10?0.05:h<25?0.10:h<100?0.20:0.30
price*=1-discount

priceDisplay.innerText="$"+price.toFixed(0)
window.finalPrice=price

pricingOutput.innerHTML=`
${html}<br>
${grow.checked?growText+"<br><br>":""}
Materials: $${materialCost.toFixed(0)}<br>
Labor: $${labor.toFixed(0)}<br>
Overhead: $${overheadCost.toFixed(0)}<br>
Total Cost: $${totalCost.toFixed(0)}
`
}

function createJob(){

if(!window.finalPrice){
alert("Run pricing first")
return
}

const h=n(houses.value)||1
const mats=getMaterials(tier.value,h)

let breakdown={}
let totalCost=0
let alertsList=[]

// ===== MATERIAL DEDUCTION =====
Object.keys(mats).forEach(k=>{
let qty=n(mats[k])
let item=inv[k]||{c:0,q:0}

let cost=qty*(item.c||0)
let remaining=item.q-qty

if(remaining<=5) alertsList.push(`${k} OUT`)
else if(remaining<20) alertsList.push(`${k} LOW`)

item.q=Math.max(0,remaining)
inv[k]=item

breakdown[k]={qty,cost}
totalCost+=cost
})

// ===== GROW =====
let growCost=0
if(grow.checked){

if(tier.value==="standard"){
growCost = h>=10 ? (100*h)+(50*3*h) : (150+(50*3))
}

if(tier.value==="premium"){
growCost = h>=50 ? 0 : (h>=10 ? (50*2*h) : (50+(50*3)))
}

breakdown["grow"]={qty:1,cost:growCost}
totalCost+=growCost
}

jobs.push({
name:name.value||"Client",
tier:tier.value,
revenue:window.finalPrice,
profit:window.finalPrice-totalCost,
materials:breakdown,
alerts:alertsList,
grow:grow.checked
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
}

function render(){

jobsDiv.innerHTML=""
let alertHTML=""

jobs.forEach((j,i)=>{

j.alerts.forEach(a=>{
alertHTML+=`<div class="alert">🚨 ${a}</div>`
})

jobsDiv.innerHTML+=`
<div class="card">
<b>${j.name} (${j.tier})</b><br>
Revenue: $${j.revenue.toFixed(0)}<br>
Profit: $${j.profit.toFixed(0)}<br>

<button onclick="openProposal(${i})">View Proposal</button>
</div>
`
})

alerts.innerHTML=alertHTML||"No alerts"
}

// ===== PROPOSAL =====
function openProposal(i){

let j=jobs[i]

proposalContent.innerHTML=`
<div class="proposal-card">

<h2>${j.name}</h2>

<h3>${j.tier.toUpperCase()} PACKAGE</h3>

<p>
We don’t just seed lawns — we build them from the soil up.
</p>

<p>
Our process delivers thicker growth, stronger roots, and long-term durability.
</p>

${j.grow?`<p>✔ Grow System Included</p>`:""}

<div class="price-box">
<div>Final Investment</div>
<div class="big">$${j.revenue.toFixed(0)}</div>
</div>

<p>
This investment reflects a premium installation designed to outperform standard seeding methods.
</p>

<button onclick="downloadPDF(${i})">Download PDF</button>

</div>
`

proposalModal.style.display="block"
}

function closeProposal(){
proposalModal.style.display="none"
}

// ===== LUXURY PDF =====
async function downloadPDF(i){

const { jsPDF } = window.jspdf
let j = jobs[i]

let doc=new jsPDF()
let y=20

doc.setFontSize(20)
doc.text("LAWN IMPROVEMENT PROPOSAL",105,y,{align:"center"})

y+=10
doc.text("Premium Hydroseeding System",105,y,{align:"center"})

y+=10
doc.line(20,y,190,y)

y+=15
doc.text("Client: "+j.name,20,y)

y+=15
doc.text("Package: "+j.tier.toUpperCase(),20,y)

y+=15
doc.text("This is a premium lawn installation designed for long-term performance.",20,y)

y+=10
doc.text("Stronger roots. Thicker turf. Better results.",20,y)

y+=20
doc.setFontSize(18)
doc.text("$"+j.revenue.toFixed(0),105,y,{align:"center"})

doc.save(j.name+"_proposal.pdf")
}

function clearJobs(){
jobs=[]
localStorage.removeItem("jobs")
render()
}

render()

</script>

</body>
</html>
