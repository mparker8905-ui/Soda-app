<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{width:100%;padding:16px;margin-top:10px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;margin-top:15px;}
.big{font-size:34px;font-weight:bold;}
.alert{color:red}
.good{color:lime}
#proposalModal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;overflow:auto;padding:20px;}
.proposal-card{background:#111;border:2px solid gold;padding:20px;border-radius:20px;}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">🔥 Premium</option>
</select>

<label><input type="checkbox" id="grow"> Grow System</label>

<input id="houses" value="1">
<input id="sqft" placeholder="Sq Ft">

<input id="laborRate" value="70">
<input id="crewSize" value="1">
<input id="hours" value="8">
<input id="overhead" value="15">
<input id="margin" value="60">

<button onclick="autoFillPrice()">Auto Price</button>

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
</div>

<div id="pricingOutput"></div>

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Jobs</h2>
<div id="jobs"></div>
</div>

<div id="proposalModal">
<button onclick="closeProposal()">Close</button>
<div id="proposalContent"></div>
</div>

<script>

function n(v){return Number(v)||0}

let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inv=JSON.parse(localStorage.getItem("inv")||"{}")

function getMaterials(tier,h){
if(tier==="standard"){
return{tttf:1.7*h,rye:0.3*h}
}else{
return{elite:1.5*h,kbg:0.3*h}
}
}

function autoFillPrice(){

const h=n(houses.value)||1
const mats=getMaterials(tier.value,h)

let materialCost=0

Object.keys(mats).forEach(k=>{
materialCost+=mats[k]*50
})

let growCost=0

if(grow.checked){
if(tier.value==="standard"){
growCost = h>=10 ? (100*h)+(50*3*h) : (150+(50*3))
}else{
if(h>=50) growCost=0
else growCost = h>=10 ? (50*2*h) : (50+(50*3))
}
}

let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)
let overheadCost=(materialCost+labor)*(n(overhead.value)/100)

let totalCost=materialCost+labor+overheadCost+growCost
let price=totalCost/(1-(n(margin.value)/100))

let discount= h<10?0.05:h<25?0.10:h<100?0.20:0.30
price*=1-discount

priceDisplay.innerText="$"+price.toFixed(0)
window.finalPrice=price
}

function createJob(){

jobs.push({
name:name.value,
tier:tier.value,
revenue:window.finalPrice,
grow:grow.checked
})

localStorage.setItem("jobs",JSON.stringify(jobs))
render()
}

function render(){

jobsDiv.innerHTML=""

jobs.forEach((j,i)=>{
jobsDiv.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
$${j.revenue.toFixed(0)}
<button onclick="openProposal(${i})">Proposal</button>
</div>
`
})
}

function openProposal(i){

let j=jobs[i]

proposalContent.innerHTML=`
<div class="proposal-card">

<h2>${j.name}</h2>

<h3>${j.tier.toUpperCase()} PACKAGE</h3>

<p>
Our process is designed to deliver a thicker, healthier, and longer-lasting lawn by focusing on soil health first and growth performance second.
</p>

<p>
Unlike standard seeding services, we use a proven system that improves germination rates, strengthens root development, and ensures long-term durability.
</p>

${j.grow?`
<p>
✔ Grow System Included – Ensures consistent watering and optimal early-stage growth.
</p>
`:""}

<div class="price-box">
<div>Final Investment</div>
<div class="big">$${j.revenue.toFixed(0)}</div>
</div>

<p>
This investment reflects a professional-grade installation designed to outperform traditional methods and deliver lasting results.
</p>

<p>
We stand behind our process and take pride in delivering lawns that not only look great but continue to perform over time.
</p>

<button onclick="downloadPDF(${i})">Download PDF</button>

</div>
`

proposalModal.style.display="block"
}

function closeProposal(){
proposalModal.style.display="none"
}

// ===== LUXURY PDF WITH SALES LANGUAGE =====
async function downloadPDF(i){

const { jsPDF } = window.jspdf
let j = jobs[i]

let doc = new jsPDF()
let y = 20

doc.setFontSize(22)
doc.text("LAWN IMPROVEMENT PROPOSAL",105,y,{align:"center"})

y+=10
doc.setFontSize(10)
doc.text("Professional Hydroseeding & Soil Enhancement",105,y,{align:"center"})

y+=10
doc.line(20,y,190,y)

y+=15
doc.setFontSize(12)
doc.text("Prepared For:",20,y)
doc.text(j.name,20,y+6)

y+=20
doc.setFontSize(14)
doc.text("Selected Package",20,y)

y+=8
doc.setFontSize(12)
doc.text(j.tier.toUpperCase(),20,y)

y+=15

doc.setFontSize(12)
doc.text("Our approach focuses on building a stronger lawn from the soil up,",20,y)
y+=6
doc.text("resulting in better germination, improved durability, and long-term performance.",20,y)

y+=10
doc.text("This is not just a seeding service — it’s a complete lawn establishment system.",20,y)

y+=15

if(j.grow){
doc.text("Grow System Included:",20,y)
y+=6
doc.text("Ensures consistent watering and optimal early-stage development.",20,y)
y+=10
}

doc.setFillColor(240,240,240)
doc.rect(20,y,170,25,"F")

doc.setFontSize(10)
doc.text("TOTAL INVESTMENT",105,y+8,{align:"center"})

doc.setFontSize(22)
doc.text("$"+j.revenue.toFixed(0),105,y+18,{align:"center"})

y+=40

doc.setFontSize(10)
doc.text("This proposal is valid for 7 days.",20,y)

y+=15
doc.text("Client Signature: ____________________________",20,y)

doc.save(j.name+"_Proposal.pdf")
}

render()

</script>

</body>
</html>
