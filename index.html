<!DOCTYPE html>
<html>
<head>

<style>

input, select {
  font-size:16px;
}
button{width:100%;padding:12px;margin-top:10px;background:#d4af37;border:none;border-radius:8px;font-weight:bold}
.gold{
  color:#d4af37;
  font-size:32px;
  font-weight:bold;
}
.job{background:#0f0f0f;padding:10px;margin-top:10px;border-left:3px solid #d4af37;border-radius:8px}
.finalBox{
  border:2px solid #d4af37;
  border-radius:16px;
  padding:20px;
  text-align:center;
  margin-top:20px;
  box-shadow:0 0 20px rgba(212,175,55,0.25);
}

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses" value="1">
<input id="margin" placeholder="Target Margin %" value="40">
<input id="overhead" placeholder="Overhead %" value="15">

<h3>Add Ons</h3>

<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bioHum"> Bio/Hum Blend (50/50)</label>
<label><input type="checkbox" id="bio100"> Biochar 100%</label>
<label><input type="checkbox" id="humic100"> Humic 100%</label>
<label><input type="checkbox" id="grow"> Grow System</label>

<label><input type="checkbox" id="lime"> Lime</label>
<input id="limeQty" placeholder="Lime Amount">

<label><input type="checkbox" id="sulfur"> Sulfur</label>
<input id="sulfurQty" placeholder="Sulfur Amount">

<h3>Schedule</h3>

<label>Quote Date</label>
<input id="quoteDate" type="date">

<label>Soil Test Date</label>
<input id="soilDate" type="date">

<label>Aeration Date</label>
<input id="aerationDate" type="date">

<label>Compost Date</label>
<input id="compostDate" type="date">

<label>Hydroseed Date</label>
<input id="hydroDate" type="date">

<label>Grow System Install</label>
<input id="installDate" type="date">

<label>Final Inspection</label>
<input id="finalDate" type="date">

<button onclick="createJob()">Create Job</button>
<button onclick="viewProposal()">View Proposal</button>
<button onclick="applyPremium()">Auto Apply Premium</button>

<div class="finalBox">
<h3>Final Investment</h3>
<div id="finalPrice" class="gold"></div>
<div id="finalDetails"></div>no
</div>

<div class="card">
<h3>Inventory</h3>
<div id="inventoryUI"></div>
<button onclick="save()">Save Inventory</button>
</div>

<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

<div class="card">
<h3>Job History</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>Analytics</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Totals</h3>
<div id="totals" class="gold"></div>
</div>

<div class="card">
<h3>CRM</h3>
<div id="crm"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// ===== STORAGE =====

function load(){
  try{
    let data = localStorage.getItem("app")
    if(data){
      app = JSON.parse(data)
    }
  }catch(e){
    console.log("LOAD ERROR", e)
    localStorage.removeItem("app") // reset bad data
  }
}

// ===== STATE =====

let app = {
  inventory:{
    standard:[
      {name:"seed",cost:80,qty:100},
      {name:"fert",cost:40,qty:100},
      {name:"mulch",cost:35,qty:100},
      {name:"tack",cost:25,qty:100}
    ],
    premium:[
      {name:"bio",cost:25,qty:100},
      {name:"humic",cost:20,qty:100}
    ],
    addons:[
      {name:"lime",cost:15,qty:100},
      {name:"sulfur",cost:20,qty:100}
    ]
  },
  jobs:[],
  customers:[]
}

// ===== HELPERS =====
function el(id){ return document.getElementById(id) }

// ===== CALCULATE =====
function calculate(){

  let sqft = +el("sqft")?.value || 0
  let houses = +el("houses")?.value || 1
  let margin = (+el("margin")?.value || 40)/100
  let overhead = (+el("overhead")?.value || 15)/100

  let factor = sqft/5000

  let used = {
    seed:0.5*factor*houses,
    fert:1*factor*houses,
    mulch:1*factor*houses,
    tack:0.5*factor*houses,
    bio: el("bioHum")?.checked ? 0.5*factor*houses : 0,
    humic: el("bioHum")?.checked ? 0.5*factor*houses : 0,
    lime: el("lime")?.checked ? +el("limeQty").value||0 : 0,
    sulfur: el("sulfur")?.checked ? +el("sulfurQty").value||0 : 0
  }

  let all = [
    ...app.inventory.standard,
    ...app.inventory.premium,
    ...app.inventory.addons
  ]

  let materialCost = 0

  all.forEach(i=>{
    if(used[i.name]){
      materialCost += used[i.name] * i.cost
    }
  })

  let labor = (sqft < 5000 ? 200 : 400) * houses
  let overheadCost = (materialCost + labor) * overhead
  let cost = materialCost + labor + overheadCost
  let revenue = cost/(1-margin)
  let profit = revenue - cost

el("finalPrice").innerHTML = revenue 
  ? "$" + Math.round(revenue) 
  : "no"

  return {revenue, profit, cost, used}
}

// ===== CREATE JOB =====

window.createJob = function(){

  let data = calculate()
  if(!data) return

  let name = el("customer").value || "Customer"
  let date = new Date().toLocaleDateString()

  let margin = data.revenue > 0 
    ? Math.round((data.profit / data.revenue) * 100) 
    : 0

  // build material breakdown
  let materialsUsed = Object.entries(data.used)
    .filter(([k,v]) => v > 0)
    .map(([k,v]) => `${k}: ${v.toFixed(1)}`)
    .join(", ")

  app.jobs.push({
    name: el("customer")?.value || "Customer",
    revenue: data.revenue,
    profit: data.profit,
    cost: data.cost,
    date: new Date().toLocaleDateString()
  })

  // customer tracking
  let customer = app.customers.find(c => c.name === name)

  if(!customer){
    customer = {name, jobs:[]}
    app.customers.push(customer)
  }

  customer.jobs.push({
    revenue: data.revenue,
    profit: data.profit,
    date
  })

  save()
  render()
}

//====View proposal===
window.viewProposal = function(){

  let data = calculate()
  if(!data) return

  alert(
    "Revenue: $" + Math.round(data.revenue) +
    "\nProfit: $" + Math.round(data.profit)
  )
}

//=====Apply premium=====

window.applyPremium = function(){

  let tier = document.getElementById("tier")
  if(tier) tier.value = "premium"

  let ids = ["aeration","compost","bioHum","lime","sulfur"]

  ids.forEach(id=>{
  let checkbox = document.getElementById(id)
  if(checkbox) checkbox.checked = true
  })
}

// ===== INVENTORY SAVE =====
function saveInventory(){

  let inputs = document.querySelectorAll("#inventoryUI input")

  inputs.forEach(input=>{
    let type = input.dataset.type
    let idx = input.dataset.idx
    let field = input.dataset.field

    app.inventory[type][idx][field] =
      field==="name"
        ? input.value
        : +input.value
  })

  save()
  render()
}


// ===== RENDER =====

function render(){

  console.log("1️⃣ render start")

  let inventoryUI = el("inventoryUI")
  if(!inventoryUI) return
  console.log("2️⃣ inventoryUI", inventoryUI)

  let history = el("history")
  console.log("3️⃣ history", history)

  let alerts = el("alerts")
  console.log("4️⃣ alerts", alerts)

  let crm = el("crm")
  console.log("5️⃣ crm", crm)

let totals = el("totals")

let totalRevenue = app.jobs.reduce((a,b)=>a+b.revenue,0)
let totalProfit = app.jobs.reduce((a,b)=>a+b.profit,0)

totals.innerHTML = `
  Revenue: $${Math.round(totalRevenue)}<br>
  Profit: $${Math.round(totalProfit)}<br>
  Jobs: ${app.jobs.length}
}
/*
  // ===== INVENTORY =====
  console.log("6️⃣ before inventory render")

inventoryUI.innerHTML = `

${(app.inventory.standard || []).map(i => `
  <div>${i.name} - $${i.cost} - Qty: ${i.qty}</div>
`).join("")}

<h3>Premium</h3>
${(app.inventory.premium || []).map(i => `
  <div>${i.name} - $${i.cost} - Qty: ${i.qty}</div>
`).join("")}

<h3>Addons</h3>
${(app.inventory.addons || []).map(i => `
  <div>${i.name} - $${i.cost} - Qty: ${i.qty}</div>
`).join("")}
`
*/
  console.log("7️⃣ after inventory")

  // ===== ALERTS =====
  console.log("8️⃣ before alerts")

  let all = [
    ...(app.inventory.standard||[]),
    ...(app.inventory.premium||[]),
    ...(app.inventory.addons||[])
  ]

  let list = []

  all.forEach(i=>{
    if(i.qty <= 0){
      list.push("OUT: "+i.name)
    } else if(i.qty < 10){
      list.push("LOW: "+i.name)
    }
  })

  alerts.innerHTML = list.length ? list.join("<br>") : "OK"

  console.log("9️⃣ after alerts")

  // ===== HISTORY =====
  console.log("🔟 before history")

 history.innerHTML = app.jobs.map(j => `
  <div style="margin-bottom:10px">
    <b>${j.name}</b><br>
    Date: ${j.date}<br>
    Revenue: $${Math.round(j.revenue)}<br>
    Profit: $${Math.round(j.profit)} (${j.margin}%)<br>
    Cost: $${Math.round(j.cost)}<br>
    Materials: ${j.materials}
  </div>
`).join("")

  console.log("11️⃣ after history")

  // ===== CRM =====
  console.log("12️⃣ before crm")

  crm.innerHTML = `
    ${(app.customers||[]).map(c=>`
      <div>${c.name}</div>
    `).join("")}
  `
*/
  console.log("13️⃣ after crm")

  // ===== TOTALS =====
  console.log("14️⃣ before totals")

  let totals = el("totals")

  let totalRevenue = (app.jobs||[]).reduce((a,b)=>a+(b.revenue||0),0)
  let totalProfit = (app.jobs||[]).reduce((a,b)=>a+(b.profit||0),0)

  totals.innerHTML = `Rev: $${Math.round(totalRevenue)} | Profit: $${Math.round(totalProfit)}`

  console.log("15️⃣ after totals")
/*
  // ===== CHART =====
  console.log("16️⃣ before chart")

  let ctx = document.getElementById("chart")

  if(ctx && window.Chart){
    try{
      if(window.myChart){
        window.myChart.destroy()
      }

      window.myChart = new Chart(ctx, {
        type:"bar",
        data:{
          labels:(app.jobs||[]).map(j=>j.name),
          datasets:[
            {label:"Profit", data:(app.jobs||[]).map(j=>j.profit)}
          ]
        }
      })
    }catch(e){
      console.log("CHART ERROR", e)
    }
  }
*/
  console.log("17️⃣ render complete")
}

// ===== START =====
load()
render()

</script>

</body>
</html>
