<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{width:100%;padding:16px;margin-top:10px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;margin-top:15px;}
.big{font-size:34px;font-weight:bold;}
.alert{color:red}
.good{color:lime}

#proposalModal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;overflow:auto;padding:20px;}
.proposal-card{background:#111;border:2px solid gold;padding:20px;border-radius:20px;}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier" onchange="handleTier()">
<option value="standard">Standard</option>
<option value="premium">🔥 Premium</option>
</select>

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow"> Grow System</label><br>
<label><input type="checkbox" id="aeration"> Aeration</label><br>
<label><input type="checkbox" id="compost"> Compost</label><br>
<label><input type="checkbox" id="bio"> Biochar</label><br>
<label><input type="checkbox" id="hum"> Humic Acid</label>

<input id="houses" value="1" placeholder="Houses">

<h3>Labor & Overhead</h3>
<input id="laborRate" value="70">
<input id="crewSize" value="1">
<input id="hours" value="8">
<input id="overhead" value="15">
<input id="margin" value="60">

<button onclick="autoFillPrice()">Auto Price</button>

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
</div>

<div id="pricingOutput"></div>

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>
<input id="tttfC" placeholder="TTTF Cost">
<input id="tttfQ" placeholder="TTTF Qty">
<input id="ryeC" placeholder="Rye Cost">
<input id="ryeQ" placeholder="Rye Qty">
<input id="eliteC" placeholder="Elite Cost">
<input id="eliteQ" placeholder="Elite Qty">
<input id="kbgC" placeholder="KBG Cost">
<input id="kbgQ" placeholder="KBG Qty">
<input id="milC" placeholder="Milorganite Cost">
<input id="milQ" placeholder="Milorganite Qty">
<input id="espC" placeholder="Espoma Cost">
<input id="espQ" placeholder="Espoma Qty">
<input id="woodC" placeholder="Wood Cost">
<input id="woodQ" placeholder="Wood Qty">
<input id="bfmC" placeholder="BFM Cost">
<input id="bfmQ" placeholder="BFM Qty">
<input id="tackC" placeholder="Tack Cost">
<input id="tackQ" placeholder="Tack Qty">
<input id="compC" placeholder="Compost Cost">
<input id="compQ" placeholder="Compost Qty">
<input id="bioC" placeholder="Bio Cost">
<input id="bioQ" placeholder="Bio Qty">
<input id="humC" placeholder="Humic Cost">
<input id="humQ" placeholder="Humic Qty">

<button onclick="saveInv()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div id="proposalModal">
<button onclick="closeProposal()">Close</button>
<div id="proposalContent"></div>
</div>

<script>

function n(v){return Number(v)||0}

let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inv=JSON.parse(localStorage.getItem("inv")||"{}")

function handleTier(){
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bio.checked=true
hum.checked=true
}
}

function saveInv(){
inv={
tttf:{c:n(tttfC.value),q:n(tttfQ.value)},
rye:{c:n(ryeC.value),q:n(ryeQ.value)},
elite:{c:n(eliteC.value),q:n(eliteQ.value)},
kbg:{c:n(kbgC.value),q:n(kbgQ.value)},
mil:{c:n(milC.value),q:n(milQ.value)},
esp:{c:n(espC.value),q:n(espQ.value)},
wood:{c:n(woodC.value),q:n(woodQ.value)},
bfm:{c:n(bfmC.value),q:n(bfmQ.value)},
tack:{c:n(tackC.value),q:n(tackQ.value)},
comp:{c:n(compC.value),q:n(compQ.value)},
bio:{c:n(bioC.value),q:n(bioQ.value)},
hum:{c:n(humC.value),q:n(humQ.value)}
}
localStorage.setItem("inv",JSON.stringify(inv))
alert("Saved")
}

function getMaterials(tierVal,h){

if(tierVal==="standard"){
return{
tttf:1.7*h,
rye:0.3*h,
mil:1.2*h,
wood:12*h,
tack:0.6*h,
comp:compost.checked?4*h:0,
bio:bio.checked?1*h:0,
hum:hum.checked?1*h:0
}
}

if(tierVal==="premium"){
return{
elite:1.6*h,
kbg:0.4*h,
esp:1.5*h,
bfm:12*h,
tack:0.6*h,
comp:4*h,
bio:1*h,
hum:0.5*h
}
}
}

function autoFillPrice(){

const h=n(houses.value)||1
const mats=getMaterials(tier.value,h)

let materialCost=0
let html=""

Object.keys(mats).forEach(k=>{
let qty=n(mats[k])
let cost=qty*(inv[k]?.c||0)
materialCost+=cost
html+=`${k}: ${qty.toFixed(2)} ($${cost.toFixed(0)})<br>`
})

let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)
let overheadCost=(materialCost+labor)*(n(overhead.value)/100)
let totalCost=materialCost+labor+overheadCost

let price=totalCost/(1-(n(margin.value)/100))

priceDisplay.innerText="$"+price.toFixed(0)
window.finalPrice=price

pricingOutput.innerHTML=html
}

function createJob(){

if(!window.finalPrice){alert("Run pricing");return}

const mats=getMaterials(tier.value,n(houses.value)||1)

let breakdown={}
let totalCost=0
let alertsList=[]

Object.keys(mats).forEach(k=>{
let qty=n(mats[k])
let item=inv[k]||{c:0,q:0}
let cost=qty*(item.c||0)
let remaining=item.q-qty

if(remaining<=5) alertsList.push(`${k} OUT`)
else if(remaining<20) alertsList.push(`${k} LOW`)

item.q=Math.max(0,remaining)
inv[k]=item

breakdown[k]={qty,cost}
totalCost+=cost
})

jobs.push({
name:name.value||"Client",
tier:tier.value,
revenue:window.finalPrice,
profit:window.finalPrice-totalCost,
materials:breakdown,
alerts:alertsList
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
}

function render(){

jobsDiv.innerHTML=""
let rev=0,prof=0,alertHTML=""

jobs.forEach((j,i)=>{
rev+=j.revenue
prof+=j.profit

j.alerts.forEach(a=>alertHTML+=`<div class="alert">${a}</div>`)

let mats=""
for(let m in j.materials){
let d=j.materials[m]
mats+=`${m}: ${d.qty.toFixed(2)} ($${d.cost.toFixed(0)})<br>`
}

jobsDiv.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
${mats}
Revenue: $${j.revenue.toFixed(0)}<br>
Profit: $${j.profit.toFixed(0)}<br>
<button onclick="openProposal(${i})">Proposal</button>
</div>
`
})

stats.innerHTML=`Jobs:${jobs.length}<br>Revenue:$${rev.toFixed(0)}<br>Profit:$${prof.toFixed(0)}`
alerts.innerHTML=alertHTML||"No alerts"
}

function openProposal(i){
let j=jobs[i]

proposalContent.innerHTML=`
<div class="proposal-card">
<h2>${j.name}</h2>
<h3>${j.tier.toUpperCase()}</h3>

<p>We build lawns that last — thicker, stronger, and healthier.</p>

<div class="price-box">
<div>Final Investment</div>
<div class="big">$${j.revenue.toFixed(0)}</div>
</div>

<button onclick="downloadPDF(${i})">Download PDF</button>
</div>
`

proposalModal.style.display="block"
}

function closeProposal(){proposalModal.style.display="none"}

async function downloadPDF(i){

const { jsPDF } = window.jspdf
let j=jobs[i]
let doc=new jsPDF()

doc.text("Lawn Proposal",20,20)
doc.text(j.name,20,30)
doc.text("Investment: $"+j.revenue.toFixed(0),20,40)

doc.save(j.name+"_proposal.pdf")
}

render()

</script>

</body>
</html>
