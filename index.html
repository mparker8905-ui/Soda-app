<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{width:100%;padding:16px;margin-top:10px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;margin-top:15px;}
.big{font-size:34px;font-weight:bold;}
.alert{color:red}
.good{color:lime}
.flex{display:flex;gap:10px}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier" onchange="handleTier(); autoFillPrice()">
<option value="standard">Standard</option>
<option value="premium">🔥 Premium (Best Lawn)</option>
</select>

<h3>Yard Size</h3>
<div class="flex">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Sq Ft Per House">

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow"> Grow System</label>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bio"> Biochar</label>
<label><input type="checkbox" id="hum"> Humic Acid</label>

<input id="houses" value="1" placeholder="Houses">

<h3>Labor & Overhead</h3>
<input id="laborRate" placeholder="Labor Rate ($/hr)" value="70">
<input id="crewSize" placeholder="Crew Size" value="1">
<input id="hours" placeholder="Hours Per Job" value="8">
<input id="overhead" placeholder="Overhead (%)" value="15">
<input id="margin" placeholder="Target Profit Margin (%)" value="60">

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
<div id="tierBadge"></div>
<div id="dealScore"></div>
</div>

<div id="pricingOutput"></div>

<button id="createBtn" onclick="createJob()" disabled>Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>
<input id="tttfC" placeholder="TTTF Cost"><input id="tttfQ" placeholder="TTTF Qty">
<input id="ryeC" placeholder="Rye Cost"><input id="ryeQ" placeholder="Rye Qty">
<input id="eliteC" placeholder="Elite Cost"><input id="eliteQ" placeholder="Elite Qty">
<input id="kbgC" placeholder="KBG Cost"><input id="kbgQ" placeholder="KBG Qty">
<input id="milC" placeholder="Mil Cost"><input id="milQ" placeholder="Mil Qty">
<input id="espC" placeholder="Esp Cost"><input id="espQ" placeholder="Esp Qty">
<input id="woodC" placeholder="Wood Cost"><input id="woodQ" placeholder="Wood Qty">
<input id="bfmC" placeholder="BFM Cost"><input id="bfmQ" placeholder="BFM Qty">
<input id="tackC" placeholder="Tack Cost"><input id="tackQ" placeholder="Tack Qty">
<input id="compC" placeholder="Compost Cost"><input id="compQ" placeholder="Compost Qty">
<input id="bioC" placeholder="Bio Cost"><input id="bioQ" placeholder="Bio Qty">
<input id="humC" placeholder="Humic Cost"><input id="humQ" placeholder="Humic Qty">

<button onclick="saveInv()">Save Inventory</button>
</div>

<div class="card"><h2>Alerts</h2><div id="alerts"></div></div>

<div class="card"><h2>Job History</h2><div id="jobs"></div></div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

function n(v){return Number(v)||0}

let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inv=JSON.parse(localStorage.getItem("inv")||"{}")

function setSize(v){sqft.value=v; autoFillPrice()}

function handleTier(){
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bio.checked=true
hum.checked=true
}
}

function saveInv(){
inv={
tttf:{c:n(tttfC.value),q:n(tttfQ.value)},
rye:{c:n(ryeC.value),q:n(ryeQ.value)},
elite:{c:n(eliteC.value),q:n(eliteQ.value)},
kbg:{c:n(kbgC.value),q:n(kbgQ.value)},
mil:{c:n(milC.value),q:n(milQ.value)},
esp:{c:n(espC.value),q:n(espQ.value)},
wood:{c:n(woodC.value),q:n(woodQ.value)},
bfm:{c:n(bfmC.value),q:n(bfmQ.value)},
tack:{c:n(tackC.value),q:n(tackQ.value)},
comp:{c:n(compC.value),q:n(compQ.value)},
bio:{c:n(bioC.value),q:n(bioQ.value)},
hum:{c:n(humC.value),q:n(humQ.value)}
}
localStorage.setItem("inv",JSON.stringify(inv))
alert("Saved")
}

function autoFillPrice(){

const sqftVal=n(sqft.value)
if(!sqftVal){return}

const housesCount=n(houses.value)||1
const totalSqft=sqftVal*housesCount

const rates=(tier.value==="premium")?
{elite:.08,kbg:.02,esp:.05,bfm:.08,tack:.01,comp:.03,bio:.008,hum:.005}:
{tttf:.085,rye:.015,mil:.05,wood:.08,tack:.01,
comp:compost.checked?.03:0,
bio:bio.checked?.008:0,
hum:hum.checked?.005:0}

let materialCost=0,html=""

Object.keys(rates).forEach(k=>{
let qty=rates[k]*totalSqft
let cost=qty*(inv[k]?.c||0)
materialCost+=cost
html+=`${k}: ${qty.toFixed(1)} ($${cost.toFixed(0)})<br>`
})

let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)
let overheadCost=(materialCost+labor)*(n(overhead.value)/100)

let growCost=0
if(grow.checked){
growCost = (tier.value==="standard") ? 300 :
(housesCount>=50?0:200)
}

let totalCost=materialCost+labor+overheadCost+growCost
if(totalCost<=0){return}

let price=totalCost/(1-(n(margin.value)/100))

priceDisplay.innerText="$"+price.toFixed(0)

pricingOutput.innerHTML=html+`
<br>Materials:$${materialCost.toFixed(0)}
<br>Labor:$${labor.toFixed(0)}
<br>Overhead:$${overheadCost.toFixed(0)}
<br>Grow:$${growCost}
<br><b>Total Cost:$${totalCost.toFixed(0)}</b>`

let marginReal=((price-totalCost)/price)*100
dealScore.innerHTML=marginReal>50?"🔥 A DEAL":marginReal>35?"👍 B DEAL":"⚠️ Low"

createBtn.disabled=false
window.finalPrice=price
}

function createJob(){

let mats={}
let alertsArr=[]

Object.keys(inv).forEach(k=>{
let used=5
let item=inv[k]
item.q-=used
if(item.q<=5)alertsArr.push(k+" OUT")
else if(item.q<20)alertsArr.push(k+" LOW")
})

jobs.push({
name:name.value,
revenue:window.finalPrice,
profit:window.finalPrice*0.4,
alerts:alertsArr
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))
render()
}

function render(){

let rev=0,prof=0,aHTML=""

jobsDiv.innerHTML=""

jobs.forEach((j,i)=>{
rev+=j.revenue
prof+=j.profit

j.alerts.forEach(a=>aHTML+=`<div class="alert">${a}</div>`)

jobsDiv.innerHTML+=`
<div class="card">
${j.name}<br>
$${j.revenue.toFixed(0)}<br>
<button onclick="downloadPDF(${i})">PDF</button>
</div>`
})

stats.innerHTML=`Jobs:${jobs.length}<br>Revenue:$${rev}<br>Profit:$${prof}`
alerts.innerHTML=aHTML||"No alerts"

renderChart()
}

function renderChart(){
let ctx=document.getElementById("chart")
let labels=jobs.map((_,i)=>"Job "+(i+1))
let rev=jobs.map(j=>j.revenue)
let prof=jobs.map(j=>j.profit)

if(window.chart)window.chart.destroy()

window.chart=new Chart(ctx,{
type:'bar',
data:{labels,datasets:[{label:'Revenue',data:rev},{label:'Profit',data:prof}]}
})
}

async function downloadPDF(i){
const { jsPDF }=window.jspdf
let j=jobs[i]
let doc=new jsPDF()

doc.setFontSize(18)
doc.text("Lawn Investment Plan",20,20)

doc.setFontSize(12)
doc.text("We design lawns that outperform standard installs.",20,35)
doc.text("Investment: $"+j.revenue.toFixed(0),20,50)

doc.save("proposal.pdf")
}

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",autoFillPrice)
})

render()

</script>

</body>
</html>
