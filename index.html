<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;margin:0}
.card{background:#111;padding:20px;margin:15px;border-radius:16px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:10px}
button{width:100%;padding:14px;background:#d4af37;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
.alert{color:red}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1">
<input id="sqft" placeholder="Sq Ft Per House">
<input id="margin" placeholder="Margin % (default 60)">

<h3>Labor & Overhead</h3>
<input id="laborRate" placeholder="Labor $/hr">
<input id="crewSize" placeholder="Crew Size">
<input id="hours" placeholder="Hours">
<input id="overhead" placeholder="Overhead %">

<button onclick="autoFillPrice()">Auto Fill Price</button>
<input id="jobPrice" placeholder="Final Price">

<button onclick="createJob()">Create Job</button>

<div id="pricingOutput"></div>
</div>

<div class="card">
<h2>Inventory</h2>

<input id="tttfCost" placeholder="TTTF Cost"><input id="tttfQty" placeholder="TTTF Qty">
<input id="ryeCost" placeholder="Rye Cost"><input id="ryeQty" placeholder="Rye Qty">
<input id="eliteCost" placeholder="Elite Cost"><input id="eliteQty" placeholder="Elite Qty">
<input id="kbgCost" placeholder="KBG Cost"><input id="kbgQty" placeholder="KBG Qty">

<input id="milCost" placeholder="Milorganite Cost"><input id="milQty" placeholder="Mil Qty">
<input id="espCost" placeholder="Espoma Cost"><input id="espQty" placeholder="Esp Qty">

<input id="woodCost" placeholder="Wood Mulch Cost"><input id="woodQty" placeholder="Wood Qty">
<input id="bfmCost" placeholder="BFM Cost"><input id="bfmQty" placeholder="BFM Qty">

<input id="tackCost" placeholder="Tack Cost"><input id="tackQty" placeholder="Tack Qty">

<input id="compCost" placeholder="Compost Cost"><input id="compQty" placeholder="Comp Qty">
<input id="bioCost" placeholder="Bio Cost"><input id="bioQty" placeholder="Bio Qty">
<input id="humCost" placeholder="Humic Cost"><input id="humQty" placeholder="Hum Qty">

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
<button onclick="clearJobs()" style="background:red">Clear Job History</button>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

let jobs = JSON.parse(localStorage.getItem("jobs")||"[]")
let inv = JSON.parse(localStorage.getItem("inv")||"{}")
let chart

const n=v=>parseFloat(v)||0
const sqftInput=document.getElementById("sqft")

// 🔒 STRICT MATERIAL GROUPS
const STANDARD_KEYS = ["tttf","rye","mil","wood","tack"]
const PREMIUM_KEYS = ["elite","kbg","esp","bfm","tack","comp","bio","hum"]

// ================= INVENTORY =================
function saveInventory(){

inv = {
tttf:{c:n(tttfCost.value),q:n(tttfQty.value)},
rye:{c:n(ryeCost.value),q:n(ryeQty.value)},
elite:{c:n(eliteCost.value),q:n(eliteQty.value)},
kbg:{c:n(kbgCost.value),q:n(kbgQty.value)},
mil:{c:n(milCost.value),q:n(milQty.value)},
esp:{c:n(espCost.value),q:n(espQty.value)},
wood:{c:n(woodCost.value),q:n(woodQty.value)},
bfm:{c:n(bfmCost.value),q:n(bfmQty.value)},
tack:{c:n(tackCost.value),q:n(tackQty.value)},
comp:{c:n(compCost.value),q:n(compQty.value)},
bio:{c:n(bioCost.value),q:n(bioQty.value)},
hum:{c:n(humCost.value),q:n(humQty.value)}
}

localStorage.setItem("inv",JSON.stringify(inv))
alert("Inventory Saved ✅")
}

// ================= MATERIALS =================
function getMaterials(tier,h){

const sqftVal=n(sqftInput.value)||5000
const factor=(sqftVal*h)/1000

if(tier==="standard"){
const seed=6*factor
return {
tttf:seed*0.85,
rye:seed*0.15,
mil:4*factor,
wood:40*factor,
tack:2*factor
}
}

const seed=5*factor
return {
elite:seed*0.8,
kbg:seed*0.2,
esp:4*factor,
bfm:50*factor,
tack:2*factor,
comp:15*factor,
bio:3*factor,
hum:2*factor
}
}

// ================= PRICING =================
function autoFillPrice(){

const h=Math.max(1,n(houses.value))
const sqftVal=n(sqftInput.value)||5000
const totalSqft=sqftVal*h

const mats=getMaterials(tier.value,h)

// 🔥 STRICT FILTER
const allowed = tier.value==="standard"?STANDARD_KEYS:PREMIUM_KEYS

let materialCost=0

allowed.forEach(key=>{
const qty=mats[key]||0
const item=inv[key]

if(item && qty>0){
materialCost+=qty*n(item.c)
}
})

if(materialCost<=0){
alert("Enter inventory costs")
return
}

// LABOR
const laborRate=n(document.getElementById("laborRate").value)
const crew=n(document.getElementById("crewSize").value)
const hrs=n(document.getElementById("hours").value)

let laborCost=laborRate*crew*hrs
if(isNaN(laborCost)) laborCost=0

// OVERHEAD
let overheadPercent=n(document.getElementById("overhead").value)||15
const overheadCost=(materialCost+laborCost)*(overheadPercent/100)

// TOTAL COST
const totalCost=materialCost+laborCost+overheadCost

// MARGIN
let marginPercent=n(document.getElementById("margin").value)||60
const basePrice=totalCost/(1-(marginPercent/100))

// DISCOUNT
let discount=0
if(h>=100)discount=0.30
else if(h>=50)discount=0.20
else if(h>=25)discount=0.10
else if(h>=2)discount=0.05

const finalPrice=basePrice*(1-discount)

// OUTPUT
jobPrice.value=finalPrice.toFixed(0)

pricingOutput.innerHTML=`
Materials: $${materialCost.toFixed(0)}<br>
Labor: $${laborCost.toFixed(0)}<br>
Overhead: $${overheadCost.toFixed(0)}<br>
<b>Total Cost: $${totalCost.toFixed(0)}</b><br><br>

Final Price: $${finalPrice.toFixed(0)}
`
}

// ================= CREATE JOB =================
function createJob(){

const h=Math.max(1,n(houses.value))
const revenue=n(jobPrice.value)

if(!revenue){
alert("Use Auto Fill Price")
return
}

const mats=getMaterials(tier.value,h)
const allowed = tier.value==="standard"?STANDARD_KEYS:PREMIUM_KEYS

let breakdown={}
let totalCost=0
let alertsList=[]

allowed.forEach(key=>{

const qty=n(mats[key]||0)
if(qty<=0) return

const item=inv[key]
if(!item) return

const available=n(item.q)
const cost=qty*n(item.c)

if(qty>available) alertsList.push(`🚨 ${key.toUpperCase()} SHORTAGE`)
else if((available-qty)<=5) alertsList.push(`⚠️ ${key.toUpperCase()} LOW`)

item.q=Math.max(0,available-qty)

breakdown[key]={qty,cost}
totalCost+=cost
})

const profit=revenue-totalCost

jobs.push({
name:name.value||"Client",
tier:tier.value,
revenue,
profit,
margin:(profit/revenue*100)||0,
materials:breakdown,
alerts:alertsList
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
}

// ================= RENDER =================
function render(){

let rev=0,prof=0,alertsHTML=""

jobs.forEach(j=>{
rev+=j.revenue
prof+=j.profit
j.alerts.forEach(a=>alertsHTML+=`<div class="alert">${a}</div>`)
})

stats.innerHTML=`
Jobs: ${jobs.length}<br>
Revenue: $${rev}<br>
Profit: $${prof}<br>
Margin: ${(prof/rev*100||0).toFixed(1)}%
`

alerts.innerHTML = alertsHTML || "No alerts ✅"

jobsDiv.innerHTML=""

jobs.slice().reverse().forEach(j=>{

let matHTML=""
let total=0

for(let m in j.materials){
const d=j.materials[m]
total+=d.cost
matHTML+=`${m.toUpperCase()}: ${d.qty.toFixed(2)} ($${d.cost.toFixed(0)})<br>`
}

jobsDiv.innerHTML+=`
<div class="card">
<b>${j.name} (${j.tier})</b><br>
Revenue: $${j.revenue}<br>
Profit: $${j.profit}<br>
Margin: ${j.margin.toFixed(1)}%<br><br>
${matHTML}
<b>Total Cost: $${total.toFixed(0)}</b>
</div>
`
})

// chart
if(chart)chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map((_,i)=>i+1),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})
}

function clearJobs(){
if(!confirm("Delete all jobs?"))return
jobs=[]
localStorage.removeItem("jobs")
render()
}

const jobsDiv=document.getElementById("jobs")

render()

</script>

</body>
</html>
