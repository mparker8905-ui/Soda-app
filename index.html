<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px}
input,select,button{width:100%;margin:6px 0;padding:12px;border-radius:10px;border:none;background:#222;color:#fff}
button{background:gold;color:#000;font-weight:bold}
.row{display:flex;gap:10px}
.row button{flex:1}
.big{font-size:28px;text-align:center}
.alert{color:red}
.section-break{margin:20px 0;border-top:1px solid #333}
</style>
</head>

<body>

<div class="card">

<h2>Create Job</h2>

<input id="name" placeholder="Customer">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Sqft">
<input id="houses" placeholder="Houses">

<h3>Labor</h3>
<input id="rate" placeholder="Rate" value="70">
<input id="crew" placeholder="Crew" value="2">
<input id="hours" placeholder="Hours" value="8">

<h3>Overhead / Margin</h3>
<input id="overhead" placeholder="Overhead %" value="15">
<input id="margin" placeholder="Margin %" value="40">

<div class="big" id="price">$0</div>
<div id="breakdown"></div>

<button onclick="createJob()">Create Job</button>

</div>

<!-- INVENTORY -->
<div class="card">
<h2>Inventory</h2>
<div id="inventory"></div>
<button onclick="saveInventory()">Save Inventory</button>
</div>

<!-- ALERTS -->
<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<!-- JOB HISTORY -->
<div class="card">
<h2>Job History</h2>
<button onclick="clearJobs()">Clear</button>
<div id="jobs"></div>
</div>

<!-- ANALYTICS -->
<div class="card">

<h2>Analytics</h2>

<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>

<div class="section-break"></div>

<h3>Total Revenue</h3>
<div id="totalRevenue"></div>

<h3>Total Profit</h3>
<div id="totalProfit"></div>

<div class="section-break"></div>

<h3>Fatal Costs</h3>
<div id="fatalCosts"></div>

</div>

<script>

const n=v=>Number(v)||0

let jobs=[]
let inventory={}

// ---------- MATERIALS ----------
const materials={
standard:{seed:6,fert:4,mulch:5,tack:1},
premium:{elite:6,kbg:2,fert:4,comp:10,bio:2,hum:2}
}

// ---------- SIZE ----------
function setSize(v){
sqft.value=v
calculate()
}

// ---------- INVENTORY ----------
function renderInventory(){

let html=""

Object.keys({...materials.standard,...materials.premium}).forEach(m=>{
let d=inventory[m]||{}
html+=`
<b>${m}</b>
<input id="${m}_cost" placeholder="cost" value="${d.cost||""}">
<input id="${m}_qty" placeholder="qty" value="${d.qty||""}">
`
})

inventory.innerHTML=html
}

function saveInventory(){

Object.keys({...materials.standard,...materials.premium}).forEach(m=>{
inventory[m]={
cost:n(document.getElementById(m+"_cost").value),
qty:n(document.getElementById(m+"_qty").value)
}
})

renderInventory()
}

// ---------- CALC ----------
function calculate(){

let sqftVal=n(sqft.value)
let housesVal=n(houses.value)||1

let matSet=materials[tier.value]

let materialCost=0
let used={}

Object.keys(matSet).forEach(m=>{
let usage=(matSet[m]*sqftVal*housesVal)/1000
let costPer=inventory[m]?.cost||20
let cost=usage*costPer

used[m]={usage,cost}
materialCost+=cost
})

// labor
let labor=n(rate.value)*n(crew.value)*n(hours.value)*housesVal

let overheadCost=(materialCost+labor)*(n(overhead.value)/100)

let totalCost=materialCost+labor+overheadCost

// pricing
let marginMult=1+(n(margin.value)/100)

if(strategy.value==="win") marginMult*=0.8
if(strategy.value==="max") marginMult*=1.2

let revenue=totalCost*marginMult

// builder discount
if(housesVal>=10 && housesVal<30) revenue*=0.9
if(housesVal>=30 && housesVal<75) revenue*=0.8
if(housesVal>=75) revenue*=0.7

let profit=revenue-totalCost
let marginPct=(profit/revenue)*100

window.calcData={materialCost,labor,totalCost,revenue,profit,marginPct,used}

price.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Cost: $${Math.round(totalCost)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`

}

// ---------- CREATE JOB ----------
function createJob(){

calculate()

let alertsArr=[]

Object.keys(calcData.used).forEach(m=>{
let u=calcData.used[m].usage

if(!inventory[m]) return

inventory[m].qty-=u

if(inventory[m].qty<=5){
alertsArr.push(m+" LOW")
}

if(inventory[m].qty<=0){
alertsArr.push(m+" OUT")
inventory[m].qty=0
}
})

jobs.push({...calcData,date:new Date().toLocaleString()})

render()
}

// ---------- RENDER ----------
function render(){

// alerts
alerts.innerHTML=""
Object.keys(inventory).forEach(m=>{
if(inventory[m].qty<=5){
alerts.innerHTML+=`<div class="alert">${m} low</div>`
}
})

// jobs
jobsDiv.innerHTML=""
jobs.forEach(j=>{

let matHTML=""
Object.entries(j.used).forEach(([k,v])=>{
matHTML+=`${k}: ${v.usage.toFixed(2)} ($${Math.round(v.cost)})<br>`
})

jobsDiv.innerHTML+=`
<div class="card">
${j.date}<br><br>
<b>Materials</b><br>
${matHTML}<br>
Material Cost:$${Math.round(j.materialCost)}<br>
Labor:$${Math.round(j.labor)}<br>
Revenue:$${Math.round(j.revenue)}<br>
Profit:$${Math.round(j.profit)}<br>
Margin:${j.marginPct.toFixed(1)}%
</div>`
})

// analytics totals
let totalRev=jobs.reduce((a,b)=>a+b.revenue,0)
let totalProf=jobs.reduce((a,b)=>a+b.profit,0)
let totalMat=jobs.reduce((a,b)=>a+b.materialCost,0)
let totalLabor=jobs.reduce((a,b)=>a+b.labor,0)

totalRevenue.innerHTML="$"+Math.round(totalRev)
totalProfit.innerHTML="$"+Math.round(totalProf)

fatalCosts.innerHTML=`
Material Spend: $${Math.round(totalMat)}<br>
Labor Spend: $${Math.round(totalLabor)}
`

buildCharts()
}

const jobsDiv=document.getElementById("jobs")

// ---------- CHARTS ----------
function buildCharts(){

if(window.revChart) window.revChart.destroy()
if(window.profitChart) window.profitChart.destroy()

revChart=new Chart(document.getElementById("revChart"),{
type:"line",
data:{
labels:jobs.map((_,i)=>"Job "+(i+1)),
datasets:[{label:"Revenue",data:jobs.map(j=>j.revenue)}]
}
})

profitChart=new Chart(document.getElementById("profitChart"),{
type:"line",
data:{
labels:jobs.map((_,i)=>"Job "+(i+1)),
datasets:[{label:"Profit",data:jobs.map(j=>j.profit)}]
}
})

}

// ---------- CLEAR ----------
function clearJobs(){
jobs=[]
render()
}

// init
renderInventory()

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

</script>

</body>
</html>
