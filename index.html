<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.row{display:flex;gap:8px}
.row button{flex:1}
.gold{color:#d4af37}
.alert{padding:6px;border-radius:6px;margin:4px 0}
.low{background:#665500}
.out{background:#661111}
.small{font-size:14px}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses">

<h3>Add Ons</h3>

<label><input type="checkbox" id="grow"> Grow System</label>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bioHum"> Bio/Hum Blend (50/50)</label>
<label><input type="checkbox" id="bio100"> Biochar 100%</label>
<label><input type="checkbox" id="hum100"> Humic 100%</label>

<h3>Schedule</h3>
<input type="date" id="quote">
<input type="date" id="soil">
<input type="date" id="aer">
<input type="date" id="comp">
<input type="date" id="hydro">
<input type="date" id="growInstall">
<input type="date" id="growRemove">
<input type="date" id="final">

<h3>Labor</h3>
<input id="rate" placeholder="Hourly Rate">
<input id="crew" placeholder="Crew Size">
<input id="hours" placeholder="Hours per house">

<h3 class="small">Target Margin %</h3>
<input id="margin">

<div class="card">
<h3 class="gold">Final Investment</h3>
<div id="price">$0</div>
<div id="breakdown"></div>
</div>

<button onclick="createJob()">Create Job</button>
<button onclick="openClient()">Client View</button>

</div>

<div class="card">
<h2>Inventory</h2>
<div id="inventory"></div>
<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>
<div class="gold" id="totals"></div>
</div>

<script>

let inventory={
seed:100,fert:100,mulch:100,
compost:100,bio:100,humic:100
}

let jobs=[]

tier.onchange=()=>{
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bioHum.checked=true
}
}

function setSize(v){
sqft.value=v
calculate()
}

function calculate(){

let sqftVal=Number(sqft.value)||0
let housesVal=Number(houses.value)||1

let seedUse=sqftVal/1000*housesVal
let matCost=seedUse*100

if(compost.checked) matCost+=seedUse*30
if(bioHum.checked){
matCost+=seedUse*25*0.5
matCost+=seedUse*20*0.5
}
if(bio100.checked) matCost+=seedUse*25
if(hum100.checked) matCost+=seedUse*20

let labor=(rate.value||0)*(crew.value||0)*(hours.value||0)*housesVal

let cost=matCost+labor

let m=(margin.value||0)/100
let revenue = m>0 ? cost/(1-m) : cost

if(strategy.value==="win") revenue*=0.9
if(strategy.value==="max") revenue*=1.2

let profit=revenue-cost
let marginPct = revenue>0 ? (profit/revenue)*100 : 0

price.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Materials: $${Math.round(matCost)}<br>
Labor: $${Math.round(labor)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`

return {seedUse,matCost,labor,revenue,profit,marginPct}
}

function createJob(){

let c=calculate()

inventory.seed-=c.seedUse
if(compost.checked) inventory.compost-=c.seedUse
if(bioHum.checked){
inventory.bio-=c.seedUse*0.5
inventory.humic-=c.seedUse*0.5
}
if(bio100.checked) inventory.bio-=c.seedUse
if(hum100.checked) inventory.humic-=c.seedUse

jobs.push({
name:customer.value,
date:quote.value||"N/A",
...c
})

renderJobs()
renderAlerts()
renderAnalytics()
renderInventory()
}

function renderJobs(){
jobs.innerHTML=""
jobs.forEach(j=>{
jobs.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
Quote: ${j.date}<br><br>
Materials: $${Math.round(j.matCost)}<br>
Labor: $${Math.round(j.labor)}<br>
Revenue: $${Math.round(j.revenue)}<br>
Profit: $${Math.round(j.profit)}<br>
Margin: ${j.marginPct.toFixed(1)}%
</div>
`
})
}

function renderAlerts(){
alerts.innerHTML=""
Object.keys(inventory).forEach(k=>{
if(inventory[k]<5) alerts.innerHTML+=`<div class="alert out">OUT: ${k}</div>`
else if(inventory[k]<20) alerts.innerHTML+=`<div class="alert low">LOW: ${k}</div>`
})
}

function renderInventory(){
inventory.innerHTML=""
Object.keys(inventory).forEach(k=>{
inventory.innerHTML+=`<div>${k}: ${Math.round(inventory[k])}</div>`
})
}

function saveInventory(){
alert("Saved")
}

function renderAnalytics(){

let rev=jobs.map(j=>j.revenue)
let prof=jobs.map(j=>j.profit)

new Chart(revChart,{type:"line",data:{labels:rev.map((_,i)=>i),datasets:[{data:rev}]}})
new Chart(profitChart,{type:"line",data:{labels:prof.map((_,i)=>i),datasets:[{data:prof}]}})

let totalRev=rev.reduce((a,b)=>a+b,0)
let totalProf=prof.reduce((a,b)=>a+b,0)
let margin= totalRev>0 ? (totalProf/totalRev)*100 : 0

totals.innerHTML=`
Total Revenue: $${Math.round(totalRev)}<br>
Total Profit: $${Math.round(totalProf)}<br>
Avg Margin: ${margin.toFixed(1)}%
`
}

function openClient(){
alert("Client view + PDF next upgrade")
}

document.querySelectorAll("input,select").forEach(el=>el.addEventListener("input",calculate))

renderInventory()

</script>

</body>
</html>
