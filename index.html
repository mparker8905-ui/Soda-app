<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {background:#000;color:#fff;font-family:sans-serif;margin:0}
.container{padding:15px}
.card{background:#111;padding:20px;margin-bottom:15px;border-radius:16px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:10px}
button{width:100%;padding:14px;background:#d4af37;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
.low{color:red}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>
<input id="name" placeholder="Customer Name">

<select id="size">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1">

<label><input type="checkbox" id="builder"> Builder Mode</label>
<input id="pricePerHouse" placeholder="Price Per House">

<button onclick="addJob()">Create Job</button>
</div>

<div class="card">
<h2>Material Costs</h2>
<input id="seedCost" placeholder="Seed Cost">
<input id="fertCost" placeholder="Fertilizer Cost">
<input id="mulchCost" placeholder="Mulch Cost">
<input id="tackCost" placeholder="Tackifier Cost">
<input id="soilCost" placeholder="Soil Additives Cost">
<button onclick="saveCosts()">Save Costs</button>
</div>

<div class="card">
<button onclick="clearJobs()">Clear Jobs</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobList"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let jobs = JSON.parse(localStorage.getItem("jobs")||"[]");
let costs = JSON.parse(localStorage.getItem("costs")||"{}");
let chart;

function n(v){return parseFloat(v)||0}

// SAVE COSTS
function saveCosts(){
costs={
seed:n(seedCost.value),
fert:n(fertCost.value),
mulch:n(mulchCost.value),
tack:n(tackCost.value),
soil:n(soilCost.value)
}
localStorage.setItem("costs",JSON.stringify(costs))
}

// MATERIAL RECIPES
function getMaterialUsage(tier){
if(tier==="standard"){
return {seed:1,fert:1,mulch:1,tack:1,soil:1}
}
return {seed:1.2,fert:1.2,mulch:1.3,tack:1.1,soil:1.5}
}

// ADD JOB
function addJob(){

const houses=Math.max(1,n(houses.value))
const builder=builder.checked
const price=n(pricePerHouse.value)

const base={
small:1500,
medium:2500,
large:3500
}[size.value]

const revenue=builder?price*houses:base*houses

const usage=getMaterialUsage(tier.value)

let matCost=
(costs.seed*usage.seed)+
(costs.fert*usage.fert)+
(costs.mulch*usage.mulch)+
(costs.tack*usage.tack)+
(costs.soil*usage.soil)

matCost*=houses

const profit=revenue-matCost
const margin=revenue?(profit/revenue*100):0

jobs.push({
name:name.value||"Client",
tier:tier.value,
houses,
revenue,
profit,
margin,
materials:usage,
date:new Date().toLocaleDateString()
})

localStorage.setItem("jobs",JSON.stringify(jobs))

render()
}

// RENDER
function render(){

let rev=0,prof=0
jobs.forEach(j=>{
rev+=j.revenue
prof+=j.profit
})

const margin=rev?(prof/rev*100).toFixed(1):0

stats.innerHTML=`
Jobs: ${jobs.length}<br>
Revenue: $${rev}<br>
Profit: $${prof}<br>
Margin: ${margin}%
`

jobList.innerHTML=""

jobs.forEach(j=>{
jobList.innerHTML+=`
<div>
<b>${j.name} (${j.tier})</b><br>
Houses: ${j.houses}<br>
Revenue: $${j.revenue}<br>
Profit: $${j.profit}<br>
Margin: ${j.margin.toFixed(1)}%<br>
Materials:<br>
Seed: ${j.materials.seed}<br>
Fert: ${j.materials.fert}<br>
Mulch: ${j.materials.mulch}<br>
Tack: ${j.materials.tack}<br>
Soil: ${j.materials.soil}
</div><hr>`
})

// FIX CHART BUG
if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map(j=>j.date),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})

}

function clearJobs(){
jobs=[]
localStorage.removeItem("jobs")
render()
}

render()

</script>
</body>
</html>
