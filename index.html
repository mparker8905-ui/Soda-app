<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px}
input,select,button{width:100%;margin:6px 0;padding:12px;border-radius:10px;border:none;background:#222;color:#fff}
button{background:gold;color:#000;font-weight:bold}
.row{display:flex;gap:10px}
.row button{flex:1}
.big{font-size:28px;text-align:center}
.gold{color:gold;font-weight:bold}
.alert{color:red}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Sqft">
<input id="houses" placeholder="Houses">

<h3>Labor</h3>
<input id="rate" value="70">
<input id="crew" value="2">
<input id="hours" value="8">

<h3>Overhead / Margin</h3>
<input id="overhead" value="15">
<input id="margin" value="40">

<div class="big" id="price">$0</div>
<div id="breakdown"></div>

<button onclick="createJob()">Create Job</button>
</div>

<!-- INVENTORY -->
<div class="card">
<h2>Inventory</h2>
<div id="inventoryUI"></div>
<button onclick="saveInventory()">Save Inventory</button>
</div>

<!-- ALERTS -->
<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<!-- JOB HISTORY -->
<div class="card">
<h2>Job History</h2>
<button onclick="clearJobs()">Clear</button>
<div id="jobs"></div>
</div>

<!-- ANALYTICS -->
<div class="card">
<h2>Analytics</h2>

<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>

<br>

<div class="gold">Total Revenue</div>
<div id="totalRevenue"></div>

<div class="gold">Total Profit</div>
<div id="totalProfit"></div>

<br>

<div class="gold">Fatal Costs</div>
<div id="fatalCosts"></div>

</div>

<script>

const n=v=>Number(v)||0

let jobs=[]
let inventoryData={}

// ---------- MATERIAL RATES (PER 1K SQFT) ----------
const materialRates={
standard:{seed:6,fert:4,mulch:5,tack:1},
premium:{elite:6,kbg:2,fert:4,comp:10,bio:2,hum:2}
}

// ---------- SIZE ----------
function setSize(v){
sqft.value=v
calculate()
}

// ---------- INVENTORY ----------
function renderInventory(){
let html=""

Object.keys({...materialRates.standard,...materialRates.premium}).forEach(m=>{
let d=inventoryData[m]||{}
html+=`
<b>${m}</b>
<input id="${m}_cost" placeholder="cost" value="${d.cost||""}">
<input id="${m}_qty" placeholder="qty" value="${d.qty||""}">
`
})

inventoryUI.innerHTML=html
}

function saveInventory(){
Object.keys({...materialRates.standard,...materialRates.premium}).forEach(m=>{
inventoryData[m]={
cost:n(document.getElementById(m+"_cost").value),
qty:n(document.getElementById(m+"_qty").value)
}
})
renderInventory()
}

// ---------- CALC ----------
function calculate(){

let sqftVal=n(sqft.value)
let housesVal=n(houses.value)||1

let matSet=materialRates[tier.value]

let totalMaterialCost=0
let usedMaterials={}

Object.keys(matSet).forEach(m=>{

// correct usage formula
let usagePerHouse = (matSet[m] * sqftVal) / 1000
let totalUsage = usagePerHouse * housesVal

let costPer = inventoryData[m]?.cost || 20
let cost = totalUsage * costPer

usedMaterials[m]={usage:totalUsage,cost}
totalMaterialCost+=cost

})

// labor
let labor=n(rate.value)*n(crew.value)*n(hours.value)*housesVal

let overheadCost=(totalMaterialCost+labor)*(n(overhead.value)/100)

let totalCost=totalMaterialCost+labor+overheadCost

// pricing
let marginMult=1+(n(margin.value)/100)

if(strategy.value==="win") marginMult*=0.85
if(strategy.value==="max") marginMult*=1.25

let revenue=totalCost*marginMult

// builder discount
if(housesVal>=10 && housesVal<30) revenue*=0.9
if(housesVal>=30 && housesVal<75) revenue*=0.8
if(housesVal>=75) revenue*=0.7

let profit=revenue-totalCost
let marginPct=(profit/revenue)*100

window.calcData={
usedMaterials,
totalMaterialCost,
labor,
totalCost,
revenue,
profit,
marginPct
}

price.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Cost: $${Math.round(totalCost)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`
}

// ---------- CREATE JOB ----------
function createJob(){

calculate()

// inventory deduction
Object.keys(calcData.usedMaterials).forEach(m=>{
if(!inventoryData[m]) return

inventoryData[m].qty -= calcData.usedMaterials[m].usage

if(inventoryData[m].qty < 0){
inventoryData[m].qty = 0
}
})

jobs.push({...calcData,date:new Date().toLocaleString()})

renderAll()
}

// ---------- RENDER ----------
function renderAll(){

// JOBS
jobs.innerHTML=""
jobs.forEach(j=>{

let matHTML=""
Object.entries(j.usedMaterials).forEach(([k,v])=>{
matHTML+=`${k}: ${v.usage.toFixed(2)} ($${Math.round(v.cost)})<br>`
})

jobs.innerHTML+=`
<div class="card">
${j.date}<br><br>
<b>Materials</b><br>
${matHTML}<br>
Material Cost:$${Math.round(j.totalMaterialCost)}<br>
Labor:$${Math.round(j.labor)}<br>
Revenue:$${Math.round(j.revenue)}<br>
Profit:$${Math.round(j.profit)}<br>
Margin:${j.marginPct.toFixed(1)}%
</div>`
})

// TOTALS
let totalRev=jobs.reduce((a,b)=>a+b.revenue,0)
let totalProf=jobs.reduce((a,b)=>a+b.profit,0)
let totalMat=jobs.reduce((a,b)=>a+b.totalMaterialCost,0)
let totalLabor=jobs.reduce((a,b)=>a+b.labor,0)

totalRevenue.innerHTML="$"+Math.round(totalRev)
totalProfit.innerHTML="$"+Math.round(totalProf)

fatalCosts.innerHTML=`
Material Spend: $${Math.round(totalMat)}<br>
Labor Spend: $${Math.round(totalLabor)}
`

buildCharts()
}

// ---------- CHARTS ----------
let revChart, profitChart

function buildCharts(){

let labels=jobs.map((_,i)=>"Job "+(i+1))
let revData=jobs.map(j=>j.revenue)
let profitData=jobs.map(j=>j.profit)

if(revChart) revChart.destroy()
if(profitChart) profitChart.destroy()

revChart=new Chart(revChartCanvas,{
type:"line",
data:{labels,datasets:[{label:"Revenue",data:revData}]}
})

profitChart=new Chart(profitChartCanvas,{
type:"line",
data:{labels,datasets:[{label:"Profit",data:profitData}]}
})

}

const revChartCanvas=document.getElementById("revChart")
const profitChartCanvas=document.getElementById("profitChart")

// ---------- CLEAR ----------
function clearJobs(){
jobs=[]
renderAll()
}

// INIT
renderInventory()

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

</script>

</body>
</html>
