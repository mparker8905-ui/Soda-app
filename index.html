<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:15px}
.card{background:#121212;padding:15px;margin-bottom:15px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:8px;background:#1a1a1a;color:#fff;border-radius:8px;border:1px solid #333}
button{width:100%;padding:12px;margin-top:10px;background:#d4af37;border:none;border-radius:8px;font-weight:bold}
.gold{color:#d4af37;font-size:22px;font-weight:bold}
.job{background:#0f0f0f;padding:10px;margin-top:10px;border-left:3px solid #d4af37;border-radius:8px}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">
<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses" value="1">
<input id="margin" placeholder="Target Margin %" value="40">
<input id="overhead" placeholder="Overhead %" value="15">

<h3>Add Ons</h3>

<label><input type="checkbox" id="aeration"> Aeration</label><br>
<label><input type="checkbox" id="compost"> Compost</label><br>
<label><input type="checkbox" id="bioHum"> Bio/Hum Blend</label><br>

<label><input type="checkbox" id="lime"> Lime</label>
<input id="limeQty" placeholder="Lime Amount">

<label><input type="checkbox" id="sulfur"> Sulfur</label>
<input id="sulfurQty" placeholder="Sulfur Amount">

<div class="card" style="border:2px solid #d4af37;text-align:center">
<h3>Final Investment</h3>
<div id="finalPrice"></div>
<div id="finalBreakdown"></div>
</div>

<button id="premiumBtn">Auto Apply Premium</button>
<button id="createBtn">Create Job</button>
<button id="proposalBtn">View Proposal</button>
</div>

<div class="card">
<h3>Inventory</h3>
<div id="inventoryUI"></div>
<button id="saveBtn">Save Inventory</button>
</div>

<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

<div class="card">
<h3>Job History</h3>
<div id="jobHistory"></div>
</div>

<div class="card">
<h3>Totals</h3>
<div id="totals" class="gold"></div>
</div>

<script>

// ========= ELEMENTS =========
const customer = document.getElementById("customer")
const tier = document.getElementById("tier")
const sqft = document.getElementById("sqft")
const houses = document.getElementById("houses")
const margin = document.getElementById("margin")
const overhead = document.getElementById("overhead")

const aeration = document.getElementById("aeration")
const compost = document.getElementById("compost")
const bioHum = document.getElementById("bioHum")
const lime = document.getElementById("lime")
const sulfur = document.getElementById("sulfur")

const limeQty = document.getElementById("limeQty")
const sulfurQty = document.getElementById("sulfurQty")

const finalPrice = document.getElementById("finalPrice")
const finalBreakdown = document.getElementById("finalBreakdown")

const inventoryUI = document.getElementById("inventoryUI")
const alertsBox = document.getElementById("alerts")
const jobHistory = document.getElementById("jobHistory")
const totals = document.getElementById("totals")

// ========= STATE =========
let app = JSON.parse(localStorage.getItem("soda")) || {
inventory:[
{name:"seed",cost:80,qty:50},
{name:"fert",cost:40,qty:50},
{name:"mulch",cost:35,qty:50},
{name:"tack",cost:25,qty:50},
{name:"bio",cost:25,qty:50},
{name:"humic",cost:20,qty:50},
{name:"lime",cost:15,qty:50},
{name:"sulfur",cost:20,qty:50}
],
jobs:[]
}

// ========= SAVE =========
function save(){
localStorage.setItem("soda",JSON.stringify(app))
alert("Saved ✅")
}

// ========= CALCULATE =========
function calculate(){

let s = Number(sqft.value)||0
let h = Number(houses.value)||1
let m = (Number(margin.value)||40)/100
let o = (Number(overhead.value)||15)/100

let factor = s/5000

let used = {
seed:0.5*factor*h,
fert:1*factor*h,
mulch:1*factor*h,
tack:0.5*factor*h,
bio: bioHum.checked ? 0.5*factor*h : 0,
humic: bioHum.checked ? 0.5*factor*h : 0,
lime: lime.checked ? Number(limeQty.value)||0 : 0,
sulfur: sulfur.checked ? Number(sulfurQty.value)||0 : 0
}

let materialCost = 0

app.inventory.forEach(i=>{
if(used[i.name]){
materialCost += used[i.name]*i.cost
}
})

let labor = s<5000?200:400
labor *= h

let overheadCost = (materialCost+labor)*o

let cost = materialCost+labor+overheadCost
let revenue = cost/(1-m)
let profit = revenue-cost

finalPrice.innerHTML = "$"+Math.round(revenue)

finalBreakdown.innerHTML = `
Cost: $${Math.round(cost)}<br>
Profit: $${Math.round(profit)}
`

return {used,materialCost,cost,revenue,profit}
}

// ========= EVENTS =========
document.getElementById("premiumBtn").onclick=()=>{
aeration.checked=true
compost.checked=true
bioHum.checked=true
calculate()
}

document.getElementById("createBtn").onclick=()=>{

if(!customer.value){alert("Enter name");return}

let data = calculate()

app.jobs.push({
name:customer.value,
...data
})

app.inventory.forEach(i=>{
if(data.used[i.name]){
i.qty -= data.used[i.name]
if(i.qty<0)i.qty=0
}
})

save()
render()

}

document.getElementById("proposalBtn").onclick=()=>{
let d = calculate()
let w = window.open()
w.document.write(`<h1>Proposal</h1>$${Math.round(d.revenue)}`)
}

document.getElementById("saveBtn").onclick=save

// ========= RENDER =========
function render(){

inventoryUI.innerHTML = app.inventory.map((i,index)=>`
<input value="${i.name}" onchange="app.inventory[${index}].name=this.value">
<input value="${i.cost}" onchange="app.inventory[${index}].cost=+this.value">
<input value="${i.qty}" onchange="app.inventory[${index}].qty=+this.value">
`).join("")

jobHistory.innerHTML = app.jobs.map(j=>`
<div class="job">
<b>${j.name}</b><br>
Revenue: $${Math.round(j.revenue)}<br>
Profit: $${Math.round(j.profit)}
</div>
`).join("")

let alerts=[]
app.inventory.forEach(i=>{
if(i.qty<5)alerts.push("OUT: "+i.name)
else if(i.qty<20)alerts.push("LOW: "+i.name)
})

alertsBox.innerHTML = alerts.join("<br>") || "All good"

let rev=app.jobs.reduce((a,b)=>a+b.revenue,0)
let prof=app.jobs.reduce((a,b)=>a+b.profit,0)

totals.innerHTML = `
Revenue: $${Math.round(rev)}<br>
Profit: $${Math.round(prof)}
`
}

// ========= LIVE =========
setInterval(calculate,500)

render()

</script>

</body>
</html>
