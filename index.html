<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif}
.card{background:#111;padding:20px;margin:15px;border-radius:16px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:10px}
button{width:100%;padding:14px;background:#d4af37;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="size">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1">

<label><input type="checkbox" id="builder"> Builder Mode</label>
<input id="pricePerHouse" placeholder="Price Per House">

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory Costs</h2>

<input id="tttf" placeholder="TTTF Blend Cost">
<input id="rye" placeholder="Ryegrass Cost">
<input id="milorganite" placeholder="Milorganite Cost">
<input id="espoma" placeholder="Espoma Cost">
<input id="wood" placeholder="Wood Mulch Cost">
<input id="bfm" placeholder="BFM Mulch Cost">
<input id="tack" placeholder="Tackifier Cost">
<input id="compost" placeholder="Compost Cost">
<input id="biochar" placeholder="Biochar Cost">
<input id="humic" placeholder="Humic Cost">

<button onclick="saveCosts()">Save Costs</button>
</div>

<div class="card">
<button onclick="resetApp()">RESET APP</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

let jobs = JSON.parse(localStorage.getItem("jobs")||"[]")
let costs = JSON.parse(localStorage.getItem("costs")||"{}")
let chart

const n=v=>parseFloat(v)||0

function saveCosts(){
costs={
tttf:n(tttf.value),
rye:n(rye.value),
milorganite:n(milorganite.value),
espoma:n(espoma.value),
wood:n(wood.value),
bfm:n(bfm.value),
tack:n(tack.value),
compost:n(compost.value),
biochar:n(biochar.value),
humic:n(humic.value)
}
localStorage.setItem("costs",JSON.stringify(costs))
}

// MATERIAL RECIPES
function getMaterials(tier,houses){

if(tier==="standard"){
return {
seed: (1*houses),
fert: (costs.milorganite||0)*houses,
mulch: (costs.wood||0)*houses,
tack: (costs.tack||0)*houses,
soil: ((costs.compost||0)+(costs.biochar||0)+(costs.humic||0))*houses
}
}

return {
seed: (1.2*houses),
fert: (costs.espoma||0)*houses,
mulch: (costs.bfm||0)*houses,
tack: (costs.tack||0)*houses,
soil: ((costs.compost||0)+(costs.biochar||0)+(costs.humic||0))*0.5*houses
}

}

// CREATE JOB
function createJob(){

const houses=Math.max(1,n(housesInput()))
const tierVal=tier.value
const builderMode=builder.checked
const price=n(pricePerHouse.value)

const base={
small:1500,
medium:2500,
large:3500
}[size.value] || 1500

let revenue = builderMode ? (price*houses) : (base*houses)

if(!revenue) revenue = base*houses

const mats=getMaterials(tierVal,houses)

const matCost = mats.fert + mats.mulch + mats.tack + mats.soil

const profit = revenue - matCost
const margin = revenue ? (profit/revenue*100) : 0

jobs.push({
name:name.value||"Client",
tier:tierVal,
houses,
revenue,
profit,
margin,
materials:mats,
date:new Date().toLocaleDateString()
})

localStorage.setItem("jobs",JSON.stringify(jobs))
render()
}

function housesInput(){
return document.getElementById("houses").value
}

// RENDER
function render(){

let rev=0,prof=0

jobs.forEach(j=>{
rev+=n(j.revenue)
prof+=n(j.profit)
})

stats.innerHTML=`
Jobs: ${jobs.length}<br>
Revenue: $${rev}<br>
Profit: $${prof}<br>
Margin: ${(prof/rev*100||0).toFixed(1)}%
`

jobsDiv.innerHTML=""

jobs.forEach(j=>{
jobsDiv.innerHTML+=`
<div>
<b>${j.name} (${j.tier})</b><br>
Houses: ${j.houses}<br>
Revenue: $${j.revenue}<br>
Profit: $${j.profit}<br>
Margin: ${j.margin.toFixed(1)}%<br>
Materials:<br>
Seed Units: ${j.materials.seed}<br>
Fertilizer: $${j.materials.fert}<br>
Mulch: $${j.materials.mulch}<br>
Tackifier: $${j.materials.tack}<br>
Soil Additives: $${j.materials.soil}
</div><hr>`
})

// CHART FIX
if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map(j=>j.date),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})

}

function resetApp(){
localStorage.clear()
jobs=[]
render()
}

const jobsDiv=document.getElementById("jobs")

render()

</script>

</body>
</html>
