<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{padding:12px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;}
.big{font-size:28px}
.alert{color:red;font-weight:bold;}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="sqft" placeholder="Square Feet" value="3000">

<h3>Labor</h3>
<input id="rate" placeholder="Hourly Rate" value="70">
<input id="crew" placeholder="Crew Size" value="2">
<input id="hours" placeholder="Hours" value="8">

<h3>Overhead %</h3>
<input id="overhead" value="15">

<h3>Margin %</h3>
<input id="margin" value="40">

<div class="price-box">
<div>Final Investment</div>
<div id="price" class="big">$0</div>

<div id="breakdown"></div>
</div>

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory (by Brand)</h2>

<div id="inventory"></div>

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts">No alerts</div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

// ---------- HELPERS ----------
const n=v=>Number(v)||0

// ---------- STORAGE ----------
let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inventory=JSON.parse(localStorage.getItem("inventory")||"{}")

// ---------- MATERIAL MODEL ----------
const materials = {
seed:{rate:6},
fert:{rate:4},
comp:{rate:5},
bio:{rate:2},
hum:{rate:2}
}

// ---------- INVENTORY UI ----------
function renderInventory(){
let html=""
Object.keys(materials).forEach(m=>{
html+=`
<b>${m.toUpperCase()}</b>
<input id="${m}_brand" placeholder="brand">
<input id="${m}_cost" placeholder="cost per unit">
<input id="${m}_qty" placeholder="qty">
`
})
inventoryDiv.innerHTML=html
}
const inventoryDiv=document.getElementById("inventory")
renderInventory()

function saveInventory(){
Object.keys(materials).forEach(m=>{
inventory[m]={
brand:document.getElementById(m+"_brand").value,
cost:n(document.getElementById(m+"_cost").value),
qty:n(document.getElementById(m+"_qty").value)
}
})
localStorage.setItem("inventory",JSON.stringify(inventory))
alert("Saved")
}

// ---------- CALC ----------
function calculate(){

let sqft=n(document.getElementById("sqft").value)

// MATERIAL USAGE
let materialCost=0
let used={}

Object.keys(materials).forEach(m=>{
let usage=(materials[m].rate*sqft)/1000
let inv=inventory[m]||{cost:20}

let cost=usage*(inv.cost||20)

used[m]={usage,cost}

materialCost+=cost
})

// LABOR
let labor=n(rate.value)*n(crew.value)*n(hours.value)

// OVERHEAD
let overheadCost=(materialCost+labor)*(n(overhead.value)/100)

let totalCost=materialCost+labor+overheadCost

let revenue=totalCost*(1+(n(margin.value)/100))
let profit=revenue-totalCost
let marginPct=(profit/revenue)*100

window.calcData={materialCost,labor,overheadCost,totalCost,revenue,profit,marginPct,used}

price.innerText="$"+Math.round(revenue)

breakdown.innerHTML=`
Cost: $${Math.round(totalCost)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`
}

// ---------- CREATE JOB ----------
function createJob(){

calculate()

let alertsArr=[]

// DEDUCT REAL MATERIALS
Object.keys(window.calcData.used).forEach(m=>{
let usage=window.calcData.used[m].usage

if(!inventory[m]) return

inventory[m].qty -= usage

if(inventory[m].qty<=0){
alertsArr.push(m+" OUT")
inventory[m].qty=0
}
})

localStorage.setItem("inventory",JSON.stringify(inventory))

jobs.push({
name:name.value||"Client",
...window.calcData,
alerts:alertsArr,
date:new Date().toLocaleString()
})

localStorage.setItem("jobs",JSON.stringify(jobs))

render()
}

// ---------- RENDER ----------
function render(){

// ALERTS
let alertHTML=""
jobs.forEach(j=>{
j.alerts.forEach(a=>{
alertHTML+=`<div class="alert">${a}</div>`
})
})
alerts.innerHTML=alertHTML||"No alerts"

// JOBS
let jobsHTML=""
jobs.forEach(j=>{

let matHTML=""
Object.entries(j.used).forEach(([k,v])=>{
matHTML+=`${k}: ${v.usage.toFixed(1)} ($${Math.round(v.cost)})<br>`
})

jobsHTML+=`
<div class="card">
<b>${j.name}</b><br>
${j.date}<br><br>

<b>Materials Used</b><br>
${matHTML}<br>

Cost:$${Math.round(j.totalCost)}<br>
Revenue:$${Math.round(j.revenue)}<br>
Profit:$${Math.round(j.profit)}<br>
Margin:${j.marginPct.toFixed(1)}%
</div>`
})

document.getElementById("jobs").innerHTML=jobsHTML

// CHART
if(window.chart) window.chart.destroy()

window.chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map((_,i)=>"Job "+(i+1)),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})
}

// ---------- LIVE ----------
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

calculate()
render()

</script>

</body>
</html>
