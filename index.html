<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  background:#000;
  color:#fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.card{background:#111;padding:15px;border-radius:12px;margin-bottom:20px}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  background:#222;
  border:1px solid #333;
  color:#fff;
  border-radius:8px
}

.row{display:flex;gap:10px}
.row button{flex:1}

/* TOGGLES */
.toggle{
  background:#1a1a1a;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  border:1px solid #2a2a2a;
  text-align:center;
  transition:.2s;
}

.toggle.active{
  background:#d4af37;
  color:#000;
  border:1px solid #d4af37;
}

.results-card {
  border: 2px solid gold;
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  color: gold;
  background: #111; /* optional dark background */
}

.results-card h2 {
  color: gold;
  margin-bottom: 10px;
}

#results {
  color: gold;
}

/* ===== HEADER ===== */

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 5px;
}

.brand h1{
  margin:0;
  font-size:22px;
  letter-spacing:0.5px;
}

.tagline{
  font-size:12px;
  color:#aaa;
  margin-top:2px;
}

/* LOGO */
.logo{
  width:55px;
  height:auto;
  filter: drop-shadow(0 0 6px rgba(212,175,55,0.4));
}

/* GOLD DIVIDER */
.gold-line{
  height:2px;
  background:linear-gradient(
    90deg,
    transparent,
    #d4af37,
    transparent
  );
  margin:10px 0 20px 0;
}

.inventory-section{
  margin-top:15px;
  padding:12px;
  border:1px solid #333;
  border-radius:10px;
  background:#0d0d0d;

  display:flex;
  flex-direction:column;
}

.inventory-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;

  flex-wrap:wrap; /* 🔥 ADD THIS */
}

.inventory-header span{
  flex:1;
}

.inventory-actions{
  display:flex;
  gap:8px;
  flex-shrink:0; /* prevents squishing */
}

.inventory-header button{
  width:32px;
  height:32px;
  font-size:18px;
  padding:0;
  background:#d4af37;
  color:#000;
  border:none;
  border-radius:6px;
}

.material-row{
  display:flex;
  flex-direction:column; /* KEY FIX */
  gap:8px;

  background:#111;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 0 8px rgba(212,175,55,0.15);
}

.material-row input{
  flex:1;
  padding:10px;
  font-size:12px;
}

.material-row{
  width:100%;
  box-sizing:border-box;

  background:#111;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;

  box-shadow:0 0 8px rgba(212,175,55,0.15);
}

.mat-select,
.mat-input{
  width:100%;
  box-sizing:border-box; /* 👈 ADD THIS */
  padding:12px;
  border-radius:8px;
  background:#222;
  color:#fff;
  border:1px solid #333;
  font-size:14px;
}

.mat-label{
  font-size:12px;
  color:#aaa;
  margin-top:4px;
}

.row-top{
  display:flex;
  gap:8px;
  align-items:center;
  width:100%;
}

.row-top .mat-select{
  flex:1;
  min-width:0; /* 🔥 prevents overflow */
}

.delete-btn{
  width:40px;
  height:40px;
  background:#ff4d4d;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.delete-btn:active{
  transform:scale(0.95);
}

#standardMaterials,
#premiumMaterials,
#addonMaterials{
  display:flex;
  flex-direction:column;
  gap:10px;
}

</style>

</head>

<body>

<div class="header">
  <div class="brand">
    <h1>SoDa Outdoor Designs</h1>
    <div class="tagline">We build lawns from the soil up</div>
  </div>

  <img src="/logo.PNG" class="logo">
</div>

<div class="gold-line"></div>

<!-- NEW: CUSTOMER -->
<input id="customer" placeholder="Customer Name">

<input id="address" placeholder="Client Address">

<!-- NEW: PACKAGE -->
<select id="package" onchange="handlePackage()">
  <option value="standard">Standard</option>
  <option value="premium">Premium</option>
</select>

<select id="pricingMode">
  <option value="balanced">Balanced</option>
  <option value="win">Win Job</option>
  <option value="max">Maximize Profits</option>
</select>

<input id="sqft" placeholder="Square Feet">

<div class="row">
  <button onclick="setSize(3000)">Small</button>
  <button onclick="setSize(6000)">Medium</button>
  <button onclick="setSize(12000)">Large</button>
</div>

</div>

<input id="houses" type="number" value="1" min="1" placeholder="# of Houses">

<input id="targetMargin" type="number" placeholder="Target Profit Margin (%)">

<div class="card">
<h2>Add Ons</h2>

<div class="toggle" data-name="aeration" onclick="toggleAddon(this)">Aeration</div>
<div class="toggle" data-name="compost" onclick="toggleAddon(this)">Compost</div>
<div class="toggle" data-name="biohum" onclick="toggleAddon(this)">Bio / Hum Blend</div>
<div class="toggle" data-name="biochar" onclick="toggleAddon(this)">Biochar 100%</div>
<div class="toggle" data-name="humic" onclick="toggleAddon(this)">Humic Acid 100%</div>
<div class="toggle" data-name="grow" onclick="toggleAddon(this)">Grow System</div>

<div class="toggle" data-name="lime" onclick="toggleAddon(this)">Lime</div>

<div class="toggle" data-name="sulfur" onclick="toggleAddon(this)">Sulfur</div>

</div>

<div class="card">
  <h2>Labor & Overhead</h2>

  <input id="hourlyRate" type="number" placeholder="Hourly Rate ($)">
  <input id="hoursPerHouse" type="number" placeholder="Hours per House">
  <input id="crewSize" type="number" placeholder="Crew Size">
  <input id="overhead" type="number" placeholder="Overhead (%)">
</div>

<div class="card results-card">
  <h2>Job Breakdown</h2>
  <div id="results"></div>
</div>

<button onclick="openClientView()">Client View</button>

<button onclick="sendProposal()">Send Proposal</button>

<button onclick="useInventoryForJob()">Use Inventory for Job</button>

<div class="card">
  <h2>Inventory</h2>

  <!-- STANDARD -->
  <div class="inventory-section">
    <div class="inventory-header">
      <span>Standard Package</span>

      <div class="inventory-actions">
        <button onclick="addMaterialRow('standard')">+</button>
      </div>
    </div>

    <div id="standardMaterials"></div>
  </div>

  <!-- PREMIUM -->
  <div class="inventory-section">
    <div class="inventory-header">
      <span>Premium Package</span>

      <div class="inventory-actions">
        <button onclick="addMaterialRow('premium')">+</button>
      </div>
    </div>

    <div id="premiumMaterials"></div>
  </div>

  <!-- ADD-ONS -->
  <div class="inventory-section">
    <div class="inventory-header">
      <span>Add-On Materials</span>

      <div class="inventory-actions">
        <button onclick="addMaterialRow('addons')">+</button>
      </div>
    </div>

    <div id="addonMaterials"></div>
  </div>

</div>

<button onclick="saveInventory()">Save Inventory</button>

<button onclick="exportInventory()">Export Inventory</button>

<button onclick="generateInventoryPDF()">Inventory PDF</button>

<script>

//===========================
//==== STATE
//===========================
let app = {
  job:{
    addons:{
      aeration:false,
      compost:false,
      biohum:false,
      biochar:false,
      humic:false,
      grow:false,
      lime:false,
      sulfur:false
    }
  }
}

const RATES = {
  seed: 5,        // lbs per 1000 sqft
  fert: 4,
  mulch: 50,      // lbs
  tackifier: 3,

  compost: 0.5,   // yards per 1000 sqft
  biohum: 2,      // gallons

  lime: 10,       // lbs
  sulfur: 5
}

const COSTS = {
  seed: 80,
  fert: 40,
  mulch: 35,
  tackifier: 25,

  compost: 60,
  biohum: 25,

  lime: 15,
  sulfur: 20,

  biochar: 30,
  humic: 25,
  grow: 50
}

const MATERIAL_RATES = {
  seed:       { rate: 5, unit: "lbs" },
  fertilizer: { rate: 4, unit: "lbs" },
  mulch:      { rate: 50, unit: "lbs" },
  tackifier:  { rate: 3, unit: "lbs" },

  compost:    { rate: 0.5, unit: "yd3" },
  biochar:    { rate: 10, unit: "lbs" },
  humic:      { rate: 1, unit: "lbs" },

  lime:       { rate: 4, unit: "lbs" },
  sulfur:     { rate: 8, unit: "lbs" },

  sprinklers: { rate: 1, unit: "units" }
  timers: { rate: 1, unit: "units" }
}

//==============================
//HELPERS
//==============================

//==================
//== UNIT LABEL
//==================

function updateUnitLabel(selectEl){

  let row = selectEl.closest(".material-row")
  let label = row.querySelector(".unit-label")

  let type = selectEl.value

  let unit = MATERIAL_RATES[type]?.unit || ""

  if(unit){
    label.innerText = `Quantity Available (${unit})`
  } else {
    label.innerText = "Quantity Available"
  }
}

// ==============================
// SIZE BUTTONS
// ==============================

function setSize(val){
  document.getElementById("sqft").value = val
  render()
}

// ==============================
// TOGGLE BUTTONS 
// ==============================

function toggleAddon(el){
  let name = el.dataset.name

  // safety check
  if(!app.job.addons){
    app.job.addons = {}
  }

  app.job.addons[name] = !app.job.addons[name]

  el.classList.toggle("active")

  render()
}

//==============================
//==== BUILDER MODE
//==============================

function getBuilderMultiplier(houses){

  if(houses <= 1) return 1
  if(houses <= 5) return 0.95
  if(houses <= 10) return 0.9
  if(houses <= 20) return 0.85
  if(houses <= 50) return 0.80
  return 0.75
}

//============================
//==== CALCULATE JOB
//============================

function calculateJob(){

  let sqft = Number(document.getElementById("sqft")?.value) || 0
  let houses = Number(document.getElementById("houses")?.value) || 1
  let packageType = document.getElementById("package")?.value || "standard"
  let pricingMode = document.getElementById("pricingMode")?.value || "balanced"
  let targetMarginInput = Number(document.getElementById("targetMargin")?.value)

  let builderMult = getBuilderMultiplier(houses)

  let totalSqft = sqft * houses

  // ==============================
  // LABOR INPUTS
  // ==============================

  let hourlyRate = Number(document.getElementById("hourlyRate")?.value) || 0
  let hoursPerHouse = Number(document.getElementById("hoursPerHouse")?.value) || 0
  let crewSize = Number(document.getElementById("crewSize")?.value) || 1
  let overheadPct = Number(document.getElementById("overhead")?.value) || 0

  let laborEfficiency = 1 - ((1 - builderMult) * 0.5)
  let totalHours = hoursPerHouse * houses * laborEfficiency
  let laborCost = totalHours * hourlyRate * crewSize

  // ==========================
  // BASE COST
  // ==========================

  let baseRate = 0

  if(packageType === "standard") baseRate = 0.18
  if(packageType === "premium") baseRate = 0.30

 let inventory = getInventoryCost()

let baseCost = totalSqft * baseRate
if(baseCost < 500) baseCost = 500

// 🔥 NEW LOGIC
let materialCost = baseCost + inventory.total
  let addonCosts = {
  aeration: 0,
  compost: 0,
  biohum: 0,
  biochar: 0,
  humic: 0,
  grow: 0,
  lime: 0,
  sulfur: 0
}

  // ==========================
  // ADDONS
  // ==========================

  let addons = app.job.addons || {}

  function isIncluded(name){
    if(packageType !== "premium") return false
    return ["aeration","compost","biohum","lime","sulfur"].includes(name)
  }

// Aeration
if(addons.aeration && !isIncluded("aeration")){
  let cost = totalSqft * 0.04
  materialCost += cost
  addonCosts.aeration = cost
}

// Compost
if(addons.compost && !isIncluded("compost")){
  let cost = totalSqft * 0.10
  materialCost += cost
  addonCosts.compost = cost
}

// Bio/Hum Blend
if(addons.biohum && !isIncluded("biohum")){
  let cost = totalSqft * 0.12
  materialCost += cost
  addonCosts.biohum = cost
}

// Biochar
if(addons.biochar){
  let cost = totalSqft * 0.20
  materialCost += cost
  addonCosts.biochar = cost
}

// Humic
if(addons.humic){
  let cost = totalSqft * 0.01
  materialCost += cost
  addonCosts.humic = cost
}

// Grow System
if(addons.grow){

  let weeklyCost = (50 * 3) * houses
  let installCost = 0

  if(packageType === "standard"){
    installCost = houses <= 1 
      ? totalSqft * 0.05 
      : totalSqft * 0.03
  }

  let cost = weeklyCost + installCost
  materialCost += cost
  addonCosts.grow = cost
}

// Lime
if(addons.lime && !isIncluded("lime")){
  let cost = totalSqft * 0.004
  materialCost += cost
  addonCosts.lime = cost
}

// Sulfur
if(addons.sulfur && !isIncluded("sulfur")){
  let cost = totalSqft * 0.008
  materialCost += cost
  addonCosts.sulfur = cost
}

  // ==========================
  // OVERHEAD (AFTER MATERIAL)
  // ==========================

  let overheadCost = (materialCost + laborCost) * (overheadPct / 100)

  let totalCost = materialCost + laborCost + overheadCost

  // ==========================
  // PRICING
  // ==========================

  let margin

  if(targetMarginInput && targetMarginInput > 0){
    margin = targetMarginInput / 100
  } else {
    margin = 0.3
    if(pricingMode === "win") margin = 0.15
    if(pricingMode === "balanced") margin = 0.3
    if(pricingMode === "max") margin = 0.5
  }

  if(houses >= 10) margin -= 0.03
  if(houses >= 20) margin -= 0.05
  if(houses >= 50) margin -= 0.08

  if(margin < 0.1) margin = 0.1

  let price = totalCost / (1 - margin)
  let profit = price - totalCost

  return {
    sqft,
    houses,
    totalSqft,
    cost: totalCost,
    price,
    profit,
    laborCost,
    overheadCost,
    totalHours,
    addonCosts
  }
}

//=============================
//=====RENDER
//=============================

function render(){
  try{

    let r = calculateJob()
    let inv = getInventoryCost()
    let needs = getMaterialNeeds(r)
    let inventoryTotals = getInventoryTotals()
    let materialNeeds = getMaterialNeeds(r)
    let comparison = compareInventory(needs, inventoryTotals)
    let currentPackage = document.getElementById("package")?.value || "standard"
    let altPackage = currentPackage === "standard" ? "premium" : "standard"

    // temporarily switch package
    document.getElementById("package").value = altPackage
    let alt = calculateJob()
    document.getElementById("package").value = currentPackage

    let priceDiff = alt.price - r.price
    let profitDiff = alt.profit - r.profit
    let priceDiffColor = priceDiff > 0 ? "red" : "lime"
    let profitDiffColor = profitDiff > 0 ? "lime" : "red"

    let a = r.addonCosts || {}

    let packageType = currentPackage

    function isIncluded(name){
      if(packageType !== "premium") return false
      return ["aeration","compost","biohum","lime","sulfur"].includes(name)
    }

    // ======================
    // ADD-ONS HTML
    // ======================

    let addonHTML = "<b>ADD-ONS</b><br>"

    function addLine(label, cost, included){
      if((cost || 0) > 0 || included){
        addonHTML += included
          ? label + ": <span style='color:gold; font-weight:600;'>Included</span><br>"
          : label + ": $" + cost.toFixed(2) + "<br>"
      }
    }

    addLine("Aeration", a.aeration, isIncluded("aeration"))
    addLine("Compost", a.compost, isIncluded("compost"))
    addLine("Bio/Hum Blend", a.biohum, isIncluded("biohum"))

    if((a.biochar || 0) > 0){
      addonHTML += "Biochar 100%: $" + a.biochar.toFixed(2) + "<br>"
    }

    if((a.humic || 0) > 0){
      addonHTML += "Humic Acid 100%: $" + a.humic.toFixed(2) + "<br>"
    }

    if((a.grow || 0) > 0){
      addonHTML += "Grow System: $" + a.grow.toFixed(2) + "<br>"
    }

    addLine("Lime", a.lime, isIncluded("lime"))
    addLine("Sulfur", a.sulfur, isIncluded("sulfur"))

    if(addonHTML === "<b>ADD-ONS</b><br>"){
      addonHTML = ""
    } else {
      addonHTML += "<br>"
    }

    // ======================
    // SAVINGS
    // ======================

    let savings = 0

    if(isIncluded("aeration")) savings += r.totalSqft * 0.04
    if(isIncluded("compost")) savings += r.totalSqft * 0.10
    if(isIncluded("biohum")) savings += r.totalSqft * 0.12
    if(isIncluded("lime")) savings += r.totalSqft * 0.004
    if(isIncluded("sulfur")) savings += r.totalSqft * 0.008

    let savingsHTML = ""
    if(savings > 0){
      savingsHTML = "<b>Savings with Premium:</b> " +
        "<span style='color:gold; font-weight:700;'>$" + savings.toFixed(2) + "</span><br><br>"
    }

    // ======================
    // SAFE MATH
    // ======================

    let perHouseCost = r.houses ? r.cost / r.houses : 0
    let perHousePrice = r.houses ? r.price / r.houses : 0
    let perHouseProfit = r.houses ? r.profit / r.houses : 0
    let laborPerHouse = r.houses ? r.laborCost / r.houses : 0
    let overheadPerHouse = r.houses ? r.overheadCost / r.houses : 0

    let pricePerSqft = r.totalSqft ? r.price / r.totalSqft : 0
    let costPerSqft = r.totalSqft ? r.cost / r.totalSqft : 0
    let marginPercent = r.price ? (r.profit / r.price) * 100 : 0

    // ======================
    // OUTPUT
    // ======================

let materialHTML = "<b>MATERIAL REQUIREMENTS</b><br>"

Object.keys(comparison).forEach(k => {

  let item = comparison[k]
  let color = item.status === "short" ? "red" : "lime"

 let unit = MATERIAL_RATES[k]?.unit || ""

materialHTML += `
  ${k.toUpperCase()}:
  Need ${item.required.toFixed(1)} ${unit} |
  Have ${item.available.toFixed(1)} ${unit}
  <span style="color:${color}">
    ${item.status === "short"
      ? "BUY " + item.shortage.toFixed(1)
      : "OK"}
  </span>
  <br>
`

})

materialHTML += "<br><b>MATERIAL USAGE</b><br>"

Object.keys(materialNeeds).forEach(k => {

  let unit = MATERIAL_RATES[k]?.unit || ""

  materialHTML += `
    ${k.toUpperCase()}: ${materialNeeds[k].toFixed(1)} ${unit}<br>
  `
})

materialHTML += "<br>"

    document.getElementById("results").innerHTML =

      "<b>PROJECT SUMMARY</b><br>" +
      "Total Sqft: " + r.totalSqft.toFixed(0) + "<br>" +
      "Houses: " + r.houses + "<br><br>" +
      
       "<b>INVENTORY COST</b><br>" +    "Standard: $" + inv.standard.toFixed(2) + "<br>" +
"Premium: $" + inv.premium.toFixed(2) + "<br>" +
"Add-Ons: $" + inv.addons.toFixed(2) + "<br>" +
"Total Materials: $" + inv.total.toFixed(2) + "<br><br>" +

      addonHTML +
      savingsHTML +
      materialHTML +

      "<b>BASE PACKAGE</b><br>" +
      "Base Cost: $" + (r.cost - r.laborCost - r.overheadCost).toFixed(2) + "<br><br>" +

      "<b>LABOR</b><br>" +
      "Total Hours: " + r.totalHours.toFixed(2) + "<br>" +
      "Labor Cost: $" + r.laborCost.toFixed(2) + "<br>" +
      "Per House: $" + laborPerHouse.toFixed(2) + "<br><br>" +

      "<b>OVERHEAD</b><br>" +
      "Overhead Cost: $" + r.overheadCost.toFixed(2) + "<br>" +
      "Per House: $" + overheadPerHouse.toFixed(2) + "<br><br>" +

      "<b>COST BREAKDOWN</b><br>" +
      "Total Cost: $" + r.cost.toFixed(2) + "<br>" +
      "Cost / Sqft: $" + costPerSqft.toFixed(2) + "<br><br>" +

      "<b>PRICING</b><br>" +
      "Target Price: $" + r.price.toFixed(2) + "<br>" +
      "Price / Sqft: $" + pricePerSqft.toFixed(2) + "<br>" +
      "Profit: $" + r.profit.toFixed(2) + "<br>" +
      "Margin: " + marginPercent.toFixed(1) + "%<br><br>" +

      "<b>PER HOUSE</b><br>" +
      "Cost: $" + perHouseCost.toFixed(2) + "<br>" +
      "Price: $" + perHousePrice.toFixed(2) + "<br>" +
      "Profit: $" + perHouseProfit.toFixed(2) + "<br><br>" +

      "<b>PACKAGE COMPARISON</b><br>" +
      "Current: " + currentPackage.toUpperCase() + "<br>" +
      "Other: " + altPackage.toUpperCase() + "<br>" +

      "Price Difference: " +
      "<span style='color:" + priceDiffColor + "; font-weight:700;'>" +
      "$" + priceDiff.toFixed(2) +
      "</span><br>" +

      "Profit Difference: " +
      "<span style='color:" + profitDiffColor + "; font-weight:700;'>" +
      "$" + profitDiff.toFixed(2) +
      "</span><br><br>"

  } catch(e){
    document.getElementById("results").innerHTML = "Error in calculation"
  }
}

//============================
//CLIENT VIEW
//============================

function openClientView(){

  let r = calculateJob()

let materialCost = getInventoryCost().total

let materialNeeds = getMaterialNeeds(r)

let materialHTML = ""

Object.keys(materialNeeds).forEach(k => {

  let unit = MATERIAL_RATES[k]?.unit || ""

  materialHTML += `
    <div class="line">
      <span>${k.toUpperCase()}</span>
      <span>${materialNeeds[k].toFixed(1)} ${unit}</span>
    </div>
  `
})

  let customer = document.getElementById("customer")?.value || "Client"
  let address = document.getElementById("address")?.value || ""
  let packageType = document.getElementById("package")?.value || "standard"

  function isIncluded(name){
    return packageType === "premium" &&
      ["aeration","compost","biohum","lime","sulfur"].includes(name)
  }

  let a = r.addonCosts || {}
  let addonList = ""

  function addItem(label, name, cost, rate){
    let included = isIncluded(name)
    let value = included ? r.totalSqft * rate : (cost || 0)

    if(value > 0 || included){
      addonList += `
        <div style="display:flex;justify-content:space-between;">
          <span>${label}</span>
          <span>
            ${included ? "Included" : "$" + value.toFixed(2)}
            ${included ? ` ($${value.toFixed(2)} value)` : ""}
          </span>
        </div>
      `

function getInventoryCost(){

  function sumSection(id){
    let container = document.getElementById(id)
    if(!container) return 0

    let rows = container.querySelectorAll(".material-row")
    let total = 0

    rows.forEach(row => {
      let inputs = row.querySelectorAll("input")

      let cost = Number(inputs[1]?.value) || 0
      let qty = Number(inputs[2]?.value) || 0

      total += cost * qty
    })

    return total
  }

  let standard = sumSection("standardMaterials")
  let premium = sumSection("premiumMaterials")
  let addons = sumSection("addonMaterials")

  return {
    standard,
    premium,
    addons,
    total: standard + premium + addons
  }
}

function getInventoryTotals(){

  let totals = {}

  function process(section){
    (section || []).forEach(item => {
      let name = item.type
      let qty = Number(item.qty) || 0

      totals[name] = (totals[name] || 0) + qty
    })
  }

  process(saved.standard)
  process(saved.premium)
  process(saved.addons)

  return totals
}

//===================
//==COMPARE INVENTORY
//===================

function compareInventory(needs, inventory){

  let results = {}

  for(let key in needs){

    let required = needs[key]
    let available = inventory[key] || 0
    let shortage = required - available

    results[key] = {
      required,
      available,
      shortage: shortage > 0 ? shortage : 0,
      status: shortage > 0 ? "short" : "ok"
    }
  }

  return results
}

//=========================

function useInventoryForJob(){

  if(!confirm("Use inventory for this job?")){
    return
  }

  let r = calculateJob()
  let needs = getMaterialNeeds(r)

  let saved = JSON.parse(localStorage.getItem("soda_inventory") || "{}")

  function deduct(section){

    (section || []).forEach(item => {

     let type = item.type
let qty = Number(item.qty) || 0

if(needs[type] !== undefined){

  let used = Math.min(qty, needs[type])

  item.qty = qty - used

  needs[type] -= used
}
    })
  }

  deduct(saved.standard)
  deduct(saved.premium)
  deduct(saved.addons)

  localStorage.setItem("soda_inventory", JSON.stringify(saved))

  loadInventory()

  alert("Inventory Updated")
}

//==MATERIAL NEEDS

function getMaterialNeeds(r){

  let needs = {}

  let sqft = r.totalSqft

  // =========================
  // BASE MATERIALS
  // =========================

needs.seed       = (sqft / 1000) * MATERIAL_RATES.seed.rate
needs.fertilizer = (sqft / 1000) * MATERIAL_RATES.fertilizer.rate
needs.mulch      = (sqft / 1000) * MATERIAL_RATES.mulch.rate
needs.tackifier  = (sqft / 1000) * MATERIAL_RATES.tackifier.rate

  // =========================
  // PREMIUM ADDITIONS
  // =========================

  let packageType = document.getElementById("package")?.value || "standard"

  if(packageType === "premium"){
  needs.compost = (sqft / 1000) * MATERIAL_RATES.compost.rate

    // Bio/Hum blend = split usage
    needs.biochar = (sqft / 1000) * (MATERIAL_RATES.biochar.rate * 0.5)
needs.humic   = (sqft / 1000) * (MATERIAL_RATES.humic.rate * 0.5)
  }

  // =========================
  // ADD-ONS
  // =========================

  let addons = app.job.addons || {}

if(addons.lime){
 needs.lime = (sqft / 1000) * MATERIAL_RATES.lime.rate
}

if(addons.sulfur){
  needs.sulfur = (sqft / 1000) * MATERIAL_RATES.sulfur.rate
}

if(addons.biochar){
 needs.biochar = (needs.biochar || 0) +
  (sqft / 1000) * MATERIAL_RATES.biochar.rate
}

if(addons.humic){
  needs.humic = (needs.humic || 0) +
  (sqft / 1000) * MATERIAL_RATES.humic.rate
}

  return needs
}

document.getElementById("houses").addEventListener("input", function(e){
  app.job.houses = Number(e.target.value) || 1
  render()
})

document.getElementById("customer").addEventListener("input", function(e){
  app.job.customer = e.target.value
})

document.getElementById("targetMargin")?.addEventListener("input", render)

document.addEventListener("input", render)
document.addEventListener("change", render)

loadInventory()

// fallback if empty
if(!localStorage.getItem("soda_inventory")){
  addMaterialRow("standard")
  addMaterialRow("premium")
  addMaterialRow("addons")
}

</script>

</body>
</html>
