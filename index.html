<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { background:#0d0d0d; color:white; font-family:Arial; padding:20px; }
.card { background:#111; padding:20px; border-radius:12px; margin-bottom:20px; }
input, select {
  width:100%; padding:12px; margin:6px 0;
  background:#1a1a1a; border:1px solid #333;
  color:white; border-radius:8px;
}
button {
  width:100%; padding:14px;
  background:#d4af37; border:none; border-radius:10px;
}
.job { border-left:4px solid #d4af37; padding:10px; margin-bottom:10px; }
</style>
</head>

<body>

<div class="card">
<h3>Overview</h3>
Jobs: <span id="jobsCount">0</span><br>
Revenue: $<span id="rev">0</span><br>
Profit: $<span id="profit">0</span><br>
Avg Margin: <span id="margin">0</span>%
</div>

<div class="card">
<h3>Log Job</h3>

<input id="name" placeholder="Customer Name">

<select id="size">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<select id="type">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<!-- MATERIAL SELECTION -->
<select id="seedType">
<option value="gci">GCI TTTF</option>
<option value="blue">GCI Blue</option>
<option value="basicMix">Basic Mix</option>
<option value="lebanon">Lebanon</option>
<option value="andersons">Andersons</option>
<option value="organic">Organic</option>
</select>

<select id="mulchType">
<option value="paperMulch">Paper Mulch</option>
<option value="bfm">BFM Mulch</option>
<option value="basicMulch">Basic Mulch</option>
</select>

<button onclick="logJob()">Log Job</button>
</div>

<div class="card">
<h3>Material Costs</h3>

<input id="gciCost" placeholder="GCI Cost">
<input id="blueCost" placeholder="Blue Cost">
<input id="basicMixCost" placeholder="Basic Mix Cost">
<input id="lebanonCost" placeholder="Lebanon Cost">
<input id="andersonsCost" placeholder="Andersons Cost">
<input id="organicCost" placeholder="Organic Cost">

<input id="paperMulchCost" placeholder="Paper Mulch Cost">
<input id="bfmCost" placeholder="BFM Cost">
<input id="basicMulchCost" placeholder="Basic Mulch Cost">

<input id="tackCost" placeholder="Tackifier Cost">
<input id="compostCost" placeholder="Compost Cost">
<input id="biocharCost" placeholder="Biochar Cost">

<button onclick="saveCosts()">Save Costs</button>
</div>

<div class="card">
<h3>Job History</h3>
<div id="history"></div>
</div>

<script>

const $ = id => document.getElementById(id);

let jobs = JSON.parse(localStorage.getItem("jobs")) || {};
let costs = JSON.parse(localStorage.getItem("costs")) || {};

const USE = {
small:{seed:1,mulch:1,tack:0.5,compost:0.5},
medium:{seed:2,mulch:2,tack:1,compost:1},
large:{seed:3,mulch:3,tack:1.5,compost:1.5}
};

function saveCosts(){
costs = {
gci:+$("gciCost").value||0,
blue:+$("blueCost").value||0,
basicMix:+$("basicMixCost").value||0,
lebanon:+$("lebanonCost").value||0,
andersons:+$("andersonsCost").value||0,
organic:+$("organicCost").value||0,
paperMulch:+$("paperMulchCost").value||0,
bfm:+$("bfmCost").value||0,
basicMulch:+$("basicMulchCost").value||0,
tack:+$("tackCost").value||0,
compost:+$("compostCost").value||0
};

localStorage.setItem("costs", JSON.stringify(costs));
}

function logJob(){

let size = $("size").value;
let type = $("type").value;
let seedType = $("seedType").value;
let mulchType = $("mulchType").value;

let base = {small:1500, medium:2000, large:3000}[size];
if(type==="premium") base *= 1.4;

let u = USE[size];

let cost =
u.seed * (costs[seedType]||0) +
u.mulch * (costs[mulchType]||0) +
u.tack * (costs.tack||0) +
u.compost * (costs.compost||0);

let profit = base - cost;
let margin = (profit/base)*100;

jobs.push({
name:$("name").value,
type,size,
seedType,mulchType,
revenue:base,
cost,
profit,
margin,
materials:u
});

localStorage.setItem("jobs", JSON.stringify(jobs));

render();
}

function render(){

let r=0,p=0,m=0;

jobs.forEach(j=>{
r+=j.revenue;
p+=j.profit;
m+=j.margin;
});

$("jobsCount").innerText = jobs.length;
$("rev").innerText = Math.round(r);
$("profit").innerText = Math.round(p);
$("margin").innerText = jobs.length?(m/jobs.length).toFixed(1):0;

history.innerHTML = jobs.map(j=>`
<div class="job">
<b>${j.name}</b> (${j.type})<br>
Seed: ${j.seedType}<br>
Mulch: ${j.mulchType}<br><br>

💰 Revenue: $${j.revenue}<br>
💸 Cost: $${j.cost}<br>
📈 Profit: $${j.profit}<br>
📊 Margin: ${j.margin.toFixed(1)}%
</div>
`).join("");

}

render();

</script>

</body>
</html>
