<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:20px}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px}
input,select{width:100%;margin:6px 0;padding:12px;border-radius:10px;border:none;background:#222;color:#fff}
button{padding:12px;border-radius:12px;border:none;background:gold;color:#000;font-weight:bold;margin-top:8px}
.row{display:flex;gap:10px}
.row button{flex:1}
.toggle{display:flex;align-items:center;gap:10px;margin:8px 0}
.big{font-size:32px;text-align:center;margin-top:10px}
.gold{color:gold;font-weight:bold}
.box{border:2px solid gold;padding:20px;border-radius:20px;margin-top:10px;text-align:center}
</style>
</head>

<body>

<!-- CREATE JOB -->
<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Sqft">
<input id="houses" placeholder="Houses">

<h3>Add Ons</h3>

<div class="toggle"><input type="checkbox" id="grow"> Grow System</div>
<div class="toggle"><input type="checkbox" id="aeration"> Aeration</div>
<div class="toggle"><input type="checkbox" id="compost"> Compost</div>
<div class="toggle"><input type="checkbox" id="bio"> Biochar (50%)</div>
<div class="toggle"><input type="checkbox" id="humic"> Humic Acid (50%)</div>

<h3>Labor</h3>
<input id="rate" value="70" placeholder="Rate">
<input id="crew" value="2" placeholder="Crew Size">
<input id="hours" value="8" placeholder="Hours">

<h3>Overhead / Margin</h3>
<input id="overhead" value="15" placeholder="Overhead %">
<input id="margin" value="40" placeholder="Margin %">

<div class="box">
<div>Final Investment</div>
<div class="big" id="price">$0</div>

<div id="breakdown"></div>
</div>

<button onclick="createJob()">Create Job</button>
</div>

<!-- INVENTORY -->
<div class="card">
<h2>Inventory</h2>

<h3>Standard</h3>
<div id="standardInv"></div>

<h3>Premium</h3>
<div id="premiumInv"></div>

<button onclick="saveInventory()">Save Inventory</button>
</div>

<!-- JOB HISTORY -->
<div class="card">
<h2>Job History</h2>
<button onclick="clearJobs()">Clear</button>
<div id="jobs"></div>
</div>

<!-- ANALYTICS -->
<div class="card">
<h2>Analytics</h2>

<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>

<br>

<div class="gold">Total Revenue</div>
<div id="totalRevenue"></div>

<div class="gold">Total Profit</div>
<div id="totalProfit"></div>

</div>

<script>

const n=v=>Number(v)||0

let jobs=[]
let inventory={}

// ---------- MATERIAL MAP ----------
const standardMats={
seed:6,
fert:4,
mulch:5,
tack:1
}

const premiumMats={
elite:6,
kbg:2,
fert:4,
comp:10,
bio:2,
hum:2
}

// ---------- ADD-ONS ----------
const addOns={
grow:2,
aeration:1,
compost:5,
bio:1,
humic:1
}

// ---------- SIZE ----------
function setSize(v){
sqft.value=v
calculate()
}

// ---------- INVENTORY UI ----------
function renderInventory(){

let sHTML=""
Object.keys(standardMats).forEach(m=>{
sHTML+=`
<b>${m}</b>
<input id="${m}_cost" placeholder="cost">
<input id="${m}_qty" placeholder="qty">
`
})

let pHTML=""
Object.keys(premiumMats).forEach(m=>{
pHTML+=`
<b>${m}</b>
<input id="${m}_cost" placeholder="cost">
<input id="${m}_qty" placeholder="qty">
`
})

standardInv.innerHTML=sHTML
premiumInv.innerHTML=pHTML
}

// ---------- SAVE INVENTORY ----------
function saveInventory(){

[...Object.keys(standardMats),...Object.keys(premiumMats)].forEach(m=>{
inventory[m]={
cost:n(document.getElementById(m+"_cost").value)||20,
qty:n(document.getElementById(m+"_qty").value)||0
}
})
}

// ---------- CALC ----------
function calculate(){

let sqftVal=n(sqft.value)
let housesVal=n(houses.value)||1

let mats = tier.value==="standard"?standardMats:premiumMats

let used={}
let matCost=0

Object.keys(mats).forEach(m=>{
let usage=((mats[m]*sqftVal)/1000)*housesVal
let cost=(inventory[m]?.cost||20)*usage

used[m]={usage,cost}
matCost+=cost
})

// ADD ONS
Object.keys(addOns).forEach(a=>{
if(document.getElementById(a).checked){
let usage=((addOns[a]*sqftVal)/1000)*housesVal
let cost=usage*20
used[a]={usage,cost}
matCost+=cost
}
})

// LABOR
let labor=n(rate.value)*n(crew.value)*n(hours.value)*housesVal

let overheadCost=(matCost+labor)*(n(overhead.value)/100)

let totalCost=matCost+labor+overheadCost

let multiplier=1+(n(margin.value)/100)

if(strategy.value==="win") multiplier*=0.85
if(strategy.value==="max") multiplier*=1.25

let revenue=totalCost*multiplier

// BUILDER DISCOUNT
if(housesVal>=10&&housesVal<30) revenue*=0.9
if(housesVal>=30&&housesVal<75) revenue*=0.8
if(housesVal>=75) revenue*=0.7

let profit=revenue-totalCost
let marginPct=(profit/revenue)*100

window.calc={
used,matCost,labor,totalCost,revenue,profit,marginPct
}

price.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Cost: $${Math.round(totalCost)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`
}

// ---------- CREATE JOB ----------
function createJob(){
calculate()
jobs.push({...calc,date:new Date().toLocaleString()})
renderJobs()
renderCharts()
}

// ---------- JOBS ----------
function renderJobs(){
jobs.innerHTML=""

jobs.forEach(j=>{
let mats=""
Object.entries(j.used).forEach(([k,v])=>{
mats+=`${k}: ${v.usage.toFixed(2)} ($${Math.round(v.cost)})<br>`
})

jobs.innerHTML+=`
<div class="card">
${j.date}<br><br>
${mats}<br>
Revenue:$${Math.round(j.revenue)}<br>
Profit:$${Math.round(j.profit)}
</div>`
})
}

// ---------- TOTALS ----------
function totals(){
let rev=jobs.reduce((a,b)=>a+b.revenue,0)
let prof=jobs.reduce((a,b)=>a+b.profit,0)

totalRevenue.innerHTML="$"+Math.round(rev)
totalProfit.innerHTML="$"+Math.round(prof)
}

// ---------- CHARTS ----------
let revChart, profitChart

function renderCharts(){

totals()

let labels=jobs.map((_,i)=>"Job "+(i+1))

let rev=jobs.map(j=>j.revenue)
let prof=jobs.map(j=>j.profit)

if(revChart) revChart.destroy()
if(profitChart) profitChart.destroy()

revChart=new Chart(document.getElementById("revChart"),{
type:"line",
data:{labels,datasets:[{label:"Revenue",data:rev}]}
})

profitChart=new Chart(document.getElementById("profitChart"),{
type:"line",
data:{labels,datasets:[{label:"Profit",data:prof}]}
})
}

// ---------- CLEAR ----------
function clearJobs(){
jobs=[]
renderJobs()
renderCharts()
}

// INIT
renderInventory()
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

</script>

</body>
</html>
