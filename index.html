<!DOCTYPE html>

<html>

<head>

  <title>SoDa App</title>

  <link rel="stylesheet" href="css/styles.css">

</head>

<body>

<h1>Hydroseed Calculator</h1>

<!-- PRICING MODE -->

<label>Pricing Mode</label>

<select id="pricingMode">

  <option value="standard">Standard</option>

  <option value="aggressive">Aggressive</option>

  <option value="premium">Premium</option>

</select>

<hr>

<!-- INPUTS -->

<label>Square Feet</label>

<input id="sqft" type="number" placeholder="Enter sqft">

<label>Houses</label>

<input id="houses" type="number" value="1">

<label>Cost ($)</label>

<input id="cost" type="number" placeholder="Material cost">

<hr>

<!-- RESULTS -->

<h2>Results</h2>

<div id="results"></div>

<hr>

<!-- ADVANCED FEATURES -->

<h2>Deal Score</h2>

<div id="dealScore"></div>

<h2>Insights</h2>

<div id="insights"></div>

<h2>Tank Plan</h2>

<div id="tanks"></div>

<hr>

<!-- NAV -->

<a href="crm.html">Go to CRM</a><br>

<a href="inventory.html">Go to Inventory</a>

<!-- SCRIPTS -->

<script src="js/state.js"></script>

<script src="js/pricing.js"></script>

<script src="js/core.js"></script>

<script src="js/insights.js"></script>

<script src="js/tank.js"></script>

<script src="js/deals.js"></script>

<script src="js/ui.js"></script>

<div class="toast-container" id="toastContainer"></div>

</body>

</html>
