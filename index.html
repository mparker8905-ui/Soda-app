<!DOCTYPE html>
<html>
<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  background:#000;
  color:#fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.card{background:#111;padding:15px;border-radius:12px;margin-bottom:20px}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  background:#222;
  border:1px solid #333;
  color:#fff;
  border-radius:8px
}

.row{display:flex;gap:10px}
.row button{flex:1}

/* TOGGLES */
.toggle{
  background:#1a1a1a;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  border:1px solid #2a2a2a;
  text-align:center;
  transition:.2s;
}

.toggle.active{
  background:#d4af37;
  color:#000;
  border:1px solid #d4af37;
}

.results-card {
  border: 2px solid gold;
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  color: gold;
  background: #111; /* optional dark background */
}

.results-card h2 {
  color: gold;
  margin-bottom: 10px;
}

#results {
  color: gold;
}

/* ===== HEADER ===== */

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 5px;
}

.brand h1{
  margin:0;
  font-size:22px;
  letter-spacing:0.5px;
}

.tagline{
  font-size:12px;
  color:#aaa;
  margin-top:2px;
}

/* LOGO */
.logo{
  width:55px;
  height:auto;
  filter: drop-shadow(0 0 6px rgba(212,175,55,0.4));
}

/* GOLD DIVIDER */
.gold-line{
  height:2px;
  background:linear-gradient(
    90deg,
    transparent,
    #d4af37,
    transparent
  );
  margin:10px 0 20px 0;
}

.inventory-section{
  margin-top:15px;
  padding:12px;
  border:1px solid #333;
  border-radius:10px;
  background:#0d0d0d;

  display:flex;
  flex-direction:column;
}

.inventory-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;

  flex-wrap:wrap; /* 🔥 ADD THIS */
}

.inventory-header span{
  flex:1;
}

.inventory-actions{
  display:flex;
  gap:8px;
  flex-shrink:0; /* prevents squishing */
}

.inventory-header button{
  width:32px;
  height:32px;
  font-size:18px;
  padding:0;
  background:#d4af37;
  color:#000;
  border:none;
  border-radius:6px;
}

.material-row{
  display:flex;
  flex-direction:column; /* KEY FIX */
  gap:8px;

  background:#111;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 0 8px rgba(212,175,55,0.15);
}

.material-row input{
  flex:1;
  padding:10px;
  font-size:12px;
}

.material-row{
  width:100%;
  box-sizing:border-box;

  background:#111;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;

  box-shadow:0 0 8px rgba(212,175,55,0.15);
}

.mat-select,
.mat-input{
  width:100%;
  box-sizing:border-box; /* 👈 ADD THIS */
  padding:12px;
  border-radius:8px;
  background:#222;
  color:#fff;
  border:1px solid #333;
  font-size:14px;
}

.mat-label{
  font-size:12px;
  color:#aaa;
  margin-top:4px;
}

.row-top{
  display:flex;
  gap:8px;
  align-items:center;
  width:100%;
}

.row-top .mat-select{
  flex:1;
  min-width:0; /* 🔥 prevents overflow */
}

.delete-btn{
  width:40px;
  height:40px;
  background:#ff4d4d;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.delete-btn:active{
  transform:scale(0.95);
}

#standardMaterials,
#premiumMaterials,
#addonMaterials{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.alert-box{
  margin-bottom:12px;
  padding:12px;
  border-radius:10px;
  font-size:13px;
}

.alert-title{
  font-weight:700;
  margin-bottom:6px;
}

.alert-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0;
}

.alert-line button{
  background:#d4af37;
  color:#000;
  border:none;
  border-radius:6px;
  padding:4px 8px;
  font-size:11px;
  font-weight:600;
}

.alert-danger{
  background:rgba(255,60,60,0.1);
  border:1px solid rgba(255,60,60,0.4);
}

.alert-warning{
  background:rgba(255,180,0,0.1);
  border:1px solid rgba(255,180,0,0.4);
}

.alert-success{
  background:rgba(0,255,120,0.1);
  border:1px solid rgba(0,255,120,0.4);
}

/* ===== TOAST ===== */
.toast-container{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:9999;
}


/* BASE */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(20px) scale(0.95);
  padding:14px 22px;
  border-radius:12px;
  font-weight:600;
  font-size:14px;
  opacity:0;
  transition:all .35s ease;
  z-index:9999999;
  backdrop-filter: blur(8px);
}

/* SHOW ANIMATION */
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0) scale(1);
}

/* ✨ GLOW ANIMATION */
@keyframes glowPulse {
  0% { box-shadow: 0 0 0 rgba(255,255,255,0); }
  50% { box-shadow: 0 0 18px rgba(255,255,255,0.2); }
  100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
}

/* GREEN */
.toast-success{
  background:#1f3d2b;
  color:#4cff9a;
  border:1px solid #4cff9a;
  box-shadow:0 0 10px rgba(76,255,154,0.3);
  animation: glowPulse 1.5s ease;
}

/* GOLD (🔥 YOUR BRAND) */
.toast-warning{
  background:#3a2f0f;
  color:#d4af37;
  border:1px solid #d4af37;
  box-shadow:0 0 12px rgba(212,175,55,0.5);
  animation: glowPulse 1.5s ease;
}

/* RED */
.toast-error{
  background:#3a1212;
  color:#ff4d4d;
  border:1px solid #ff4d4d;
  box-shadow:0 0 12px rgba(255,77,77,0.4);
  animation: glowPulse 1.5s ease;
}

button{
  transition: all 0.15s ease;
}

button:active{
  transform: scale(0.96);
  box-shadow: 0 0 6px rgba(212,175,55,0.5);
}

.gold-text{
  color:#d4af37;
  text-shadow:0 0 6px rgba(212,175,55,0.4);
  font-weight:700;
  letter-spacing:0.5px;
}

.glass-card{
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 14px;
  padding: 16px;
  margin: 14px 0;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 12px rgba(212,175,55,0.08);
}

.section-title{
  color:#d4af37;
  font-weight:700;
  margin-bottom:8px;
  font-size:14px;
  letter-spacing:.5px;
  text-transform:uppercase;
}

/* COLLAPSIBLE CARD */
.collapsible .card-body{
  max-height: 0;
  overflow: hidden;
  transition: all 0.4s ease;
  opacity: 0;
}

/* OPEN STATE */
.collapsible.open .card-body{
  max-height: 500px;
  opacity: 1;
  margin-top: 10px;
}

/* HEADER */
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
  color:#d4af37;
  cursor:pointer;
  font-size:14px;
}

/* CHEVRON */
.chevron{
  transition: transform 0.3s ease;
}

.collapsible.open .chevron{
  transform: rotate(180deg);
}

.history-card{
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,215,0,0.2);
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
}

.history-top{
  display:flex;
  justify-content:space-between;
  font-weight:700;
  margin-bottom:6px;
}

.history-details{
  font-size:13px;
  color:#ccc;
}

.history-date{
  font-size:11px;
  color:#777;
  margin-top:6px;
}

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-card{
  width:90%;
  max-width:400px;
  background:#111;
  border:1px solid rgba(255,215,0,0.3);
  border-radius:14px;
  box-shadow:0 0 25px rgba(255,215,0,0.15);
  padding:15px;
  animation:fadeIn 0.2s ease;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
}

.modal-body label{
  display:block;
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}

.modal-body input{
  width:100%;
  padding:8px;
  margin-top:4px;
  border-radius:6px;
  border:none;
  background:#1a1a1a;
  color:#fff;
}

.modal-footer{
  margin-top:15px;
}

.modal-footer button{
  width:100%;
  padding:12px;
  background:gold;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.95)}
  to{opacity:1; transform:scale(1)}
}

</style>

</head>

<body>

<div class="header">
  <div class="brand">
   <h1 class="gold-text">SoDa Outdoor Designs</h1>
    <div class="tagline">We build lawns from the soil up</div>
  </div>

  <img src="/logo.PNG" class="logo">
</div>

<div class="gold-line"></div>

<!-- NEW: CUSTOMER -->
<input id="customer" placeholder="Customer Name">

<input id="address" placeholder="Client Address">

<!-- NEW: PACKAGE -->
<select id="package" onchange="handlePackage()">
  <option value="standard">Standard</option>
  <option value="premium">Premium</option>
</select>

<select id="pricingMode">
  <option value="balanced">Balanced</option>
  <option value="win">Win Job</option>

</select>

<select id="pricingStrategy">
  <option value="normal">Normal</option>

  <option value="undercut">Undercut Competitor</option>

</select>

<input id="competitorPrice" type="number" placeholder="Competitor Price ($)">

<input id="sqft" placeholder="Square Feet">

<div class="row">
  <button onclick="setSize(3000)">Small</button>

</div>

</div>

<input id="houses" type="number" value="1" min="1" placeholder="# of Houses">

<input id="targetMargin" type="number" placeholder="Target Profit Margin (%)">

<input id="targetProfit" type="number" placeholder="Target Profit ($)">

<div class="card">

<span class='gold-text'>Add-Ons</span>

<div class="toggle" data-name="aeration" onclick="toggleAddon(this)">Aeration</div>
<div class="toggle" data-name="compost" onclick="toggleAddon(this)">Compost</div>
<div class="toggle" data-name="biohum" onclick="toggleAddon(this)">Bio / Hum Blend</div>
<div class="toggle" data-name="biochar" onclick="toggleAddon(this)">Biochar 100%</div>
<div class="toggle" data-name="humic" onclick="toggleAddon(this)">Humic Acid 100%</div>
<div class="toggle" data-name="grow" onclick="toggleAddon(this)">Grow System</div>

</div>

<div class="card">
 <span class='gold-text'>Labor & Overhead</span>

  <input id="hourlyRate" type="number" placeholder="Hourly Rate ($)">
  <input id="hoursPerHouse" type="number" placeholder="Hours per House">
  <input id="crewSize" type="number" placeholder="Crew Size">

</div>

<button onclick="fixAllIssues()" style="
  background:#d4af37;
  color:#000;
  font-weight:bold;
  margin-bottom:10px;
">
  ⚡ Fix All Issues
</button>

<button onclick="optimizeForProfit()" style="
  background:#00c853;
  color:#000;
  font-weight:bold;
  margin-bottom:10px;
">
  💰 Optimize for Profit
</button>

<button onclick="optimizeForTargetProfit()" style="
  background:#00e5ff;
  color:#000;
  font-weight:bold;
  margin-bottom:10px;
">
  🎯 Hit Target Profit
</button>

<button onclick="winJob()">🔥 Win This Job</button>

<div class="card results-card">
  <h2>Job Breakdown</h2>
  <div id="results"></div>
</div>

<button onclick="saveJob()" class="primary-btn">
  💾 Save Job
</button>

<div id="jobHistorySection" class="glass-card">
  <div class="section-title">JOB HISTORY</div>
  <div id="jobHistory"></div>
</div>

<button onclick="openClientView()">Client View</button>

<button onclick="sendProposal()">Send Proposal</button>

<div class="card">
  <span class='gold-text'>Inventory</span>

  <!-- STANDARD -->
  <div class="inventory-section">
    <div class="inventory-header">
      <span>Standard Package</span>

      <div class="inventory-actions">
        <button onclick="addMaterialRow('standard')">+</button>
      </div>
    </div>

    <div id="standardMaterials"></div>
  </div>

  <!-- PREMIUM -->
  <div class="inventory-section">
    <div class="inventory-header">
      <span>Premium Package</span>

      <div class="inventory-actions">
        <button onclick="addMaterialRow('premium')">+</button>
      </div>
    </div>

    <div id="premiumMaterials"></div>
  </div>

  <!-- ADD-ONS -->
  <div class="inventory-section">
    <div class="inventory-header">
      <span>Add-On Materials</span>

      <div class="inventory-actions">
        <button onclick="addMaterialRow('addons')">+</button>
      </div>
    </div>

    <div id="addonMaterials"></div>
  </div>

</div>

<button onclick="saveInventory()">Save Inventory</button>

<button onclick="exportInventory()">Export Inventory</button>

<button onclick="generateInventoryPDF()">Inventory PDF</button>

<script>

//===========================
//==== STATE
//===========================
let app = {
  job:{
    addons:{
      aeration:false,
      compost:false,
      biohum:false,
      biochar:false,
      humic:false,
      grow:false,
      lime:false,
      sulfur:false
    }
  }
}

//===============
//== CONSTANTS
//===============

const RATES = {
  seed: 5,        // lbs per 1000 sqft
  fert: 4,
  mulch: 50,      // lbs
  tackifier: 3,

  compost: 0.5,   // yards per 1000 sqft
  biohum: 2,      // gallons

  lime: 10,       // lbs
  sulfur: 5
}

const COSTS = {
  seed: 80,
  fert: 40,
  mulch: 35,
  tackifier: 25,

  compost: 60,
  biohum: 25,

  lime: 15,
  sulfur: 20,

  biochar: 30,
  humic: 25,
  grow: 50
}

const MATERIAL_RATES = {
  seed:       { rate: 5, unit: "lbs" },
  fertilizer: { rate: 4, unit: "lbs" },
  mulch:      { rate: 50, unit: "lbs" },
  tackifier:  { rate: 3, unit: "lbs" },

  compost:    { rate: 0.5, unit: "yd3" },
  biochar:    { rate: 10, unit: "lbs" },
  humic:      { rate: 1, unit: "lbs" },

  lime:       { rate: 4, unit: "lbs" },
  sulfur:     { rate: 8, unit: "lbs" },

  sprinklers: { rate: 1, unit: "units" },
  timers: { rate: 1, unit: "units" }
}

const MATERIAL_LABELS = {
  seed: "Seed",
  fertilizer: "Fertilizer",
  mulch: "Mulch",
  tackifier: "Tackifier",
  compost: "Compost",
  biochar: "Biochar",
  humic: "Humic Acid",
  lime: "Lime",
  sulfur: "Sulfur",
  sprinklers: "Sprinklers",
  timers: "Sprinkler Timers" // 👈 YOUR NEW ONE
}

//=====================
//== TOAST SYSTEM
//=====================

function showToast(message, type = "success", targetCard = null){

  let toast = document.createElement("div")
  toast.className = `toast toast-${type}`
  toast.innerText = message

  // 👉 CLICK HANDLER
  if(targetCard){
    toast.style.cursor = "pointer"

    toast.onclick = () => {
      let card = document.querySelector(`[data-card="${targetCard}"]`)

      if(card){
        // open it
        card.classList.add("open")

        // scroll to it
        card.scrollIntoView({
          behavior: "smooth",
          block: "center"
        })

        // temporary glow boost
        card.classList.add("highlight")
        setTimeout(() => {
          card.classList.remove("highlight")
        }, 2000)
      }
    }
  }

  document.body.appendChild(toast)

  setTimeout(() => toast.classList.add("show"), 10)

  setTimeout(() => {
    toast.classList.remove("show")
    setTimeout(() => toast.remove(), 300)
  }, 3000)
}

//==================
//== UNIT LABEL
//==================

function updateUnitLabel(selectEl){

  let row = selectEl.closest(".material-row")
  let label = row.querySelector(".unit-label")

  let type = selectEl.value

  let unit = MATERIAL_RATES[type]?.unit || ""

  if(unit){
    label.innerText = `Quantity Available (${unit})`
  } else {
    label.innerText = "Quantity Available"
  }
}

// ==============================
// SIZE BUTTONS
// ==============================

function setSize(val){
  document.getElementById("sqft").value = val
  render()
}

// ==============================
// TOGGLE BUTTONS 
// ==============================

function toggleAddon(el){
  let name = el.dataset.name

  // safety check
  if(!app.job.addons){
    app.job.addons = {}
  }

  app.job.addons[name] = !app.job.addons[name]

  el.classList.toggle("active")

  render()
}

//==============================
//==== BUILDER MODE
//==============================

function getBuilderMultiplier(houses){

  if(houses <= 1) return 1
  if(houses <= 5) return 0.95
  if(houses <= 10) return 0.9
  if(houses <= 20) return 0.85
  if(houses <= 50) return 0.80
  return 0.75
}

//============================
//==== CALCULATE JOB
//============================

function calculateJob(){

  let sqft = Number(document.getElementById("sqft")?.value) || 0
  let houses = Number(document.getElementById("houses")?.value) || 1
  let packageType = document.getElementById("package")?.value || "standard"
  let pricingMode = document.getElementById("pricingMode")?.value || "balanced"
  let targetMarginInput = Number(document.getElementById("targetMargin")?.value)

  let builderMult = getBuilderMultiplier(houses)

  let totalSqft = sqft * houses

  // ==============================
  // LABOR INPUTS
  // ==============================

  let hourlyRate = Number(document.getElementById("hourlyRate")?.value) || 0
  let hoursPerHouse = Number(document.getElementById("hoursPerHouse")?.value) || 0
  let crewSize = Number(document.getElementById("crewSize")?.value) || 1
  let overheadPct = Number(document.getElementById("overhead")?.value) || 0

  let laborEfficiency = 1 - ((1 - builderMult) * 0.5)
  let totalHours = hoursPerHouse * houses * laborEfficiency
  let laborCost = totalHours * hourlyRate * crewSize

  // ==========================
  // BASE COST
  // ==========================

  let baseRate = 0

  if(packageType === "standard") baseRate = 0.18
  if(packageType === "premium") baseRate = 0.30

 let inventory = getInventoryCost()

let baseCost = totalSqft * baseRate
if(baseCost < 500) baseCost = 500

// 🔥 NEW LOGIC

let materialCost = inventory.total > 0 ? inventory.total : baseCost

  let addonCosts = {
  aeration: 0,
  compost: 0,
  biohum: 0,
  biochar: 0,
  humic: 0,
  grow: 0,
  lime: 0,
  sulfur: 0
}

  // ==========================
  // ADDONS
  // ==========================

  let addons = app.job.addons || {}

  function isIncluded(name){
    if(packageType !== "premium") return false
    return ["aeration","compost","biohum","lime","sulfur"].includes(name)
  }

// Aeration
if(addons.aeration && !isIncluded("aeration")){
  let cost = totalSqft * 0.04
  materialCost += cost
  addonCosts.aeration = cost
}

// Compost
if(addons.compost && !isIncluded("compost")){
  let cost = totalSqft * 0.10
  materialCost += cost
  addonCosts.compost = cost
}

// Bio/Hum Blend
if(addons.biohum && !isIncluded("biohum")){
  let cost = totalSqft * 0.12
  materialCost += cost
  addonCosts.biohum = cost
}

// Biochar
if(addons.biochar){
  let cost = totalSqft * 0.20
  materialCost += cost
  addonCosts.biochar = cost
}

// Humic
if(addons.humic){
  let cost = totalSqft * 0.01
  materialCost += cost
  addonCosts.humic = cost
}

// Grow System
if(addons.grow){

  let weeklyCost = (50 * 3) * houses
  let installCost = 0

  if(packageType === "standard"){
    installCost = houses <= 1 
      ? totalSqft * 0.05 
      : totalSqft * 0.03
  }

  let cost = weeklyCost + installCost
  materialCost += cost
  addonCosts.grow = cost
}

// Lime
if(addons.lime && !isIncluded("lime")){
  let cost = totalSqft * 0.004
  materialCost += cost
  addonCosts.lime = cost
}

// Sulfur
if(addons.sulfur && !isIncluded("sulfur")){
  let cost = totalSqft * 0.008
  materialCost += cost
  addonCosts.sulfur = cost
}

  // ==========================
  // OVERHEAD (AFTER MATERIAL)
  // ==========================

  let overheadCost = (materialCost + laborCost) * (overheadPct / 100)

  let totalCost = materialCost + laborCost + overheadCost

  // ==========================
  // PRICING
  // ==========================

  let margin

  if(targetMarginInput && targetMarginInput > 0){
    margin = targetMarginInput / 100
  } else {
    margin = 0.3
    if(pricingMode === "win") margin = 0.15
    if(pricingMode === "balanced") margin = 0.3
    if(pricingMode === "max") margin = 0.5
  }

  if(houses >= 10) margin -= 0.03
  if(houses >= 20) margin -= 0.05
  if(houses >= 50) margin -= 0.08

  if(margin < 0.1) margin = 0.1

 let strategy = document.getElementById("pricingStrategy")?.value || "normal"
let competitor = Number(document.getElementById("competitorPrice")?.value) || 0

let price = totalCost / (1 - margin)

// ==========================
// PRICING POWER MODE
// ==========================

if(strategy === "market"){
  let marketRate = 0.35 // $/sqft target
  let marketPrice = totalSqft * marketRate

  if(marketPrice > price){
    price = marketPrice
  }
}

if(strategy === "undercut" && competitor > 0){
  price = competitor * 0.97 // 3% undercut
}

if(strategy === "builder"){
  price *= 0.92 // aggressive builder pricing
}

// SAFETY FLOOR (never lose money)
if(price < totalCost * 1.1){
  price = totalCost * 1.1
}

let profit = price - totalCost

  return {
    sqft,
    houses,
    totalSqft,
    cost: totalCost,
    price,
    profit,
    laborCost,
    overheadCost,
    totalHours,
    addonCosts
  }
}

function saveJob(){

  let r = calculateJob()
  let needs = getMaterialNeeds(r)

  // ======================
  // BUILD JOB
  // ======================

  let job = {
    id: Date.now(),
    date: new Date().toLocaleString(),
    sqft: r.totalSqft,
    price: r.price,
    cost: r.cost,
    profit: r.profit,
    margin: r.price ? (r.profit / r.price) * 100 : 0
  }

  // ======================
  // SAVE HISTORY
  // ======================

  let history = JSON.parse(localStorage.getItem("jobHistory") || "[]")
  history.unshift(job)
  localStorage.setItem("jobHistory", JSON.stringify(history))

  // ======================
  // DEDUCT INVENTORY
  // ======================

  let full = JSON.parse(localStorage.getItem("inventory_full") || "{}")

  Object.keys(needs).forEach(type => {

    let remaining = needs[type] || 0

    ["standard","premium","addons"].forEach(section => {

      (full[section] || []).forEach(item => {

        if(item.type === type && remaining > 0){

          let used = Math.min(item.qty, remaining)

          item.qty -= used
          remaining -= used
        }

      })
    })
  })

  localStorage.setItem("inventory_full", JSON.stringify(full))

  // ======================
  // UPDATE UI
  // ======================

  renderHistory()
  render()

  showToast("Job saved + inventory updated","success")
}

function getInventoryCost(){

  let saved = JSON.parse(localStorage.getItem("inventory_full") || "{}")

  function sum(section){
    let total = 0
    ;(section || []).forEach(item => {
      total += (item.cost || 0) * (item.qty || 0)
    })
    return total
  }

  let standard = sum(saved.standard)
  let premium = sum(saved.premium)
  let addons = sum(saved.addons)

  return {
    standard,
    premium,
    addons,
    total: standard + premium + addons
  }
}

function getInventoryTotals(){

  let inventory = JSON.parse(localStorage.getItem("inventory_full") || "{}")

  let totals = {}

  Object.values(inventory).forEach(section => {
    section.forEach(item => {

      let type = item.type
      let qty = item.qty || 0

      totals[type] = (totals[type] || 0) + qty
    })

  return totals

//==COMPARE INVENTORY
//===================

function compareInventory(needs, inventory){

  let results = {}

  for(let key in needs){

    let required = needs[key]
    let available = inventory[key] || 0
    let shortage = required - available

    results[key] = {
      required,
      available,
      shortage: shortage > 0 ? shortage : 0,
      status: shortage > 0 ? "short" : "ok"
    }
  }

  return results
}
//=========================
//===USE INVENTORY FOR JOB
//=========================

function useInventoryForJob(){

  if(!confirm("Use inventory for this job?")) return

  let r = calculateJob()
  let needs = getMaterialNeeds(r)

  let full = JSON.parse(localStorage.getItem("inventory_full") || "{}")

  function deduct(section){

    (section || []).forEach(item => {

      let type = item.type
      let qty = Number(item.qty) || 0

      if(needs[type] !== undefined){

        let used = Math.min(qty, needs[type])

        item.qty -= used
        needs[type] -= used
      }
    })
  }

  deduct(full.standard)
  deduct(full.premium)
  deduct(full.addons)

  localStorage.setItem("inventory_full", JSON.stringify(full))

  loadInventory()
  render()

  showToast("Inventory applied to job", "success")
}

 //=====================
//==MATERIAL NEEDS
//======================

function getMaterialNeeds(r){

  let needs = {}

  let sqft = r.totalSqft

  // =========================
  // BASE MATERIALS
  // =========================

needs.seed       = (sqft / 1000) * MATERIAL_RATES.seed.rate
needs.fertilizer = (sqft / 1000) * MATERIAL_RATES.fertilizer.rate
needs.mulch      = (sqft / 1000) * MATERIAL_RATES.mulch.rate
needs.tackifier  = (sqft / 1000) * MATERIAL_RATES.tackifier.rate

  // =========================
  // PREMIUM ADDITIONS
  // =========================

  let packageType = document.getElementById("package")?.value || "standard"

  if(packageType === "premium"){
  needs.compost = (sqft / 1000) * MATERIAL_RATES.compost.rate

    // Bio/Hum blend = split usage
    needs.biochar = (sqft / 1000) * (MATERIAL_RATES.biochar.rate * 0.5)
needs.humic   = (sqft / 1000) * (MATERIAL_RATES.humic.rate * 0.5)
  }

  // =========================
  // ADD-ONS
  // =========================

  let addons = app.job.addons || {}

if(addons.lime){
 needs.lime = (sqft / 1000) * MATERIAL_RATES.lime.rate
}

if(addons.sulfur){
  needs.sulfur = (sqft / 1000) * MATERIAL_RATES.sulfur.rate
}

if(addons.biochar){
 needs.biochar = (needs.biochar || 0) +
  (sqft / 1000) * MATERIAL_RATES.biochar.rate
}

if(addons.humic){
  needs.humic = (needs.humic || 0) +
  (sqft / 1000) * MATERIAL_RATES.humic.rate
}

  return needs
}

//================
//== ALERTS
//================

function generateAlerts(r, comparison){

  let alerts = {
    danger: [],
    warning: [],
    success: []
  }

  let margin = r.price ? (r.profit / r.price) * 100 : 0

  // 🚨 LOW MARGIN
  if(margin < 20){
    alerts.danger.push({
      text: `Low profit margin (${margin.toFixed(1)}%)`,
      fix: "margin"
    })
  }

  // ⚠️ MEDIUM MARGIN
  else if(margin < 30){
    alerts.warning.push({
      text: `Margin could be improved (${margin.toFixed(1)}%)`,
      fix: "margin"
    })
  }

  // 💰 HIGH PROFIT
  if(margin > 40){
    alerts.success.push({
      text: `High profit margin (${margin.toFixed(1)}%)`
    })
  }

  // 🚨 INVENTORY SHORTAGES
  Object.keys(comparison).forEach(k => {

    let item = comparison[k]

    if(item.shortage > 0.5){

      alerts.danger.push({
        text: `${k.toUpperCase()} short by ${item.shortage.toFixed(1)}`,
        fix: "inventory",
        type: k,
        amount: item.shortage
      })
    }
  })

  // ⚠️ LOW PROFIT $
  if(r.profit < 200){
    alerts.warning.push({
      text: `Low total profit ($${r.profit.toFixed(0)})`,
      fix: "price"
    })
  }

  return alerts
}

//====================
//== EXPORT INVENTORY
//====================

function exportInventory(){

 let saved = JSON.parse(localStorage.getItem("inventory_full") || "{}")

  let rows = [["Section","Material","Cost","Quantity","Unit"]]

  function process(sectionName, items){

    (items || []).forEach(item => {

      let type = item.type || ""
      let name = item.name || MATERIAL_LABELS[item.type] || item.type
      let cost = item.cost || 0
      let qty = item.qty || 0
      let unit = MATERIAL_RATES[type]?.unit || ""

      rows.push([
        sectionName,
        name,
        cost,
        qty,
        unit
      ])
    })

  } // ✅ CLOSE process()

  // 👇 YOU ALSO NEED TO CALL IT
  process("Standard", saved.standard)
  process("Premium", saved.premium)
  process("Add-On", saved.addons)

  // 👇 CSV BUILD
  let csvContent = rows.map(r => r.join(",")).join("\n")

  let blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" })
  let url = URL.createObjectURL(blob)

  let link = document.createElement("a")
  link.href = url
  link.download = "inventory.csv"

  document.body.appendChild(link)
  link.click()
  document.body.removeChild(link)

} // ✅ CLOSE exportInventory()

window.fixLowMargin = function(){

  let input = document.getElementById("targetMargin")

  if(!input){
    showToast("Margin input missing", "error")
    return
  }

  let current = Number(input.value) || 0

  if(current < 30){
    input.value = 35
  } else {
    input.value = current + 5
  }

  render()

 showToast("📈 Margin improved", "success", "pricing")
}

  let pricingMode = document.getElementById("pricingMode")

    showToast("Missing inputs", "error")

//================
//== FIX INVENTORY
//================

window.fixInventory = function(type, amount){

  let container

  if(type === "seed" || type === "fertilizer" || type === "mulch" || type === "tackifier"){
    container = document.getElementById("standardMaterials")
  } else if(type === "compost" || type === "biochar" || type === "humic"){
    container = document.getElementById("premiumMaterials")
  } else {
    container = document.getElementById("addonMaterials")
  }

  if(!container) return

  let rows = container.querySelectorAll(".material-row")
  let found = false

  // 🔍 CHECK EXISTING ROWS
  rows.forEach(row => {

    let select = row.querySelector("select")
    let inputs = row.querySelectorAll("input")

    if(select && select.value === type){

      let currentQty = Number(inputs[2]?.value) || 0
      inputs[2].value = Math.ceil(currentQty + amount)
      showToast(`${MATERIAL_LABELS[type]} +${Math.ceil(amount)} added`)
      found = true
    }

  })

  // ➕ IF NOT FOUND → CREATE NEW ROW
  if(!found){

    let row = document.createElement("div")
    row.className = "material-row"

    row.innerHTML = `
      <div class="row-top">
        <select class="mat-select">
          <option value="seed" ${type==="seed"?"selected":""}>Seed</option>
          <option value="fertilizer" ${type==="fertilizer"?"selected":""}>Fertilizer</option>
          <option value="mulch" ${type==="mulch"?"selected":""}>Mulch</option>
          <option value="tackifier" ${type==="tackifier"?"selected":""}>Tackifier</option>
          <option value="compost" ${type==="compost"?"selected":""}>Compost</option>
          <option value="biochar" ${type==="biochar"?"selected":""}>Biochar</option>
          <option value="humic" ${type==="humic"?"selected":""}>Humic Acid</option>
          <option value="lime" ${type==="lime"?"selected":""}>Lime</option>
          <option value="sulfur" ${type==="sulfur"?"selected":""}>Sulfur</option>
          <option value="sprinklers" ${type==="sprinklers"?"selected":""}>Sprinklers</option>
          <option value="timers" ${type==="timers"?"selected":""}>Sprinkler Timers</option>
        </select>

        <button class="delete-btn" onclick="deleteRow(this)">🗑</button>
      </div>

      <label class="mat-label">Material Name</label>
      <input class="mat-input" value="${MATERIAL_LABELS[type] || type}">

      <label class="mat-label">Cost per Unit ($)</label>
      <input class="mat-input" type="number" value="0">

      <label class="mat-label unit-label">Quantity Available</label>
      <input class="mat-input" type="number" value="${Math.ceil(amount)}">
    `

    container.appendChild(row)
    showToast(`${MATERIAL_LABELS[type]} +${Math.ceil(amount)} added`)
  }

  // 💾 SAVE + REFRESH
  saveInventory()
  loadInventory()

  setTimeout(() => {
    render()
  }, 50)
}

//=========================
//===FIX ALL ISSUES
//=========================

window.fixAllIssues = function(){

  fixLowMargin()
  fixLowPrice()

  let r = calculateJob()
  let needs = getMaterialNeeds(r)
  let inventory = getInventoryTotals()

  let fixes = 0

  Object.keys(needs).forEach(type => {
    let shortage = (needs[type] || 0) - (inventory[type] || 0)

    if(shortage > 0.5){
      fixInventory(type, shortage)
      fixes++
    }
  })

  showToast(`⚡ ${fixes} issues fixed`, "warning")

  setTimeout(() => render(), 100)
}

//========================
//== OPTIMIZE FOR PROFIT
//========================

window.optimizeForProfit = function(){

  let r = calculateJob()

  let sqft = r.totalSqft
  let currentMargin = r.price ? (r.profit / r.price) * 100 : 0

  let marginInput = document.getElementById("targetMargin")
  let pricingMode = document.getElementById("pricingMode")

  let targetMargin = 30

  // 🔥 Smart scaling based on job size
  if(sqft < 3000){
    targetMargin = 40
  }
  else if(sqft < 8000){
    targetMargin = 35
  }
  else if(sqft < 20000){
    targetMargin = 30
  }
  else {
    targetMargin = 25
  }

  // 🔥 Boost if profit too low
  if(r.profit < 200){
    targetMargin += 5
  }

  // 🔥 Don’t reduce margin if already higher
  if(currentMargin > targetMargin){
    targetMargin = currentMargin
  }

  // Apply
  marginInput.value = Math.round(targetMargin)
  pricingMode.value = "max"


showToast("All issues fixed ✅")

  render()
}

//================================
//==== TARGET PROFIT
//================================

window.optimizeForTargetProfit = function(){

  let targetProfit = Number(document.getElementById("targetProfit")?.value) || 0

  if(targetProfit <= 0){
    alert("Enter target profit")
    return
  }

  let pricingMode = document.getElementById("pricingMode")
  let marginInput = document.getElementById("targetMargin")

  // start with a base margin
  let margin = 25

  let attempts = 0
  let maxAttempts = 20

  while(attempts < maxAttempts){

    marginInput.value = margin
    pricingMode.value = "max"

    let r = calculateJob()

    if(r.profit >= targetProfit){
      break
    }

    margin += 2
    attempts++
  }

  render()

 alert(`Target hit at ${margin}% margin 💰`)
}

//========================

function toggleCard(el){
  let card = el.parentElement

  document.querySelectorAll(".collapsible").forEach(c => {
    if(c !== card) c.classList.remove("open")
  })

  card.classList.toggle("open")

  setTimeout(() => {
    card.scrollIntoView({ behavior: "smooth", block: "start" })
  }, 200)
}

//========================
//=== RENDER HISTORY
//========================

function renderHistory(){

  let history = JSON.parse(localStorage.getItem("jobHistory") || "[]")

  let html = ""

  history.forEach((job, index) => {

    let color =
      job.margin < 20 ? "#ff4d4d" :
      job.margin < 30 ? "#ffd24d" :
      "#4cff9a"

    html += `
      <div class="history-card">

        <div class="history-top">
          <b>${job.sqft} sqft</b>
          <span style="color:${color}">
            ${job.margin.toFixed(1)}%
          </span>
        </div>

        <div class="history-details">
          💰 $${job.price.toFixed(2)} |
          Profit: $${job.profit.toFixed(2)}
        </div>

        <div class="history-date">
          ${job.date}
        </div>

        <div style="margin-top:10px; display:flex; gap:8px;">
          <button onclick="editJob(${index})">✏️ Edit</button>
          <button onclick="deleteJob(${index})">🗑 Delete</button>
        </div>

      </div>
    `
  })

  document.getElementById("jobHistory").innerHTML = html
}

window.deleteJob = function(index){

  let history = JSON.parse(localStorage.getItem("jobHistory") || "[]")

  if(!confirm("Delete this job?")) return

  history.splice(index, 1)

  localStorage.setItem("jobHistory", JSON.stringify(history))

  renderHistory()

  showToast("Job deleted", "error")
}

let currentEditIndex = null

window.editJob = function(index){

  let history = JSON.parse(localStorage.getItem("jobHistory") || "[]")
  let job = history[index]

  if(!job) return

  currentEditIndex = index

  document.getElementById("editSqft").value = job.sqft
  document.getElementById("editPrice").value = job.price
  document.getElementById("editCost").value = job.cost

  document.getElementById("jobModal").style.display = "flex"
}

//====================
//==CLOSE JOB
//====================

function closeJobModal(){
  document.getElementById("jobModal").style.display = "none"
}

//====================
//==SAVE JOB
//====================

function saveJobEdit(){

  let history = JSON.parse(localStorage.getItem("jobHistory") || "[]")

  if(currentEditIndex === null) return

  let job = history[currentEditIndex]

  let sqft = Number(document.getElementById("editSqft").value) || job.sqft
  let price = Number(document.getElementById("editPrice").value) || job.price
  let cost = Number(document.getElementById("editCost").value) || job.cost

  let profit = price - cost
  let margin = price ? (profit / price) * 100 : 0

  history[currentEditIndex] = {
    ...job,
    sqft,
    price,
    cost,
    profit,
    margin
  }

  localStorage.setItem("jobHistory", JSON.stringify(history))

  closeJobModal()
  renderHistory()

  showToast("Job updated", "success")
}
