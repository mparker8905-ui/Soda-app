<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;margin:0}
.card{background:#111;padding:20px;margin:15px;border-radius:16px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:10px}
button{width:100%;padding:14px;background:#d4af37;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
.alert{color:red}
h2{margin-top:0}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>
<input id="name" placeholder="Customer Name">

<select id="size">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1">
<input id="sqft" placeholder="Sq Ft Per House">

<button onclick="autoFillPrice()">Auto Fill Price</button>
<input id="jobPrice" placeholder="Final Job Price">

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>

<input id="tttfCost" placeholder="TTTF Cost"><input id="tttfQty" placeholder="TTTF Qty">
<input id="ryeCost" placeholder="Rye Cost"><input id="ryeQty" placeholder="Rye Qty">
<input id="eliteCost" placeholder="Elite Fescue Cost"><input id="eliteQty" placeholder="Elite Qty">
<input id="kbgCost" placeholder="KBG Cost"><input id="kbgQty" placeholder="KBG Qty">

<input id="milCost" placeholder="Milorganite Cost"><input id="milQty" placeholder="Milorganite Qty">
<input id="espCost" placeholder="Espoma Cost"><input id="espQty" placeholder="Espoma Qty">

<input id="woodCost" placeholder="Wood Mulch Cost"><input id="woodQty" placeholder="Wood Qty">
<input id="bfmCost" placeholder="BFM Cost"><input id="bfmQty" placeholder="BFM Qty">

<input id="tackCost" placeholder="Tackifier Cost"><input id="tackQty" placeholder="Tack Qty">

<input id="compCost" placeholder="Compost Cost"><input id="compQty" placeholder="Compost Qty">
<input id="bioCost" placeholder="Biochar Cost"><input id="bioQty" placeholder="Biochar Qty">
<input id="humCost" placeholder="Humic Cost"><input id="humQty" placeholder="Humic Qty">

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Smart Pricing</h2>
<input id="targetMargin" placeholder="Target Margin %">
<button onclick="calculatePrice()">Calculate Price</button>
<div id="pricingOutput"></div>
<button onclick="generateProposal()">Generate Proposal</button>
</div>

<div class="card">
<h2>Inventory Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<button onclick="resetApp()">RESET APP</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Proposal</h2>
<div id="proposal"></div>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inv=JSON.parse(localStorage.getItem("inv")||"{}")
let chart

const n=v=>parseFloat(v)||0

function saveInventory(){
inv={
tttf:{c:n(tttfCost.value),q:n(tttfQty.value)},
rye:{c:n(ryeCost.value),q:n(ryeQty.value)},
elite:{c:n(eliteCost.value),q:n(eliteQty.value)},
kbg:{c:n(kbgCost.value),q:n(kbgQty.value)},
mil:{c:n(milCost.value),q:n(milQty.value)},
esp:{c:n(espCost.value),q:n(espQty.value)},
wood:{c:n(woodCost.value),q:n(woodQty.value)},
bfm:{c:n(bfmCost.value),q:n(bfmQty.value)},
tack:{c:n(tackCost.value),q:n(tackQty.value)},
comp:{c:n(compCost.value),q:n(compQty.value)},
bio:{c:n(bioCost.value),q:n(bioQty.value)},
hum:{c:n(humCost.value),q:n(humQty.value)}
}
localStorage.setItem("inv",JSON.stringify(inv))
}

function getMaterials(tier,h){
const sqft=n(sqftInput.value)||5000
const factor=(sqft*h)/1000

if(tier==="standard"){
const seed=7*factor
return {
tttf:seed*0.85,
rye:seed*0.15,
mil:5*factor,
wood:50*factor,
tack:3*factor,
comp:0,bio:0,hum:0
}
}

const seed=5*factor
return {
elite:seed*0.8,
kbg:seed*0.2,
esp:5*factor,
bfm:50*factor,
tack:3*factor,
comp:20*factor,
bio:5*factor,
hum:2*factor
}
}

function autoFillPrice(){

const h=n(houses.value)||1
const mats=getMaterials(tier.value,h)

let cost=0
for(let k in mats){
cost+=(inv[k]?.c||0)*mats[k]
}

if(!cost){alert("Add inventory costs");return}

let price=cost/(1-0.6)

let discount=0
if(h>=100)discount=0.30
else if(h>=50)discount=0.20
else if(h>=25)discount=0.10
else if(h>=2)discount=0.05

price=price*(1-discount)

jobPrice.value=price.toFixed(0)

pricingOutput.innerHTML=`
Material Cost: $${cost.toFixed(0)}<br>
Discount: ${(discount*100)}%
`
}

function createJob(){

const h=Math.max(1,n(houses.value))
const revenue=n(jobPrice.value)
if(!revenue){alert("Use Auto Fill Price");return}

const mats=getMaterials(tier.value,h)

let breakdown={},alertsList=[],totalCost=0

for(let key in mats){

const qty=mats[key]
if(qty<=0) continue

const item=inv[key]
if(!item) continue

const cost=item.c*qty
const available=item.q

if(qty>available) alertsList.push(`${key} shortage`)
if(available>0 && (available-qty)<5) alertsList.push(`${key} low`)

item.q=Math.max(0,available-qty)

breakdown[key]={qty,cost}
totalCost+=cost
}

const profit=revenue-totalCost

jobs.push({
name:name.value||"Client",
tier:tier.value,
houses:h,
revenue,
profit,
margin:(profit/revenue*100)||0,
materials:breakdown,
alerts:alertsList,
sqft:(n(sqftInput.value)||5000)*h
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
}

function generateProposal(){

const nameVal=name.value||"Customer"
const price=jobPrice.value||"TBD"

proposal.innerHTML=`
<div style="background:#0b0b0b;padding:25px;border-radius:16px">
<h1 style="color:#d4af37">SoDa Outdoor Designs</h1>
<p><b>Client:</b> ${nameVal}</p>
<p><b>Total Investment:</b> $${price}</p>
<p>✔ Pet & Family Safe</p>
<p>✔ Premium Materials</p>
<p>✔ Long-Term Lawn Health</p>
</div>`
}

function downloadPDF(){
const win=window.open('')
win.document.write(proposal.innerHTML)
win.print()
}

function render(){

let rev=0,prof=0,alertsHTML=""

jobs.forEach(j=>{
rev+=j.revenue
prof+=j.profit
j.alerts.forEach(a=>alertsHTML+=`<div class="alert">${a}</div>`)
})

stats.innerHTML=`
Jobs: ${jobs.length}<br>
Revenue: $${rev}<br>
Profit: $${prof}<br>
Margin: ${(prof/rev*100||0).toFixed(1)}%
`

alerts.innerHTML=alertsHTML

jobsDiv.innerHTML=""

jobs.forEach(j=>{
let matHTML="",total=0
for(let m in j.materials){
const d=j.materials[m]
if(!d.qty) continue
total+=d.cost
matHTML+=`${m}: ${d.qty.toFixed(1)} ($${d.cost.toFixed(0)})<br>`
}

jobsDiv.innerHTML+=`
<div>
<b>${j.name}</b><br>
Revenue: $${j.revenue}<br>
Profit: $${j.profit}<br>
${matHTML}
</div><hr>`
})

if(chart) chart.destroy()
chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map((_,i)=>i+1),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})
}

function resetApp(){
localStorage.clear()
jobs=[]
inv={}
render()
}

const jobsDiv=document.getElementById("jobs")
const sqftInput=document.getElementById("sqft")

render()

</script>

</body>
</html>
