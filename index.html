<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SoDa Outdoor Designs</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="brand">

    <h1>Hydroseed Calculator</h1>

    <div class="tagline">SoDa Outdoor Designs</div>

  </div>

</div>

<div class="gold-line"></div>

<!-- NAV -->

<div class="row" style="margin-bottom:18px;">

  <button onclick="location.href='crm.html'">CRM</button>

  <button onclick="location.href='inventory.html'">Inventory</button>

</div>

<!-- =========================

     PROJECT DETAILS

========================= -->

<div class="collapsible card open" data-card="details">

  <div class="card-header" onclick="toggleCard(this)">

    Project Details

    <span class="chevron">⌄</span>

  </div>

  <div class="card-body">

    <label>Square Feet</label>

    <input id="sqft" type="number" value="3000">

    <label>Houses</label>

    <input id="houses" type="number" value="1">

    <label>Package</label>

    <select id="package">

      <option value="standard">Standard</option>

      <option value="premium">Premium</option>

    </select>

    <label>Pricing Mode</label>

    <select id="pricingMode">

      <option value="win">Win Job</option>

      <option value="balanced" selected>Balanced</option>

      <option value="max">Max Profit</option>

    </select>

    <label>Target Margin (%)</label>

    <input id="targetMargin" type="number" value="40">

    <label>Pricing Strategy</label>

    <select id="pricingStrategy">

      <option value="normal">Normal</option>

      <option value="market">Market</option>

      <option value="undercut">Undercut</option>

      <option value="builder">Builder</option>

    </select>

    <label>Competitor Price ($)</label>

    <input id="competitorPrice" type="number" placeholder="Optional">

  </div>

</div>

<!-- =========================

     LABOR

========================= -->

<div class="collapsible card" data-card="labor">

  <div class="card-header" onclick="toggleCard(this)">

    Labor Settings

    <span class="chevron">⌄</span>

  </div>

  <div class="card-body">

    <label>Hourly Rate ($)</label>

    <input id="hourlyRate" type="number" value="25">

    <label>Hours Per House</label>

    <input id="hoursPerHouse" type="number" value="5">

    <label>Crew Size</label>

    <input id="crewSize" type="number" value="2">

    <label>Overhead (%)</label>

    <input id="overhead" type="number" value="10">

  </div>

</div>

<!-- =========================

     TANK

========================= -->

<div class="collapsible card" data-card="tank">

  <div class="card-header" onclick="toggleCard(this)">

    Tank Settings

    <span class="chevron">⌄</span>

  </div>

  <div class="card-body">

    <label>Tank Size</label>

    <select id="tankSize">

      <option value="100">100 Gallon</option>

      <option value="300">300 Gallon</option>

      <option value="500" selected>500 Gallon</option>

      <option value="700">700 Gallon</option>

    </select>

  </div>

</div>

<!-- =========================

     ADDONS

========================= -->

<div class="collapsible card" data-card="addons">

  <div class="card-header" onclick="toggleCard(this)">

    Add-ons

    <span class="chevron">⌄</span>

  </div>

  <div class="card-body">

    <div class="toggle" onclick="this.classList.toggle('active'); app.job.addons.aeration=this.classList.contains('active'); requestRender();">

      Aeration

    </div>

    <div class="toggle" onclick="this.classList.toggle('active'); app.job.addons.compost=this.classList.contains('active'); requestRender();">

      Compost

    </div>

    <div class="toggle" onclick="this.classList.toggle('active'); app.job.addons.biochar=this.classList.contains('active'); requestRender();">

      Biochar

    </div>

    <div class="toggle" onclick="this.classList.toggle('active'); app.job.addons.humic=this.classList.contains('active'); requestRender();">

      Humic

    </div>

    <div class="toggle" onclick="this.classList.toggle('active'); app.job.addons.grow=this.classList.contains('active'); requestRender();">

      Grow System

    </div>

    <div class="toggle" onclick="this.classList.toggle('active'); app.job.addons.lime=this.classList.contains('active'); requestRender();">

      Lime

    </div>

    <div class="toggle" onclick="this.classList.toggle('active'); app.job.addons.sulfur=this.classList.contains('active'); requestRender();">

      Sulfur

    </div>

  </div>

</div>

<!-- =========================

     SCHEDULE

========================= -->

<div class="collapsible card" data-card="schedule">

  <div class="card-header" onclick="toggleCard(this)">

    Schedule

    <span class="chevron">⌄</span>

  </div>

  <div class="card-body">

    <label>Project Start</label>

    <input type="date" id="projectStart">

    <div id="schedulePreview"></div>

  </div>

</div>

<!-- =========================

     PROPOSAL

========================= -->

<div class="collapsible card" data-card="proposal">

  <div class="card-header" onclick="toggleCard(this)">

    Proposal Info

    <span class="chevron">⌄</span>

  </div>

  <div class="card-body">

    <label>Customer Name</label>

    <input id="customer">

    <label>Address</label>

    <input id="address">

    <label>Quote Date</label>

    <input type="date" id="quoteDate">

    <button class="primary full" onclick="sendProposal()">

      Generate Proposal

    </button>

  </div>

</div>

<!-- =========================

     RESULTS

========================= -->

<div class="collapsible card open" data-card="results">

  <div class="card-header" onclick="toggleCard(this)">

    Results

    <span class="chevron">⌄</span>

  </div>

  <div class="card-body">

    <div id="results"></div>

  </div>

</div>

<!-- =========================

     PIPELINE

========================= -->

<div class="collapsible card" data-card="pipeline">

  <div class="card-header" onclick="toggleCard(this)">

    Pipeline

    <span class="chevron">⌄</span>

  </div>

  <div class="card-body">

    <div id="jobHistoryList"></div>

  </div>

</div>

<!-- =========================

     HISTORY

========================= -->

<div class="collapsible card" data-card="history">

  <div class="card-header" onclick="toggleCard(this)">

    History

    <span class="chevron">⌄</span>

  </div>

  <div class="card-body">

    <div id="jobHistory"></div>

  </div>

</div>

<!-- MODAL -->

<div id="proposalModal" class="proposal-modal" onclick="handleModalBackground(event)">

  <div class="proposal-content">

    <div id="modalCustomer"></div>

    <div id="modalAddress"></div>

    <div id="modalBody"></div>

  </div>

</div>

<!-- TOAST -->

<div id="toastContainer" class="toast-container"></div>

<!-- JS ORDER -->

<script src="js/core.js"></script>

<script src="js/state.js"></script>

<script src="js/inventory.js"></script>

<script src="js/crm.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

</body>

</html>
