<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoDa CRM Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#000;color:#fff;font-family:Arial;padding:20px}
.card{background:#111;padding:20px;border-radius:15px;margin-bottom:20px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;border:1px solid #333;color:#fff;border-radius:10px}
button{width:100%;padding:15px;margin-top:10px;background:#d4af37;border:none;border-radius:12px;font-weight:bold}
.job{border-left:4px solid gold;padding:10px;margin:10px 0;background:#111}
.unpaid{color:red}.paid{color:lime}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>
<input id="name" placeholder="Customer Name">

<select id="size">
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>

<select id="type">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1" placeholder="# of Houses">

<label><input type="checkbox" id="builderMode"> Builder Mode</label>

<input id="pricePerHouse" type="number" placeholder="Price Per House">

<button onclick="logJob()">Create Job</button>
</div>

<div class="card">
<h2>Material Costs</h2>
<input id="seedCost" placeholder="Seed Cost">
<input id="fertCost" placeholder="Fertilizer Cost">
<input id="mulchCost" placeholder="Mulch Cost">
<input id="tackCost" placeholder="Tackifier Cost">
<input id="soilCost" placeholder="Soil Additives Cost">
<button onclick="saveCosts()">Save Costs</button>
</div>

<div class="card">
<button onclick="toggleClient()">Toggle Client View</button>
<button onclick="clearJobs()">Clear Job History</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="history"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chartMain"></canvas>
<br><br>
<canvas id="chartType"></canvas>
<br><br>
<canvas id="chartMonthly"></canvas>
</div>

<script>
const { jsPDF } = window.jspdf;

let jobs = JSON.parse(localStorage.getItem("jobs")||"[]");
let cost = JSON.parse(localStorage.getItem("cost")||"{}");
let clientMode = false;
let charts = {};

// ---------- MATERIAL RECIPES ----------
function getMaterials(type,size){
let base = {small:1, medium:2, large:3}[size];

if(type==="standard"){
return {seed:base,fert:base,mulch:base,tack:base,soil:0};
}

if(type==="premium"){
return {seed:base,fert:base,mulch:base,tack:base,soil:base};
}
}

// ---------- SAVE COST ----------
function saveCosts(){
cost = {
seed:+seedCost.value||0,
fert:+fertCost.value||0,
mulch:+mulchCost.value||0,
tack:+tackCost.value||0,
soil:+soilCost.value||0
};
localStorage.setItem("cost",JSON.stringify(cost));
render();
}

// ---------- LOG JOB ----------
function logJob(){

try{

let name = nameInput();
let size = val("size");
let type = val("type");
let houses = parseInt(val("houses")) || 1;
let builder = document.getElementById("builderMode").checked;
let priceInput = parseFloat(val("pricePerHouse")) || 0;

let baseMaterials = getMaterials(type,size);
let materials = {};

for(let k in baseMaterials){
materials[k] = baseMaterials[k] * houses;
}

// revenue
let baseRevenue = {small:1500, medium:2500, large:3500}[size];
if(type==="premium") baseRevenue *= 1.4;

let revenuePerHouse = builder && priceInput ? priceInput : baseRevenue;
let revenue = revenuePerHouse * houses;

// cost
let materialCost = 0;
for(let k in materials){
materialCost += (materials[k]||0)*(cost[k]||0);
}

let costPerHouse = materialCost / houses;
let profit = revenue - materialCost;
let profitPerHouse = profit / houses;
let margin = revenue ? (profit/revenue*100) : 0;

let job = {
name,
type,
size,
houses,
builder,
pricePerHouse: revenuePerHouse,
materials,
revenue,
profit,
margin,
costPerHouse,
profitPerHouse,
paid:false,
date:new Date().toLocaleDateString()
};

jobs.push(job);
localStorage.setItem("jobs",JSON.stringify(jobs));

render();

}catch(e){alert(e.message)}
}

// ---------- HELPERS ----------
function val(id){return document.getElementById(id).value}
function nameInput(){return document.getElementById("name").value}

// ---------- CLIENT MODE ----------
function toggleClient(){
clientMode=!clientMode;
render();
}

// ---------- CLEAR ----------
function clearJobs(){
if(confirm("Clear all jobs?")){
jobs=[];
localStorage.setItem("jobs","[]");
render();
}
}

// ---------- PDF ----------
function pdf(j){
const doc = new jsPDF();

doc.text("SoDa Outdoor Designs",20,20);
doc.text(`Customer: ${j.name}`,20,40);
doc.text(`Homes: ${j.houses}`,20,50);
doc.text(`Price/Home: $${Math.round(j.pricePerHouse)}`,20,60);
doc.text(`Total: $${Math.round(j.revenue)}`,20,70);

doc.save(j.name+".pdf");
}

// ---------- RENDER ----------
function render(){

// stats
let rev=0, prof=0;
jobs.forEach(j=>{rev+=j.revenue;prof+=j.profit});

let margin = rev ? (prof/rev*100).toFixed(1) : 0;

stats.innerHTML = `
Jobs: ${jobs.length}<br>
Revenue: $${rev}<br>
Profit: $${prof}<br>
Margin: ${margin}%
`;

// history
history.innerHTML = jobs.map((j,i)=>{

if(clientMode){
return `
<div class="job">
<b>${j.name}</b><br>
Homes: ${j.houses}<br>
${j.type.toUpperCase()}<br>
$${Math.round(j.pricePerHouse)}/home<br>
Total: $${Math.round(j.revenue)}
</div>`;
}

let matHTML="";
let totalCost=0;

for(let k in j.materials){
let qty = j.materials[k];
let c = cost[k]||0;
let item = qty*c;
totalCost+=item;

matHTML += `${k}: ${qty} ($${item})<br>`;
}

return `
<div class="job">

<b>${j.name}</b> (${j.type}) — ${j.houses} homes<br>

💰 Total: $${Math.round(j.revenue)}<br>
🏠 Per House: $${Math.round(j.pricePerHouse)}<br>

📉 Cost/House: $${Math.round(j.costPerHouse)}<br>
📈 Profit/House: $${Math.round(j.profitPerHouse)}<br>

📊 Margin: ${j.margin.toFixed(1)}%<br><br>

<b>Materials</b><br>
${matHTML}

<span class="${j.paid?'paid':'unpaid'}">
${j.paid?'PAID':'UNPAID'}
</span>

<button onclick="jobs[${i}].paid=!jobs[${i}].paid;localStorage.setItem('jobs',JSON.stringify(jobs));render()">Toggle Paid</button>
<button onclick='pdf(${JSON.stringify(j)})'>PDF</button>

</div>`;
}).join("");

// ---------- CHARTS FIX ----------
Object.values(charts).forEach(c=>c.destroy());
charts = {};

// main
charts.main = new Chart(document.getElementById("chartMain"),{
type:"bar",
data:{
labels:jobs.map(j=>j.date),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue),backgroundColor:"#d4af37"},
{label:"Profit",data:jobs.map(j=>j.profit),backgroundColor:"#fff"}
]
}
});

// type
let s=jobs.filter(j=>j.type==="standard").length;
let p=jobs.filter(j=>j.type==="premium").length;

charts.type = new Chart(document.getElementById("chartType"),{
type:"doughnut",
data:{labels:["Standard","Premium"],datasets:[{data:[s,p]}]}
});

// monthly
let m={};
jobs.forEach(j=>{
if(!m[j.date]) m[j.date]={r:0,p:0};
m[j.date].r+=j.revenue;
m[j.date].p+=j.profit;
});

charts.month = new Chart(document.getElementById("chartMonthly"),{
type:"line",
data:{
labels:Object.keys(m),
datasets:[
{label:"Revenue",data:Object.values(m).map(v=>v.r),borderColor:"#d4af37"},
{label:"Profit",data:Object.values(m).map(v=>v.p),borderColor:"#fff"}
]
}
});

}

render();
</script>

</body>
</html>
