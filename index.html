<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;}
.big{font-size:34px}
.alert{color:red}
.good{color:lime}
.flex{display:flex;gap:10px}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier" onchange="handleTier()">
<option value="standard">Standard</option>
<option value="premium">🔥 Premium</option>
</select>

<select id="bidMode">
<option value="win">Win Job</option>
<option value="balanced" selected>Balanced</option>
<option value="profit">Max Profit</option>
</select>

<h3>Yard Size</h3>
<div class="flex">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Sq Ft Per House">
<input id="houses" value="1" placeholder="Number of Houses">

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow"> Grow System</label>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bio"> Biochar</label>
<label><input type="checkbox" id="hum"> Humic Acid</label>

<h3>Labor & Overhead</h3>
<input id="laborRate" value="70" placeholder="Labor Rate ($/hr)">
<input id="crewSize" value="2" placeholder="Crew Size">
<input id="hours" value="8" placeholder="Hours Per House">
<input id="overhead" value="15" placeholder="Overhead (%)">
<input id="margin" value="60" placeholder="Base Margin (%)">

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
<div id="dealScore"></div>
</div>

<div id="pricingOutput"></div>
<div id="profitWarnings"></div>

<button onclick="runAndCreate()">Create Job</button>
</div>

<div class="card">
<h2>Inventory (Cost + Qty)</h2>
<div id="inventoryInputs"></div>
<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card"><h2>Alerts</h2><div id="alerts"></div></div>
<div class="card"><h2>Job History</h2><div id="jobs"></div></div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

// ---------- DOM FIX (CRITICAL) ----------
const jobsEl = document.getElementById("jobs")
const alertsEl = document.getElementById("alerts")
const inventoryInputs = document.getElementById("inventoryInputs")

// ---------- HELPERS ----------
function n(v){return Number(v)||0}

// ---------- STATE ----------
let inv=JSON.parse(localStorage.getItem("inv")||"{}")
let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")

const materials=["tttf","rye","elite","kbg","mil","esp","wood","bfm","tack","comp","bio","hum"]

// ---------- INVENTORY ----------
function renderInventory(){
inventoryInputs.innerHTML=""
materials.forEach(m=>{
inventoryInputs.innerHTML+=`
<input id="${m}C" placeholder="${m} cost">
<input id="${m}Q" placeholder="${m} qty">
`
})
}
renderInventory()

function saveInventory(){
materials.forEach(m=>{
inv[m]={c:n(document.getElementById(m+"C").value),q:n(document.getElementById(m+"Q").value)}
})
localStorage.setItem("inv",JSON.stringify(inv))
alert("Inventory Saved")
}

// ---------- TIER ----------
function handleTier(){
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bio.checked=true
hum.checked=true
}
}

// ---------- SIZE ----------
function setSize(v){
sqft.value=v
autoPrice()
}

// ---------- EFFICIENCY ----------
function getEfficiency(h){
if(h<=3)return 1
if(h<=9)return .9
if(h<=24)return .8
if(h<=49)return .7
if(h<=99)return .6
return .5
}

// ---------- MARGIN ----------
function getMargin(){
let base=n(margin.value)
let h=n(houses.value)

if(h>=50)base-=10
else if(h>=25)base-=7
else if(h>=10)base-=5

if(bidMode.value==="win")base-=10
if(bidMode.value==="profit")base+=10

return Math.max(25,Math.min(70,base))
}

// ---------- BAG SIZES ----------
const bagSize={
tttf:50,rye:50,elite:50,kbg:50,
mil:50,esp:50,wood:50,bfm:50,
tack:25,comp:40,bio:40,hum:40
}

// ---------- PRICING ----------
function autoPrice(){

let sqftVal=n(sqft.value)
let h=n(houses.value)||1
if(!sqftVal)return

let totalSqft=sqftVal*h

let rates = tier.value==="premium"?{
elite:7,kbg:2,esp:5,bfm:7,tack:1,comp:20,bio:3,hum:2
}:{
tttf:7,rye:5,mil:5,wood:7,tack:1,
comp:compost.checked?20:0,
bio:bio.checked?3:0,
hum:hum.checked?2:0
}

let materialCost=0
let html=""
window.lastMaterials={}

Object.keys(rates).forEach(k=>{
let lbs=(rates[k]*totalSqft)/1000
let bags=lbs/bagSize[k]

let cost=(inv[k]?.c||0)*bags

window.lastMaterials[k]={qty:bags,cost}
materialCost+=cost

html+=`${k}: ${bags.toFixed(2)} bags ($${cost.toFixed(0)})<br>`
})

// LABOR
let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)*h*getEfficiency(h)

// OVERHEAD
let overheadCost=(materialCost+labor)*(n(overhead.value)/100)

// GROW
let growCost=0
if(grow.checked){
growCost=tier.value==="standard"?300:(h>=50?0:200)
}

// TOTAL
let totalCost=materialCost+labor+overheadCost+growCost
if(totalCost<=0)return

let margin=getMargin()
let price=totalCost/(1-(margin/100))

window.finalPrice=price
window.lastMaterialCost=materialCost
window.lastLabor=labor
window.lastOverhead=overheadCost
window.lastGrow=growCost

priceDisplay.innerText="$"+price.toFixed(0)

let realMargin=((price-totalCost)/price)*100
dealScore.innerHTML=realMargin>50?"🔥 A DEAL":"👍 OK"

pricingOutput.innerHTML=html+`
<br>Materials:$${materialCost.toFixed(0)}
<br>Labor:$${labor.toFixed(0)}
<br>Overhead:$${overheadCost.toFixed(0)}
<br>Grow:$${growCost}
<br><b>Total Cost:$${totalCost.toFixed(0)}</b>
<br>Margin:${margin}%`

let warn=[]
if(realMargin<35)warn.push("Low margin")
if(labor>materialCost)warn.push("Labor > Materials")

profitWarnings.innerHTML=warn.length?
warn.map(w=>`<div class="alert">${w}</div>`).join(""):
`<div class="good">✔ Healthy</div>`
}

// ---------- SAFE CREATE ----------
function runAndCreate(){
autoPrice()
setTimeout(()=>createJob(),50)
}

function createJob(){

if(!window.finalPrice || !window.lastMaterials){
alert("Run pricing first")
return
}

let snapshot=JSON.parse(JSON.stringify(window.lastMaterials))
let alertsArr=[]

Object.keys(snapshot).forEach(k=>{
let used=n(snapshot[k].qty)

if(!inv[k])inv[k]={q:0,c:0}

inv[k].q-=used

if(inv[k].q<=5)alertsArr.push(`🚨 ${k} OUT`)
else if(inv[k].q<20)alertsArr.push(`⚠️ ${k} LOW`)
})

let totalCost=window.lastMaterialCost+window.lastLabor+window.lastOverhead+window.lastGrow
let revenue=window.finalPrice
let profit=revenue-totalCost
let margin=(profit/revenue)*100

jobs.push({
name:name.value||"Client",
revenue,profit,margin,
materials:snapshot,
alerts:alertsArr
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
alert("Job Created ✅")
}

// ---------- RENDER ----------
function render(){

jobsEl.innerHTML=""
alertsEl.innerHTML=""

let alertHTML=""

jobs.forEach(j=>{

j.alerts.forEach(a=>alertHTML+=`<div class="alert">${a}</div>`)

let mats=""
Object.keys(j.materials).forEach(m=>{
mats+=`${m}: ${j.materials[m].qty.toFixed(2)} ($${j.materials[m].cost.toFixed(0)})<br>`
})

jobsEl.innerHTML+=`
<div class="card">
<b>${j.name}</b><br><br>
${mats}
Revenue:$${j.revenue.toFixed(0)}<br>
Profit:$${j.profit.toFixed(0)}<br>
Margin:${j.margin.toFixed(1)}%
</div>`
})

alertsEl.innerHTML=alertHTML||"No alerts"

// chart
if(window.chart)chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map((_,i)=>"Job "+(i+1)),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})
}

// ---------- EVENTS (MOBILE FIX) ----------
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",autoPrice)
el.addEventListener("change",autoPrice)
})

// INIT
render()

</script>

</body>
</html>
