<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 REQUIRED FOR CHARTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Soda App</title>

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  margin: 0;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

h3 {
  margin-top: 0;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  background: #1a1a1a;
  border: 1px solid #333;
  color: white;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 14px;
  background: #d4af37;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  margin-top: 10px;
}

.stat {
  margin: 10px 0;
}

#alerts {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
<h3>Overview</h3>
<div class="stat">Jobs: <span id="jobs">0</span></div>
<div class="stat">Revenue: $<span id="revenue">0</span></div>
<div class="stat">Profit: $<span id="profit">0</span></div>
</div>

<div class="card">
<h3>Log Job</h3>
<input id="jobName" placeholder="Customer Name">
<select id="jobSize">
<option value="1000">Small</option>
<option value="2000">Medium</option>
<option value="3000">Large</option>
</select>
<button onclick="logJob()">Log Job</button>
</div>

<div class="card">
<h3>Inventory</h3>
<input id="seed" placeholder="Seed">
<input id="fert" placeholder="Fertilizer">
<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h3>Material Costs</h3>
<input id="seedCost" placeholder="Seed Cost">
<input id="fertCost" placeholder="Fertilizer Cost">
<button onclick="saveCosts()">Save Costs</button>
</div>

<div class="card">
<h3>Inventory Alerts</h3>
<div id="alerts">Checking...</div>
</div>

<div class="card">
<h3>Reorder List</h3>
<div id="reorder">None</div>
</div>

<div class="card">
<h3>Job History</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>Analytics</h3>
<canvas id="chart"></canvas>
</div>

<script>
let jobs = JSON.parse(localStorage.getItem("jobs")) || [];
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let costs = JSON.parse(localStorage.getItem("costs")) || {};

function saveInventory() {
  inventory.seed = Number(document.getElementById("seed").value);
  inventory.fert = Number(document.getElementById("fert").value);
  localStorage.setItem("inventory", JSON.stringify(inventory));
  updateAlerts();
}

function saveCosts() {
  costs.seed = Number(document.getElementById("seedCost").value);
  costs.fert = Number(document.getElementById("fertCost").value);
  localStorage.setItem("costs", JSON.stringify(costs));
}

function logJob() {
  const name = document.getElementById("jobName").value;
  const revenue = Number(document.getElementById("jobSize").value);

  const job = {
    name,
    revenue,
    profit: revenue * 0.5,
    date: new Date().toLocaleDateString()
  };

  jobs.push(job);
  localStorage.setItem("jobs", JSON.stringify(jobs));

  render();
}

function render() {
  document.getElementById("jobs").innerText = jobs.length;

  let totalRevenue = jobs.reduce((a, b) => a + b.revenue, 0);
  let totalProfit = jobs.reduce((a, b) => a + b.profit, 0);

  document.getElementById("revenue").innerText = totalRevenue;
  document.getElementById("profit").innerText = totalProfit;

  let historyHTML = "";
  jobs.forEach(j => {
    historyHTML += `<div>${j.name} - $${j.revenue}</div>`;
  });
  document.getElementById("history").innerHTML = historyHTML;

  renderChart();
}

function updateAlerts() {
  if (inventory.seed < 10) {
    document.getElementById("alerts").innerText = "Low Seed!";
    document.getElementById("reorder").innerText = "Seed";
  } else {
    document.getElementById("alerts").innerText = "All inventory levels good";
    document.getElementById("reorder").innerText = "None";
  }
}

function renderChart() {
  const ctx = document.getElementById("chart");

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: jobs.map(j => j.date),
      datasets: [{
        label: "Revenue",
        data: jobs.map(j => j.revenue)
      }]
    }
  });
}

render();
updateAlerts();
</script>

</body>
</html>
