<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{background:#000;color:#fff;font-family:sans-serif;margin:0;padding:10px}
.card{background:#111;padding:15px;border-radius:12px;margin-bottom:20px}
input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  background:#222;
  border:1px solid #333;
  color:#fff;
  border-radius:8px
}
.row{display:flex;gap:10px}
.row button{flex:1}

.toggle{
  background:#1a1a1a;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  border:1px solid #2a2a2a;
  text-align:center;
  font-weight:500;
  transition:.2s;
}
.toggle.active{
  background:#d4af37;
  color:#000;
  font-weight:bold;
  border:1px solid #d4af37;
  box-shadow:0 0 10px rgba(212,175,55,0.4);
}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="package">
  <option value="standard">Standard</option>
  <option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1" placeholder="# of Houses">

<div class="row">
  <button onclick="setSize(3000)">Small</button>
  <button onclick="setSize(6000)">Medium</button>
  <button onclick="setSize(12000)">Large</button>
</div>

<input id="sqft" type="number" placeholder="Square Feet (per house)">

</div>

<div class="card">
<h2>Add Ons</h2>

<div class="toggle" data-name="aeration" onclick="toggleAddon(this)">Aeration</div>
<div class="toggle" data-name="compost" onclick="toggleAddon(this)">Compost</div>
<div class="toggle" data-name="biohum" onclick="toggleAddon(this)">Bio / Hum Blend</div>

<div class="toggle" data-name="lime" onclick="toggleAddon(this)">Lime</div>
<input id="limeQty" type="number" placeholder="Lime Quantity">

<div class="toggle" data-name="sulfur" onclick="toggleAddon(this)">Sulfur</div>
<input id="sulfurQty" type="number" placeholder="Sulfur Quantity">

</div>

<script>

// ---------- HELPERS ----------
function el(id){ return document.getElementById(id) }

// ---------- STATE ----------
let app = {
  inventory:{
    standard:[
      {name:"seed",cost:80,qty:100},
      {name:"fert",cost:40,qty:100},
      {name:"mulch",cost:35,qty:100},
      {name:"tack",cost:25,qty:100}
    ],
    premium:[
      {name:"bio",cost:25,qty:100},
      {name:"humic",cost:20,qty:100}
    ],
    addons:[
      {name:"lime",cost:15,qty:100},
      {name:"sulfur",cost:20,qty:100}
    ]
  },

  jobs:[],

  job:{
    customer:"",
    sqft:0,
    houses:1,
    package:"standard",

    addons:{
      aeration:false,
      compost:false,
      biohum:false,
      lime:false,
      sulfur:false,
      grow:false
    },

    quantities:{
      lime:0,
      sulfur:0
    }
  }
};

// ---------- UI ----------
function setSize(val){
  console.log("clicked size:", val)

  app.job.sqft = val

  let input = el("sqft")
  if(input) input.value = val

  render()
}

function toggleAddon(elRef){
  let name = elRef.dataset.name

  app.job.addons[name] = !app.job.addons[name]

  render()
}

// ---------- BIND ----------
function bind(){

  let c = el("customer")
  if(c) c.oninput = e => app.job.customer = e.target.value

  let s = el("sqft")
  if(s) s.oninput = e => {
    app.job.sqft = +e.target.value
    render()
  }

  let h = el("houses")
  if(h) h.oninput = e => {
    app.job.houses = +e.target.value
    render()
  }

  let p = el("package")
  if(p) p.onchange = e => {
    app.job.package = e.target.value
    applyPackage()
    render()
  }

  let l = el("limeQty")
  if(l) l.oninput = e => {
    app.job.quantities.lime = +e.target.value
    render()
  }

  let su = el("sulfurQty")
  if(su) su.oninput = e => {
    app.job.quantities.sulfur = +e.target.value
    render()
  }

}

// ---------- LOGIC ----------
function applyPackage(){

  let j = app.job

  if(j.package === "premium"){
    j.addons.aeration = true
    j.addons.compost = true
    j.addons.biohum = true
    j.addons.lime = true
    j.addons.sulfur = true
  }

  if(!j.quantities.lime) j.quantities.lime = 1
  if(!j.quantities.sulfur) j.quantities.sulfur = 1
}

// ---------- RENDER ----------

function render(){
  let j = app.job

  document.querySelectorAll(".toggle").forEach(elm=>{
    let name = elm.dataset.name

    if(j.addons[name]){
      elm.classList.add("active")
    } else {
      elm.classList.remove("active")
    }
  })

  console.log("render", j)
}

// ---------- INIT ----------
document.addEventListener("DOMContentLoaded", () => {
  bind()
  render()
})

</script>

</body>
</html>
