<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{padding:12px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.flex{display:flex;gap:10px;margin:10px 0;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;margin-top:10px;}
.big{font-size:34px}
.alert{color:#ff4d4d;font-weight:bold;margin-bottom:6px;}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier" onchange="handleTier()">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="bidMode">
<option value="balanced">Balanced</option>
<option value="win">Win</option>
<option value="profit">Profit</option>
</select>

<!-- ✅ SIZE BUTTONS BACK -->
<div class="flex">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" value="3000" placeholder="Sq Ft">
<input id="houses" value="1" placeholder="Houses">

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow"> Grow</label>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bio"> Bio</label>
<label><input type="checkbox" id="hum"> Humic</label>

<h3>Labor</h3>
<input id="laborRate" value="70">
<input id="crewSize" value="2">
<input id="hours" value="8">
<input id="overhead" value="15">
<input id="margin" value="60">

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
</div>

<div id="pricingOutput"></div>

<button onclick="runAndCreate()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>
<div id="invUI"></div>
<button onclick="saveInv()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts">No alerts</div>
</div>

<div class="card">
<h2>Job History</h2>
<button onclick="clearJobs()" style="background:red;width:100%;">Clear Job History</button>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

// ---------- SAFE ----------
function n(v){return isNaN(Number(v))?0:Number(v)}

// ---------- STATE ----------
let inv=JSON.parse(localStorage.getItem("inv")||"{}")
let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")

const jobsEl=document.getElementById("jobs")
const alertsEl=document.getElementById("alerts")
const invUI=document.getElementById("invUI")

// ---------- SIZE ----------
function setSize(v){
sqft.value=v
autoPrice()
}

// ---------- PREMIUM ----------
function handleTier(){
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bio.checked=true
hum.checked=true
}
autoPrice()
}

// ---------- INVENTORY ----------
const mats=["tttf","rye","elite","kbg","mil","esp","wood","bfm","tack","comp","bio","hum"]

function renderInv(){
invUI.innerHTML=""
mats.forEach(m=>{
invUI.innerHTML+=`
<input id="${m}C" placeholder="${m} cost">
<input id="${m}Q" placeholder="${m} qty">
`
})
}
renderInv()

function saveInv(){
mats.forEach(m=>{
inv[m]={c:n(document.getElementById(m+"C").value),q:n(document.getElementById(m+"Q").value)}
})
localStorage.setItem("inv",JSON.stringify(inv))
alert("Saved")
}

// ---------- PRICING ----------
function autoPrice(){

let sqftVal=n(sqft.value)||1
let h=n(houses.value)||1
let totalSqft=sqftVal*h

// ✅ ALWAYS VALID RATES
let rates = tier.value==="premium"
? {elite:7,kbg:2,esp:5,bfm:7,tack:1,comp:20,bio:3,hum:2}
: {tttf:7,rye:5,mil:5,wood:7,tack:1}

if(compost.checked) rates.comp=20
if(bio.checked) rates.bio=3
if(hum.checked) rates.hum=2

let materialCost=0
window.lastMaterials={}
let html=""

Object.keys(rates).forEach(k=>{
let bags=Math.ceil((rates[k]*totalSqft)/1000)
let cost=(inv[k]?.c||20)*bags // default cost fallback

window.lastMaterials[k]={qty:bags,cost:cost}
materialCost+=cost

html+=`${k}: ${bags} ($${cost})<br>`
})

// ✅ LABOR
let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)*h

// ✅ OVERHEAD
let overheadCost=(materialCost+labor)*(n(overhead.value)/100)

// ✅ GROW
let growCost=grow.checked?300:0

let totalCost=materialCost+labor+overheadCost+growCost
let margin=n(margin.value)

let price = totalCost/(1-(margin/100))

window.finalPrice=price
window.lastMaterialCost=materialCost
window.lastLabor=labor
window.lastOverhead=overheadCost
window.lastGrow=growCost

priceDisplay.innerText="$"+Math.round(price)

pricingOutput.innerHTML=html+`
<br>Materials:$${materialCost}
<br>Labor:$${labor}
<br>Overhead:$${overheadCost}
<br>Grow:$${growCost}
<br><b>Total:$${totalCost}</b>`
}

// ---------- CREATE ----------
function runAndCreate(){
autoPrice()
setTimeout(createJob,50)
}

function createJob(){

if(!window.finalPrice) return alert("Pricing not ready")

let snapshot=JSON.parse(JSON.stringify(window.lastMaterials))
let alertsArr=[]

Object.keys(snapshot).forEach(k=>{
let used=snapshot[k].qty
if(!inv[k]) inv[k]={q:0,c:0}

inv[k].q=Math.max(0,inv[k].q-used)

// ✅ ALERT FIX
if(inv[k].q===0) alertsArr.push(`${k} OUT`)
else if(inv[k].q<10) alertsArr.push(`${k} LOW`)
})

let totalCost=window.lastMaterialCost+window.lastLabor+window.lastOverhead+window.lastGrow
let revenue=window.finalPrice
let profit=revenue-totalCost
let margin=(profit/revenue)*100

jobs.push({
name:name.value||"Client",
materials:snapshot,
revenue,
profit,
margin,
alerts:alertsArr,
date:new Date().toLocaleString()
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
alert("Job Created")
}

// ---------- CLEAR ----------
function clearJobs(){
jobs=[]
localStorage.removeItem("jobs")
render()
}

// ---------- RENDER ----------
function render(){

jobsEl.innerHTML=""
alertsEl.innerHTML=""

jobs.forEach(j=>{
j.alerts.forEach(a=>{
alertsEl.innerHTML+=`<div class="alert">${a}</div>`
})

jobsEl.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
${j.date}<br>
Revenue:$${j.revenue}<br>
Profit:$${j.profit}<br>
Margin:${j.margin.toFixed(1)}%
</div>`
})

if(!alertsEl.innerHTML) alertsEl.innerHTML="No alerts"

// chart
if(window.chart) window.chart.destroy()

window.chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map((_,i)=>"Job "+(i+1)),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})
}

// ---------- EVENTS ----------
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",autoPrice)
})

render()
autoPrice()

</script>

</body>
</html>
