<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;margin:0}
.card{background:#111;padding:20px;margin:15px;border-radius:16px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:10px}
button{width:100%;padding:14px;background:#d4af37;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
.alert{color:#ff4d4d}
.good{color:#00ff88}
.warn{color:#ffd700}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1">
<input id="sqft" placeholder="Sq Ft Per House">
<input id="margin" placeholder="Target Margin % (default 60)">

<h3>Labor & Overhead</h3>
<input id="laborRate" placeholder="Labor $/hr">
<input id="crewSize" placeholder="Crew Size">
<input id="hours" placeholder="Hours">
<input id="overhead" placeholder="Overhead %">

<button onclick="autoFillPrice()">Auto Fill Price</button>

<div id="priceCard" style="margin-top:20px;padding:20px;border:2px solid #d4af37;border-radius:16px;text-align:center;">
<div style="opacity:.6;">Final Price</div>
<div id="priceDisplay" style="font-size:42px;font-weight:bold;">$0</div>
<div id="dealRating"></div>
</div>

<input id="jobPrice" type="hidden">

<div id="pricingOutput"></div>

<button onclick="createJob()">Create Job</button>

</div>

<div class="card">
<h2>Inventory</h2>

<input id="tttfCost" placeholder="TTTF Cost"><input id="tttfQty" placeholder="TTTF Qty">
<input id="ryeCost" placeholder="Rye Cost"><input id="ryeQty" placeholder="Rye Qty">
<input id="eliteCost" placeholder="Elite Cost"><input id="eliteQty" placeholder="Elite Qty">
<input id="kbgCost" placeholder="KBG Cost"><input id="kbgQty" placeholder="KBG Qty">

<input id="milCost" placeholder="Milorganite Cost"><input id="milQty" placeholder="Mil Qty">
<input id="espCost" placeholder="Espoma Cost"><input id="espQty" placeholder="Esp Qty">

<input id="woodCost" placeholder="Wood Mulch Cost"><input id="woodQty" placeholder="Wood Qty">
<input id="bfmCost" placeholder="BFM Cost"><input id="bfmQty" placeholder="BFM Qty">

<input id="tackCost" placeholder="Tack Cost"><input id="tackQty" placeholder="Tack Qty">

<input id="compCost" placeholder="Compost Cost"><input id="compQty" placeholder="Comp Qty">
<input id="bioCost" placeholder="Bio Cost"><input id="bioQty" placeholder="Bio Qty">
<input id="humCost" placeholder="Humic Cost"><input id="humQty" placeholder="Hum Qty">

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
<button onclick="clearJobs()" style="background:red">Clear Job History</button>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

// ===== STATE =====
let jobs = JSON.parse(localStorage.getItem("jobs")||"[]")
let inv = JSON.parse(localStorage.getItem("inv")||"{}")
let chart

const n=v=>parseFloat(v)||0

const STANDARD_KEYS=["tttf","rye","mil","wood","tack"]
const PREMIUM_KEYS=["elite","kbg","esp","bfm","tack","comp","bio","hum"]

// ===== INVENTORY =====
function saveInventory(){
inv={
tttf:{c:n(tttfCost.value),q:n(tttfQty.value)},
rye:{c:n(ryeCost.value),q:n(ryeQty.value)},
elite:{c:n(eliteCost.value),q:n(eliteQty.value)},
kbg:{c:n(kbgCost.value),q:n(kbgQty.value)},
mil:{c:n(milCost.value),q:n(milQty.value)},
esp:{c:n(espCost.value),q:n(espQty.value)},
wood:{c:n(woodCost.value),q:n(woodQty.value)},
bfm:{c:n(bfmCost.value),q:n(bfmQty.value)},
tack:{c:n(tackCost.value),q:n(tackQty.value)},
comp:{c:n(compCost.value),q:n(compQty.value)},
bio:{c:n(bioCost.value),q:n(bioQty.value)},
hum:{c:n(humCost.value),q:n(humQty.value)}
}
localStorage.setItem("inv",JSON.stringify(inv))
alert("Saved ✅")
}

// ===== MATERIAL ENGINE =====
function getMaterials(tier,h){
const sqft=n(document.getElementById("sqft").value)||5000
const k=(sqft*h)/1000

if(tier==="standard"){
const seed=6*k
return {
tttf:seed*0.85,
rye:seed*0.15,
mil:1*k,
wood:3*k,
tack:0.5*k
}
}

const seed=5*k
return {
elite:seed*0.8,
kbg:seed*0.2,
esp:1*k,
bfm:4*k,
tack:0.5*k,
comp:1.5*k,
bio:0.3*k,
hum:0.2*k
}
}

// ===== AUTO PRICE =====
function autoFillPrice(){

const h=n(houses.value)||1
const tierVal=tier.value

const mats=getMaterials(tierVal,h)
const allowed=tierVal==="standard"?STANDARD_KEYS:PREMIUM_KEYS

let materialCost=0

allowed.forEach(key=>{
const qty=n(mats[key])
const cost=n(inv[key]?.c)
if(qty>0 && cost>0) materialCost+=qty*cost
})

// labor
const labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)

// overhead
const overheadPercent=n(overhead.value)||15
const overheadCost=(materialCost+labor)*(overheadPercent/100)

// total cost
const totalCost=materialCost+labor+overheadCost

// margin
const targetMargin=n(document.getElementById("margin").value)||60
let basePrice=totalCost/(1-(targetMargin/100))

// REAL margin
let profit=basePrice-totalCost
let marginReal=(profit/basePrice)*100

// ===== PROFIT PROTECTION =====
const MIN_MARGIN=35

if(marginReal<MIN_MARGIN){
basePrice=totalCost/(1-(MIN_MARGIN/100))
marginReal=MIN_MARGIN
}

// ===== BUILDER DISCOUNT =====
let discount=0

if(h<10) discount=0.05
else if(h>=10 && h<25) discount=0.10
else if(h>=25 && h<100) discount=0.20
else if(h>=100) discount=0.30

const finalPrice=basePrice*(1-discount)

// ===== DISPLAY =====
priceDisplay.innerText=`$${finalPrice.toFixed(0)}`
jobPrice.value=finalPrice
window.finalPrice=finalPrice

// rating
const rating=document.getElementById("dealRating")

if(marginReal>60){
rating.innerHTML="<span class='good'>A+ DEAL 💰</span>"
}
else if(marginReal>40){
rating.innerHTML="<span class='warn'>B DEAL 👍</span>"
}
else{
rating.innerHTML="<span class='alert'>C DEAL ⚠️</span>"
}

// breakdown
pricingOutput.innerHTML=`
<div class="card">Materials: $${materialCost.toFixed(0)}</div>
<div class="card">Labor: $${labor.toFixed(0)}</div>
<div class="card">Overhead: $${overheadCost.toFixed(0)}</div>
<div class="card"><b>Total Cost: $${totalCost.toFixed(0)}</b></div>
<div class="card"><b>Builder Discount: ${(discount*100)}%</b></div>
`
}

// ===== CREATE JOB =====
function createJob(){

if(!window.finalPrice){
alert("Run Auto Fill Price")
return
}

const h=n(houses.value)||1
const tierVal=tier.value

const mats=getMaterials(tierVal,h)
const allowed=tierVal==="standard"?STANDARD_KEYS:PREMIUM_KEYS

let breakdown={}
let totalCost=0
let alertsList=[]

allowed.forEach(key=>{
const qty=n(mats[key])
const item=inv[key]

if(!item || qty<=0) return

const cost=qty*n(item.c)
const remaining=item.q-qty

if(qty>item.q) alertsList.push(`🚨 ${key} OUT`)
else if(remaining<=5) alertsList.push(`⚠️ ${key} LOW (${remaining.toFixed(1)})`)

item.q=Math.max(0,remaining)

breakdown[key]={qty,cost}
totalCost+=cost
})

const profit=window.finalPrice-totalCost

jobs.push({
name:name.value||"Client",
tier:tierVal,
revenue:window.finalPrice,
profit,
margin:(profit/window.finalPrice*100)||0,
materials:breakdown,
alerts:alertsList
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
}

// ===== RENDER =====
function render(){

let rev=0,prof=0,alertHTML=""

jobs.forEach(j=>{
rev+=j.revenue
prof+=j.profit
j.alerts.forEach(a=>alertHTML+=`<div class="alert">${a}</div>`)
})

stats.innerHTML=`
Jobs: ${jobs.length}<br>
Revenue: $${rev.toFixed(0)}<br>
Profit: $${prof.toFixed(0)}<br>
Margin: ${(prof/rev*100||0).toFixed(1)}%
`

alerts.innerHTML=alertHTML||"No alerts"

jobsDiv.innerHTML=""

jobs.slice().reverse().forEach(j=>{
let mats=""
let total=0

for(let m in j.materials){
const d=j.materials[m]
total+=d.cost
mats+=`${m}: ${d.qty.toFixed(2)} ($${d.cost.toFixed(0)})<br>`
}

jobsDiv.innerHTML+=`
<div class="card">
<b>${j.name} (${j.tier})</b><br>
Revenue: $${j.revenue.toFixed(0)}<br>
Profit: $${j.profit.toFixed(0)}<br>
Margin: ${j.margin.toFixed(1)}%<br><br>
${mats}
<b>Total Cost: $${total.toFixed(0)}</b>
</div>
`
})

// chart
if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map((_,i)=>i+1),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})
}

function clearJobs(){
jobs=[]
localStorage.removeItem("jobs")
render()
}

const jobsDiv=document.getElementById("jobs")

render()

</script>

</body>
</html>
