<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.flex{display:flex;gap:10px}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;}
.big{font-size:34px}
.alert{color:red}
.good{color:lime}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier" onchange="handleTier()">
<option value="standard">Standard</option>
<option value="premium">🔥 Premium</option>
</select>

<h3>Bid Strategy</h3>
<select id="bidMode">
<option value="win">Win Job</option>
<option value="balanced" selected>Balanced</option>
<option value="profit">Max Profit</option>
</select>

<h3>Yard Size</h3>
<div class="flex">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Sq Ft Per House">
<input id="houses" value="1" placeholder="Number of Houses">

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow"> Grow System</label>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bio"> Biochar</label>
<label><input type="checkbox" id="hum"> Humic Acid</label>

<h3>Labor & Overhead</h3>
<input id="laborRate" placeholder="Labor Rate ($/hr)" value="70">
<input id="crewSize" placeholder="Crew Size" value="2">
<input id="hours" placeholder="Hours Per House" value="8">
<input id="overhead" placeholder="Overhead (%)" value="15">
<input id="margin" placeholder="Base Margin (%)" value="60">

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
<div id="tierBadge"></div>
<div id="dealScore"></div>
</div>

<div id="pricingOutput"></div>
<div id="profitWarnings"></div>

<button id="createBtn" onclick="createJob()" disabled>Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>
<div id="inventoryInputs"></div>
<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card"><h2>Alerts</h2><div id="alerts"></div></div>
<div class="card"><h2>Job History</h2><div id="jobs"></div></div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

function n(v){return Number(v)||0}

let inv = JSON.parse(localStorage.getItem("inv")||"{}")
let jobs = JSON.parse(localStorage.getItem("jobs")||"[]")

const materials = ["tttf","rye","elite","kbg","mil","esp","wood","bfm","tack","comp","bio","hum"]

function renderInventoryInputs(){
inventoryInputs.innerHTML=""
materials.forEach(m=>{
inventoryInputs.innerHTML+=`
<input id="${m}C" placeholder="${m} cost">
<input id="${m}Q" placeholder="${m} qty">
`
})
}
renderInventoryInputs()

function saveInventory(){
materials.forEach(m=>{
inv[m]={c:n(document.getElementById(m+"C").value),q:n(document.getElementById(m+"Q").value)}
})
localStorage.setItem("inv",JSON.stringify(inv))
alert("Saved")
}

function handleTier(){
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bio.checked=true
hum.checked=true
}
}

function setSize(v){sqft.value=v; autoFillPrice()}

function getEfficiency(h){
if(h<=3)return 1
if(h<=9)return .9
if(h<=24)return .8
if(h<=49)return .7
if(h<=99)return .6
return .5
}

function getSmartMargin(){
let base=n(margin.value)
let h=n(houses.value)||1

if(h>=50)base-=10
else if(h>=25)base-=7
else if(h>=10)base-=5

if(bidMode.value==="win")base-=10
if(bidMode.value==="profit")base+=10

return Math.max(25,Math.min(70,base))
}

function detectProfitLeaks(totalCost, price, materialCost, labor, overheadCost){
let warnings=[]
let margin=((price-totalCost)/price)*100

if(margin<35)warnings.push("⚠️ Low margin")
if(margin<25)warnings.push("🚨 High risk job")
if(labor>materialCost)warnings.push("⚠️ Labor > Materials")

return warnings
}

function autoFillPrice(){

if(Object.keys(inv).length===0){return}

let sqftVal=n(sqft.value)
if(!sqftVal)return

let h=n(houses.value)||1
let totalSqft=sqftVal*h

let rates=tier.value==="premium"?
{elite:.08,kbg:.02,esp:.05,bfm:.08,tack:.01,comp:.03,bio:.008,hum:.005}:
{tttf:.085,rye:.015,mil:.05,wood:.08,tack:.01,
comp:compost.checked?.03:0,
bio:bio.checked?.008:0,
hum:hum.checked?.005:0}

let materialCost=0,html=""
window.lastMaterials={}

Object.keys(rates).forEach(k=>{
let qty=rates[k]*totalSqft
let costPerUnit=inv[k]?.c||0
let cost=qty*costPerUnit

window.lastMaterials[k]={qty,cost}

materialCost+=cost
html+=`${k}: ${qty.toFixed(1)} ($${cost.toFixed(0)})<br>`
})

let efficiency=getEfficiency(h)
let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)*h*efficiency
let overheadCost=(materialCost+labor)*(n(overhead.value)/100)

let growCost=0
if(grow.checked){
growCost = tier.value==="standard"?300: (h>=50?0:200)
}

let totalCost=materialCost+labor+overheadCost+growCost
if(totalCost<=0)return

let smartMargin=getSmartMargin()
let price=totalCost/(1-(smartMargin/100))

window.finalPrice=price
window.lastLabor=labor
window.lastOverhead=overheadCost
window.lastGrow=growCost

priceDisplay.innerText="$"+price.toFixed(0)

let marginReal=((price-totalCost)/price)*100
dealScore.innerHTML=marginReal>50?"🔥 A DEAL":"👍 OK"

tierBadge.innerHTML=tier.value==="premium"?"🌱 Premium Lawn":"✔ Standard"

pricingOutput.innerHTML=html+`
<br>Materials:$${materialCost.toFixed(0)}
<br>Labor:$${labor.toFixed(0)}
<br>Overhead:$${overheadCost.toFixed(0)}
<br>Grow:$${growCost}
<br><b>Total Cost:$${totalCost.toFixed(0)}</b>
<br>Margin:${smartMargin}%`

let warnings=detectProfitLeaks(totalCost,price,materialCost,labor,overheadCost)
profitWarnings.innerHTML=warnings.map(w=>`<div class="alert">${w}</div>`).join("") || "<div class='good'>✔ Healthy</div>"

createBtn.disabled=false
}

function createJob(){

if(!window.finalPrice)return

let alertsArr=[]
let totalMaterialCost=0

Object.keys(window.lastMaterials).forEach(k=>{
let used=window.lastMaterials[k].qty
inv[k].q-=used

if(inv[k].q<=5)alertsArr.push(k+" OUT")
else if(inv[k].q<20)alertsArr.push(k+" LOW")

totalMaterialCost+=window.lastMaterials[k].cost
})

let totalCost=totalMaterialCost+window.lastLabor+window.lastOverhead+window.lastGrow
let profit=window.finalPrice-totalCost
let margin=(profit/window.finalPrice)*100

jobs.push({
name:name.value||"Client",
revenue:window.finalPrice,
profit,
margin,
materials:window.lastMaterials,
alerts:alertsArr
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
}

function render(){

jobsDiv.innerHTML=""
let aHTML=""

jobs.forEach(j=>{
j.alerts.forEach(a=>aHTML+=`<div class="alert">${a}</div>`)

let mats=""
for(let m in j.materials){
mats+=`${m}: ${j.materials[m].qty.toFixed(1)} ($${j.materials[m].cost.toFixed(0)})<br>`
}

jobsDiv.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
${mats}
Revenue:$${j.revenue.toFixed(0)}<br>
Profit:$${j.profit.toFixed(0)}<br>
Margin:${j.margin.toFixed(1)}%
</div>`
})

alerts.innerHTML=aHTML||"No alerts"

if(window.chart)chart.destroy()
chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:jobs.map((_,i)=>"Job "+(i+1)),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]}
})
}

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",autoFillPrice)
})

render()

</script>

</body>
</html>
