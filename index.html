<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Soda App</title>

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  margin: 0;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

h3 { margin-top: 0; }

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  background: #1a1a1a;
  border: 1px solid #333;
  color: white;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 14px;
  background: #d4af37;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  margin-top: 10px;
}

#alerts {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
<h3>Overview</h3>
<div>Jobs: <span id="jobs">0</span></div>
<div>Revenue: $<span id="revenue">0</span></div>
<div>Profit: $<span id="profit">0</span></div>
</div>

<div class="card">
<h3>Log Job</h3>
<input id="jobName" placeholder="Customer Name">

<select id="jobSize">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<button onclick="logJob()">Log Job</button>
</div>

<div class="card">
<h3>Inventory</h3>

<input id="gci" placeholder="GCI TTTF">
<input id="blue" placeholder="GCI Blue">
<input id="basicMix" placeholder="Basic Mix">
<input id="lebanon" placeholder="Lebanon">
<input id="andersons" placeholder="Andersons">
<input id="organic" placeholder="Organic">

<input id="paperMulch" placeholder="Paper Mulch">
<input id="bfm" placeholder="BFM Mulch">
<input id="basicMulch" placeholder="Basic Mulch">

<input id="tackifier" placeholder="Tackifier">
<input id="compost" placeholder="Compost">
<input id="biochar" placeholder="Biochar">

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h3>Inventory Alerts</h3>
<div id="alerts">Checking...</div>
</div>

<div class="card">
<h3>Reorder List</h3>
<div id="reorder">None</div>
</div>

<div class="card">
<h3>Job History</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>Analytics</h3>
<canvas id="chart"></canvas>
</div>

<script>
// ---------- HELPERS ----------
function money(n){
  return Math.round(n * 100) / 100;
}

// ---------- DATA ----------
let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

let inventory = JSON.parse(localStorage.getItem("inventory")) || {
  gci:0, blue:0, basicMix:0, lebanon:0, andersons:0, organic:0,
  paperMulch:0, bfm:0, basicMulch:0,
  tackifier:0, compost:0, biochar:0
};

// ---------- MATERIAL USAGE ----------
const MATERIAL_USAGE = {
  small: { seed:1, mulch:1, tackifier:0.5, compost:0.5 },
  medium:{ seed:2, mulch:2, tackifier:1, compost:1 },
  large: { seed:3, mulch:3, tackifier:1.5, compost:1.5 }
};

// ---------- SAVE INVENTORY ----------
function saveInventory(){
  inventory.gci = +gci.value || 0;
  inventory.blue = +blue.value || 0;
  inventory.basicMix = +basicMix.value || 0;
  inventory.lebanon = +lebanon.value || 0;
  inventory.andersons = +andersons.value || 0;
  inventory.organic = +organic.value || 0;

  inventory.paperMulch = +paperMulch.value || 0;
  inventory.bfm = +bfm.value || 0;
  inventory.basicMulch = +basicMulch.value || 0;

  inventory.tackifier = +tackifier.value || 0;
  inventory.compost = +compost.value || 0;
  inventory.biochar = +biochar.value || 0;

  localStorage.setItem("inventory", JSON.stringify(inventory));
  updateAlerts();
}

// ---------- LOG JOB ----------
function logJob(){
  const name = jobName.value;
  const size = jobSize.value;

  const prices = { small:1500, medium:2000, large:3000 };
  const revenue = prices[size];

  const usage = MATERIAL_USAGE[size];

  // subtract inventory
  inventory.gci -= usage.seed;
  inventory.paperMulch -= usage.mulch;
  inventory.tackifier -= usage.tackifier;
  inventory.compost -= usage.compost;

  for(let k in inventory){
    if(inventory[k] < 0) inventory[k] = 0;
  }

  localStorage.setItem("inventory", JSON.stringify(inventory));

  const profit = revenue * 0.65;

  jobs.push({
    name,
    revenue,
    profit,
    date: new Date().toLocaleDateString()
  });

  localStorage.setItem("jobs", JSON.stringify(jobs));

  jobName.value = "";

  updateAlerts();
  render();
}

// ---------- ALERTS ----------
function updateAlerts(){
  let low = [];
  let threshold = 5;

  for(let key in inventory){
    if(inventory[key] < threshold){
      low.push(key);
    }
  }

  if(low.length){
    alerts.innerText = "LOW: " + low.join(", ");
    reorder.innerText = low.join(", ");
  } else {
    alerts.innerText = "All inventory levels good";
    reorder.innerText = "None";
  }
}

// ---------- RENDER ----------
function render(){
  jobsEl = jobs.length;
  revenueEl = jobs.reduce((a,b)=>a+b.revenue,0);
  profitEl = jobs.reduce((a,b)=>a+b.profit,0);

  jobs.innerText = jobsEl;
  revenue.innerText = money(revenueEl);
  profit.innerText = money(profitEl);

  history.innerHTML = jobs.map(j =>
    `<div>${j.name} - $${money(j.revenue)}</div>`
  ).join("");

  renderChart();
}

// ---------- CHART ----------
let chart;

function renderChart(){
  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels: jobs.map(j=>j.date),
      datasets:[
        {
          label:"Revenue",
          data: jobs.map(j=>j.revenue),
          backgroundColor:"#d4af37"
        },
        {
          label:"Profit",
          data: jobs.map(j=>j.profit),
          backgroundColor:"#ffffff"
        }
      ]
    }
  });
}

// ---------- INIT ----------
render();
updateAlerts();

</script>

</body>
</html>
