<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:15px}
.card{background:#121212;padding:15px;margin-bottom:15px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:8px;background:#1a1a1a;color:#fff;border-radius:8px;border:1px solid #333}
button{width:100%;padding:12px;margin-top:10px;background:#d4af37;border:none;border-radius:8px;font-weight:bold}
.gold{color:#d4af37;font-size:22px;font-weight:bold}
.job{background:#0f0f0f;padding:10px;margin-top:10px;border-left:3px solid #d4af37;border-radius:8px}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="tier" onchange="applyPremium()">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses">
<input id="margin" placeholder="Target Margin %">

<h3>Add Ons</h3>

<label><input type="checkbox" id="aeration"> Aeration</label><br>
<label><input type="checkbox" id="compost"> Compost</label><br>
<label><input type="checkbox" id="bioHum"> Bio/Hum Blend (50/50)</label><br>
<label><input type="checkbox" id="bio100"> Biochar 100%</label><br>
<label><input type="checkbox" id="hum100"> Humic 100%</label><br>

<label><input type="checkbox" id="lime" onchange="toggle('limeQty',this)"> Lime</label>
<input id="limeQty" placeholder="Lime Amount" style="display:none">

<label><input type="checkbox" id="sulfur" onchange="toggle('sulfurQty',this)"> Sulfur</label>
<input id="sulfurQty" placeholder="Sulfur Amount" style="display:none">

<h3>Final Investment</h3>
<div id="final" class="gold"></div>

<button onclick="applyPremium()">Auto Apply Premium</button>
<button onclick="createJob()">Create Job</button>
<button onclick="openProposal()">View Proposal</button>

</div>

<div class="card">
<h3>Inventory</h3>
<div id="inventoryUI"></div>
<button onclick="save()">Save Inventory</button>
</div>

<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

<div class="card">
<h3>Job History</h3>
<div id="jobHistory"></div>
</div>

<div class="card">
<h3>Analytics</h3>
<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>

<div class="gold" id="totals"></div>
</div>

<script>

// ===== STATE =====
let app = JSON.parse(localStorage.getItem("soda")) || {
inventory:{
standard:[
{name:"Seed",cost:80,qty:50},
{name:"Fertilizer",cost:40,qty:50},
{name:"Mulch",cost:35,qty:50},
{name:"Tackifier",cost:25,qty:50}
],
premium:[
{name:"Seed",cost:100,qty:50},
{name:"Fertilizer",cost:50,qty:50},
{name:"Mulch",cost:40,qty:50},
{name:"Tackifier",cost:30,qty:50},
{name:"Biochar",cost:25,qty:50},
{name:"Humic",cost:20,qty:50}
],
addons:[
{name:"Lime",cost:15,qty:50},
{name:"Sulfur",cost:20,qty:50}
]
},
jobs:[]
}

// ===== SAVE =====
function save(){
localStorage.setItem("soda",JSON.stringify(app))
}

// ===== PREMIUM =====
function applyPremium(){
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bioHum.checked=true

lime.checked=true
toggle('limeQty',lime)

sulfur.checked=true
toggle('sulfurQty',sulfur)
}
}

// ===== TOGGLE =====
function toggle(id,el){
document.getElementById(id).style.display=el.checked?"block":"none"
}

// ===== CALC =====
function calc(){

let sqftVal=+sqft.value||0
let housesVal=+houses.value||1
let marginVal=(+margin.value||30)/100

let material = sqftVal*0.12*housesVal
let labor = 200*housesVal
let cost = material+labor

let revenue = cost/(1-marginVal)
let profit = revenue-cost

final.innerHTML=`
Revenue: $${revenue.toFixed(0)}<br>
Cost: $${cost.toFixed(0)}<br>
Profit: $${profit.toFixed(0)}<br>
Margin: ${(profit/revenue*100).toFixed(1)}%
`

return {revenue,cost,profit,material,margin:(profit/revenue*100)}
}

setInterval(calc,500)

// ===== CREATE JOB =====
function createJob(){

let c = calc()

let job={
customer:customer.value,
tier:tier.value,
sqft:sqft.value,
houses:houses.value,
...c,
addons:{
aeration:aeration.checked,
compost:compost.checked,
bioHum:bioHum.checked,
bio100:bio100.checked,
hum100:hum100.checked,
lime:limeQty.value,
sulfur:sulfurQty.value
}
}

app.jobs.push(job)
save()

renderJobs()
renderTotals()
renderCharts()
renderAlerts()
}

// ===== JOB HISTORY =====
function renderJobs(){
jobHistory.innerHTML=app.jobs.map(j=>`
<div class="job">
<b>${j.customer}</b><br>
${j.tier} | ${j.sqft} sqft | ${j.houses} homes<br>
Revenue: $${j.revenue.toFixed(0)}<br>
Cost: $${j.cost.toFixed(0)}<br>
Profit: $${j.profit.toFixed(0)}<br>
Margin: ${j.margin.toFixed(1)}%<br>
Addons: ${Object.entries(j.addons).map(([k,v])=>k+":"+v).join(", ")}
</div>
`).join("")
}

// ===== TOTALS =====
function renderTotals(){
let rev=app.jobs.reduce((a,b)=>a+b.revenue,0)
let prof=app.jobs.reduce((a,b)=>a+b.profit,0)
let margin=app.jobs.length?app.jobs.reduce((a,b)=>a+b.margin,0)/app.jobs.length:0

totals.innerHTML=`
Total Revenue: $${rev.toFixed(0)}<br>
Total Profit: $${prof.toFixed(0)}<br>
Avg Margin: ${margin.toFixed(1)}%
`
}

// ===== CHARTS =====
function renderCharts(){
new Chart(revChart,{
type:"bar",
data:{labels:app.jobs.map(j=>j.customer),
datasets:[{data:app.jobs.map(j=>j.revenue)}]}
})

new Chart(profitChart,{
type:"bar",
data:{labels:app.jobs.map(j=>j.customer),
datasets:[{data:app.jobs.map(j=>j.profit)}]}
})
}

// ===== ALERTS =====
function renderAlerts(){
alerts.innerHTML=""
app.inventory.standard.concat(app.inventory.premium,app.inventory.addons).forEach(m=>{
if(m.qty<5) alerts.innerHTML+=`❌ ${m.name} OUT<br>`
else if(m.qty<20) alerts.innerHTML+=`⚠ ${m.name} LOW<br>`
})
}

// ===== INVENTORY UI =====
function renderInventory(){
inventoryUI.innerHTML=""
;["standard","premium","addons"].forEach(type=>{
inventoryUI.innerHTML+=`<h4>${type}</h4>`
app.inventory[type].forEach((m,i)=>{
inventoryUI.innerHTML+=`
<input value="${m.name}" onchange="app.inventory.${type}[${i}].name=this.value">
<input value="${m.cost}" onchange="app.inventory.${type}[${i}].cost=+this.value">
<input value="${m.qty}" onchange="app.inventory.${type}[${i}].qty=+this.value">
`
})
})
}

// ===== PROPOSAL =====
function openProposal(){
let c=calc()
let w=window.open("")
w.document.write(`
<h1>SoDa Proposal</h1>
Customer: ${customer.value}<br>
Tier: ${tier.value}<br>
Revenue: $${c.revenue.toFixed(0)}<br><br>
<button onclick="window.print()">Download PDF</button><br>
<a href="mailto:?subject=Proposal">Email</a><br>
<a href="sms:?body=Proposal">Text</a>
`)
}

// ===== INIT =====
renderInventory()
renderJobs()
renderTotals()
renderAlerts()

</script>

</body>
</html>
