<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{padding:12px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.flex{display:flex;gap:10px;margin:10px 0;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;}
.big{font-size:32px}
.alert{color:#ff4d4d;font-weight:bold;}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<label>Tier</label>
<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<div class="flex">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<label>Square Feet</label>
<input id="sqft" value="3000">

<label># of Properties</label>
<input id="houses" value="1">

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow"> Grow</label>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bio"> Bio (50%)</label>
<label><input type="checkbox" id="hum"> Humic (50%)</label>

<h3>Labor</h3>
<label>Hourly Rate</label>
<input id="laborRate" value="70">

<label>Crew Size</label>
<input id="crewSize" value="2">

<label>Hours</label>
<input id="hours" value="8">

<h3>Overhead & Margin</h3>
<label>Overhead %</label>
<input id="overhead" value="15">

<label>Margin %</label>
<input id="margin" value="40">

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
</div>

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>
<div id="inventory"></div>
<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts">No alerts</div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

// ---------- HELPERS ----------
function n(v){return Number(v)||0}

// ---------- DATA ----------
let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inventory=JSON.parse(localStorage.getItem("inventory")||"{}")

const materials=["seed","fert","comp","bio","hum"]

// ---------- SIZE ----------
function setSize(v){sqft.value=v;calculate()}

// ---------- PREMIUM ----------
tier.onchange=()=>{
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bio.checked=true
hum.checked=true
}
calculate()
}

// ---------- INVENTORY ----------
function renderInventory(){
inventoryDiv.innerHTML=materials.map(m=>`
<input id="${m}c" placeholder="${m} cost">
<input id="${m}q" placeholder="${m} qty">
`).join("")
}
const inventoryDiv=document.getElementById("inventory")
renderInventory()

function saveInventory(){
materials.forEach(m=>{
inventory[m]={c:n(document.getElementById(m+"c").value),q:n(document.getElementById(m+"q").value)}
})
localStorage.setItem("inventory",JSON.stringify(inventory))
alert("Saved")
}

// ---------- CALC ----------
function calculate(){

let sqftVal=n(sqft.value)
let jobsCount=n(houses.value)

// REALISTIC RATES (FIXED)
let baseRate = tier.value==="premium" ? 0.12 : 0.08

let materialCost = sqftVal * baseRate

// ADD-ONS
if(compost.checked) materialCost += sqftVal * 0.05
if(bio.checked) materialCost += sqftVal * 0.02
if(hum.checked) materialCost += sqftVal * 0.02
if(grow.checked) materialCost *=1.1

// LABOR
let labor = n(laborRate.value)*n(crewSize.value)*n(hours.value)

// OVERHEAD
let overheadCost = (materialCost+labor)*(n(overhead.value)/100)

// TOTAL COST
let totalCost = materialCost+labor+overheadCost

// FINAL PRICE
let price = totalCost*(1+(n(margin.value)/100))

window.finalPrice=price
window.materialCost=materialCost

priceDisplay.innerText="$"+Math.round(price)
}

// ---------- CREATE JOB ----------
function createJob(){

calculate()

let alertsArr=[]

materials.forEach(m=>{
if(!inventory[m]) inventory[m]={q:0,c:0}

inventory[m].q -= 1

if(inventory[m].q<=0){
alertsArr.push(m+" OUT")
inventory[m].q=0
}
})

let revenue=window.finalPrice
let profit=revenue-window.materialCost
let margin=(profit/revenue)*100

jobs.push({
name:name.value||"Client",
revenue,
profit,
margin,
materialCost:window.materialCost,
alerts:alertsArr,
date:new Date().toLocaleString()
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inventory",JSON.stringify(inventory))

render()
}

// ---------- RENDER ----------
function render(){

let jobsHTML=""
let alertsHTML=""

jobs.forEach(j=>{
j.alerts.forEach(a=>alertsHTML+=`<div class="alert">${a}</div>`)

jobsHTML+=`
<div class="card">
<b>${j.name}</b><br>
${j.date}<br>
Material Cost:$${Math.round(j.materialCost)}<br>
Revenue:$${Math.round(j.revenue)}<br>
Profit:$${Math.round(j.profit)}<br>
Margin:${j.margin.toFixed(1)}%
</div>`
})

alerts.innerHTML=alertsHTML||"No alerts"
jobsDiv.innerHTML=jobsHTML

// CHART
if(window.chart) window.chart.destroy()

window.chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map((_,i)=>"Job "+(i+1)),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})
}

const jobsDiv=document.getElementById("jobs")

// ---------- LIVE ----------
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

calculate()
render()

</script>

</body>
</html>
