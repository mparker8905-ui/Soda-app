<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:10px}
.card{background:#111;padding:15px;border-radius:12px;margin-bottom:20px}

input,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  background:#222;
  border:1px solid #333;
  color:#fff;
  border-radius:8px
}

.row{display:flex;gap:10px}
.row button{flex:1}

/* TOGGLES */
.toggle{
  background:#1a1a1a;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  border:1px solid #2a2a2a;
  text-align:center;
  transition:.2s;
}

.toggle.active{
  background:#d4af37;
  color:#000;
  border:1px solid #d4af37;
}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="sqft" placeholder="Square Feet">

<div class="row">
  <button onclick="setSize(3000)">Small</button>
  <button onclick="setSize(6000)">Medium</button>
  <button onclick="setSize(12000)">Large</button>
</div>

</div>

<div class="card">
<h2>Add Ons</h2>

<div class="toggle" onclick="toggleAddon(this)">Aeration</div>
<div class="toggle" onclick="toggleAddon(this)">Compost</div>
<div class="toggle" onclick="toggleAddon(this)">Bio / Hum Blend</div>

<div class="toggle" onclick="toggleAddon(this)">Lime</div>
<input id="limeQty" type="number" placeholder="Lime Quantity">

<div class="toggle" onclick="toggleAddon(this)">Sulfur</div>
<input id="sulfurQty" type="number" placeholder="Sulfur Quantity">

</div>

<div class="card">
<h2>Costs</h2>

<input id="seedCost" placeholder="Seed Cost">
<input id="fertCost" placeholder="Fertilizer Cost">
<input id="mulchCost" placeholder="Mulch Cost">
<input id="tackCost" placeholder="Tack Cost">
<input id="compostCostUnit" placeholder="Compost Cost">

<button onclick="saveCosts()">Save Costs</button>

</div>

<script>

// ==============================
// SIZE BUTTONS
// ==============================
function setSize(val){
  let input = document.getElementById("sqft")
  if(input){
    input.value = val
  }
}

// ==============================
// TOGGLE BUTTONS
// ==============================
function toggleAddon(el){

  if(el.classList.contains("active")){
    el.classList.remove("active")
  } else {
    el.classList.add("active")
  }

}

// ==============================
// SAVE COSTS
// ==============================
function saveCosts(){

  let costs = {
    seed: Number(document.getElementById("seedCost")?.value) || 0,
    fert: Number(document.getElementById("fertCost")?.value) || 0,
    mulch: Number(document.getElementById("mulchCost")?.value) || 0,
    tack: Number(document.getElementById("tackCost")?.value) || 0,
    compost: Number(document.getElementById("compostCostUnit")?.value) || 0
  };

  localStorage.setItem("costs", JSON.stringify(costs));

  alert("Costs Saved ✅");
}

// ==============================
// INIT (SAFE)
// ==============================
function updateDashboard(){
  console.log("dashboard ready")
}

function checkLowInventory(){
  console.log("inventory checked")
}

// RUN
updateDashboard()
checkLowInventory()

</script>

</body>
</html>
