<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.row{display:flex;gap:8px}
.row button{flex:1}
.gold{color:#d4af37;font-size:20px}
.sectionTitle{margin-top:12px;font-weight:bold}
.label{font-size:12px;color:#aaa}
.alert{padding:8px;margin:4px 0;border-radius:8px;background:#332222}
.alert.out{background:#661111}
</style>
</head>

<body>

<div class="card">

<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses">

<h3>Add Ons</h3>
<label>Aeration <input type="checkbox" id="aeration"></label>
<label>Compost <input type="checkbox" id="compost"></label>
<label>Biochar 50% <input type="checkbox" id="bio"></label>
<label>Humic 50% <input type="checkbox" id="humic"></label>

<h3>Schedule</h3>
<div class="label">Quote Date</div><input type="date" id="date_quote">
<div class="label">Soil Test</div><input type="date" id="date_soil">
<div class="label">Aeration</div><input type="date" id="date_aeration">
<div class="label">Compost</div><input type="date" id="date_compost">
<div class="label">Hydroseed</div><input type="date" id="date_seed">
<div class="label">Grow Install</div><input type="date" id="date_install">
<div class="label">Grow Pickup</div><input type="date" id="date_pickup">
<div class="label">Final Inspection</div><input type="date" id="date_check">

<h3>Labor</h3>
<input id="rate" placeholder="Hourly Rate">
<input id="crew" placeholder="Crew Size">
<input id="hours" placeholder="Hours per house">

<h3>Margin</h3>
<input id="margin" placeholder="Profit %">

<div class="card">
<h3 class="gold">Final Investment</h3>
<div id="price"></div>
<div id="breakdown"></div>
</div>

<button onclick="createJob()">Create Job</button>

</div>

<div class="card">
<h2>Inventory</h2>

<h3>Standard Package</h3>
<div id="inv_standard"></div>

<h3>Premium Package</h3>
<div id="inv_premium"></div>

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>

<div class="gold" id="totalRevenue"></div>
<div class="gold" id="totalProfit"></div>
<div class="gold" id="totalMat"></div>
<div class="gold" id="totalMargin"></div>

</div>

<script>

let inventory={
standard:{
seed:{name:"Seed",cost:80,qty:100},
fert:{name:"Fertilizer",cost:40,qty:100},
mulch:{name:"Mulch",cost:35,qty:100},
tack:{name:"Tackifier",cost:20,qty:100}
},
premium:{
elite:{name:"Elite Seed",cost:100,qty:100},
kbg:{name:"KBG",cost:120,qty:100},
comp:{name:"Compost",cost:30,qty:100},
bio:{name:"Biochar",cost:25,qty:100},
hum:{name:"Humic",cost:20,qty:100}
}
}

let jobs=[]

tier.onchange=()=>{
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bio.checked=true
humic.checked=true
}
}

function renderInventory(){

inv_standard.innerHTML=""
Object.keys(inventory.standard).forEach(k=>{
let m=inventory.standard[k]
inv_standard.innerHTML+=`
<div class="label">Material Name</div><input value="${m.name}">
<div class="label">Cost</div><input value="${m.cost}">
<div class="label">Qty</div><input value="${m.qty}">
`
})

inv_premium.innerHTML=""
Object.keys(inventory.premium).forEach(k=>{
let m=inventory.premium[k]
inv_premium.innerHTML+=`
<div class="label">Material Name</div><input value="${m.name}">
<div class="label">Cost</div><input value="${m.cost}">
<div class="label">Qty</div><input value="${m.qty}">
`
})

}

function calculate(){

let sqftVal=Number(sqft.value)||0
let housesVal=Number(houses.value)||1

let matCost=(sqftVal/1000)*housesVal*200

let labor=(Number(rate.value)||0)*(Number(crew.value)||0)*(Number(hours.value)||0)*housesVal

let total=matCost+labor

let multiplier=1+(Number(margin.value)||0)/100

if(strategy.value==="win") multiplier*=0.85
if(strategy.value==="max") multiplier*=1.25

let revenue=total*multiplier
let profit=revenue-total
let marginPct=(profit/revenue)*100

price.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Materials: $${Math.round(matCost)}<br>
Labor: $${Math.round(labor)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`

return {matCost,labor,revenue,profit,marginPct}
}

function createJob(){

let c=calculate()

jobs.push({
name:name.value,
date:new Date().toLocaleString(),
...c
})

renderJobs()
renderAnalytics()
}

function renderJobs(){
jobs.innerHTML=""
jobs.forEach(j=>{
jobs.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
${j.date}<br><br>

Material Cost: $${Math.round(j.matCost)}<br>
Labor: $${Math.round(j.labor)}<br>
Revenue: $${Math.round(j.revenue)}<br>
Profit: $${Math.round(j.profit)}<br>
Margin: ${j.marginPct.toFixed(1)}%
</div>
`
})
}

function renderAnalytics(){

let rev=jobs.map(j=>j.revenue)
let prof=jobs.map(j=>j.profit)

new Chart(revChart,{type:"line",data:{labels:rev.map((_,i)=>i),datasets:[{data:rev}]}})
new Chart(profitChart,{type:"line",data:{labels:prof.map((_,i)=>i),datasets:[{data:prof}]}})

let totalR=rev.reduce((a,b)=>a+b,0)
let totalP=prof.reduce((a,b)=>a+b,0)
let totalM=jobs.reduce((a,b)=>a+b.matCost,0)

totalRevenue.innerHTML="Total Revenue: $"+Math.round(totalR)
totalProfit.innerHTML="Total Profit: $"+Math.round(totalP)
totalMat.innerHTML="Total Materials: $"+Math.round(totalM)
totalMargin.innerHTML="Avg Margin: "+((totalP/totalR)*100).toFixed(1)+"%"
}

renderInventory()
document.querySelectorAll("input,select").forEach(el=>el.addEventListener("input",calculate))

</script>

</body>
</html>
