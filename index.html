<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoDa Operations</title>

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  padding:15px;
}

h1 {
  text-align:center;
  color:#d4af37;
}

.card {
  background:#121212;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#1a1a1a;
  color:white;
  border:1px solid #333;
  border-radius:8px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#d4af37;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.job {
  background:#0f0f0f;
  padding:10px;
  margin-top:10px;
  border-left:3px solid #d4af37;
  border-radius:8px;
}

.gold {
  color:#d4af37;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>SoDa Operations</h1>

<!-- JOB INPUT -->
<div class="card">
  <h3>Create Job</h3>

  <input id="customer" placeholder="Customer Name">

  <select id="tier">
    <option value="standard">Standard</option>
    <option value="premium">Premium</option>
  </select>

  <input id="sqft" placeholder="Square Feet">
  <input id="houses" placeholder="Number of Houses">
  <input id="margin" placeholder="Target Margin %">

  <h4>Add Ons</h4>
  <label><input type="checkbox" id="aeration"> Aeration</label><br>
  <label><input type="checkbox" id="compost"> Compost</label><br>
  <label><input type="checkbox" id="bioHum"> Bio/Hum Blend (50/50)</label><br>
  <label><input type="checkbox" id="bio100"> Biochar 100%</label><br>
  <label><input type="checkbox" id="hum100"> Humic Acid 100%</label><br>
  <label><input type="checkbox" id="grow"> Grow System</label><br>

  <label><input type="checkbox" id="lime"> Lime</label>
  <input id="limeQty" placeholder="Lime Amount"><br>

  <label><input type="checkbox" id="sulfur"> Sulfur</label>
  <input id="sulfurQty" placeholder="Sulfur Amount"><br>

  <button onclick="autoSelectPremium()">Auto Apply Premium</button>
  <button onclick="createJob()">Create Job</button>
  <button onclick="openProposal()">View Proposal</button>
</div>

<!-- SCHEDULE -->
<div class="card">
<h3>Scheduling</h3>
<label>Quote Date</label><input type="date" id="date_quote">
<label>Soil Test</label><input type="date" id="date_soil">
<label>Aeration</label><input type="date" id="date_aeration">
<label>Compost</label><input type="date" id="date_compost">
<label>Hydroseed</label><input type="date" id="date_seed">
<label>Grow Install</label><input type="date" id="date_grow_install">
<label>Grow Removal</label><input type="date" id="date_grow_remove">
<label>Final Inspection</label><input type="date" id="date_final">
</div>

<!-- INVENTORY -->
<div class="card">
<h3>Inventory</h3>

<h4>Standard Materials</h4>
<input id="inv_seed_std" placeholder="Seed Qty">
<input id="inv_fert_std" placeholder="Fertilizer Qty">
<input id="inv_mulch_std" placeholder="Mulch Qty">
<input id="inv_tack_std" placeholder="Tackifier Qty">

<h4>Premium Materials</h4>
<input id="inv_seed_pre" placeholder="Seed Qty">
<input id="inv_fert_pre" placeholder="Fertilizer Qty">
<input id="inv_mulch_pre" placeholder="Mulch Qty">
<input id="inv_tack_pre" placeholder="Tackifier Qty">
<input id="inv_bio" placeholder="Biochar Qty">
<input id="inv_humic" placeholder="Humic Qty">

<h4>Add Ons</h4>
<input id="inv_lime" placeholder="Lime Qty">
<input id="inv_sulfur" placeholder="Sulfur Qty">
<input id="inv_sprinkler" placeholder="Sprinklers Qty">

<button onclick="saveInventory()">Save Inventory</button>
</div>

<!-- ALERTS -->
<div class="card">
<h3>Inventory Alerts</h3>
<div id="alerts"></div>
</div>

<!-- JOB HISTORY -->
<div class="card">
<h3>Job History</h3>
<div id="jobHistory"></div>
<button onclick="clearJobs()">Clear History</button>
</div>

<!-- TOTALS -->
<div class="card">
<h3 class="gold">Business Totals</h3>
<div class="gold" id="totalRevenue"></div>
<div class="gold" id="totalProfit"></div>
<div class="gold" id="avgMargin"></div>
</div>

<script>

// STORAGE
let jobs = JSON.parse(localStorage.getItem("jobs")) || []
let inventory = JSON.parse(localStorage.getItem("inventory")) || {}

// PREMIUM AUTO
function autoSelectPremium(){
if(tier.value === "premium"){
aeration.checked = true
compost.checked = true
bioHum.checked = true
lime.checked = true
sulfur.checked = true
}
}

// CALCULATE JOB
function calculateJob(){

let sqftVal = +sqft.value || 0
let housesVal = +houses.value || 1
let marginVal = (+margin.value || 30)/100

let baseMaterial = sqftVal * 0.02

let materials = {
seed: baseMaterial * housesVal,
fert: baseMaterial * housesVal,
mulch: baseMaterial * housesVal,
tack: baseMaterial * housesVal,
bio: bioHum.checked || bio100.checked ? baseMaterial*0.5 : 0,
humic: bioHum.checked || hum100.checked ? baseMaterial*0.5 : 0,
lime: lime.checked ? +limeQty.value || 0 : 0,
sulfur: sulfur.checked ? +sulfurQty.value || 0 : 0
}

let materialCost = Object.values(materials).reduce((a,b)=>a+b,0) * 10
let labor = (sqftVal/1000) * 50 * housesVal
let cost = materialCost + labor

let revenue = cost/(1-marginVal)
let profit = revenue - cost

return {materials, materialCost, labor, cost, revenue, profit, margin:(profit/revenue*100)}
}

// CREATE JOB
function createJob(){

let calc = calculateJob()

let job = {
customer: customer.value || "Customer",
tier: tier.value,
sqft: sqft.value,
houses: houses.value,
...calc,
date:new Date().toLocaleDateString()
}

jobs.push(job)
localStorage.setItem("jobs", JSON.stringify(jobs))

deductInventory(calc.materials)
renderJobs()
updateTotals()
checkAlerts()

}

// INVENTORY DEDUCT
function deductInventory(m){
Object.keys(m).forEach(k=>{
if(inventory[k] !== undefined){
inventory[k] -= m[k]
if(inventory[k] < 0) inventory[k]=0
}
})
localStorage.setItem("inventory", JSON.stringify(inventory))
}

// SAVE INVENTORY
function saveInventory(){
inventory = {
seed:+inv_seed_std.value||0,
fert:+inv_fert_std.value||0,
mulch:+inv_mulch_std.value||0,
tack:+inv_tack_std.value||0,
bio:+inv_bio.value||0,
humic:+inv_humic.value||0,
lime:+inv_lime.value||0,
sulfur:+inv_sulfur.value||0
}
localStorage.setItem("inventory", JSON.stringify(inventory))
alert("Saved ✅")
}

// ALERTS
function checkAlerts(){
let alertsArr = []
Object.entries(inventory).forEach(([k,v])=>{
if(v <=5) alertsArr.push("❌ OUT: "+k)
else if(v<20) alertsArr.push("⚠ LOW: "+k)
})
alerts.innerHTML = alertsArr.join("<br>") || "All good"
}

// JOB HISTORY
function renderJobs(){
let html=""
jobs.slice().reverse().forEach(j=>{
html+=`
<div class="job">
<b>${j.customer}</b><br>
Revenue: $${j.revenue.toFixed(0)}<br>
Profit: $${j.profit.toFixed(0)}<br>
Margin: ${j.margin.toFixed(1)}%<br>
Materials Cost: $${j.materialCost.toFixed(0)}<br>
${Object.entries(j.materials).map(([k,v])=>k+":"+v.toFixed(1)).join("<br>")}
</div>`
})
jobHistory.innerHTML=html
}

// TOTALS
function updateTotals(){
let rev=0, prof=0, margin=0
jobs.forEach(j=>{
rev+=j.revenue
prof+=j.profit
margin+=j.margin
})
totalRevenue.innerText="Revenue: $"+Math.round(rev)
totalProfit.innerText="Profit: $"+Math.round(prof)
avgMargin.innerText="Avg Margin: "+(jobs.length?margin/jobs.length:0).toFixed(1)+"%"
}

// CLEAR
function clearJobs(){
jobs=[]
localStorage.removeItem("jobs")
renderJobs()
updateTotals()
}

// PROPOSAL
function openProposal(){
let j = calculateJob()
let w = window.open("")
w.document.write(`
<h1>Proposal</h1>
Customer: ${customer.value}<br>
Revenue: $${j.revenue.toFixed(0)}<br>
<button onclick="window.print()">Download PDF</button>
`)
}

// INIT
renderJobs()
updateTotals()
checkAlerts()

</script>

</body>
</html>
