<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{padding:12px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.flex{display:flex;gap:10px;margin:10px 0;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;}
.big{font-size:34px}
.alert{color:#ff4d4d;font-weight:bold;}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<div class="flex">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" value="3000">
<input id="houses" value="1">

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow"> Grow</label>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bio"> Bio</label>
<label><input type="checkbox" id="hum"> Humic</label>

<h3>Labor</h3>
<input id="laborRate" value="70">
<input id="crewSize" value="2">
<input id="hours" value="8">

<h3>Overhead & Margin</h3>
<input id="overhead" value="15">
<input id="margin" value="40">

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
</div>

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

// ---------- HELPERS ----------
function n(v){return Number(v)||0}

// ---------- DATA ----------
let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")

// ---------- SIZE ----------
function setSize(v){
sqft.value=v
calculate()
}

// ---------- CALCULATION ----------
function calculate(){

let totalSqft=n(sqft.value)*n(houses.value)

// BASE RATES (FIXED BUSINESS LOGIC)
let ratesStandard = {
tttf:6, rye:4, mil:4, wood:5, tack:1
}

let ratesPremium = {
elite:6, kbg:2, esp:4, bfm:6, tack:1,
comp:15, bio:2, hum:2
}

// GROW = BOOST, NOT FLAT PRICE
if(grow.checked){
Object.keys(ratesStandard).forEach(k=>ratesStandard[k]*=1.15)
Object.keys(ratesPremium).forEach(k=>ratesPremium[k]*=1.15)
}

// SELECT RATES
let rates = tier.value==="premium" ? ratesPremium : ratesStandard

// MATERIAL COST
let materialCost=0
let materialsUsed={}

Object.keys(rates).forEach(k=>{
let qty=Math.ceil((rates[k]*totalSqft)/1000)
let cost=qty*18 // realistic avg cost

materialsUsed[k]={qty,cost}
materialCost+=cost
})

// LABOR
let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)*n(houses.value)

// OVERHEAD
let overheadCost=(materialCost+labor)*(n(overhead.value)/100)

// TRUE COST
let totalCost=materialCost+labor+overheadCost

// FINAL PRICE (FIXED)
let price=totalCost*(1+(n(margin.value)/100))

window.finalPrice=price
window.materialsUsed=materialsUsed
window.materialCost=materialCost

priceDisplay.innerText="$"+Math.round(price)
}

// ---------- CREATE JOB ----------
function createJob(){

calculate()

let revenue=window.finalPrice
let materialCost=window.materialCost

let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)
let totalCost=materialCost+labor

let profit=revenue-totalCost
let margin=(profit/revenue)*100

jobs.push({
name:name.value||"Client",
revenue,
profit,
margin,
materials:window.materialsUsed,
materialCost,
date:new Date().toLocaleString()
})

localStorage.setItem("jobs",JSON.stringify(jobs))

render()
}

// ---------- RENDER ----------
function render(){

let jobsHTML=""

jobs.forEach(j=>{

let materialsHTML=""
Object.entries(j.materials).forEach(([k,v])=>{
materialsHTML+=`${k}: ${v.qty} ($${v.cost})<br>`
})

jobsHTML+=`
<div class="card">
<b>${j.name}</b><br>
${j.date}<br><br>

<b>Materials</b><br>
${materialsHTML}<br>

Material Cost: $${Math.round(j.materialCost)}<br>
Revenue: $${Math.round(j.revenue)}<br>
Profit: $${Math.round(j.profit)}<br>
Margin: ${j.margin.toFixed(1)}%
</div>`
})

document.getElementById("jobs").innerHTML=jobsHTML

// ---------- CHART FIX ----------
if(window.chart) window.chart.destroy()

window.chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map((_,i)=>"Job "+(i+1)),
datasets:[
{
label:"Revenue",
data:jobs.map(j=>j.revenue)
},
{
label:"Profit",
data:jobs.map(j=>j.profit)
}
]
}
})
}

// ---------- LIVE ----------
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

calculate()
render()

</script>

</body>
</html>
