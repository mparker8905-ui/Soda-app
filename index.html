<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SoDa Outdoor Designs | Hydroseed Calculator</title>

  <link rel="stylesheet" href="css/styles.css" />

</head>

<body>

  <header class="page-header">

    <h1>Hydroseed Calculator</h1>

    <p>SoDa Outdoor Designs</p>

  </header>

  <main class="app-wrap">

    <!-- JOB INPUTS -->

    <section class="card collapsible open" data-card="job">

      <div class="card-title" onclick="toggleCard(this)">

        Project Details

      </div>

      <div class="card-body">

        <label>Square Feet</label>

        <input id="sqft" type="number" placeholder="Enter sqft" />

        <label>Houses</label>

        <input id="houses" type="number" value="1" />

        <label>Package</label>

        <select id="package">

          <option value="standard">Standard</option>

          <option value="premium">Premium</option>

        </select>

        <label>Pricing Mode</label>

        <select id="pricingMode">

          <option value="win">Win Job</option>

          <option value="balanced" selected>Balanced</option>

          <option value="max">Max Profit</option>

        </select>

        <label>Target Margin (%)</label>

        <input id="targetMargin" type="number" placeholder="Optional" />

        <label>Pricing Strategy</label>

        <select id="pricingStrategy">

          <option value="normal">Normal</option>

          <option value="market">Market Floor</option>

          <option value="undercut">Undercut Competitor</option>

          <option value="builder">Builder Discount</option>

        </select>

        <label>Competitor Price ($)</label>

        <input id="competitorPrice" type="number" placeholder="Optional" />

      </div>

    </section>

    <!-- LABOR -->

    <section class="card collapsible" data-card="labor">

      <div class="card-title" onclick="toggleCard(this)">

        Labor Settings

      </div>

      <div class="card-body">

        <label>Hourly Rate ($)</label>

        <input id="hourlyRate" type="number" />

        <label>Hours Per House</label>

        <input id="hoursPerHouse" type="number" />

        <label>Crew Size</label>

        <input id="crewSize" type="number" value="1" />

        <label>Overhead (%)</label>

        <input id="overhead" type="number" />

      </div>

    </section>

    <!-- TANK -->

    <section class="card collapsible" data-card="tank">

      <div class="card-title" onclick="toggleCard(this)">

        Tank Settings

      </div>

      <div class="card-body">

        <label>Tank Size</label>

        <select id="tankSize">

          <option value="100">100 Gallon</option>

          <option value="300">300 Gallon</option>

          <option value="500" selected>500 Gallon</option>

          <option value="700">700 Gallon</option>

          <option value="1000">1000 Gallon</option>

        </select>

      </div>

    </section>

    <!-- ADDONS -->

    <section class="card collapsible" data-card="addons">

      <div class="card-title" onclick="toggleCard(this)">

        Add-ons

      </div>

      <div class="card-body checkbox-grid">

        <label><input type="checkbox" onchange="state.job.addons.aeration=this.checked;requestRender()"> Aeration</label>

        <label><input type="checkbox" onchange="state.job.addons.compost=this.checked;requestRender()"> Compost</label>

        <label><input type="checkbox" onchange="state.job.addons.biohum=this.checked;requestRender()"> BioHum</label>

        <label><input type="checkbox" onchange="state.job.addons.biochar=this.checked;requestRender()"> Biochar</label>

        <label><input type="checkbox" onchange="state.job.addons.humic=this.checked;requestRender()"> Humic</label>

        <label><input type="checkbox" onchange="state.job.addons.grow=this.checked;requestRender()"> Grow System</label>

        <label><input type="checkbox" onchange="state.job.addons.lime=this.checked;requestRender()"> Lime</label>

        <label><input type="checkbox" onchange="state.job.addons.sulfur=this.checked;requestRender()"> Sulfur</label>

      </div>

    </section>

    <!-- TIMELINE -->

    <section class="card collapsible" data-card="schedule">

      <div class="card-title" onclick="toggleCard(this)">

        Schedule

      </div>

      <div class="card-body">

        <label>Project Start</label>

        <input id="projectStart" type="date" />

        <label>Quote Date</label>

        <input id="quoteDate" type="date" />

        <div class="radio-group">

          <label><input type="radio" name="timeline" checked onchange="state.ui.timeline='standard';requestRender()"> Standard</label>

          <label><input type="radio" name="timeline" onchange="state.ui.timeline='fast';requestRender()"> Fast</label>

          <label><input type="radio" name="timeline" onchange="state.ui.timeline='extended';requestRender()"> Extended</label>

        </div>

        <div id="schedulePreview"></div>

      </div>

    </section>

    <!-- CUSTOMER -->

    <section class="card collapsible" data-card="customer">

      <div class="card-title" onclick="toggleCard(this)">

        Proposal Info

      </div>

      <div class="card-body">

        <label>Customer</label>

        <input id="customer" type="text" />

        <label>Address</label>

        <input id="address" type="text" />

        <button onclick="sendProposal()">Send Proposal</button>

        <button onclick="createLead()">Create Lead</button>

      </div>

    </section>

    <!-- RESULTS -->

    <section class="card open">

      <div class="card-title">Results</div>

      <div class="card-body">

        <div id="results"></div>

      </div>

    </section>

    <!-- CRM PIPELINE -->

    <section class="card">

      <div class="card-title">Pipeline</div>

      <div class="card-body">

        <div id="jobHistoryList"></div>

      </div>

    </section>

    <!-- HISTORY -->

    <section class="card">

      <div class="card-title">History</div>

      <div class="card-body">

        <div id="jobHistory"></div>

      </div>

    </section>

  </main>

  <!-- MODAL -->

  <div id="proposalModal" class="proposal-modal" onclick="handleModalBackground(event)">

    <div class="proposal-content">

      <h3 id="modalCustomer"></h3>

      <div id="modalAddress"></div>

      <div id="modalBody"></div>

    </div>

  </div>

  <!-- TOASTS -->

  <div id="toastContainer" class="toast-container"></div>

  <!-- JS -->

  <script src="js/core.js"></script>

  <script src="js/state.js"></script>

  <script src="js/inventory.js"></script>

  <script src="js/crm.js"></script>

  <script src="js/ui.js"></script>

  <script src="js/app.js"></script>

</body>

</html>
