<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Revenue Engine</title>

<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:20px}
input,select,button{width:100%;margin:6px 0;padding:14px;border-radius:12px;border:none;background:#222;color:#fff}
button{background:#ffd54f;color:#000;font-weight:bold}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px}
.row{display:flex;gap:10px}
.row button{flex:1}
.big{font-size:32px;text-align:center;margin-top:10px}
.alert{color:#ff4444}
canvas{background:#000;margin-top:10px}
</style>

</head>
<body>

<div class="card">

<h2>Create Job</h2>

<input id="name" placeholder="Customer Name"/>

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Square Feet"/>
<input id="houses" placeholder="# Houses"/>

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow"> Grow</label><br>
<label><input type="checkbox" id="aeration"> Aeration</label><br>
<label><input type="checkbox" id="compost"> Compost</label><br>
<label><input type="checkbox" id="bio"> Bio</label><br>
<label><input type="checkbox" id="hum"> Humic</label><br>

<h3>Labor & Overhead</h3>
<label>Labor Rate</label>
<input id="rate" value="70"/>
<label>Crew Size</label>
<input id="crew" value="1"/>
<label>Hours</label>
<input id="hours" value="8"/>

<h3>Overhead & Margin</h3>
<label>Overhead %</label>
<input id="overhead" value="15"/>
<label>Margin %</label>
<input id="margin" value="40"/>

<div class="big" id="final">$0</div>
<div id="breakdown"></div>

<button onclick="createJob()">Create Job</button>
<button onclick="openCloseScreen()">Close Deal</button>

</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<button onclick="clearJobs()">Clear</button>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>

<h4>Revenue Trend</h4>
<canvas id="revChart" height="120"></canvas>

<h4>Profit Trend</h4>
<canvas id="profitChart" height="120"></canvas>

<h4>Margins</h4>
<div id="avgMargin"></div>

<h4>Total Revenue</h4>
<div id="totalRevenue"></div>

<h4>Total Profit</h4>
<div id="totalProfit"></div>

</div>

<div id="closeScreen" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;padding:20px">
<div id="closeContent"></div>
<button onclick="closeCloseScreen()">Back</button>
</div>

<script>

function n(v){return parseFloat(v)||0}

function setSize(v){
sqft.value=v
calculate()
}

// ---------- ALERTS ----------
function updateAlerts(){
alerts.innerHTML=""
if(n(sqft.value)===0){
alerts.innerHTML="Enter sqft"
}
}

// ---------- CALC ----------
function calculate(){

let area=n(sqft.value)
let homes=n(houses.value)||1

let materialCost = area*0.12
let labor = n(rate.value)*n(crew.value)*n(hours.value)

let cost = materialCost + labor
let overheadCost = cost*(n(overhead.value)/100)
let totalCost = cost + overheadCost

let baseRate=0.8

if(strategy.value==="win") baseRate=0.65
if(strategy.value==="max") baseRate=1.1

if(tier.value==="premium"){
baseRate+=0.25
aeration.checked=true
compost.checked=true
bio.checked=true
hum.checked=true
}

let addon=0
if(grow.checked) addon+=0.1
if(aeration.checked) addon+=0.15
if(compost.checked) addon+=0.2
if(bio.checked) addon+=0.15
if(hum.checked) addon+=0.1

let price = baseRate + addon

let revenue = area * price

// builder discount
let discount=0
if(homes>=10 && homes<30) discount=0.1
if(homes>=30 && homes<75) discount=0.2
if(homes>=75) discount=0.3

revenue = revenue*(1-discount)*homes

let profit = revenue - totalCost
let marginPct = (profit/revenue)*100

final.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Cost: $${Math.round(totalCost)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`

window.calcData={revenue,profit,marginPct}
updateAlerts()
}

// ---------- JOB STORAGE ----------
let jobsData=[]

function createJob(){
calculate()

jobsData.push({
date:new Date().toLocaleTimeString(),
...calcData
})

renderJobs()
updateAnalytics()
}

function renderJobs(){
jobs.innerHTML=""
jobsData.forEach(j=>{
jobs.innerHTML+=`
<div>
${j.date}<br>
Revenue:$${Math.round(j.revenue)}<br>
Profit:$${Math.round(j.profit)}<br>
Margin:${j.marginPct.toFixed(1)}%
</div><br>`
})
}

function clearJobs(){
jobsData=[]
renderJobs()
updateAnalytics()
}

// ---------- ANALYTICS ----------
function updateAnalytics(){

let revCtx=document.getElementById("revChart").getContext("2d")
let profitCtx=document.getElementById("profitChart").getContext("2d")

revCtx.clearRect(0,0,400,200)
profitCtx.clearRect(0,0,400,200)

let revs=jobsData.map(j=>j.revenue)
let profits=jobsData.map(j=>j.profit)

drawLine(revCtx,revs)
drawLine(profitCtx,profits)

let totalRev=revs.reduce((a,b)=>a+b,0)
let totalProf=profits.reduce((a,b)=>a+b,0)
let avgMargin = jobsData.length ? jobsData.reduce((a,b)=>a+b.marginPct,0)/jobsData.length : 0

totalRevenue.innerHTML="$"+Math.round(totalRev)
totalProfit.innerHTML="$"+Math.round(totalProf)
avgMargin.innerHTML=avgMargin.toFixed(1)+"%"
}

function drawLine(ctx,data){

if(data.length<2)return

let max=Math.max(...data)

data.forEach((v,i)=>{
let x = i*50
let y = 100 - (v/max)*100

if(i===0){
ctx.moveTo(x,y)
}else{
ctx.lineTo(x,y)
}
})

ctx.strokeStyle="white"
ctx.stroke()
}

// ---------- CLOSE SCREEN ----------
function openCloseScreen(){
calculate()
closeContent.innerHTML=`
<h2>${name.value||"Project"}</h2>
<div class="big">$${Math.round(calcData.revenue)}</div>
Full service package included
`
closeScreen.style.display="block"
}

function closeCloseScreen(){
closeScreen.style.display="none"
}

// live calc
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

</script>

</body>
</html>
