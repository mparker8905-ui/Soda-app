<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta

    name="viewport"

    content="width=device-width, initial-scale=1.0"

  />

  <title>

    SoDa Outdoor Designs | Estimator

  </title>

  <link

    rel="stylesheet"

    href="assets/styles.css"

  />

</head>

<body>

  <!-- =====================

       APP SHELL

  ====================== -->

  <div class="app-shell">

    <!-- =====================

         SIDEBAR

    ====================== -->

    <aside class="sidebar">

      <div class="brand-wrap">

        <img

          src="assets/logo.png"

          alt="SoDa Outdoor Designs"

          class="brand-logo"

        />

        <div class="brand-text">

          <h1>

            SoDa Outdoor Designs

          </h1>

          <p>

            We build lawns from the soil up

          </p>

        </div>

      </div>

      <nav class="nav-links">

        <a

          href="index.html"

          class="nav-link active"

        >

          Dashboard

        </a>

        <a

          href="inventory.html"

          class="nav-link"

        >

          Inventory

        </a>

        <a

          href="crm.html"

          class="nav-link"

        >

          CRM

        </a>

      </nav>

    </aside>

    <!-- =====================

         MAIN CONTENT

    ====================== -->

    <main class="main-content">

      <!-- =====================

           PAGE HEADER

      ====================== -->

      <section class="page-header">

        <div>

          <h2>

            Lawn Estimator

          </h2>

          <p>

            Professional hydroseeding pricing

            and scheduling system.

          </p>

        </div>

      </section>

      <!-- =====================

           FORM GRID

      ====================== -->

      <section class="grid-two">

        <!-- =====================

             LEFT PANEL

        ====================== -->

        <div class="card">

          <h3>

            Job Inputs

          </h3>

          <div class="form-grid">

            <label>

              Customer

              <input

                id="customer"

                type="text"

                placeholder="Customer Name"

              />

            </label>

            <label>

              Address

              <input

                id="address"

                type="text"

                placeholder="Job Address"

              />

            </label>

            <label>

              Quote Date

              <input

                id="quoteDate"

                type="date"

              />

            </label>

            <label>

              Project Start

              <input

                id="projectStart"

                type="date"

              />

            </label>

            <label>

              Sqft Per House

              <input

                id="sqft"

                type="number"

                value="0"

              />

            </label>

            <label>

              Houses

              <input

                id="houses"

                type="number"

                value="1"

              />

            </label>

            <label>

              Package

              <select id="package">

                <option value="standard">

                  Standard

                </option>

                <option value="premium">

                  Premium

                </option>

              </select>

            </label>

            <label>

              Pricing Mode

              <select id="pricingMode">

                <option value="win">

                  Win Job

                </option>

                <option

                  value="balanced"

                  selected

                >

                  Balanced

                </option>

                <option value="max">

                  Max Profit

                </option>

              </select>

            </label>

            <label>

              Target Margin %

              <input

                id="targetMargin"

                type="number"

                value="0"

              />

            </label>

            <label>

              Pricing Strategy

              <select

                id="pricingStrategy"

              >

                <option value="normal">

                  Normal

                </option>

                <option value="market">

                  Market Rate

                </option>

                <option value="undercut">

                  Undercut Competitor

                </option>

                <option value="builder">

                  Builder Discount

                </option>

              </select>

            </label>

            <label>

              Competitor Price

              <input

                id="competitorPrice"

                type="number"

                value="0"

              />

            </label>

            <label>

              Tank Size

              <select id="tankSize">

                <option value="100">

                  100 Gallon

                </option>

                <option value="300">

                  300 Gallon

                </option>

                <option

                  value="500"

                  selected

                >

                  500 Gallon

                </option>

                <option value="700">

                  700 Gallon

                </option>

              </select>

            </label>

          </div>

        </div>

        <!-- =====================

             RIGHT PANEL

        ====================== -->

        <div class="card">

          <h3>

            Labor Inputs

          </h3>

          <div class="form-grid">

            <label>

              Hourly Rate

              <input

                id="hourlyRate"

                type="number"

                value="0"

              />

            </label>

            <label>

              Hours Per House

              <input

                id="hoursPerHouse"

                type="number"

                value="0"

              />

            </label>

            <label>

              Crew Size

              <input

                id="crewSize"

                type="number"

                value="1"

              />

            </label>

            <label>

              Overhead %

              <input

                id="overhead"

                type="number"

                value="0"

              />

            </label>

          </div>

          <h3 class="mt-24">

            Add-ons

          </h3>

          <div class="checkbox-grid">

            <label>

              <input

                type="checkbox"

                id="addonAeration"

              />

              Aeration

            </label>

            <label>

              <input

                type="checkbox"

                id="addonCompost"

              />

              Compost

            </label>

            <label>

              <input

                type="checkbox"

                id="addonBiohum"

              />

              Biohum

            </label>

            <label>

              <input

                type="checkbox"

                id="addonBiochar"

              />

              Biochar

            </label>

            <label>

              <input

                type="checkbox"

                id="addonHumic"

              />

              Humic

            </label>

            <label>

              <input

                type="checkbox"

                id="addonGrow"

              />

              Grow System

            </label>

            <label>

              <input

                type="checkbox"

                id="addonLime"

              />

              Lime

            </label>

            <label>

              <input

                type="checkbox"

                id="addonSulfur"

              />

              Sulfur

            </label>

          </div>

          <div class="mt-24">

            <button

              onclick="render()"

              class="btn btn-primary"

            >

              Calculate Job

            </button>

            <button

              onclick="sendProposal()"

              class="btn btn-gold"

            >

              Send Proposal

            </button>

            <button

              onclick="createLead()"

              class="btn"

            >

              Create Lead

            </button>

          </div>

        </div>

      </section>

      <!-- =====================

           RESULTS

      ====================== -->

      <section class="card mt-24">

        <h3>

          Results

        </h3>

        <div id="results">

          <div class="muted">

            Enter job values to begin.

          </div>

        </div>

      </section>

      <!-- =====================

           SCHEDULE

      ====================== -->

      <section class="card mt-24">

        <h3>

          Schedule Preview

        </h3>

        <div

          id="schedulePreview"

        ></div>

      </section>

      <!-- =====================

           JOB HISTORY

      ====================== -->

      <section class="card mt-24">

        <h3>

          Job History

        </h3>

        <div id="jobHistory"></div>

      </section>

    </main>

  </div>

  <!-- =====================

       PROPOSAL MODAL

  ====================== -->

  <div

    id="proposalModal"

    class="modal"

    onclick="handleModalBackground(event)"

  >

    <div class="modal-content proposal-content">

      <button

        class="close-btn"

        onclick="closeProposalModal()"

      >

        ×

      </button>

      <h2 id="modalCustomer"></h2>

      <p id="modalAddress"></p>

      <div id="modalBody"></div>

    </div>

  </div>

  <!-- =====================

       TOASTS

  ====================== -->

  <div id="toastWrap"></div>

  <!-- =====================

       SCRIPT ORDER

  ====================== -->

  <script src="js/state.js"></script>

  <script src="js/core.js"></script>

  <script src="js/inventory.js"></script>

  <script src="js/crm.js"></script>

  <script src="js/ui.js"></script>

  <script src="js/app.js"></script>

</body>

</html>
