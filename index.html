<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.gold{color:#d4af37;font-size:20px}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<h3>Schedule</h3>

<label>Quote Date</label>
<input type="date" id="quote">

<label>Soil Test Date</label>
<input type="date" id="soil">

<label>Aeration Date</label>
<input type="date" id="aerationDate">

<label>Compost Date</label>
<input type="date" id="compostDate">

<label>Hydroseed Date</label>
<input type="date" id="hydroDate">

<label>Grow System Install</label>
<input type="date" id="installDate">

<label>Grow System Removal</label>
<input type="date" id="removalDate">

<label>Final Lawn Inspection</label>
<input type="date" id="inspectionDate">

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>

<h3>Standard</h3>

<input id="s_seed_name" placeholder="Seed Name">
<input id="s_seed_cost" placeholder="Seed Cost">
<input id="s_seed_qty" placeholder="Seed Quantity">

<input id="s_fert_name" placeholder="Fertilizer Name">
<input id="s_fert_cost" placeholder="Fertilizer Cost">
<input id="s_fert_qty" placeholder="Fertilizer Quantity">

<input id="s_mulch_name" placeholder="Mulch Name">
<input id="s_mulch_cost" placeholder="Mulch Cost">
<input id="s_mulch_qty" placeholder="Mulch Quantity">

<input id="s_tack_name" placeholder="Tackifier Name">
<input id="s_tack_cost" placeholder="Tackifier Cost">
<input id="s_tack_qty" placeholder="Tackifier Quantity">

<h3>Premium</h3>

<input id="p_seed_name" placeholder="Seed Name">
<input id="p_seed_cost" placeholder="Seed Cost">
<input id="p_seed_qty" placeholder="Seed Quantity">

<input id="p_fert_name" placeholder="Fertilizer Name">
<input id="p_fert_cost" placeholder="Fertilizer Cost">
<input id="p_fert_qty" placeholder="Fertilizer Quantity">

<input id="p_mulch_name" placeholder="Mulch Name">
<input id="p_mulch_cost" placeholder="Mulch Cost">
<input id="p_mulch_qty" placeholder="Mulch Quantity">

<input id="p_tack_name" placeholder="Tackifier Name">
<input id="p_tack_cost" placeholder="Tackifier Cost">
<input id="p_tack_qty" placeholder="Tackifier Quantity">

<input id="p_bio_name" placeholder="Biochar Name">
<input id="p_bio_cost" placeholder="Biochar Cost">
<input id="p_bio_qty" placeholder="Biochar Quantity">

<input id="p_hum_name" placeholder="Humic Name">
<input id="p_hum_cost" placeholder="Humic Cost">
<input id="p_hum_qty" placeholder="Humic Quantity">

<h3>Add Ons</h3>

<input id="lime_name" placeholder="Lime Name">
<input id="lime_cost" placeholder="Lime Cost">
<input id="lime_qty" placeholder="Lime Quantity">

<input id="sulfur_name" placeholder="Sulfur Name">
<input id="sulfur_cost" placeholder="Sulfur Cost">
<input id="sulfur_qty" placeholder="Sulfur Quantity">

<input id="sprinkler_name" placeholder="Sprinkler Name">
<input id="sprinkler_cost" placeholder="Sprinkler Cost">
<input id="sprinkler_qty" placeholder="Sprinkler Quantity">

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<script>

let jobs=[]

function createJob(){

let job={
name:customer.value,
schedule:{
quote:quote.value,
soil:soil.value,
aeration:aerationDate.value,
compost:compostDate.value,
hydro:hydroDate.value,
install:installDate.value,
removal:removalDate.value,
inspection:inspectionDate.value
}
}

jobs.push(job)
renderJobs()
}

function renderJobs(){
jobs.innerHTML=jobs.map(j=>`
<div>
<b>${j.name}</b><br>
Quote: ${j.schedule.quote}<br>
Soil: ${j.schedule.soil}<br>
Aeration: ${j.schedule.aeration}<br>
Compost: ${j.schedule.compost}<br>
Hydro: ${j.schedule.hydro}<br>
Install: ${j.schedule.install}<br>
Removal: ${j.schedule.removal}<br>
Inspection: ${j.schedule.inspection}
</div><br>
`).join("")
}

function saveInventory(){
alert("Inventory Saved")
}

</script>

</body>
</html>
