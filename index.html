<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;margin:0}
.card{background:#111;padding:20px;margin:15px;border-radius:16px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:10px}
button{width:100%;padding:14px;background:#d4af37;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
.alert{color:#ff4d4d}
.good{color:#00ff88}
.warn{color:#ffd700}
.priceBox{border:2px solid #d4af37;padding:20px;border-radius:16px;text-align:center;margin-top:15px}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<h3>Package</h3>
<select id="tier">
<option value="standard">Standard</option>
<option value="premium" selected>🔥 Premium (Best Value)</option>
</select>

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow" checked> 🔥 Grow System (Recommended)</label><br>
<label><input type="checkbox" id="aeration"> Aeration</label><br>
<label><input type="checkbox" id="compostAdd"> Compost</label>

<input id="houses" type="number" value="1" placeholder="Houses">
<input id="sqft" placeholder="Sq Ft Per House">
<input id="margin" placeholder="Target Margin % (default 60)">

<h3>Labor & Overhead</h3>
<input id="laborRate" placeholder="Labor $/hr">
<input id="crewSize" placeholder="Crew Size">
<input id="hours" placeholder="Hours">
<input id="overhead" placeholder="Overhead %">

<button onclick="autoFillPrice()">Auto Fill Price</button>

<div class="priceBox">
<div>Final Price</div>
<div id="priceDisplay" style="font-size:40px">$0</div>
<div id="dealRating"></div>
</div>

<input id="jobPrice" type="hidden">
<div id="pricingOutput"></div>

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>

<input id="tttfCost" placeholder="TTTF Cost"><input id="tttfQty" placeholder="TTTF Qty">
<input id="ryeCost" placeholder="Rye Cost"><input id="ryeQty" placeholder="Rye Qty">
<input id="eliteCost" placeholder="Elite Cost"><input id="eliteQty" placeholder="Elite Qty">
<input id="kbgCost" placeholder="KBG Cost"><input id="kbgQty" placeholder="KBG Qty">

<input id="milCost" placeholder="Mil Cost"><input id="milQty" placeholder="Mil Qty">
<input id="espCost" placeholder="Esp Cost"><input id="espQty" placeholder="Esp Qty">

<input id="woodCost" placeholder="Wood Cost"><input id="woodQty" placeholder="Wood Qty">
<input id="bfmCost" placeholder="BFM Cost"><input id="bfmQty" placeholder="BFM Qty">

<input id="tackCost" placeholder="Tack Cost"><input id="tackQty" placeholder="Tack Qty">

<input id="compCost" placeholder="Comp Cost"><input id="compQty" placeholder="Comp Qty">
<input id="bioCost" placeholder="Bio Cost"><input id="bioQty" placeholder="Bio Qty">
<input id="humCost" placeholder="Hum Cost"><input id="humQty" placeholder="Hum Qty">

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
<button onclick="clearJobs()" style="background:red">Clear Job History</button>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Usage Trends</h2>
<h3>Standard</h3>
<canvas id="standardQtyChart"></canvas>
<canvas id="standardCostChart"></canvas>

<h3>Premium</h3>
<canvas id="premiumQtyChart"></canvas>
<canvas id="premiumCostChart"></canvas>
</div>

<script>

let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inv=JSON.parse(localStorage.getItem("inv")||"{}")
let chart,standardQtyChart,standardCostChart,premiumQtyChart,premiumCostChart

const n=v=>parseFloat(v)||0

const STANDARD_KEYS=["tttf","rye","mil","wood","tack"]
const PREMIUM_KEYS=["elite","kbg","esp","bfm","tack","comp","bio","hum"]

// AUTO TOGGLE GROW
tier.addEventListener("change",()=>{
if(tier.value==="premium"){
grow.checked=true
aeration.checked=true
compostAdd.checked=true
}else{
aeration.checked=false
compostAdd.checked=false
}
})

// LOAD INVENTORY
function loadInventoryToUI(){
Object.keys(inv).forEach(k=>{
document.getElementById(k+"Cost").value=inv[k]?.c||""
document.getElementById(k+"Qty").value=inv[k]?.q||""
})
}

// SAVE INVENTORY
function saveInventory(){
inv={
tttf:{c:n(tttfCost.value),q:n(tttfQty.value)},
rye:{c:n(ryeCost.value),q:n(ryeQty.value)},
elite:{c:n(eliteCost.value),q:n(eliteQty.value)},
kbg:{c:n(kbgCost.value),q:n(kbgQty.value)},
mil:{c:n(milCost.value),q:n(milQty.value)},
esp:{c:n(espCost.value),q:n(espQty.value)},
wood:{c:n(woodCost.value),q:n(woodQty.value)},
bfm:{c:n(bfmCost.value),q:n(bfmQty.value)},
tack:{c:n(tackCost.value),q:n(tackQty.value)},
comp:{c:n(compCost.value),q:n(compQty.value)},
bio:{c:n(bioCost.value),q:n(bioQty.value)},
hum:{c:n(humCost.value),q:n(humQty.value)}
}
localStorage.setItem("inv",JSON.stringify(inv))
loadInventoryToUI()
alert("Saved")
}

// MATERIALS
function getMaterials(tier,h){
const sqftVal=n(sqft.value)||5000
const k=(sqftVal*h)/1000

let mats={}

if(tier==="standard"){
const seed=6*k
mats={tttf:seed*0.85,rye:seed*0.15,mil:1*k,wood:3*k,tack:0.5*k}
}else{
const seed=5*k
mats={elite:seed*0.8,kbg:seed*0.2,esp:1*k,bfm:4*k,tack:0.5*k,comp:1.5*k,bio:0.3*k,hum:0.2*k}
}

// ADD-ONS
if(grow.checked){
mats.bio=(mats.bio||0)+(0.5*k)
mats.hum=(mats.hum||0)+(0.5*k)
}

if(tier==="premium" || compostAdd.checked){
mats.comp=(mats.comp||0)+(2*k)
}

if(tier==="premium" || aeration.checked){
mats.aeration=h
}

return mats
}

// AUTO PRICE
function autoFillPrice(){

const h=n(houses.value)||1
const tierVal=tier.value
const mats=getMaterials(tierVal,h)

let materialCost=0
Object.keys(mats).forEach(k=>{
if(k==="aeration") return
materialCost+=n(mats[k])*(inv[k]?.c||0)
})

let aerationCost=(mats.aeration||0)*50

let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)
let overheadCost=(materialCost+labor)*(n(overhead.value||15)/100)

// BUNDLE
let bundleDiscount=0
if(tierVal==="premium" && grow.checked){
const sqftVal=n(sqft.value)||5000
const k=(sqftVal*h)/1000
const growCost=(0.5*k*(inv.bio?.c||0))+(0.5*k*(inv.hum?.c||0))
bundleDiscount=growCost*0.30
}

let totalCost=materialCost+labor+overheadCost+aerationCost-bundleDiscount

let price=totalCost/(1-(n(margin.value||60)/100))

// BUILDER DISCOUNT
let discount=0
if(h<10) discount=0.05
else if(h<25) discount=0.10
else if(h<100) discount=0.20
else discount=0.30

price*=1-discount

priceDisplay.innerText="$"+price.toFixed(0)
window.finalPrice=price

pricingOutput.innerHTML=`
Materials: $${materialCost.toFixed(0)}<br>
Labor: $${labor.toFixed(0)}<br>
Overhead: $${overheadCost.toFixed(0)}<br>
Aeration: $${aerationCost.toFixed(0)}<br>
${bundleDiscount>0?`<div class="good">Bundle Savings: -$${bundleDiscount.toFixed(0)}</div>`:""}
<b>Total Cost: $${totalCost.toFixed(0)}</b>
`
}

// CREATE JOB
function createJob(){
if(!window.finalPrice){alert("Run pricing");return}

const h=n(houses.value)||1
const mats=getMaterials(tier.value,h)

let breakdown={}
let totalCost=0
let alertSet=new Set()

Object.keys(mats).forEach(k=>{
if(k==="aeration") return
const qty=n(mats[k])
const item=inv[k]
if(!item) return

const cost=qty*(item.c||0)
const remaining=item.q-qty

if(remaining<=5) alertSet.add(`🚨 ${k} OUT`)
else if(remaining<20) alertSet.add(`⚠️ ${k} LOW`)

item.q=Math.max(0,remaining)

breakdown[k]={qty,cost}
totalCost+=cost
})

// aeration
if(mats.aeration){
const cost=50*h
breakdown.aeration={qty:h,cost}
totalCost+=cost
}

const profit=window.finalPrice-totalCost

jobs.push({
name:name.value||"Client",
tier:tier.value,
revenue:window.finalPrice,
profit,
margin:(profit/window.finalPrice*100)||0,
materials:breakdown,
alerts:[...alertSet]
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

loadInventoryToUI()
render()
}

// RENDER
function render(){

let rev=0,prof=0,alertHTML=""
jobs.forEach(j=>{
rev+=j.revenue
prof+=j.profit
j.alerts.forEach(a=>alertHTML+=`<div class="alert">${a}</div>`)
})

stats.innerHTML=`Jobs:${jobs.length}<br>Revenue:$${rev.toFixed(0)}<br>Profit:$${prof.toFixed(0)}<br>Margin:${(prof/rev*100||0).toFixed(1)}%`
alerts.innerHTML=alertHTML||"No alerts"

jobsDiv.innerHTML=""
jobs.slice().reverse().forEach(j=>{
let mats=""
for(let m in j.materials){
const d=j.materials[m]
mats+=`${m}: ${d.qty.toFixed(2)} ($${d.cost.toFixed(0)})<br>`
}
jobsDiv.innerHTML+=`<div class="card">${j.name} (${j.tier})<br>${mats}</div>`
})

// chart
if(chart) chart.destroy()
chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map((_,i)=>i+1),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})

// trend charts
renderTrendCharts()
}

function renderTrendCharts(){

const build=(tier,qtyId,costId)=>{
const tierJobs=jobs.filter(j=>j.tier===tier)
let totals={},costs={}
tierJobs.forEach(j=>{
for(let m in j.materials){
totals[m]=(totals[m]||0)+j.materials[m].qty
costs[m]=(costs[m]||0)+j.materials[m].cost
}
})

if(window[qtyId]) window[qtyId].destroy()
if(window[costId]) window[costId].destroy()

window[qtyId]=new Chart(document.getElementById(qtyId),{
type:"bar",
data:{labels:Object.keys(totals),datasets:[{data:Object.values(totals)}]}
})

window[costId]=new Chart(document.getElementById(costId),{
type:"pie",
data:{labels:Object.keys(costs),datasets:[{data:Object.values(costs)}]}
})
}

build("standard","standardQtyChart","standardCostChart")
build("premium","premiumQtyChart","premiumCostChart")
}

function clearJobs(){
jobs=[]
localStorage.removeItem("jobs")
render()
}

const jobsDiv=document.getElementById("jobs")

loadInventoryToUI()
render()

</script>

</body>
</html>
