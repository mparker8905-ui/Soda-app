<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:10px}
.card{background:#111;padding:15px;border-radius:12px;margin-bottom:20px}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  background:#222;
  border:1px solid #333;
  color:#fff;
  border-radius:8px
}

.row{display:flex;gap:10px}
.row button{flex:1}

/* TOGGLES */
.toggle{
  background:#1a1a1a;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  border:1px solid #2a2a2a;
  text-align:center;
  transition:.2s;
}

.toggle.active{
  background:#d4af37;
  color:#000;
  border:1px solid #d4af37;
}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<!-- NEW: CUSTOMER -->
<input id="customer" placeholder="Customer Name">

<!-- NEW: PACKAGE -->
<select id="package" onchange="handlePackage()">
  <option value="standard">Standard</option>
  <option value="premium">Premium</option>
</select>

<select id="pricingMode">
  <option value="balanced">Balanced</option>
  <option value="win">Win Job</option>
  <option value="max">Maximize Profits</option>
</select>

<input id="sqft" placeholder="Square Feet">

<div class="row">
  <button onclick="setSize(3000)">Small</button>
  <button onclick="setSize(6000)">Medium</button>
  <button onclick="setSize(12000)">Large</button>
</div>

</div>

<input id="houses" type="number" value="1" min="1" placeholder="# of Houses">

<div class="card">
<h2>Add Ons</h2>

<div class="toggle" data-name="aeration" onclick="toggleAddon(this)">Aeration</div>
<div class="toggle" data-name="compost" onclick="toggleAddon(this)">Compost</div>
<div class="toggle" data-name="biohum" onclick="toggleAddon(this)">Bio / Hum Blend</div>
<div class="toggle" data-name="biochar" onclick="toggleAddon(this)">Biochar 100%</div>
<div class="toggle" data-name="humic" onclick="toggleAddon(this)">Humic Acid 100%</div>
<div class="toggle" data-name="grow" onclick="toggleAddon(this)">Grow System</div>

<div class="toggle" data-name="lime" onclick="toggleAddon(this)">Lime</div>
<input id="limeQty" type="number" placeholder="Lime Quantity">

<div class="toggle" data-name="sulfur" onclick="toggleAddon(this)">Sulfur</div>
<input id="sulfurQty" type="number" placeholder="Sulfur Quantity">

</div>

<div class="card">
  <h2>Results</h2>
  <div id="results"></div>
</div>

<script>

//===========================
//==== STATE
//===========================
let app = {
  job:{
    addons:{
      aeration:false,
      compost:false,
      biohum:false,
      biochar:false,
      humic:false,
      grow:false,
      lime:false,
      sulfur:false
    }
  }
}

const RATES = {
  seed: 5,        // lbs per 1000 sqft
  fert: 4,
  mulch: 50,      // lbs
  tack: 3,

  compost: 0.5,   // yards per 1000 sqft
  biohum: 2,      // gallons

  lime: 10,       // lbs
  sulfur: 5
}

const COSTS = {
  seed: 80,
  fert: 40,
  mulch: 35,
  tack: 25,

  compost: 60,
  biohum: 25,

  lime: 15,
  sulfur: 20,

  biochar: 30,
  humic: 25,
  grow: 50
}
//==============================
//HELPERS
//==============================

// ==============================
// SIZE BUTTONS
// ==============================

function setSize(val){
  document.getElementById("sqft").value = val
  render()
}

// ==============================
// TOGGLE BUTTONS 
// ==============================

function toggleAddon(el){
  let name = el.dataset.name

  app.job.addons[name] = !app.job.addons[name]

  el.classList.toggle("active")

  if(name === "lime" && app.job.addons[name]){
    document.getElementById("limeQty").value ||= 1
  }

  if(name === "sulfur" && app.job.addons[name]){
    document.getElementById("sulfurQty").value ||= 1
  }
render()
}

//==============================
//==== BUILDER MODE
//==============================

function getBuilderMultiplier(houses){

  if(houses <= 1) return 1
  if(houses <= 5) return 0.95
  if(houses <= 10) return 0.9
  if(houses <= 20) return 0.85
  if(houses <= 50) return 0.80
  return 0.75
}

//============================
//==== CALCULATE JOB
//============================

function calculateJob(){

  let sqft = Number(document.getElementById("sqft").value) || 0
  let houses = Number(document.getElementById("houses")?.value) || 1
  let builderMult = getBuilderMultiplier(houses)
  let packageType = document.getElementById("package").value
  let pricingMode = document.getElementById("pricingMode").value

  let totalSqft = sqft * houses
  let units = totalSqft / 1000
  let materialEfficiency = 1 - ((1 - builderMult) * 0.5)
units = units * materialEfficiency

  let materialCost = 0

  // BASE MATERIALS
  materialCost += units * RATES.seed * COSTS.seed / 100
  materialCost += units * RATES.fert * COSTS.fert / 100
  materialCost += units * RATES.mulch * COSTS.mulch / 100
  materialCost += units * RATES.tack * COSTS.tack / 100

  // PREMIUM MATERIALS
  if(packageType === "premium"){
    materialCost += units * RATES.biohum * COSTS.biohum / 10
  }

  // ADDONS

 let addons = app.job.addons

  if(addons.compost) materialCost += units * RATES.compost * COSTS.compost
  if(addons.biohum) materialCost += units * COSTS.biohum

let limeQty = Number(document.getElementById("limeQty")?.value) || 0
let sulfurQty = Number(document.getElementById("sulfurQty")?.value) || 0

if(addons.lime) materialCost += limeQty * COSTS.lime
if(addons.sulfur) materialCost += sulfurQty * COSTS.sulfur

  if(addons.biochar) materialCost += units * COSTS.biochar
  if(addons.humic) materialCost += units * COSTS.humic
  if(addons.grow) materialCost += units * COSTS.grow

// LABOR (scaled)

let labor = (totalSqft * 0.05) * builderMult

// APPLY MATERIAL EFFICIENCY (bulk savings)

let totalCost = materialCost + labor

  // PRICING MODES

  let margin = 0.3

if(pricingMode === "win") margin = 0.15
if(pricingMode === "balanced") margin = 0.3
if(pricingMode === "max") margin = 0.5

// builder volume adjustment
if(houses >= 10) margin -= 0.03
if(houses >= 20) margin -= 0.05
if(houses >= 50) margin -= 0.08

if(margin < 0.1) margin = 0.1

  let price = totalCost / (1 - margin)
  let profit = price - totalCost

  return {
    sqft,
    houses,
    totalSqft,
    cost: totalCost,
    price,
    profit
  }
}
//=============================
//=====RENDER
//=============================

function render(){
  try{
    let r = calculateJob()
    
    let perHouseCost = r.cost / r.houses
    let perHousePrice = r.price / r.houses
    let perHouseProfit = r.profit / r.houses

    document.getElementById("results").innerHTML = `
      Total Sqft: ${r.totalSqft.toFixed(0)}<br><br>

      TOTAL:<br>
      Cost: $${r.cost.toFixed(2)}<br>
      Price: $${r.price.toFixed(2)}<br>
      Profit: $${r.profit.toFixed(2)}<br><br>

      PER HOUSE:<br>
      Cost: $${perHouseCost.toFixed(2)}<br>
      Price: $${perHousePrice.toFixed(2)}<br>
      Profit: $${perHouseProfit.toFixed(2)}
    `
  } catch(e){
    document.getElementById("results").innerHTML = "Error in calculation"
  }
}

document.addEventListener("input", render)
document.addEventListener("change", render)

// ==============================
// PREMIUM PACKAGE AUTO-SELECT
// ==============================
function handlePackage(){

  let pkg = document.getElementById("package").value
  let toggles = document.querySelectorAll(".toggle")

  if(pkg === "premium"){

    toggles.forEach(t => {
      let name = t.dataset.name

      if(name === "aeration" ||
         name === "compost" ||
         name === "biohum" ||
         name === "lime" ||
         name === "sulfur"){
        t.classList.add("active")
      }
    })

  } else {

    // OPTIONAL: clear selections when going back to standard
    toggles.forEach(t => t.classList.remove("active"))

  }
}

document.getElementById("houses").addEventListener("input", function(e){
  app.job.houses = Number(e.target.value) || 1
  render()
})

document.getElementById("customer").addEventListener("input", function(e){
  app.job.customer = e.target.value
})

document.getElementById("limeQty").addEventListener("input", function(){
  render()
})

document.getElementById("sulfurQty").addEventListener("input", function(){
  render()
})

</script>

</body>
</html>
