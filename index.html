<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { background:#0b0b0b; color:white; font-family:Arial; padding:20px; }
.card { background:#121212; padding:20px; border-radius:12px; margin-bottom:20px; }
button { background:#d4af37; padding:12px; border:none; border-radius:8px; width:100%; margin-top:10px; }
input, select { width:100%; padding:10px; margin:5px 0; background:#1a1a1a; border:1px solid #333; color:white; }
.job { border-left:4px solid #d4af37; padding:10px; margin-bottom:10px; }
.paid { color:#00ff99; }
.unpaid { color:#ff4d4d; }
</style>

</head>

<body>

<div class="card">
<h3>Dashboard</h3>
Jobs: <span id="jobs">0</span><br>
Revenue: $<span id="rev">0</span><br>
Profit: $<span id="profit">0</span><br>
Margin: <span id="margin">0</span>%<br>
</div>

<div class="card">
<h3>Create Job</h3>

<input id="name" placeholder="Customer Name">

<select id="size">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<select id="type">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<button onclick="createJob()">Create Job</button>

</div>

<div class="card">
<h3>Jobs</h3>
<div id="jobList"></div>
</div>

<script>

const { jsPDF } = window.jspdf;

let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

// ---------- CREATE JOB ----------
function createJob(){

let name = document.getElementById("name").value || "Customer";
let size = document.getElementById("size").value;
let type = document.getElementById("type").value;

let price = {small:1500,medium:2000,large:3000}[size];
if(type==="premium") price*=1.4;

let cost = price * 0.4; // simple model
let profit = price - cost;
let margin = (profit/price)*100;

jobs.push({
name, type, size,
price, profit, margin,
paid:false
});

localStorage.setItem("jobs", JSON.stringify(jobs));

render();
}

// ---------- TOGGLE PAYMENT ----------
function togglePaid(i){
jobs[i].paid = !jobs[i].paid;
localStorage.setItem("jobs", JSON.stringify(jobs));
render();
}

// ---------- PDF ----------
function generatePDF(job){

const doc = new jsPDF();

doc.setFontSize(18);
doc.text("SoDa Outdoor Designs", 20, 20);

doc.setFontSize(12);
doc.text(`Customer: ${job.name}`, 20, 40);
doc.text(`Package: ${job.type}`, 20, 50);
doc.text(`Price: $${job.price}`, 20, 60);

doc.text("Services:", 20, 80);

if(job.type==="standard"){
doc.text("- Hydroseeding (TTTF + Rye)", 20, 90);
doc.text("- Organic Fertilization", 20, 100);
}

if(job.type==="premium"){
doc.text("- Elite Hydroseed Blend", 20, 90);
doc.text("- Organic Soil Program", 20, 100);
doc.text("- Biochar + Humic Enhancement", 20, 110);
}

doc.save("SoDa_Quote.pdf");
}

// ---------- RENDER ----------
function render(){

let rev=0,profit=0,margin=0;

jobs.forEach(j=>{
rev+=j.price;
profit+=j.profit;
margin+=j.margin;
});

document.getElementById("jobs").innerText = jobs.length;
document.getElementById("rev").innerText = Math.round(rev);
document.getElementById("profit").innerText = Math.round(profit);
document.getElementById("margin").innerText = jobs.length?(margin/jobs.length).toFixed(1):0;

document.getElementById("jobList").innerHTML = jobs.map((j,i)=>`
<div class="job">
<b>${j.name}</b> (${j.type})<br>

Price: $${j.price}<br>
Profit: $${j.profit}<br>
Margin: ${j.margin.toFixed(1)}%<br>

<span class="${j.paid?'paid':'unpaid'}">
${j.paid?'PAID':'UNPAID'}
</span>

<button onclick="togglePaid(${i})">Toggle Paid</button>
<button onclick='generatePDF(${JSON.stringify(j)})'>Download Quote</button>

${j.margin<30?"⚠️ Underpriced Job":""}

</div>
`).join("");

}

render();

</script>

</body>
</html>
