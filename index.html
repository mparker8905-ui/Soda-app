<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soda App Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#000; color:#fff; font-family:sans-serif; margin:0; }
.container { padding:15px; }
.card {
  background:#111;
  padding:20px;
  margin-bottom:15px;
  border-radius:16px;
}
input, select {
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#222;
  color:#fff;
  border:none;
  border-radius:10px;
}
button {
  width:100%;
  padding:14px;
  background:#d4af37;
  border:none;
  border-radius:12px;
  font-weight:bold;
  margin-top:10px;
}
.low { color:red; }
.good { color:#0f0; }
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>
<input id="name" placeholder="Customer Name">
<select id="size">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>
<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1" placeholder="Number of Houses">

<label>
<input type="checkbox" id="builder"> Builder Mode
</label>

<input id="pricePerHouse" type="number" placeholder="Price Per House">

<button onclick="addJob()">Create Job</button>
</div>

<div class="card">
<h2>Material Costs</h2>
<input id="seedCost" placeholder="Seed Cost">
<input id="fertCost" placeholder="Fertilizer Cost">
<input id="mulchCost" placeholder="Mulch Cost">
<input id="tackCost" placeholder="Tackifier Cost">
<input id="soilCost" placeholder="Soil Additives Cost">
<button onclick="saveCosts()">Save Costs</button>
</div>

<div class="card">
<button onclick="toggleClient()">Toggle Client View</button>
<button onclick="clearJobs()">Clear Jobs</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let jobs = JSON.parse(localStorage.getItem("jobs") || "[]");
let costs = JSON.parse(localStorage.getItem("costs") || "{}");
let chart;

// SAFE NUMBER
function n(v){ return parseFloat(v)||0; }

// SAVE COSTS
function saveCosts(){
  costs = {
    seed:n(seedCost.value),
    fert:n(fertCost.value),
    mulch:n(mulchCost.value),
    tack:n(tackCost.value),
    soil:n(soilCost.value)
  };
  localStorage.setItem("costs", JSON.stringify(costs));
}

// ADD JOB
function addJob(){
  try {

    const houses = Math.max(1, n(document.getElementById("houses").value));
    const builder = document.getElementById("builder").checked;
    const priceHouse = n(document.getElementById("pricePerHouse").value);

    const basePrice = {
      small:1500,
      medium:2500,
      large:3500
    }[size.value];

    let revenue = builder
      ? priceHouse * houses
      : basePrice * houses;

    // MATERIAL COSTS
    let matCost =
      costs.seed +
      costs.fert +
      costs.mulch +
      costs.tack +
      costs.soil;

    matCost *= houses;

    const profit = revenue - matCost;
    const margin = revenue ? (profit/revenue*100) : 0;

    const job = {
      name: name.value || "Client",
      tier: tier.value,
      houses,
      revenue,
      profit,
      margin,
      paid:false,
      date:new Date().toLocaleDateString()
    };

    jobs.push(job);
    localStorage.setItem("jobs", JSON.stringify(jobs));

    render();

  } catch(e){
    alert("Error: "+e.message);
  }
}

// RENDER
function render(){

  // DASHBOARD
  let rev=0, prof=0;
  jobs.forEach(j=>{
    rev += n(j.revenue);
    prof += n(j.profit);
  });

  let margin = rev ? (prof/rev*100).toFixed(1) : 0;

  stats.innerHTML = `
  Jobs: ${jobs.length}<br>
  Revenue: $${rev}<br>
  Profit: $${prof}<br>
  Margin: ${margin}%
  `;

  // JOB LIST
  jobs.innerHTML="";
  jobs.forEach((j,i)=>{
    jobs.innerHTML += `
    <div>
      <b>${j.name} (${j.tier})</b><br>
      Houses: ${j.houses}<br>
      Profit: $${j.profit}<br>
      Margin: ${j.margin.toFixed(1)}%<br>
      ${j.paid?"PAID":"<span class='low'>UNPAID</span>"}
      <button onclick="togglePaid(${i})">Toggle Paid</button>
    </div><hr>`;
  });

  // CHART FIX
  if(chart) chart.destroy();

  const ctx = document.getElementById("chart");

  chart = new Chart(ctx,{
    type:"bar",
    data:{
      labels:jobs.map(j=>j.date),
      datasets:[
        {label:"Revenue", data:jobs.map(j=>j.revenue)},
        {label:"Profit", data:jobs.map(j=>j.profit)}
      ]
    }
  });

}

// TOGGLE PAID
function togglePaid(i){
  jobs[i].paid=!jobs[i].paid;
  localStorage.setItem("jobs", JSON.stringify(jobs));
  render();
}

// CLEAR
function clearJobs(){
  jobs=[];
  localStorage.removeItem("jobs");
  render();
}

// CLIENT VIEW
function toggleClient(){
  document.body.style.background =
    document.body.style.background=="white"?"black":"white";
}

render();

</script>
</body>
</html>
