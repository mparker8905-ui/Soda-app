<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:16px;margin:0}
.card{background:#111;padding:18px;border-radius:18px;margin-bottom:16px}

input,select{
width:100%;
margin:6px 0;
padding:14px;
border-radius:10px;
border:none;
background:#222;
color:#fff;
font-size:16px;
}

button{
padding:14px;
border-radius:12px;
border:none;
background:gold;
color:#000;
font-weight:bold;
margin-top:10px;
width:100%;
}

.row{display:flex;gap:10px}
.row button{flex:1}

.toggle{
display:flex;
align-items:center;
gap:12px;
width:100%;
margin:10px 0;
}

.toggle input{
width:22px;
height:22px;
flex-shrink:0;
}

.toggle span{
flex:1;
text-align:left;
}

.box{
border:2px solid gold;
padding:16px;
border-radius:18px;
text-align:center;
margin-top:12px;
}

.big{font-size:30px}
.gold{color:gold;font-weight:bold}

.alert{
margin:6px 0;
padding:10px;
border-radius:10px;
background:#220000;
color:#ff4d4d;
font-weight:bold;
}

.alert.out{
background:#550000;
color:#ff0000;
}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Sqft">
<input id="houses" placeholder="Houses">

<h3>Add Ons</h3>

<label class="toggle"><input type="checkbox" id="grow"><span>Grow System</span></label>
<label class="toggle"><input type="checkbox" id="aeration"><span>Aeration</span></label>
<label class="toggle"><input type="checkbox" id="compost"><span>Compost</span></label>
<label class="toggle"><input type="checkbox" id="bio"><span>Biochar (50%)</span></label>
<label class="toggle"><input type="checkbox" id="humic"><span>Humic Acid (50%)</span></label>

<h3>Labor</h3>
<input id="rate" value="70">
<input id="crew" value="2">
<input id="hours" value="8">

<h3>Overhead / Margin</h3>
<input id="overhead" value="15">
<input id="margin" value="40">

<div class="box">
<div>Final Investment</div>
<div class="big" id="price">$0</div>
<div id="breakdown"></div>
</div>

<button onclick="createJob()">Create Job</button>
</div>

<!-- INVENTORY -->
<div class="card">
<h2>Inventory</h2>

<div id="standardInv"></div>
<div id="premiumInv"></div>

<button onclick="saveInventory()">Save Inventory</button>
</div>

<!-- ALERTS -->
<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<!-- JOB HISTORY -->
<div class="card">
<h2>Job History</h2>
<button onclick="clearJobs()">Clear</button>
<div id="jobList"></div>
</div>

<!-- ANALYTICS -->
<div class="card">
<h2>Analytics</h2>

<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>

<br>

<div class="gold">Total Revenue</div>
<div id="totalRevenue"></div>

<div class="gold">Total Profit</div>
<div id="totalProfit"></div>

</div>

<script>

const n=v=>Number(v)||0

let jobs=[]
let inventory={}

// MATERIAL RATES
const standardMats={seed:6,fert:4,mulch:5,tack:1}
const premiumMats={elite:6,kbg:2,fert:4,comp:10,bio:2,hum:2}
const addOns={grow:2,aeration:1,compost:5,bio:1,humic:1}

// SIZE
function setSize(v){
sqft.value=v
calculate()
}

// INVENTORY UI
function renderInventory(){

standardInv.innerHTML=`
<h3>Standard Package</h3>
<input id="seed_name" placeholder="Seed Name">
<input id="seed_cost" placeholder="Cost">
<input id="seed_qty" placeholder="Qty">

<input id="fert_name" placeholder="Fertilizer Name">
<input id="fert_cost" placeholder="Cost">
<input id="fert_qty" placeholder="Qty">

<input id="mulch_name" placeholder="Mulch Name">
<input id="mulch_cost" placeholder="Cost">
<input id="mulch_qty" placeholder="Qty">

<input id="tack_name" placeholder="Tack Name">
<input id="tack_cost" placeholder="Cost">
<input id="tack_qty" placeholder="Qty">
`

premiumInv.innerHTML=`
<h3>Premium Package</h3>
<input id="elite_name" placeholder="Elite Seed Name">
<input id="elite_cost" placeholder="Cost">
<input id="elite_qty" placeholder="Qty">

<input id="kbg_name" placeholder="KBG Name">
<input id="kbg_cost" placeholder="Cost">
<input id="kbg_qty" placeholder="Qty">

<input id="comp_name" placeholder="Compost Name">
<input id="comp_cost" placeholder="Cost">
<input id="comp_qty" placeholder="Qty">

<input id="bio_name" placeholder="Biochar Name">
<input id="bio_cost" placeholder="Cost">
<input id="bio_qty" placeholder="Qty">

<input id="hum_name" placeholder="Humic Name">
<input id="hum_cost" placeholder="Cost">
<input id="hum_qty" placeholder="Qty">
`
}

// SAVE INVENTORY
function saveInventory(){

const mats=["seed","fert","mulch","tack","elite","kbg","comp","bio","hum"]

mats.forEach(m=>{
inventory[m]={
name:document.getElementById(m+"_name")?.value || m,
cost:n(document.getElementById(m+"_cost")?.value)||20,
qty:n(document.getElementById(m+"_qty")?.value)||0
}
})

}

// PREMIUM AUTO SELECT
tier.addEventListener("change",()=>{

if(tier.value==="premium"){
["aeration","compost","bio","humic"].forEach(id=>{
document.getElementById(id).checked=true
})
}else{
["aeration","compost","bio","humic"].forEach(id=>{
document.getElementById(id).checked=false
})
}

calculate()

})

// CALC
function calculate(){

let sqftVal=n(sqft.value)
let housesVal=n(houses.value)||1

let mats = tier.value==="standard"?standardMats:premiumMats

let used={}
let matCost=0

Object.keys(mats).forEach(m=>{
let usage=((mats[m]*sqftVal)/1000)*housesVal
let cost=(inventory[m]?.cost||20)*usage

used[m]={usage,cost}
matCost+=cost
})

// ADD ONS
Object.keys(addOns).forEach(a=>{
if(document.getElementById(a).checked){
let usage=((addOns[a]*sqftVal)/1000)*housesVal
let cost=usage*20
used[a]={usage,cost}
matCost+=cost
}
})

// LABOR
let labor=n(rate.value)*n(crew.value)*n(hours.value)*housesVal

let overheadCost=(matCost+labor)*(n(overhead.value)/100)
let totalCost=matCost+labor+overheadCost

let multiplier=1+(n(margin.value)/100)

if(strategy.value==="win") multiplier*=0.85
if(strategy.value==="max") multiplier*=1.25

let revenue=totalCost*multiplier

// BUILDER DISCOUNT
if(housesVal>=10 && housesVal<30) revenue*=0.9
if(housesVal>=30 && housesVal<75) revenue*=0.8
if(housesVal>=75) revenue*=0.7

let profit=revenue-totalCost
let marginPct=(profit/revenue)*100

window.calc={used,matCost,labor,totalCost,revenue,profit,marginPct}

price.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Cost: $${Math.round(totalCost)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`
}

// CREATE JOB
function createJob(){
calculate()
jobs.push({...calc,date:new Date().toLocaleString()})
renderJobs()
renderCharts()
renderAlerts()
}

// JOB HISTORY
function renderJobs(){

jobList.innerHTML=""

jobs.forEach(j=>{
let mats=""
Object.entries(j.used).forEach(([k,v])=>{
mats+=`${inventory[k]?.name||k}: ${v.usage.toFixed(2)} ($${Math.round(v.cost)})<br>`
})

jobList.innerHTML+=`
<div class="card">
${j.date}<br><br>
${mats}<br>
Material Cost:$${Math.round(j.matCost)}<br>
Labor:$${Math.round(j.labor)}<br>
Revenue:$${Math.round(j.revenue)}<br>
Profit:$${Math.round(j.profit)}<br>
Margin:${j.marginPct.toFixed(1)}%
</div>`
})
}

// ALERTS
function renderAlerts(){

let html=""

// JOB ALERTS
jobs.forEach(j=>{
if(j.marginPct < 25){
html += `<div class="alert">⚠️ Low margin (${j.marginPct.toFixed(1)}%)</div>`
}
})

// INVENTORY ALERTS
Object.entries(inventory).forEach(([k,v])=>{

if(v.qty < 5){
html += `<div class="alert out">🚨 OUT: ${v.name||k} (${v.qty})</div>`
}
else if(v.qty < 20){
html += `<div class="alert">⚠️ Low: ${v.name||k} (${v.qty})</div>`
}

})

if(!html) html="No alerts"

alerts.innerHTML=html
}

// CHARTS
let revChart, profitChart

function renderCharts(){

let labels=jobs.map((_,i)=>"Job "+(i+1))
let rev=jobs.map(j=>j.revenue)
let prof=jobs.map(j=>j.profit)

let totalRev=jobs.reduce((a,b)=>a+b.revenue,0)
let totalProf=jobs.reduce((a,b)=>a+b.profit,0)

totalRevenue.innerHTML="$"+Math.round(totalRev)
totalProfit.innerHTML="$"+Math.round(totalProf)

if(revChart) revChart.destroy()
if(profitChart) profitChart.destroy()

revChart=new Chart(revChart,{
type:"line",
data:{labels,datasets:[{label:"Revenue",data:rev}]}
})

profitChart=new Chart(profitChart,{
type:"line",
data:{labels,datasets:[{label:"Profit",data:prof}]}
})

}

// CLEAR
function clearJobs(){
jobs=[]
renderJobs()
renderCharts()
renderAlerts()
}

// INIT
renderInventory()
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

</script>

</body>
</html>
