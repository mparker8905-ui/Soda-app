<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif}
.card{background:#111;padding:20px;margin:15px;border-radius:16px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:10px}
button{width:100%;padding:14px;background:#d4af37;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>
<input id="name" placeholder="Customer Name">

<select id="size">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1">

<label><input type="checkbox" id="builder"> Builder Mode</label>
<input id="pricePerHouse" placeholder="Price Per House">

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>

<input id="tttfCost" placeholder="TTTF Cost">
<input id="tttfQty" placeholder="TTTF Quantity">

<input id="ryeCost" placeholder="Rye Cost">
<input id="ryeQty" placeholder="Rye Quantity">

<input id="milCost" placeholder="Milorganite Cost">
<input id="milQty" placeholder="Milorganite Qty">

<input id="espCost" placeholder="Espoma Cost">
<input id="espQty" placeholder="Espoma Qty">

<input id="woodCost" placeholder="Wood Mulch Cost">
<input id="woodQty" placeholder="Wood Mulch Qty">

<input id="bfmCost" placeholder="BFM Cost">
<input id="bfmQty" placeholder="BFM Qty">

<input id="tackCost" placeholder="Tackifier Cost">
<input id="tackQty" placeholder="Tackifier Qty">

<input id="compCost" placeholder="Compost Cost">
<input id="compQty" placeholder="Compost Qty">

<input id="bioCost" placeholder="Biochar Cost">
<input id="bioQty" placeholder="Biochar Qty">

<input id="humCost" placeholder="Humic Cost">
<input id="humQty" placeholder="Humic Qty">

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<button onclick="resetApp()">RESET APP</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<script>

let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inv=JSON.parse(localStorage.getItem("inv")||"{}")

const n=v=>parseFloat(v)||0

function saveInventory(){
inv={
tttf:{c:n(tttfCost.value),q:n(tttfQty.value)},
rye:{c:n(ryeCost.value),q:n(ryeQty.value)},
mil:{c:n(milCost.value),q:n(milQty.value)},
esp:{c:n(espCost.value),q:n(espQty.value)},
wood:{c:n(woodCost.value),q:n(woodQty.value)},
bfm:{c:n(bfmCost.value),q:n(bfmQty.value)},
tack:{c:n(tackCost.value),q:n(tackQty.value)},
comp:{c:n(compCost.value),q:n(compQty.value)},
bio:{c:n(bioCost.value),q:n(bioQty.value)},
hum:{c:n(humCost.value),q:n(humQty.value)}
}
localStorage.setItem("inv",JSON.stringify(inv))
}

// RECIPES
function getMaterials(tier,h){

if(tier==="standard"){
return {
tttf:0.8*h,
rye:0.2*h,
mil:1*h,
wood:1*h,
tack:1*h,
comp:0,
bio:0,
hum:0
}
}

return {
tttf:0.8*h,
rye:0,
mil:0,
esp:1*h,
bfm:1*h,
tack:1*h,
comp:1*h,
bio:0.5*h,
hum:0.5*h
}

}

// CREATE JOB
function createJob(){

const h=Math.max(1,n(houses.value))
const tierVal=tier.value
const builderMode=builder.checked
const price=n(pricePerHouse.value)

const base={small:1500,medium:2500,large:3500}[size.value]

let revenue = builderMode ? price*h : base*h
if(!revenue) revenue=base*h

const mats=getMaterials(tierVal,h)

let breakdown={}
let totalMatCost=0

for(let key in mats){
const qty=mats[key]||0
const cost=(inv[key]?.c||0)*qty
breakdown[key]={qty,cost}
totalMatCost+=cost
if(inv[key]) inv[key].q -= qty
}

const profit=revenue-totalMatCost

jobs.push({
name:name.value||"Client",
tier:tierVal,
houses:h,
revenue,
profit,
margin:(profit/revenue*100)||0,
materials:breakdown
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
}

// RENDER
function render(){

let rev=0,prof=0
jobs.forEach(j=>{rev+=j.revenue;prof+=j.profit})

stats.innerHTML=`
Jobs: ${jobs.length}<br>
Revenue: $${rev}<br>
Profit: $${prof}<br>
Margin: ${(prof/rev*100||0).toFixed(1)}%
`

jobsDiv.innerHTML=""

jobs.forEach(j=>{

let matHTML=""

for(let m in j.materials){
const d=j.materials[m]
if(!d || (!d.qty && !d.cost)) continue
matHTML+=`${m.toUpperCase()}: ${d.qty} units ($${d.cost.toFixed(0)})<br>`
}

jobsDiv.innerHTML+=`
<div>
<b>${j.name} (${j.tier})</b><br>
Houses: ${j.houses}<br>
Revenue: $${j.revenue}<br>
Profit: $${j.profit}<br>
Margin: ${j.margin.toFixed(1)}%<br>
Materials:<br>${matHTML}
</div><hr>`
})

}

function resetApp(){
localStorage.clear()
jobs=[]
inv={}
render()
}

const jobsDiv=document.getElementById("jobs")
render()

</script>

</body>
</html>
