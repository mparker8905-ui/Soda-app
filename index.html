<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:15px}
.card{background:#121212;padding:15px;margin-bottom:15px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:8px;background:#1a1a1a;color:#fff;border-radius:8px;border:1px solid #333}
button{width:100%;padding:12px;margin-top:10px;background:#d4af37;border:none;border-radius:8px;font-weight:bold}
.gold{color:#d4af37;font-size:22px;font-weight:bold}
.job{background:#0f0f0f;padding:10px;margin-top:10px;border-left:3px solid #d4af37;border-radius:8px}
</style>
</head>

<body>

<!-- CREATE JOB -->
<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="tier" onchange="applyPremium()">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses">
<input id="margin" placeholder="Target Margin %" value="40">
<input id="overhead" placeholder="Overhead %" value="15">

<h3>Add Ons</h3>

<label><input type="checkbox" id="aeration"> Aeration</label><br>
<label><input type="checkbox" id="compost"> Compost</label><br>
<label><input type="checkbox" id="bioHum"> Bio/Hum Blend (50/50)</label><br>
<label><input type="checkbox" id="bio100"> Biochar 100%</label><br>
<label><input type="checkbox" id="hum100"> Humic 100%</label><br>

<label><input type="checkbox" id="lime" onchange="toggle('limeQty',this)"> Lime</label>
<input id="limeQty" placeholder="Lime Amount" style="display:none">

<label><input type="checkbox" id="sulfur" onchange="toggle('sulfurQty',this)"> Sulfur</label>
<input id="sulfurQty" placeholder="Sulfur Amount" style="display:none">

<!-- FINAL INVESTMENT -->
<div class="card" style="border:2px solid #d4af37;text-align:center">
<h3>Final Investment</h3>
<div id="finalPrice" style="font-size:42px;font-weight:bold"></div>
<div id="finalBreakdown"></div>
<div id="finalTotals" style="margin-top:10px"></div>
</div>

<button onclick="applyPremium()">Auto Apply Premium</button>
<button onclick="createJob()">Create Job</button>
<button onclick="openProposal()">View Proposal</button>

</div>

<!-- INVENTORY -->
<div class="card">
<h3>Inventory</h3>
<div id="inventoryUI"></div>
<button onclick="save()">Save Inventory</button>
</div>

<!-- ALERTS -->
<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

<!-- JOB HISTORY -->
<div class="card">
<h3>Job History</h3>
<div id="jobHistory"></div>
</div>

<!-- ANALYTICS -->
<div class="card">
<h3>Analytics</h3>
<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>
</div>

<!-- TOTALS -->
<div class="card" style="text-align:center">
<div id="globalTotals" class="gold"></div>
</div>

<script>

// ================= STATE =================
let app = JSON.parse(localStorage.getItem("soda")) || {
inventory:{
standard:[
{name:"seed",cost:80,qty:50},
{name:"fert",cost:40,qty:50},
{name:"mulch",cost:35,qty:50},
{name:"tack",cost:25,qty:50}
],
premium:[
{name:"bio",cost:25,qty:50},
{name:"humic",cost:20,qty:50}
],
addons:[
{name:"lime",cost:15,qty:50},
{name:"sulfur",cost:20,qty:50}
]
},
jobs:[]
}

// ================= SAVE =================
function save(){
localStorage.setItem("soda",JSON.stringify(app))
}

// ================= PREMIUM =================
function applyPremium(){
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bioHum.checked=true
lime.checked=true
sulfur.checked=true
toggle('limeQty',lime)
toggle('sulfurQty',sulfur)
}
}

// ================= TOGGLE =================
function toggle(id,el){
document.getElementById(id).style.display=el.checked?"block":"none"
}

// ================= CALCULATE =================
function calculateJob(){

let sqftVal = Number(sqft.value)||0
let housesVal = Number(houses.value)||1
let marginVal = (Number(margin.value)||40)/100
let overheadPct = (Number(overhead.value)||15)/100

let factor = sqftVal / 5000

let materials = {
seed: 0.5 * factor * housesVal,
fert: 1 * factor * housesVal,
mulch: 1 * factor * housesVal,
tack: 0.5 * factor * housesVal,
bio: (bioHum.checked||bio100.checked)?0.5*factor*housesVal:0,
humic: (bioHum.checked||hum100.checked)?0.5*factor*housesVal:0,
lime: lime.checked ? Number(limeQty.value)||0 : 0,
sulfur: sulfur.checked ? Number(sulfurQty.value)||0 : 0
}

// COST CALCULATION
let materialCost = 0

app.inventory.standard.forEach(m=>{
if(materials[m.name]) materialCost += materials[m.name] * m.cost
})

app.inventory.premium.forEach(m=>{
if(materials[m.name]) materialCost += materials[m.name] * m.cost
})

app.inventory.addons.forEach(m=>{
if(materials[m.name]) materialCost += materials[m.name] * m.cost
})

let labor = sqftVal <= 5000 ? 200 : sqftVal <= 10000 ? 400 : 700
labor *= housesVal

let overhead = (materialCost + labor) * overheadPct

let cost = materialCost + labor + overhead
let revenue = cost / (1 - marginVal)
let profit = revenue - cost
let marginCalc = (profit/revenue*100)

// UI UPDATE
finalPrice.innerHTML = `$${revenue.toFixed(0)}`
finalBreakdown.innerHTML = `
Materials: $${materialCost.toFixed(0)}<br>
Labor: $${labor.toFixed(0)}<br>
Overhead: $${overhead.toFixed(0)}
`
finalTotals.innerHTML = `
Cost: $${cost.toFixed(0)}<br>
Revenue: $${revenue.toFixed(0)}<br>
Profit: $${profit.toFixed(0)}<br>
Margin: ${marginCalc.toFixed(1)}%
`

return {materials,materialCost,labor,overhead,cost,revenue,profit,margin:marginCalc}
}

// LIVE UPDATE
setInterval(calculateJob,500)

// ================= CREATE JOB =================
function createJob(){

if(!customer.value){
alert("Enter customer name")
return
}

let data = calculateJob()

let job = {
customer: customer.value,
tier: tier.value,
sqft: Number(sqft.value)||0,
houses: Number(houses.value)||1,
...data,
date:new Date().toLocaleDateString()
}

app.jobs.push(job)

deductInventory(data.materials)

save()
renderAll()

alert("Job Created ✅")
}

// ================= INVENTORY DEDUCT =================
function deductInventory(used){

["standard","premium","addons"].forEach(type=>{
app.inventory[type].forEach(m=>{
if(used[m.name]){
m.qty -= used[m.name]
if(m.qty < 0) m.qty = 0
}
})
})

}

// ================= ALERTS =================
function renderAlerts(){

let alertsArr = []

app.inventory.standard
.concat(app.inventory.premium, app.inventory.addons)
.forEach(m=>{
if(m.qty <= 5){
alertsArr.push("❌ OUT: " + m.name)
}else if(m.qty < 20){
alertsArr.push("⚠ LOW: " + m.name)
}
})

alerts.innerHTML = alertsArr.length ? alertsArr.join("<br>") : "All inventory good"
}

// ================= JOB HISTORY =================
function renderJobs(){

jobHistory.innerHTML = app.jobs.map(j=>`
<div class="job">
<b>${j.customer}</b><br>
${j.tier} | ${j.sqft} sqft | ${j.houses} homes<br>

💰 Revenue: $${j.revenue.toFixed(0)}<br>
💸 Cost: $${j.cost.toFixed(0)}<br>
📈 Profit: $${j.profit.toFixed(0)}<br>
📊 Margin: ${j.margin.toFixed(1)}%<br>

<br><b>Materials Used:</b><br>
${Object.entries(j.materials).map(([k,v])=>`${k}: ${v.toFixed(2)}`).join("<br>")}

<br><b>Material Cost:</b> $${j.materialCost.toFixed(0)}

</div>
`).join("")
}

// ================= TOTALS =================
function renderTotals(){

let totalRevenue = app.jobs.reduce((a,b)=>a+b.revenue,0)
let totalCost = app.jobs.reduce((a,b)=>a+b.cost,0)
let avgMargin = app.jobs.length ? app.jobs.reduce((a,b)=>a+b.margin,0)/app.jobs.length : 0

globalTotals.innerHTML = `
Total Revenue: $${totalRevenue.toFixed(0)}<br>
Total Cost: $${totalCost.toFixed(0)}<br>
Total Profit: $${(totalRevenue-totalCost).toFixed(0)}<br>
Avg Margin: ${avgMargin.toFixed(1)}%
`
}

// ================= INVENTORY UI =================
function renderInventory(){

inventoryUI.innerHTML=""

;["standard","premium","addons"].forEach(type=>{
inventoryUI.innerHTML+=`<h4>${type}</h4>`

app.inventory[type].forEach((m,i)=>{
inventoryUI.innerHTML+=`
<input value="${m.name}" onchange="app.inventory.${type}[${i}].name=this.value">
<input value="${m.cost}" onchange="app.inventory.${type}[${i}].cost=+this.value">
<input value="${m.qty}" onchange="app.inventory.${type}[${i}].qty=+this.value">
`
})
})
}

// ================= CHARTS =================
function renderCharts(){
new Chart(revChart,{type:"bar",data:{labels:app.jobs.map(j=>j.customer),datasets:[{data:app.jobs.map(j=>j.revenue)}]}})
new Chart(profitChart,{type:"bar",data:{labels:app.jobs.map(j=>j.customer),datasets:[{data:app.jobs.map(j=>j.profit)}]}})
}

// ================= PROPOSAL =================
function openProposal(){
let c = calculateJob()
let w = window.open("")
w.document.write(`
<h1>SoDa Proposal</h1>
Customer: ${customer.value}<br>
Revenue: $${c.revenue.toFixed(0)}<br>
<button onclick="window.print()">Download PDF</button>
`)
}

// ================= INIT =================
function renderAll(){
renderInventory()
renderJobs()
renderAlerts()
renderTotals()
renderCharts()
}

renderAll()

</script>

</body>
</html>
