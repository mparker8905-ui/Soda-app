<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.row{display:flex;gap:8px}
.row button{flex:1}
.alert{padding:8px;border-radius:8px;margin:4px 0}
.low{background:#665500}
.out{background:#661111}
</style>
</head>

<body>

<div id="app">

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses">

<h3>Add Ons</h3>
<label>Grow System <input type="checkbox" id="grow"></label>
<label>Aeration <input type="checkbox" id="aeration"></label>
<label>Compost <input type="checkbox" id="compost"></label>
<label>Biochar 50% <input type="checkbox" id="bio"></label>
<label>Humic 50% <input type="checkbox" id="humic"></label>

<h3>Schedule</h3>
<input type="date" id="quote">
<input type="date" id="soil">
<input type="date" id="aer">
<input type="date" id="comp">
<input type="date" id="seed">
<input type="date" id="install">
<input type="date" id="pickup">
<input type="date" id="inspect">

<h3>Labor</h3>
<input id="rate" placeholder="Hourly Rate">
<input id="crew" placeholder="Crew Size">
<input id="hours" placeholder="Hours per house">

<h3>Target Margin %</h3>
<input id="margin">

<div class="card">
<h3>Final Investment</h3>
<div id="price"></div>
<div id="breakdown"></div>
</div>

<button onclick="createJob()">Create Job</button>
<button onclick="openProposal()">View Proposal</button>

</div>

<div class="card">
<h2>Inventory</h2>

<h3>Standard Package</h3>
<div id="inv_standard"></div>

<h3>Premium Package</h3>
<div id="inv_premium"></div>

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

</div>

<div id="proposal" style="display:none" class="card">
<h2>Proposal</h2>
<div id="p_content"></div>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="sendEmail()">Email</button>
<button onclick="sendText()">Text</button>
<button onclick="closeProposal()">Back</button>
</div>

<script>

let inventory={
standard:{
seed:{name:"Seed",cost:80,qty:100},
fert:{name:"Fertilizer",cost:40,qty:100},
mulch:{name:"Mulch",cost:35,qty:100},
tack:{name:"Tackifier",cost:20,qty:100}
},
premium:{
seed:{name:"Elite Seed",cost:100,qty:100},
comp:{name:"Compost",cost:30,qty:100},
bio:{name:"Biochar",cost:25,qty:100},
hum:{name:"Humic",cost:20,qty:100}
}
}

let jobs=[]
let calcData={}

function setSize(v){
sqft.value=v
calculate()
}

tier.onchange=()=>{
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bio.checked=true
humic.checked=true
}
}

function renderInventory(){
inv_standard.innerHTML=""
Object.keys(inventory.standard).forEach(k=>{
let m=inventory.standard[k]
inv_standard.innerHTML+=`
<input id="s_${k}_name" value="${m.name}">
<input id="s_${k}_cost" value="${m.cost}">
<input id="s_${k}_qty" value="${m.qty}">
`
})

inv_premium.innerHTML=""
Object.keys(inventory.premium).forEach(k=>{
let m=inventory.premium[k]
inv_premium.innerHTML+=`
<input id="p_${k}_name" value="${m.name}">
<input id="p_${k}_cost" value="${m.cost}">
<input id="p_${k}_qty" value="${m.qty}">
`
})
}

function saveInventory(){
Object.keys(inventory.standard).forEach(k=>{
inventory.standard[k].name=document.getElementById(`s_${k}_name`).value
inventory.standard[k].cost=Number(document.getElementById(`s_${k}_cost`).value)
inventory.standard[k].qty=Number(document.getElementById(`s_${k}_qty`).value)
})
Object.keys(inventory.premium).forEach(k=>{
inventory.premium[k].name=document.getElementById(`p_${k}_name`).value
inventory.premium[k].cost=Number(document.getElementById(`p_${k}_cost`).value)
inventory.premium[k].qty=Number(document.getElementById(`p_${k}_qty`).value)
})
alert("Saved")
renderAlerts()
}

function calculate(){

let sqftVal=Number(sqft.value)||0
let housesVal=Number(houses.value)||1

let matCost=(sqftVal/1000)*housesVal*200
let labor=(rate.value*crew.value*hours.value)||0

let cost=matCost+labor

let marginVal=(margin.value||0)/100
let revenue = marginVal>0 ? cost/(1-marginVal) : cost

if(strategy.value==="win") revenue*=0.9
if(strategy.value==="max") revenue*=1.2

let profit=revenue-cost
let marginPct=(profit/revenue)*100

price.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Materials: $${Math.round(matCost)}<br>
Labor: $${Math.round(labor)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`

calcData={matCost,labor,revenue,profit,marginPct}
}

function createJob(){

jobs.push({
name:name.value||"Customer",
date:new Date().toLocaleString(),
materials:calcData.matCost,
labor:calcData.labor,
revenue:calcData.revenue,
profit:calcData.profit,
margin:calcData.marginPct
})

renderJobs()
renderAlerts()
}

function renderJobs(){
jobs.innerHTML=""
jobs.forEach(j=>{
jobs.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
${j.date}<br><br>
Materials: $${j.materials}<br>
Labor: $${j.labor}<br>
Revenue: $${j.revenue}<br>
Profit: $${j.profit}<br>
Margin: ${j.margin.toFixed(1)}%
</div>
`
})
}

function renderAlerts(){
alerts.innerHTML=""
Object.values(inventory.standard).forEach(m=>{
if(m.qty<5) alerts.innerHTML+=`<div class="alert out">OUT: ${m.name}</div>`
else if(m.qty<20) alerts.innerHTML+=`<div class="alert low">LOW: ${m.name}</div>`
})
}

function openProposal(){
app.style.display="none"
proposal.style.display="block"

p_content.innerHTML=`
<b>${name.value}</b><br><br>
Total: $${Math.round(calcData.revenue)}
`
}

function closeProposal(){
proposal.style.display="none"
app.style.display="block"
}

function downloadPDF(){
window.print()
}

function sendEmail(){
window.location.href=`mailto:?subject=Proposal&body=Total $${Math.round(calcData.revenue)}`
}

function sendText(){
window.location.href=`sms:?body=Proposal $${Math.round(calcData.revenue)}`
}

renderInventory()
document.querySelectorAll("input,select").forEach(el=>el.addEventListener("input",calculate))

</script>

</body>
</html>
