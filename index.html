<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#000;color:#fff;padding:20px;}
.card{background:#111;padding:20px;border-radius:20px;margin-bottom:20px;}
input,select{width:100%;padding:14px;margin:6px 0;border-radius:10px;border:none;background:#222;color:#fff;}
button{padding:12px;border:none;border-radius:12px;background:gold;font-weight:bold;}
.flex{display:flex;gap:10px;margin:10px 0;}
.price-box{border:2px solid gold;padding:20px;border-radius:20px;text-align:center;}
.big{font-size:34px}
.alert{color:#ff4d4d;font-weight:bold;}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="bidMode">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="profit">Max Profit</option>
</select>

<div class="flex">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Square Feet" value="3000">
<input id="houses" placeholder="Number of Properties" value="1">

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow"> Growth Treatment ($300)</label>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bio"> Bio</label>
<label><input type="checkbox" id="hum"> Humic</label>

<h3>Labor</h3>
<input id="laborRate" placeholder="Hourly Rate ($/hr)" value="70">
<input id="crewSize" placeholder="Crew Size" value="2">
<input id="hours" placeholder="Hours per Job" value="8">

<h3>Overhead & Margin</h3>
<input id="overhead" placeholder="Overhead %" value="15">
<input id="margin" placeholder="Target Margin %" value="60">

<div class="price-box">
<div>Final Investment</div>
<div id="priceDisplay" class="big">$0</div>
</div>

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>
<div id="inventory"></div>
<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts">No alerts</div>
</div>

<div class="card">
<h2>Job History</h2>
<button onclick="clearJobs()" style="background:red;width:100%">Clear Job History</button>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>

// ---------- HELPERS ----------
function n(v){return Number(v)||0}

// ---------- STATE ----------
let inventory = JSON.parse(localStorage.getItem("inventory")||"{}")
let jobs = JSON.parse(localStorage.getItem("jobs")||"[]")

const materials=["tttf","rye","elite","kbg","mil","esp","wood","bfm","tack","comp","bio","hum"]

// ---------- SIZE ----------
function setSize(v){
sqft.value=v
calculate()
}

// ---------- PREMIUM AUTO ----------
tier.onchange=()=>{
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bio.checked=true
hum.checked=true
}
calculate()
}

// ---------- INVENTORY ----------
function renderInventory(){
let html=""
materials.forEach(m=>{
html+=`
<input id="${m}c" placeholder="${m} cost">
<input id="${m}q" placeholder="${m} qty">
`
})
inventoryDiv.innerHTML=html
}
const inventoryDiv=document.getElementById("inventory")
renderInventory()

function saveInventory(){
materials.forEach(m=>{
inventory[m]={
c:n(document.getElementById(m+"c").value),
q:n(document.getElementById(m+"q").value)
}
})
localStorage.setItem("inventory",JSON.stringify(inventory))
alert("Inventory Saved")
}

// ---------- CALCULATION ----------
function calculate(){

let totalSqft=n(sqft.value)*n(houses.value)||1

let rates = tier.value==="premium"
? {elite:7,kbg:2,esp:5,bfm:7,tack:1,comp:20,bio:3,hum:2}
: {tttf:7,rye:5,mil:5,wood:7,tack:1}

if(compost.checked) rates.comp=20
if(bio.checked) rates.bio=3
if(hum.checked) rates.hum=2

let materialCost=0
window.lastMaterials={}

Object.keys(rates).forEach(k=>{
let qty=Math.ceil((rates[k]*totalSqft)/1000)
let cost=(inventory[k]?.c||20)*qty

window.lastMaterials[k]={qty,cost}
materialCost+=cost
})

// LABOR
let labor = n(laborRate.value)*n(crewSize.value)*n(hours.value)

// OVERHEAD
let overheadCost = (materialCost + labor)*(n(overhead.value)/100)

// TOTAL COST
let totalCost = materialCost + labor + overheadCost + (grow.checked?300:0)

// PRICE
let marginVal = n(margin.value)
let price = totalCost/(1-(marginVal/100))

if(!price || price<=0) price=totalCost*1.5

window.finalPrice=price

priceDisplay.innerText="$"+Math.round(price)
}

// ---------- CREATE JOB ----------
function createJob(){

calculate()

if(!window.finalPrice){
alert("Calculation failed")
return
}

let alertsArr=[]

Object.keys(window.lastMaterials).forEach(k=>{
let used=window.lastMaterials[k].qty

if(!inventory[k]) inventory[k]={q:0,c:0}

inventory[k].q -= used

if(inventory[k].q<=0){
alertsArr.push(k+" OUT")
inventory[k].q=0
}
else if(inventory[k].q<10){
alertsArr.push(k+" LOW")
}
})

// PROFIT
let revenue=window.finalPrice
let cost=0
Object.values(window.lastMaterials).forEach(m=>cost+=m.cost)

let profit=revenue-cost
let margin=(profit/revenue)*100

jobs.push({
name:name.value||"Client",
revenue,
profit,
margin,
alerts:alertsArr,
date:new Date().toLocaleString()
})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inventory",JSON.stringify(inventory))

render()

alert("Job Created")
}

// ---------- RENDER ----------
function render(){

let jobsHTML=""
let alertsHTML=""

jobs.forEach(j=>{
j.alerts.forEach(a=>{
alertsHTML+=`<div class="alert">${a}</div>`
})

jobsHTML+=`
<div class="card">
<b>${j.name}</b><br>
${j.date}<br>
Revenue:$${Math.round(j.revenue)}<br>
Profit:$${Math.round(j.profit)}<br>
Margin:${j.margin.toFixed(1)}%
</div>`
})

jobsDiv.innerHTML=jobsHTML
alerts.innerHTML=alertsHTML||"No alerts"

// chart
if(window.chart) window.chart.destroy()

window.chart=new Chart(chartCanvas,{
type:"bar",
data:{
labels:jobs.map((_,i)=>"Job "+(i+1)),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})
}

const jobsDiv=document.getElementById("jobs")
const chartCanvas=document.getElementById("chart")

function clearJobs(){
jobs=[]
localStorage.removeItem("jobs")
render()
}

// ---------- LIVE UPDATE ----------
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

// INIT
calculate()
render()

</script>

</body>
</html>
