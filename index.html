<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SoDa CRM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
background:#000;
color:#fff;
font-family:Arial;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
background:#222;
border:1px solid #333;
color:#fff;
border-radius:10px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:#d4af37;
border:none;
border-radius:12px;
font-weight:bold;
}

.job{
border-left:4px solid gold;
padding:10px;
margin:10px 0;
background:#111;
}

.unpaid{color:red;}
.paid{color:lime;}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>
<input id="name" placeholder="Customer Name">

<select id="size">
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>

<select id="type">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<button onclick="logJob()">Create Job</button>
</div>

<div class="card">
<h2>Material Costs</h2>
<input id="seedCost" placeholder="Seed Cost">
<input id="fertCost" placeholder="Fertilizer Cost">
<input id="mulchCost" placeholder="Mulch Cost">
<input id="tackCost" placeholder="Tackifier Cost">
<input id="soilCost" placeholder="Soil Additives Cost">
<button onclick="saveCosts()">Save Costs</button>
</div>

<div class="card">
<button onclick="toggleClient()">Toggle Client View</button>
<button onclick="clearJobs()">Clear Job History</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="history"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<script>
const { jsPDF } = window.jspdf;

let jobs = JSON.parse(localStorage.getItem("jobs")||"[]");
let cost = JSON.parse(localStorage.getItem("cost")||"{}");

let clientMode = false;

// ---------- MATERIAL RECIPES ----------
function getMaterials(type,size){

let base = {small:1, medium:2, large:3}[size];

if(type==="standard"){
return {
seed:base,
fert:base,
mulch:base,
tack:base,
soil:0
};
}

if(type==="premium"){
return {
seed:base,
fert:base,
mulch:base,
tack:base,
soil:base
};
}

}

// ---------- SAVE COST ----------
function saveCosts(){
cost = {
seed:+seedCost.value||0,
fert:+fertCost.value||0,
mulch:+mulchCost.value||0,
tack:+tackCost.value||0,
soil:+soilCost.value||0
};

localStorage.setItem("cost",JSON.stringify(cost));
render();
}

// ---------- LOG JOB ----------
function logJob(){

try{

let name = document.getElementById("name").value;
let size = document.getElementById("size").value;
let type = document.getElementById("type").value;

let materials = getMaterials(type,size);

// revenue logic
let revenue = {small:1500, medium:2500, large:3500}[size];
if(type==="premium") revenue *= 1.4;

// cost calc
let materialCost = 0;
for(let k in materials){
materialCost += (materials[k]||0)*(cost[k]||0);
}

let profit = revenue - materialCost;
let margin = revenue ? (profit/revenue*100) : 0;

let job = {
name,
type,
size,
materials,
revenue,
profit,
margin,
paid:false,
date:new Date().toLocaleDateString()
};

jobs.push(job);
localStorage.setItem("jobs",JSON.stringify(jobs));

render();

}catch(e){
alert(e.message);
}

}

// ---------- TOGGLE CLIENT ----------
function toggleClient(){
clientMode=!clientMode;
render();
}

// ---------- CLEAR ----------
function clearJobs(){
if(confirm("Clear all jobs?")){
jobs=[];
localStorage.setItem("jobs","[]");
render();
}
}

// ---------- PDF ----------
function pdf(j){

const doc = new jsPDF();

doc.setFontSize(18);
doc.text("SoDa Outdoor Designs",20,20);

doc.setFontSize(12);
doc.text(`Customer: ${j.name}`,20,40);
doc.text(`Package: ${j.type}`,20,50);

let y=70;

let services = j.type==="standard" ?
["Hydroseed","Fertilize","Wood Mulch","Guar Tack"] :
["Elite Seed","Organic Fert","BFM Mulch","Compost + Biochar"];

services.forEach(s=>{
doc.text("• "+s,25,y);
y+=8;
});

y+=10;
doc.text("Total: $"+Math.round(j.revenue),20,y);

doc.save(j.name+".pdf");
}

// ---------- RENDER ----------
function render(){

// stats
let rev=0, prof=0;

jobs.forEach(j=>{
rev+=j.revenue;
prof+=j.profit;
});

let margin = rev ? (prof/rev*100).toFixed(1) : 0;

stats.innerHTML = `
Jobs: ${jobs.length}<br>
Revenue: $${rev}<br>
Profit: $${prof}<br>
Margin: ${margin}%
`;

// history
history.innerHTML = jobs.map((j,i)=>{

if(clientMode){
return `
<div class="job">
<b>${j.name}</b><br>
${j.type.toUpperCase()}<br>
$${Math.round(j.revenue)}
</div>
`;
}

let matHTML="";
let totalCost=0;

for(let k in j.materials){
let qty = j.materials[k];
let c = cost[k]||0;
let item = qty*c;
totalCost+=item;

matHTML += `${k}: ${qty} ($${item})<br>`;
}

return `
<div class="job">

<b>${j.name}</b> (${j.type})<br>
Revenue: $${Math.round(j.revenue)}<br>
Cost: $${Math.round(totalCost)}<br>
Profit: $${Math.round(j.profit)}<br>
Margin: ${j.margin.toFixed(1)}%<br><br>

<b>Materials</b><br>
${matHTML}

<span class="${j.paid?'paid':'unpaid'}">
${j.paid?'PAID':'UNPAID'}
</span>

<button onclick="jobs[${i}].paid=!jobs[${i}].paid;localStorage.setItem('jobs',JSON.stringify(jobs));render()">Toggle Paid</button>
<button onclick='pdf(${JSON.stringify(j)})'>PDF</button>

</div>
`;

}).join("");

// chart
let ctx = document.getElementById("chart");

new Chart(ctx,{
type:"bar",
data:{
labels:jobs.map(j=>j.date),
datasets:[
{
label:"Revenue",
data:jobs.map(j=>j.revenue)
},
{
label:"Profit",
data:jobs.map(j=>j.profit)
}
]
}
});

}

render();
</script>

</body>
</html>
