<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.gold{color:#d4af37}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<h3>Schedule</h3>

<label>Quote Date</label>
<input type="date" id="quote">

<label>Soil Test Date</label>
<input type="date" id="soil">

<label>Aeration Date</label>
<input type="date" id="aerationDate">

<label>Compost Date</label>
<input type="date" id="compostDate">

<label>Hydroseed Date</label>
<input type="date" id="hydroDate">

<label>Grow System Install</label>
<input type="date" id="installDate">

<label>Grow System Removal</label>
<input type="date" id="removalDate">

<label>Final Lawn Inspection</label>
<input type="date" id="inspectionDate">

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>

<h3>Standard Materials</h3>
<div id="standardInv"></div>

<h3>Premium Materials</h3>
<div id="premiumInv"></div>

<h3>Add-On Materials</h3>
<div id="addonInv"></div>

<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobList"></div>
</div>

<script>

let inventory={
standard:[
{name:"Seed",cost:0,qty:0},
{name:"Fertilizer",cost:0,qty:0},
{name:"Mulch",cost:0,qty:0},
{name:"Tackifier",cost:0,qty:0}
],
premium:[
{name:"Seed",cost:0,qty:0},
{name:"Fertilizer",cost:0,qty:0},
{name:"Mulch",cost:0,qty:0},
{name:"Tackifier",cost:0,qty:0},
{name:"Biochar",cost:0,qty:0},
{name:"Humic Acid",cost:0,qty:0}
],
addons:[
{name:"Lime",cost:0,qty:0},
{name:"Sulfur",cost:0,qty:0},
{name:"Sprinkler Units",cost:0,qty:0}
]
}

let jobs=[]

function renderInventory(){

standardInv.innerHTML=inventory.standard.map((m,i)=>`
<input value="${m.name}" onchange="inventory.standard[${i}].name=this.value">
<input placeholder="Cost" value="${m.cost}" onchange="inventory.standard[${i}].cost=parseFloat(this.value)||0">
<input placeholder="Qty" value="${m.qty}" onchange="inventory.standard[${i}].qty=parseFloat(this.value)||0">
`).join("")

premiumInv.innerHTML=inventory.premium.map((m,i)=>`
<input value="${m.name}" onchange="inventory.premium[${i}].name=this.value">
<input placeholder="Cost" value="${m.cost}" onchange="inventory.premium[${i}].cost=parseFloat(this.value)||0">
<input placeholder="Qty" value="${m.qty}" onchange="inventory.premium[${i}].qty=parseFloat(this.value)||0">
`).join("")

addonInv.innerHTML=inventory.addons.map((m,i)=>`
<input value="${m.name}" onchange="inventory.addons[${i}].name=this.value">
<input placeholder="Cost" value="${m.cost}" onchange="inventory.addons[${i}].cost=parseFloat(this.value)||0">
<input placeholder="Qty" value="${m.qty}" onchange="inventory.addons[${i}].qty=parseFloat(this.value)||0">
`).join("")
}

function saveInventory(){
alert("Inventory Saved")
}

function createJob(){

let job={
name:customer.value,
schedule:{
quote:quote.value,
soil:soil.value,
aeration:aerationDate.value,
compost:compostDate.value,
hydro:hydroDate.value,
install:installDate.value,
removal:removalDate.value,
inspection:inspectionDate.value
}
}

jobs.push(job)
renderJobs()
}

function renderJobs(){
jobList.innerHTML=jobs.map(j=>`
<div>
<b>${j.name}</b><br>
Quote: ${j.schedule.quote}<br>
Soil: ${j.schedule.soil}<br>
Aeration: ${j.schedule.aeration}<br>
Compost: ${j.schedule.compost}<br>
Hydro: ${j.schedule.hydro}<br>
Install: ${j.schedule.install}<br>
Removal: ${j.schedule.removal}<br>
Inspection: ${j.schedule.inspection}
</div><br>
`).join("")
}

renderInventory()

</script>

</body>
</html>
