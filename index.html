<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.row{display:flex;gap:8px}
.row button{flex:1}
.gold{color:#d4af37}
.alert{padding:6px;border-radius:6px;margin:4px 0}
.low{background:#665500}
.out{background:#661111}
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000c;display:none;justify-content:center;align-items:center;
}
.modal-content{
background:#111;padding:20px;border-radius:12px;width:90%;
}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses">

<h3>Add Ons</h3>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bioHum"> Bio/Hum Blend (50/50)</label>

<h3>Schedule</h3>
<label>Quote Date</label><input type="date" id="quote">
<label>Soil Test Date</label><input type="date" id="soil">
<label>Aeration Date</label><input type="date" id="aer">
<label>Compost Date</label><input type="date" id="comp">
<label>Hydroseed Date</label><input type="date" id="hydro">
<label>Grow Install Date</label><input type="date" id="growInstall">
<label>Grow Removal Date</label><input type="date" id="growRemove">
<label>Final Inspection</label><input type="date" id="final">

<h3>Labor</h3>
<input id="rate" placeholder="Hourly Rate">
<input id="crew" placeholder="Crew Size">
<input id="hours" placeholder="Hours per house">

<h3>Target Margin %</h3>
<input id="margin">

<div class="card">
<h3 class="gold">Final Investment</h3>
<div id="price">$0</div>
<div id="breakdown"></div>
</div>

<button onclick="createJob()">Create Job</button>
<button onclick="openClient()">Client View</button>

</div>

<div class="card">
<h2>Inventory</h2>
<div id="inventoryUI"></div>
<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobHistory"></div>
</div>

<div id="clientModal" class="modal">
<div class="modal-content">
<h2>Client Proposal</h2>
<div id="clientContent"></div>
<button onclick="closeClient()">Close</button>
</div>
</div>

<script>

let inventory = [
{name:"Seed",cost:80,qty:100},
{name:"Fertilizer",cost:40,qty:100},
{name:"Mulch",cost:35,qty:100},
{name:"Compost",cost:30,qty:100},
{name:"Biochar",cost:25,qty:100},
{name:"Humic",cost:20,qty:100}
]

let jobs=[]

function setSize(v){
sqft.value=v
calculate()
}

function calculate(){
let sqftVal=+sqft.value||0
let housesVal=+houses.value||1

let units = sqftVal/1000 * housesVal

let materialCost = units*80

if(compost.checked) materialCost+=units*30
if(bioHum.checked){
materialCost+=units*25*0.5
materialCost+=units*20*0.5
}

let labor = (+rate.value||0)*(+crew.value||0)*(+hours.value||0)*housesVal

let cost = materialCost + labor

let marginVal = (+margin.value||0)/100
let revenue = marginVal>0 ? cost/(1-marginVal) : cost

let profit = revenue-cost

price.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Materials: $${Math.round(materialCost)}<br>
Labor: $${Math.round(labor)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}
`

return {units,materialCost,labor,revenue,profit}
}

function createJob(){

let c = calculate()

inventory[0].qty -= c.units
inventory[3].qty -= compost.checked ? c.units : 0
inventory[4].qty -= bioHum.checked ? c.units*0.5 : 0
inventory[5].qty -= bioHum.checked ? c.units*0.5 : 0

jobs.push({
name:customer.value,
date:quote.value||"N/A",
...c
})

renderJobs()
renderAlerts()
renderInventory()
}

function renderJobs(){
jobHistory.innerHTML=""
jobs.forEach(j=>{
jobHistory.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
Quote: ${j.date}<br>
Materials: $${Math.round(j.materialCost)}<br>
Labor: $${Math.round(j.labor)}<br>
Revenue: $${Math.round(j.revenue)}<br>
Profit: $${Math.round(j.profit)}
</div>
`
})
}

function renderInventory(){
inventoryUI.innerHTML=""
inventory.forEach((m,i)=>{
inventoryUI.innerHTML+=`
<input value="${m.name}" onchange="inventory[${i}].name=this.value">
<input value="${m.cost}" onchange="inventory[${i}].cost=+this.value">
<input value="${m.qty}" onchange="inventory[${i}].qty=+this.value">
`
})
}

function renderAlerts(){
alerts.innerHTML=""
inventory.forEach(m=>{
if(m.qty<5) alerts.innerHTML+=`<div class="alert out">OUT: ${m.name}</div>`
else if(m.qty<20) alerts.innerHTML+=`<div class="alert low">LOW: ${m.name}</div>`
})
}

function saveInventory(){
alert("Inventory Saved")
}

function openClient(){
let last = jobs[jobs.length-1]
if(!last) return alert("No job yet")

clientContent.innerHTML=`
<b>${last.name}</b><br>
Revenue: $${Math.round(last.revenue)}<br>
Profit: $${Math.round(last.profit)}
`

clientModal.style.display="flex"
}

function closeClient(){
clientModal.style.display="none"
}

document.querySelectorAll("input").forEach(el=>el.addEventListener("input",calculate))

renderInventory()

</script>

</body>
</html>
