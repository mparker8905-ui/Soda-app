<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawn SaaS Pro</title>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:15px}
.card{background:#121212;padding:15px;margin-bottom:15px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:8px;background:#1a1a1a;color:#fff;border-radius:8px;border:1px solid #333}
input, select {
  font-size:16px;
}
button{width:100%;padding:12px;margin-top:10px;background:#d4af37;border:none;border-radius:8px;font-weight:bold}
.gold{
  color:#d4af37;
  font-size:32px;
  font-weight:bold;
}
.job{background:#0f0f0f;padding:10px;margin-top:10px;border-left:3px solid #d4af37;border-radius:8px}
.finalBox{
  border:2px solid #d4af37;
  border-radius:16px;
  padding:20px;
  text-align:center;
  margin-top:20px;
  box-shadow:0 0 20px rgba(212,175,55,0.25);
}
label{display:block;margin-top:8px}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses" value="1">
<input id="margin" placeholder="Target Margin %" value="40">
<input id="overhead" placeholder="Overhead %" value="15">

<h3>Add Ons</h3>

<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bioHum"> Bio/Hum Blend (50/50)</label>
<label><input type="checkbox" id="bio100"> Biochar 100%</label>
<label><input type="checkbox" id="humic100"> Humic 100%</label>
<label><input type="checkbox" id="grow"> Grow System</label>

<label><input type="checkbox" id="lime"> Lime</label>
<input id="limeQty" placeholder="Lime Amount">

<label><input type="checkbox" id="sulfur"> Sulfur</label>
<input id="sulfurQty" placeholder="Sulfur Amount">

<h3>Schedule</h3>

<label>Quote Date</label>
<input id="quoteDate" type="date">

<label>Soil Test Date</label>
<input id="soilDate" type="date">

<label>Aeration Date</label>
<input id="aerationDate" type="date">

<label>Compost Date</label>
<input id="compostDate" type="date">

<label>Hydroseed Date</label>
<input id="hydroDate" type="date">

<label>Grow System Install</label>
<input id="installDate" type="date">

<label>Final Inspection</label>
<input id="finalDate" type="date">

<button onclick="createJob()">Create Job</button>
<button onclick="viewProposal()">View Proposal</button>
<button onclick="applyPremium()">Auto Apply Premium</button>

<div class="finalBox">
<h3>Final Investment</h3>
<div id="finalPrice" class="gold"></div>
<div id="finalDetails"></div>no
</div>

<div class="card">
<h3>Inventory</h3>
<div id="inventoryUI"></div>
<button onclick="save()">Save Inventory</button>
</div>

<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

<div class="card">
<h3>Job History</h3>
<div id="history"></div>
</div>

<div class="card">
<h3>Analytics</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Totals</h3>
<div id="totals" class="gold"></div>
</div>

<div class="card">
<h3>CRM</h3>
<div id="crm"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// ===== STORAGE =====
function save(){
  localStorage.setItem("app", JSON.stringify(app))
}

function load(){
  let data = localStorage.getItem("app")
  if(data){
    app = JSON.parse(data)
  }
}

// ===== STATE =====
let app = {
  inventory:{
    standard:[
      {name:"seed",cost:80,qty:100},
      {name:"fert",cost:40,qty:100},
      {name:"mulch",cost:35,qty:100},
      {name:"tack",cost:25,qty:100}
    ],
    premium:[
      {name:"bio",cost:25,qty:100},
      {name:"humic",cost:20,qty:100}
    ],
    addons:[
      {name:"lime",cost:15,qty:100},
      {name:"sulfur",cost:20,qty:100}
    ]
  },
  jobs:[],
  customers:[]
}

// ===== HELPERS =====
function el(id){ return document.getElementById(id) }

// ===== CALCULATE =====
function calculate(){

  let sqft = +el("sqft").value || 0
  let houses = +el("houses").value || 1
  let margin = (+el("margin").value || 40)/100
  let overhead = (+el("overhead").value || 15)/100

  let factor = sqft/5000

  let used = {
    seed:0.5*factor*houses,
    fert:1*factor*houses,
    mulch:1*factor*houses,
    tack:0.5*factor*houses,
    bio: el("bioHum")?.checked ? 0.5*factor*houses : 0,
    humic: el("bioHum")?.checked ? 0.5*factor*houses : 0,
    lime: el("lime")?.checked ? +el("limeQty").value||0 : 0,
    sulfur: el("sulfur")?.checked ? +el("sulfurQty").value||0 : 0
  }

  let all = [
    ...app.inventory.standard,
    ...app.inventory.premium,
    ...app.inventory.addons
  ]

  let materialCost = 0

  all.forEach(i=>{
    if(used[i.name]){
      materialCost += used[i.name] * i.cost
    }
  })

  let labor = (sqft < 5000 ? 200 : 400) * houses
  let overheadCost = (materialCost + labor) * overhead
  let cost = materialCost + labor + overheadCost
  let revenue = cost/(1-margin)
  let profit = revenue - cost

  el("finalPrice").innerHTML =
    revenue ? "$"+Math.round(revenue) : "0"

  return {revenue, profit, cost, used}
}

// ===== CREATE JOB =====
function createJob(){

  let data = calculate()
  let name = el("customer").value || "Customer"

  let existing = app.customers.find(c=>c.name===name)

  if(!existing){
    app.customers.push({name:name, jobs:[]})
    existing = app.customers.find(c=>c.name===name)
  }

  existing.jobs.push({
    revenue:data.revenue,
    profit:data.profit,
    date:new Date().toLocaleDateString()
  })

  app.jobs.push({
    name:name,
    revenue:data.revenue,
    profit:data.profit,
    date:new Date().toLocaleDateString()
  })

  // deduct inventory
  let all = [
    ...app.inventory.standard,
    ...app.inventory.premium,
    ...app.inventory.addons
  ]

  all.forEach(i=>{
    if(data.used[i.name]){
      i.qty -= data.used[i.name]
      if(i.qty < 0) i.qty = 0
    }
  })

  save()
  render()
}

// ===== INVENTORY SAVE =====
function saveInventory(){

  let inputs = document.querySelectorAll("#inventoryUI input")

  inputs.forEach(input=>{
    let type = input.dataset.type
    let idx = input.dataset.idx
    let field = input.dataset.field

    app.inventory[type][idx][field] =
      field==="name"
        ? input.value
        : +input.value
  })

  save()
  render()
}

// ===== RENDER =====
function render(){

  // INVENTORY
  let inventoryUI = el("inventoryUI")

  inventoryUI.innerHTML = `
    <h3>Standard</h3>
    ${app.inventory.standard.map((i,idx)=>`
      <div>
        <input data-type="standard" data-idx="${idx}" data-field="name" value="${i.name}">
        <input data-type="standard" data-idx="${idx}" data-field="cost" value="${i.cost}">
        <input data-type="standard" data-idx="${idx}" data-field="qty" value="${i.qty}">
      </div>
    `).join("")}

    <h3>Premium</h3>
    ${app.inventory.premium.map((i,idx)=>`
      <div>
        <input data-type="premium" data-idx="${idx}" data-field="name" value="${i.name}">
        <input data-type="premium" data-idx="${idx}" data-field="cost" value="${i.cost}">
        <input data-type="premium" data-idx="${idx}" data-field="qty" value="${i.qty}">
      </div>
    `).join("")}

    <h3>Addons</h3>
    ${app.inventory.addons.map((i,idx)=>`
      <div>
        <input data-type="addons" data-idx="${idx}" data-field="name" value="${i.name}">
        <input data-type="addons" data-idx="${idx}" data-field="cost" value="${i.cost}">
        <input data-type="addons" data-idx="${idx}" data-field="qty" value="${i.qty}">
      </div>
    `).join("")}
  `

  // ALERTS
  let alerts = el("alerts")

  let all = [
    ...app.inventory.standard,
    ...app.inventory.premium,
    ...app.inventory.addons
  ]

  let list = []

  all.forEach(i=>{
    if(i.qty <= 0){
      list.push("❌ OUT: " + i.name)
    } else if(i.qty < 10){
      list.push("⚠️ LOW: " + i.name)
    }
  })

  alerts.innerHTML = list.length
    ? list.join("<br>")
    : "✅ Inventory Healthy"

  // HISTORY
  let history = el("history")

  history.innerHTML = app.jobs.map(j=>`
    <div>
      ${j.name} - $${Math.round(j.revenue)} profit $${Math.round(j.profit)}
    </div>
  `).join("")

  // CRM
  let crm = el("crm")

  crm.innerHTML = `
    <h3>Customers</h3>
    ${app.customers.map(c=>`
      <div style="margin-bottom:10px;border:1px solid #333;padding:10px">
        <b>${c.name}</b><br>
        Jobs: ${c.jobs.length}<br>
        Profit: $${Math.round(c.jobs.reduce((a,b)=>a+(b.profit||0),0))}
      </div>
    `).join("")}
  `


// ===== TOTALS =====
let totals = el("totals")

let totalRevenue = app.jobs.reduce((a,b)=>a+(b.revenue||0),0)
let totalProfit = app.jobs.reduce((a,b)=>a+(b.profit||0),0)

totals.innerHTML = `
  <div style="font-size:18px">
    Total Revenue: $${Math.round(totalRevenue)}<br>
    Total Profit: $${Math.round(totalProfit)}
  </div>
`

// ===== CHART SAFE =====
let ctx = document.getElementById("chart")

if (ctx && window.Chart) {

  try {

    if (window.myChart) {
      window.myChart.destroy()
    }

    window.myChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: app.jobs.map(j => j.name + " " + j.date),
        datasets: [
          {
            label: "Revenue",
            data: app.jobs.map(j => j.revenue)
          },
          {
            label: "Profit",
            data: app.jobs.map(j => j.profit)
          }
        ]
      },
      options: {
        plugins: {
          legend: {
            labels: { color: "white" }
          }
        },
        scales: {
          x: { ticks: { color: "white" } },
          y: { ticks: { color: "white" } }
        }
      }
    })

  } catch (e) {
    console.log("Chart error:", e)
  }

}

// ===== START =====
load()
render()

</script>

</body>
</html>
