<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;margin:0}
.container{padding:15px}
.card{background:#111;padding:20px;margin-bottom:15px;border-radius:16px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:10px}
button{width:100%;padding:14px;background:#d4af37;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
.low{color:red}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>
<input id="name" placeholder="Customer Name">

<select id="size">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<input id="houses" type="number" value="1">

<label><input type="checkbox" id="builder"> Builder Mode</label>
<input id="pricePerHouse" placeholder="Price Per House">

<button onclick="addJob()">Create Job</button>
</div>

<div class="card">
<h2>Material Costs</h2>
<input id="seedCost" placeholder="Seed Cost">
<input id="fertCost" placeholder="Fertilizer Cost">
<input id="mulchCost" placeholder="Mulch Cost">
<input id="tackCost" placeholder="Tackifier Cost">
<input id="soilCost" placeholder="Soil Additives Cost">
<button onclick="saveCosts()">Save Costs</button>
</div>

<div class="card">
<button onclick="clearAll()">RESET APP</button>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobList"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let jobs = JSON.parse(localStorage.getItem("jobs") || "[]").filter(j=>j && j.revenue);
let costs = JSON.parse(localStorage.getItem("costs") || "{}");
let chart;

function n(v){return parseFloat(v)||0}

// SAVE COSTS
function saveCosts(){
costs={
seed:n(seedCost.value),
fert:n(fertCost.value),
mulch:n(mulchCost.value),
tack:n(tackCost.value),
soil:n(soilCost.value)
}
localStorage.setItem("costs",JSON.stringify(costs))
}

// MATERIAL RECIPES (REAL)
function getUsage(tier){
if(tier==="standard"){
return {seed:1,fert:1,mulch:1,tack:1,soil:1}
}
return {seed:1.2,fert:1.3,mulch:1.4,tack:1.2,soil:1.5}
}

// ADD JOB
function addJob(){

const houses=Math.max(1,n(document.getElementById("houses").value))
const builder=document.getElementById("builder").checked
const price=n(document.getElementById("pricePerHouse").value)

const base={
small:1500,
medium:2500,
large:3500
}[size.value] || 0

let revenue = builder ? price*houses : base*houses

const usage=getUsage(tier.value)

let matCost=
(n(costs.seed)*usage.seed)+
(n(costs.fert)*usage.fert)+
(n(costs.mulch)*usage.mulch)+
(n(costs.tack)*usage.tack)+
(n(costs.soil)*usage.soil)

matCost*=houses

const profit=revenue-matCost
const margin=revenue ? (profit/revenue*100) : 0

const job={
name:name.value||"Client",
tier:tier.value||"standard",
houses,
revenue:revenue||0,
profit:profit||0,
margin:margin||0,
materials:usage,
date:new Date().toLocaleDateString()
}

jobs.push(job)
localStorage.setItem("jobs",JSON.stringify(jobs))

render()
}

// RENDER
function render(){

let rev=0,prof=0

jobs.forEach(j=>{
rev+=n(j.revenue)
prof+=n(j.profit)
})

const margin=rev ? (prof/rev*100).toFixed(1) : 0

stats.innerHTML=`
Jobs: ${jobs.length}<br>
Revenue: $${rev}<br>
Profit: $${prof}<br>
Margin: ${margin}%
`

jobList.innerHTML=""

jobs.forEach(j=>{
jobList.innerHTML+=`
<div>
<b>${j.name} (${j.tier})</b><br>
Houses: ${j.houses}<br>
Revenue: $${j.revenue}<br>
Profit: $${j.profit}<br>
Margin: ${j.margin.toFixed(1)}%<br>
Materials:<br>
Seed: ${j.materials?.seed||0}<br>
Fert: ${j.materials?.fert||0}<br>
Mulch: ${j.materials?.mulch||0}<br>
Tack: ${j.materials?.tack||0}<br>
Soil: ${j.materials?.soil||0}
</div><hr>`
})

// CHART FIX
if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:jobs.map(j=>j.date),
datasets:[
{label:"Revenue",data:jobs.map(j=>j.revenue)},
{label:"Profit",data:jobs.map(j=>j.profit)}
]
}
})

}

// FULL RESET
function clearAll(){
localStorage.clear()
jobs=[]
render()
}

render()

</script>
</body>
</html>
