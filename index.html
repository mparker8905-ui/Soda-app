<!DOCTYPE html>
<html>
<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  background:#000;
  color:#fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.card{background:#111;padding:15px;border-radius:12px;margin-bottom:20px}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  background:#222;
  border:1px solid #333;
  color:#fff;
  border-radius:8px
}

.row{display:flex;gap:10px}
.row button{flex:1}

/* TOGGLES */
.toggle{
  background:#1a1a1a;
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  border:1px solid #2a2a2a;
  text-align:center;
  transition:.2s;
}

.toggle.active{
  background:#d4af37;
  color:#000;
  border:1px solid #d4af37;
}

.results-card {
  border: 2px solid gold;
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  color: gold;
  background: #111; /* optional dark background */
}

.results-card h2 {
  color: gold;
  margin-bottom: 10px;
}

#results {
  color: gold;
}

/* ===== HEADER ===== */

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 5px;
}

.brand h1{
  margin:0;
  font-size:22px;
  letter-spacing:0.5px;
}

.tagline{
  font-size:12px;
  color:#aaa;
  margin-top:2px;
}

/* LOGO */
.logo{
  width:55px;
  height:auto;
  filter: drop-shadow(0 0 6px rgba(212,175,55,0.4));
}

/* GOLD DIVIDER */
.gold-line{
  height:2px;
  background:linear-gradient(
    90deg,
    transparent,
    #d4af37,
    transparent
  );
  margin:10px 0 20px 0;
}

.inventory-section{
  margin-top:15px;
  padding:12px;
  border:1px solid #333;
  border-radius:10px;
  background:#0d0d0d;

  display:flex;
  flex-direction:column;
}

.inventory-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;

  flex-wrap:wrap; /* ðŸ”¥ ADD THIS */
}

.inventory-header span{
  flex:1;
}

.inventory-actions{
  display:flex;
  gap:8px;
  flex-shrink:0; /* prevents squishing */
}

.inventory-header button{
  width:32px;
  height:32px;
  font-size:18px;
  padding:0;
  background:#d4af37;
  color:#000;
  border:none;
  border-radius:6px;
}

.material-row{
  display:flex;
  flex-direction:column; /* KEY FIX */
  gap:8px;

  background:#111;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 0 8px rgba(212,175,55,0.15);
}

.material-row input{
  flex:1;
  padding:10px;
  font-size:12px;
}

.material-row{
  width:100%;
  box-sizing:border-box;

  background:#111;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;

  box-shadow:0 0 8px rgba(212,175,55,0.15);
}

.mat-select,
.mat-input{
  width:100%;
  box-sizing:border-box; /* ðŸ‘ˆ ADD THIS */
  padding:12px;
  border-radius:8px;
  background:#222;
  color:#fff;
  border:1px solid #333;
  font-size:14px;
}

.mat-label{
  font-size:12px;
  color:#aaa;
  margin-top:4px;
}

.row-top{
  display:flex;
  gap:8px;
  align-items:center;
  width:100%;
}

.row-top .mat-select{
  flex:1;
  min-width:0; /* ðŸ”¥ prevents overflow */
}

.delete-btn{
  width:40px;
  height:40px;
  background:#ff4d4d;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.delete-btn:active{
  transform:scale(0.95);
}

#standardMaterials,
#premiumMaterials,
#addonMaterials{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.alert-box{
  margin-bottom:12px;
  padding:12px;
  border-radius:10px;
  font-size:13px;
}

.alert-title{
  font-weight:700;
  margin-bottom:6px;
}

.alert-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0;
}

.alert-line button{
  background:#d4af37;
  color:#000;
  border:none;
  border-radius:6px;
  padding:4px 8px;
  font-size:11px;
  font-weight:600;
}

.alert-danger{
  background:rgba(255,60,60,0.1);
  border:1px solid rgba(255,60,60,0.4);
}

.alert-warning{
  background:rgba(255,180,0,0.1);
  border:1px solid rgba(255,180,0,0.4);
}

.alert-success{
  background:rgba(0,255,120,0.1);
  border:1px solid rgba(0,255,120,0.4);
}

/* ===== TOAST ===== */
.toast-container{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:9999;
}


/* BASE */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(20px) scale(0.95);
  padding:14px 22px;
  border-radius:12px;
  font-weight:600;
  font-size:14px;
  opacity:0;
  transition:all .35s ease;
  z-index:9999999;
  backdrop-filter: blur(8px);
}

/* SHOW ANIMATION */
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0) scale(1);
}

/* âœ¨ GLOW ANIMATION */
@keyframes glowPulse {
  0% { box-shadow: 0 0 0 rgba(255,255,255,0); }
  50% { box-shadow: 0 0 18px rgba(255,255,255,0.2); }
  100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
}

/* GREEN */
.toast-success{
  background:#1f3d2b;
  color:#4cff9a;
  border:1px solid #4cff9a;
  box-shadow:0 0 10px rgba(76,255,154,0.3);
  animation: glowPulse 1.5s ease;
}

/* GOLD (ðŸ”¥ YOUR BRAND) */
.toast-warning{
  background:#3a2f0f;
  color:#d4af37;
  border:1px solid #d4af37;
  box-shadow:0 0 12px rgba(212,175,55,0.5);
  animation: glowPulse 1.5s ease;
}

/* RED */
.toast-error{
  background:#3a1212;
  color:#ff4d4d;
  border:1px solid #ff4d4d;
  box-shadow:0 0 12px rgba(255,77,77,0.4);
  animation: glowPulse 1.5s ease;
}

button{
  transition: all 0.15s ease;
}

button:active{
  transform: scale(0.96);
  box-shadow: 0 0 6px rgba(212,175,55,0.5);
}

.gold-text{
  color:#d4af37;
  text-shadow:0 0 6px rgba(212,175,55,0.4);
  font-weight:700;
  letter-spacing:0.5px;
}

.glass-card{
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 14px;
  padding: 16px;
  margin: 14px 0;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 12px rgba(212,175,55,0.08);
}

.section-title{
  color:#d4af37;
  font-weight:700;
  margin-bottom:8px;
  font-size:14px;
  letter-spacing:.5px;
  text-transform:uppercase;
}

/* COLLAPSIBLE CARD */
.collapsible .card-body{
  max-height: 0;
  overflow: hidden;
  transition: all 0.4s ease;
  opacity: 0;
}

/* OPEN STATE */
.collapsible.open .card-body{
  max-height: 500px;
  opacity: 1;
  margin-top: 10px;
}

/* HEADER */
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
  color:#d4af37;
  cursor:pointer;
  font-size:14px;
}

/* CHEVRON */
.chevron{
  transition: transform 0.3s ease;
}

.collapsible.open .chevron{
  transform: rotate(180deg);
}

.history-card{
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,215,0,0.2);
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
}

.history-top{
  display:flex;
  justify-content:space-between;
  font-weight:700;
  margin-bottom:6px;
}

.history-details{
  font-size:13px;
  color:#ccc;
}

.history-date{
  font-size:11px;
  color:#777;
  margin-top:6px;
}

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-card{
  width:90%;
  max-width:400px;
  background:#111;
  border:1px solid rgba(255,215,0,0.3);
  border-radius:14px;
  box-shadow:0 0 25px rgba(255,215,0,0.15);
  padding:15px;
  animation:fadeIn 0.2s ease;
}

.modal-header{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
}

.modal-body label{
  display:block;
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}

.modal-body input{
  width:100%;
  padding:8px;
  margin-top:4px;
  border-radius:6px;
  border:none;
  background:#1a1a1a;
  color:#fff;
}

.modal-footer{
  margin-top:15px;
}

.modal-footer button{
  width:100%;
  padding:12px;
  background:gold;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.95)}
  to{opacity:1; transform:scale(1)}
}

.delete-btn {
  font-size: 18px;
  color: white;
}

.delete-btn:hover {
  color: red;
}

</style>

</head>

<body>

<div class="header">
  <div class="brand">
   <h1 class="gold-text">SoDa Outdoor Designs</h1>
    <div class="tagline">We build lawns from the soil up</div>
  </div>

  <img src="/logo.PNG" class="logo">
</div>

<div class="gold-line"></div>

<!-- NEW: CUSTOMER -->
<input id="customer" placeholder="Customer Name">

<input id="address" placeholder="Client Address">

<!-- NEW: PACKAGE -->
<select id="package" onchange="handlePackage()">
  <option value="standard">Standard</option>
  <option value="premium">Premium</option>
</select>

<select id="pricingMode">
  <option value="balanced">Balanced</option>
  <option value="win">Win Job</option>
  <option value="max">Maximize Profits</option>
</select>

<select id="pricingStrategy">
  <option value="normal">Normal</option>
  <option value="market">Market Rate</option>
  <option value="undercut">Undercut Competitor</option>
  <option value="builder">Builder Aggressive</option>
</select>

<input id="competitorPrice" type="number" placeholder="Competitor Price ($)">

<input id="sqft" placeholder="Square Feet">

<div class="row">
  <button onclick="setSize(3000)">Small</button>
  <button onclick="setSize(6000)">Medium</button>
  <button onclick="setSize(12000)">Large</button>
</div>

<input id="houses" type="number" value="1" min="1" placeholder="# of Houses">

<input id="targetMargin" type="number" placeholder="Target Profit Margin (%)">

<input id="targetProfit" type="number" placeholder="Target Profit ($)">

<div class="card">

<span class='gold-text'>Add-Ons</span>

<div class="toggle" data-name="aeration" onclick="toggleAddon(this)">Aeration</div>
<div class="toggle" data-name="compost" onclick="toggleAddon(this)">Compost</div>
<div class="toggle" data-name="biohum" onclick="toggleAddon(this)">Bio / Hum Blend</div>
<div class="toggle" data-name="biochar" onclick="toggleAddon(this)">Biochar 100%</div>
<div class="toggle" data-name="humic" onclick="toggleAddon(this)">Humic Acid 100%</div>
<div class="toggle" data-name="grow" onclick="toggleAddon(this)">Grow System</div>

<div class="toggle" data-name="lime" onclick="toggleAddon(this)">Lime</div>

<div class="toggle" data-name="sulfur" onclick="toggleAddon(this)">Sulfur</div>

</div>

<div class="card">
 <span class='gold-text'>Labor & Overhead</span>

  <input id="hourlyRate" type="number" placeholder="Hourly Rate ($)">
  <input id="hoursPerHouse" type="number" placeholder="Hours per House">
  <input id="crewSize" type="number" placeholder="Crew Size">
  <input id="overhead" type="number" placeholder="Overhead (%)">
</div>

<button onclick="fixAllIssues()" style="
  background:#d4af37;
  color:#000;
  font-weight:bold;
  margin-bottom:10px;
">
  ✅ Fix All Issues
</button>

<button onclick="optimizeForProfit()" style="
  background:#00c853;
  color:#000;
  font-weight:bold;
  margin-bottom:10px;
">
  🦾Optimize for Profit
</button>

<button onclick="optimizeForTargetProfit()" style="
  background:#00e5ff;
  color:#000;
  font-weight:bold;
  margin-bottom:10px;
">
  💰Hit Target Profit
</button>

<button onclick="winJob()">💎Win This Job</button>

<div class="card results-card">
  <h2>Job Breakdown</h2>
  <div id="results"></div>
</div>

<button onclick="saveJob()">
  💾Save Job
</button>

<div id="jobHistorySection" class="glass-card">
  <div class="section-title">JOB HISTORY</div>
  <div id="jobHistory"></div>
</div>

<button onclick="openClientView()">Client View</button>

<button onclick="sendProposal()">Send Proposal</button>

<div class="card">
  <span class='gold-text'>Inventory</span>

  <!-- STANDARD -->
  <div class="inventory-section">
    <div class="inventory-header">
      <span>Standard Package</span>

      <div class="inventory-actions">
        <button onclick="addMaterialRow('standard')">+</button>
      </div>
    </div>

    <div id="standardMaterials"></div>
  </div>

  <!-- PREMIUM -->
  <div class="inventory-section">
    <div class="inventory-header">
      <span>Premium Package</span>

      <div class="inventory-actions">
        <button onclick="addMaterialRow('premium')">+</button>
      </div>
    </div>

    <div id="premiumMaterials"></div>
  </div>

  <!-- ADD-ONS -->
  <div class="inventory-section">
    <div class="inventory-header">
      <span>Add-On Materials</span>

      <div class="inventory-actions">
        <button onclick="addMaterialRow('addons')">+</button>
      </div>
    </div>

    <div id="addonMaterials"></div>
  </div>

</div>

<button onclick="saveInventory()">Save Inventory</button>

<button onclick="exportInventory()">Export Inventory</button>

<button onclick="generateInventoryPDF()">Inventory PDF</button>

<div id="jobModal" class="modal-overlay" style="display:none;">
  <div class="modal-card">

    <div class="modal-header">
      <span>Edit Job</span>
      <button onclick="closeJobModal()">🗑️</button>
    </div>

    <div class="modal-body">

      <label>Sqft</label>
      <input id="editSqft" type="number">

      <label>Price ($)</label>
      <input id="editPrice" type="number">

      <label>Cost ($)</label>
      <input id="editCost" type="number">

    </div>

    <div class="modal-footer">
      <button onclick="saveJobEdit()">💾Save</button>
    </div>

  </div>
</div>

<script src="js/config.js"></script> 
<script src="js/calculator.js"></script>
<script src="js/inventory.js"></script>
<script src="js/jobs.js"></script>
<script src="js/ui.js"></script>
<script src="js/actions.js"></script>
<script src="js/main.js"></script>

 
</body>
</html>
