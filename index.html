<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.row{display:flex;gap:8px}
.row button{flex:1}
.gold{color:#d4af37}
.alert{padding:8px;border-radius:8px;margin:4px 0;background:#332222}
.alert.out{background:#661111}
.toggle{display:flex;justify-content:space-between;margin:6px 0}
#proposalScreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0b0b0b;z-index:9999;overflow:auto;padding:20px}
.label{font-size:12px;color:#aaa;margin-top:6px}
</style>
</head>

<body>

<div class="card">

<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses">

<h3>Add-ons</h3>
<label class="toggle">Grow<input type="checkbox" id="grow"></label>
<label class="toggle">Aeration<input type="checkbox" id="aeration"></label>
<label class="toggle">Compost<input type="checkbox" id="compost"></label>
<label class="toggle">Biochar<input type="checkbox" id="bio"></label>
<label class="toggle">Humic<input type="checkbox" id="humic"></label>

<h3>Schedule</h3>
<input type="date" id="date_quote">
<input type="date" id="date_seed">

<h3>Labor</h3>
<input id="rate" placeholder="Hourly Rate">
<input id="crew" placeholder="Crew Size">
<input id="hours" placeholder="Hours per house">

<h3>Margin</h3>
<input id="margin" placeholder="Profit %">

<div class="card">
<h3 class="gold">Final Investment</h3>
<div id="price">$0</div>
<div id="breakdown"></div>
</div>

<button onclick="createJob()">Create Job</button>
<button onclick="openProposal()">View Proposal</button>

</div>

<div class="card">
<h2>Inventory</h2>
<div id="inventoryUI"></div>
<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<button onclick="clearJobs()">Clear</button>
<div id="jobList"></div>
</div>

<div id="proposalScreen">
<div class="card">

<h2 class="gold">Proposal</h2>
<div id="p_name"></div>
<div id="p_price"></div>
<div id="p_schedule"></div>

<h3>Calendar</h3>
<button onclick="calendar('Hydroseed', date_seed.value)">Add Hydroseed</button>

<button onclick="closeProposal()">Close</button>

</div>
</div>

<script>

let inventory={
seed:{name:"Seed",cost:80,qty:100},
fert:{name:"Fertilizer",cost:40,qty:100},
mulch:{name:"Mulch",cost:35,qty:100},
tack:{name:"Tackifier",cost:20,qty:100},
comp:{name:"Compost",cost:30,qty:100}
}

let jobs=[]
let calc={}

function setSize(v){sqft.value=v;calculate()}

function renderInventory(){
inventoryUI.innerHTML=""
Object.keys(inventory).forEach(k=>{
inventoryUI.innerHTML+=`
<div class="label">Material Name</div>
<input id="${k}_name" value="${inventory[k].name}">
<div class="label">Cost per Unit</div>
<input id="${k}_cost" value="${inventory[k].cost}">
<div class="label">Quantity Available</div>
<input id="${k}_qty" value="${inventory[k].qty}">
`
})
}

function saveInventory(){
Object.keys(inventory).forEach(k=>{
inventory[k].name=document.getElementById(k+"_name").value
inventory[k].cost=Number(document.getElementById(k+"_cost").value)
inventory[k].qty=Number(document.getElementById(k+"_qty").value)
})
renderAlerts()
}

function calculate(){

let sqftVal=Number(sqft.value)||0
let housesVal=Number(houses.value)||1

let used={}
let matCost=0

function add(mat,rate){
let usage=(rate*sqftVal/1000)*housesVal
let cost=usage*(inventory[mat]?.cost||0)
used[mat]={usage,cost}
matCost+=cost
}

add("seed",6)
add("fert",4)
add("mulch",5)
add("tack",1)

if(compost.checked) add("comp",4)

let labor=(Number(rate.value)||0)*(Number(crew.value)||0)*(Number(hours.value)||0)*housesVal

let totalCost=matCost+labor
let revenue=totalCost*(1+(Number(margin.value)||0)/100)
let profit=revenue-totalCost
let marginPct=(profit/revenue)*100

calc={used,matCost,labor,totalCost,revenue,profit,marginPct}

price.innerHTML="$"+Math.round(revenue)

breakdown.innerHTML=`
Materials: $${Math.round(matCost)}<br>
Labor: $${Math.round(labor)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`
}

function createJob(){

calculate()

Object.entries(calc.used).forEach(([k,v])=>{
inventory[k].qty-=v.usage
})

jobs.push({
name:name.value||"Customer",
date:new Date().toLocaleString(),
...calc
})

renderInventory()
renderJobs()
renderAlerts()
}

function renderJobs(){

jobList.innerHTML=""

jobs.forEach(j=>{

let mats=""
Object.entries(j.used).forEach(([k,v])=>{
mats+=`${inventory[k].name}: ${v.usage.toFixed(2)} ($${Math.round(v.cost)})<br>`
})

jobList.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
${j.date}<br><br>

${mats}

<hr>

Material Cost: $${Math.round(j.matCost)}<br>
Labor: $${Math.round(j.labor)}<br>
Revenue: $${Math.round(j.revenue)}<br>
Profit: $${Math.round(j.profit)}<br>
Margin: ${j.marginPct.toFixed(1)}%
</div>
`
})

}

function renderAlerts(){
alerts.innerHTML=""
Object.values(inventory).forEach(v=>{
if(v.qty<5) alerts.innerHTML+=`<div class="alert out">OUT: ${v.name}</div>`
else if(v.qty<20) alerts.innerHTML+=`<div class="alert">LOW: ${v.name}</div>`
})
}

function openProposal(){
p_name.innerHTML=name.value
p_price.innerHTML="$"+Math.round(calc.revenue)
p_schedule.innerHTML="Hydroseed: "+date_seed.value
proposalScreen.style.display="block"
}

function closeProposal(){
proposalScreen.style.display="none"
}

function calendar(type,dateStr){

if(!dateStr){alert("Pick a date");return}

let start=new Date(dateStr)
start.setHours(9,0,0)

let end=new Date(start)
end.setHours(end.getHours()+2)

function f(d){
return d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z"
}

let url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${type}&dates=${f(start)}/${f(end)}`

window.open(url,"_blank")
}

renderInventory()
document.querySelectorAll("input,select").forEach(el=>el.addEventListener("input",calculate))

</script>

</body>
</html>
