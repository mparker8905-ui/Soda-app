<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.row{display:flex;gap:8px}
.row button{flex:1}
.gold{color:#d4af37;font-size:18px;font-weight:bold}
.label{font-size:12px;color:#aaa;margin-top:6px}
</style>
</head>

<body>

<div class="card">

<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="tier">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option value="balanced">Balanced</option>
<option value="win">Win Job</option>
<option value="max">Max Profit</option>
</select>

<div class="row">
<button onclick="setSize(3000)">Small</button>
<button onclick="setSize(6000)">Medium</button>
<button onclick="setSize(10000)">Large</button>
</div>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses">

<h3>Schedule</h3>

<div class="label">Quote Date</div>
<input type="date" id="quote">

<div class="label">Soil Test Date</div>
<input type="date" id="soil">

<div class="label">Aeration Date</div>
<input type="date" id="aeration_date">

<div class="label">Compost Date</div>
<input type="date" id="compost_date">

<div class="label">Hydroseed Date</div>
<input type="date" id="seed_date">

<div class="label">Grow Install</div>
<input type="date" id="install">

<div class="label">Grow Removal</div>
<input type="date" id="removal">

<div class="label">Final Inspection</div>
<input type="date" id="inspect">

<h3>Labor</h3>
<input id="rate" placeholder="Hourly Rate">
<input id="crew" placeholder="Crew Size">
<input id="hours" placeholder="Hours per house">

<h3>Target Margin %</h3>
<input id="margin">

<div class="card">
<h3 class="gold">Final Investment</h3>
<div id="price">$0</div>
<div id="breakdown"></div>
</div>

<button onclick="createJob()">Create Job</button>

</div>

<div class="card">
<h2>Job History</h2>
<div id="jobHistory"></div>
</div>

<div class="card">
<h2>Totals</h2>
<div id="totals"></div>
</div>

<script>

let jobs=[]

function setSize(v){
document.getElementById("sqft").value=v
calculate()
}

function calculate(){

let sqft=Number(document.getElementById("sqft").value)||0
let houses=Number(document.getElementById("houses").value)||1

let materialCost=(sqft/1000)*houses*200

let labor=(Number(rate.value)||0)*(Number(crew.value)||0)*(Number(hours.value)||0)*houses

let totalCost=materialCost+labor

let margin=Number(document.getElementById("margin").value)/100||0

let revenue = margin>0 ? totalCost/(1-margin) : totalCost

if(strategy.value==="win") revenue*=0.9
if(strategy.value==="max") revenue*=1.2

let profit=revenue-totalCost
let marginPct=(profit/revenue)*100

document.getElementById("price").innerHTML="$"+Math.round(revenue)

document.getElementById("breakdown").innerHTML=`
Materials: $${Math.round(materialCost)}<br>
Labor: $${Math.round(labor)}<br>
Revenue: $${Math.round(revenue)}<br>
Profit: $${Math.round(profit)}<br>
Margin: ${marginPct.toFixed(1)}%
`

return {materialCost,labor,revenue,profit,marginPct}
}

function createJob(){

let data=calculate()

let job={
name:document.getElementById("customer").value||"Customer",
quote:document.getElementById("quote").value||"N/A",
material:data.materialCost,
labor:data.labor,
revenue:data.revenue,
profit:data.profit,
margin:data.marginPct
}

jobs.push(job)

renderJobs()
renderTotals()
}

function renderJobs(){

let container=document.getElementById("jobHistory")
container.innerHTML=""

jobs.forEach(j=>{
container.innerHTML+=`
<div class="card">
<b>${j.name}</b><br>
Quote Date: ${j.quote}<br><br>

Materials: $${Math.round(j.material)}<br>
Labor: $${Math.round(j.labor)}<br>
Revenue: $${Math.round(j.revenue)}<br>
Profit: $${Math.round(j.profit)}<br>
Margin: ${j.margin.toFixed(1)}%
</div>
`
})
}

function renderTotals(){

let totalRevenue=jobs.reduce((a,b)=>a+b.revenue,0)
let totalProfit=jobs.reduce((a,b)=>a+b.profit,0)

let avgMargin = totalRevenue>0 ? (totalProfit/totalRevenue)*100 : 0

document.getElementById("totals").innerHTML=`
<div class="gold">Total Revenue: $${Math.round(totalRevenue)}</div>
<div class="gold">Total Profit: $${Math.round(totalProfit)}</div>
<div class="gold">Avg Margin: ${avgMargin.toFixed(1)}%</div>
`
}

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",calculate)
})

</script>

</body>
</html>
