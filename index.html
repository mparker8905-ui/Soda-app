<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#000;color:#fff;font-family:sans-serif;margin:0}
.card{background:#111;padding:20px;margin:15px;border-radius:16px}
input,select{width:100%;padding:12px;margin:8px 0;background:#222;color:#fff;border:none;border-radius:10px}
button{width:100%;padding:14px;background:#d4af37;border:none;border-radius:12px;margin-top:10px;font-weight:bold}
.alert{color:#ff4d4d}
.good{color:#00ff88}
.warn{color:#ffd700}
.priceBox{border:2px solid #d4af37;padding:20px;border-radius:16px;text-align:center;margin-top:15px}
</style>
</head>

<body>

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Create Job</h2>

<input id="name" placeholder="Customer Name">

<h3>Package</h3>
<select id="tier">
<option value="standard">Standard</option>
<option value="premium" selected>🔥 Premium (Best Value)</option>
</select>

<h3>Add Ons</h3>
<label><input type="checkbox" id="grow" checked> 🔥 Grow System</label><br>
<label><input type="checkbox" id="aeration"> Aeration (Included in Premium)</label><br>
<label><input type="checkbox" id="compostAdd"> Compost (Included in Premium)</label>

<input id="houses" type="number" value="1" placeholder="Houses">
<input id="sqft" placeholder="Sq Ft Per House">
<input id="margin" placeholder="Target Margin % (default 60)">

<h3>Labor & Overhead</h3>
<input id="laborRate" placeholder="Labor $/hr">
<input id="crewSize" placeholder="Crew Size">
<input id="hours" placeholder="Hours">
<input id="overhead" placeholder="Overhead %">

<button onclick="autoFillPrice()">Auto Fill Price</button>

<div class="priceBox">
<div>Final Investment</div>
<div id="priceDisplay" style="font-size:48px">$0</div>
<div id="dealRating" class="good"></div>
</div>

<div id="pricingOutput"></div>

<button onclick="createJob()">Create Job</button>
</div>

<div class="card">
<h2>Inventory</h2>
<input id="tttfCost" placeholder="TTTF Cost"><input id="tttfQty" placeholder="TTTF Qty">
<input id="ryeCost" placeholder="Rye Cost"><input id="ryeQty" placeholder="Rye Qty">
<input id="eliteCost" placeholder="Elite Cost"><input id="eliteQty" placeholder="Elite Qty">
<input id="kbgCost" placeholder="KBG Cost"><input id="kbgQty" placeholder="KBG Qty">
<input id="milCost" placeholder="Mil Cost"><input id="milQty" placeholder="Mil Qty">
<input id="espCost" placeholder="Esp Cost"><input id="espQty" placeholder="Esp Qty">
<input id="woodCost" placeholder="Wood Cost"><input id="woodQty" placeholder="Wood Qty">
<input id="bfmCost" placeholder="BFM Cost"><input id="bfmQty" placeholder="BFM Qty">
<input id="tackCost" placeholder="Tack Cost"><input id="tackQty" placeholder="Tack Qty">
<input id="compCost" placeholder="Comp Cost"><input id="compQty" placeholder="Comp Qty">
<input id="bioCost" placeholder="Bio Cost"><input id="bioQty" placeholder="Bio Qty">
<input id="humCost" placeholder="Hum Cost"><input id="humQty" placeholder="Hum Qty">
<button onclick="saveInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
<button onclick="clearJobs()" style="background:red">Clear Job History</button>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<!-- PROPOSAL MODAL -->
<div id="proposalModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:999;display:none;overflow:auto;padding:20px;">
<div style="max-width:600px;margin:auto">

<h2 style="color:gold;text-align:center">Premium Lawn Proposal</h2>
<div id="proposalClient" style="text-align:center;color:#aaa"></div>

<div class="card" style="border:1px solid gold" id="proposalPackage"></div>
<div class="card" id="proposalBreakdown"></div>

<div class="priceBox">
<div>Total Investment</div>
<div id="proposalPrice" style="font-size:48px"></div>
</div>

<button onclick="acceptProposal()" style="background:#00aa55">Accept Proposal</button>
<button onclick="closeProposal()" style="background:#333">Close</button>

</div>
</div>

<script>

let jobs=JSON.parse(localStorage.getItem("jobs")||"[]")
let inv=JSON.parse(localStorage.getItem("inv")||"{}")
let chart

const n=v=>parseFloat(v)||0

// AUTO PREMIUM SYNC
function syncTier(){
if(tier.value==="premium"){
grow.checked=true
aeration.checked=true
compostAdd.checked=true
aeration.disabled=true
compostAdd.disabled=true
}else{
aeration.disabled=false
compostAdd.disabled=false
}
}
tier.addEventListener("change",syncTier)
syncTier()

// MATERIALS
function getMaterials(tier,h){
const k=(n(sqft.value)||5000)*h/1000
if(tier==="standard"){
const seed=6*k
return {tttf:seed*0.85,rye:seed*0.15,mil:1*k,wood:3*k,tack:0.5*k}
}else{
const seed=5*k
return {elite:seed*0.8,kbg:seed*0.2,esp:1*k,bfm:4*k,tack:0.5*k,comp:1.5*k,bio:0.3*k,hum:0.2*k}
}
}

// PRICING
function autoFillPrice(){
const h=n(houses.value)||1
const mats=getMaterials(tier.value,h)

let materialCost=0
let html=""

for(let k in mats){
const qty=n(mats[k])
const cost=qty*(inv[k]?.c||0)
materialCost+=cost
html+=`${k}: ${qty.toFixed(2)} ($${cost.toFixed(0)})<br>`
}

// grow
let growCost=0,discount=0
if(grow.checked){
const k=(n(sqft.value)||5000)*h/1000
growCost=(0.5*k*(inv.bio?.c||0))+(0.5*k*(inv.hum?.c||0))
if(tier.value==="premium") discount=growCost*0.30
}

// labor + overhead
let labor=n(laborRate.value)*n(crewSize.value)*n(hours.value)
let overheadCost=(materialCost+labor)*(n(overhead.value||15)/100)

let totalCost=materialCost+labor+overheadCost+growCost-discount

let price=totalCost/(1-(n(margin.value||60)/100))

// builder discount
let d=0
if(h<10)d=0.05
else if(h<25)d=0.10
else if(h<100)d=0.20
else d=0.30

price*=1-d

priceDisplay.innerText="$"+price.toFixed(0)
window.finalPrice=price

pricingOutput.innerHTML=html+`
<br>
Grow: $${growCost.toFixed(0)}<br>
Discount: -$${discount.toFixed(0)}<br>
<br>
Materials: $${materialCost.toFixed(0)}<br>
Labor: $${labor.toFixed(0)}<br>
Overhead: $${overheadCost.toFixed(0)}<br>
<br>
<b>Total Cost: $${totalCost.toFixed(0)}</b>
`
}

// CREATE JOB
function createJob(){
const h=n(houses.value)||1
const mats=getMaterials(tier.value,h)

let breakdown={},alerts=[],cost=0

for(let k in mats){
const qty=n(mats[k])
const item=inv[k]
if(!item) continue

const c=qty*(item.c||0)
const remain=item.q-qty

if(remain<=5) alerts.push(k+" OUT")
else if(remain<20) alerts.push(k+" LOW")

item.q=Math.max(0,remain)
breakdown[k]={qty,cost:c}
cost+=c
}

const profit=window.finalPrice-cost

jobs.push({name:name.value||"Client",tier:tier.value,revenue:window.finalPrice,profit,materials:breakdown,alerts})

localStorage.setItem("jobs",JSON.stringify(jobs))
localStorage.setItem("inv",JSON.stringify(inv))

render()
}

// RENDER
function render(){
let rev=0,prof=0,alertHTML=""

jobs.forEach((j,i)=>{
rev+=j.revenue
prof+=j.profit

j.alerts.forEach(a=>alertHTML+=`<div class="alert">🚨 ${a}</div>`)

jobsDiv.innerHTML+=`
<div class="card">
<b>${j.name} (${j.tier})</b><br>
Revenue:$${j.revenue.toFixed(0)}<br>
<button onclick="openProposal(${i})">View Proposal</button>
</div>`
})

stats.innerHTML=`Jobs:${jobs.length}<br>Revenue:$${rev.toFixed(0)}<br>Profit:$${prof.toFixed(0)}`
alerts.innerHTML=alertHTML||"No alerts"
}

// PROPOSAL
function openProposal(i){
const j=jobs[i]
proposalModal.style.display="block"
proposalClient.innerText=j.name

proposalPackage.innerHTML=`<h3>${j.tier.toUpperCase()}</h3>Premium lawn solution`

let b=""
for(let m in j.materials){
b+=`${m}: ${j.materials[m].qty.toFixed(2)}<br>`
}
proposalBreakdown.innerHTML=b
proposalPrice.innerText="$"+j.revenue.toFixed(0)
}

function closeProposal(){proposalModal.style.display="none"}
function acceptProposal(){alert("Accepted");closeProposal()}

const jobsDiv=document.getElementById("jobs")
render()

</script>

</body>
</html>
