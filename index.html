<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta

    name="viewport"

    content="width=device-width, initial-scale=1.0, viewport-fit=cover"

  />

  <title>SoDa Outdoor Designs</title>

  <meta

    name="description"

    content="Professional hydroseeding pricing, scheduling, inventory and CRM system."

  />

  <link rel="stylesheet" href="styles.css" />

</head>

<body>

  <!-- =====================================

       GLOBAL HEADER

  ====================================== -->

  <header class="topbar">

    <div class="brand-wrap">

      <div class="brand-left">

        <div>

          <div class="brand-text">SoDa Outdoor Designs</div>

          <div class="brand-sub">We build lawns from the soil up</div>

        </div>

      </div>

      <!-- IMPORTANT:

           Put your real logo file in root folder:

           /logo.png

      -->

      <img

        src="/logo.png"

        alt="SoDa Outdoor Designs Logo"

        class="brand-logo"

        onerror="this.style.display='none'"

      />

    </div>

    <div class="gold-divider"></div>

  </header>

  <!-- =====================================

       MAIN PAGE

  ====================================== -->

  <main class="page-shell">

    <!-- =====================================

         NAVIGATION

    ====================================== -->

    <section class="nav-row">

      <a href="inventory.html" class="nav-btn">Inventory</a>

      <a href="crm.html" class="nav-btn">CRM</a>

      <button class="nav-btn gold" onclick="render()">

        Refresh Dashboard

      </button>

    </section>

    <!-- =====================================

         JOB INPUTS

    ====================================== -->

    <section class="card section-space">

      <div class="card-title">Lawn Estimator</div>

      <div class="card-sub">

        Professional hydroseeding pricing and scheduling system.

      </div>

      <div class="grid-2">

        <div class="field">

          <label for="customer">Customer Name</label>

          <input id="customer" type="text" placeholder="Customer Name" />

        </div>

        <div class="field">

          <label for="address">Project Address</label>

          <input id="address" type="text" placeholder="Project Address" />

        </div>

        <div class="field">

          <label for="quoteDate">Quote Date</label>

          <input id="quoteDate" type="date" />

        </div>

        <div class="field">

          <label for="projectStart">Project Start</label>

          <input id="projectStart" type="date" />

        </div>

        <div class="field">

          <label for="sqft">Sqft Per House</label>

          <input id="sqft" type="number" value="0" min="0" />

        </div>

        <div class="field">

          <label for="houses">Houses</label>

          <input id="houses" type="number" value="1" min="1" />

        </div>

        <div class="field">

          <label for="package">Package</label>

          <select id="package">

            <option value="standard">Standard</option>

            <option value="premium">Premium</option>

          </select>

        </div>

        <div class="field">

          <label for="pricingMode">Pricing Mode</label>

          <select id="pricingMode">

            <option value="win">Win Job</option>

            <option value="balanced" selected>Balanced</option>

            <option value="max">Max Profit</option>

          </select>

        </div>

        <div class="field">

          <label for="targetMargin">Target Margin %</label>

          <input id="targetMargin" type="number" value="0" />

        </div>

        <div class="field">

          <label for="pricingStrategy">Pricing Strategy</label>

          <select id="pricingStrategy">

            <option value="normal">Normal</option>

            <option value="market">Market Rate</option>

            <option value="undercut">Undercut Competitor</option>

            <option value="builder">Builder Discount</option>

          </select>

        </div>

        <div class="field">

          <label for="competitorPrice">Competitor Price</label>

          <input id="competitorPrice" type="number" value="0" />

        </div>

        <div class="field">

          <label for="tankSize">Tank Size</label>

          <select id="tankSize">

            <option value="100">100 Gallon</option>

            <option value="300">300 Gallon</option>

            <option value="500" selected>500 Gallon</option>

            <option value="700">700 Gallon</option>

            <option value="1000">1000 Gallon</option>

          </select>

        </div>

      </div>

    </section>

    <!-- =====================================

         LABOR INPUTS

    ====================================== -->

    <section class="card section-space">

      <div class="card-title">Labor Inputs</div>

      <div class="grid-2">

        <div class="field">

          <label for="hourlyRate">Hourly Rate</label>

          <input id="hourlyRate" type="number" value="0" />

        </div>

        <div class="field">

          <label for="hoursPerHouse">Hours Per House</label>

          <input id="hoursPerHouse" type="number" value="0" />

        </div>

        <div class="field">

          <label for="crewSize">Crew Size</label>

          <input id="crewSize" type="number" value="1" min="1" />

        </div>

        <div class="field">

          <label for="overhead">Overhead %</label>

          <input id="overhead" type="number" value="0" />

        </div>

      </div>

    </section>

    <!-- =====================================

         ADDONS

    ====================================== -->

    <section class="card section-space">

      <div class="card-title">Add-ons</div>

      <div class="check-grid">

        <label class="check-item">

          <input type="checkbox" id="addon_aeration" />

          Aeration

        </label>

        <label class="check-item">

          <input type="checkbox" id="addon_compost" />

          Compost

        </label>

        <label class="check-item">

          <input type="checkbox" id="addon_biohum" />

          Biohum

        </label>

        <label class="check-item">

          <input type="checkbox" id="addon_biochar" />

          Biochar

        </label>

        <label class="check-item">

          <input type="checkbox" id="addon_humic" />

          Humic

        </label>

        <label class="check-item">

          <input type="checkbox" id="addon_grow" />

          Grow System

        </label>

        <label class="check-item">

          <input type="checkbox" id="addon_lime" />

          Lime

        </label>

        <label class="check-item">

          <input type="checkbox" id="addon_sulfur" />

          Sulfur

        </label>

      </div>

      <div class="nav-row mt-18">

        <button class="nav-btn gold" onclick="render()">

          Calculate Job

        </button>

        <button class="nav-btn" onclick="sendProposal()">

          Send Proposal

        </button>

        <button class="nav-btn" onclick="createLead()">

          Create Lead

        </button>

      </div>

    </section>

    <!-- =====================================

         TIMELINE

    ====================================== -->

    <section class="card section-space">

      <div class="card-title">Timeline</div>

      <div class="nav-row">

        <button

          class="nav-btn"

          data-timeline="fast"

          onclick="setTimeline(this)"

        >

          Fast

        </button>

        <button

          class="nav-btn gold"

          data-timeline="standard"

          onclick="setTimeline(this)"

        >

          Standard

        </button>

        <button

          class="nav-btn"

          data-timeline="extended"

          onclick="setTimeline(this)"

        >

          Extended

        </button>

      </div>

    </section>

    <!-- =====================================

         RESULTS

    ====================================== -->

    <section class="section-space">

      <div id="results"></div>

    </section>

    <!-- =====================================

         SCHEDULE PREVIEW

    ====================================== -->

    <section class="card section-space">

      <div class="card-title">Schedule Preview</div>

      <div id="schedulePreview"></div>

    </section>

    <!-- =====================================

         JOB HISTORY

    ====================================== -->

    <section class="card section-space">

      <div class="card-title">Job History</div>

      <div id="jobHistory"></div>

    </section>

    <!-- =====================================

         CRM PIPELINE PREVIEW

    ====================================== -->

    <section class="card section-space">

      <div class="card-title">Sales Pipeline</div>

      <div id="jobHistoryList"></div>

    </section>

  </main>

  <!-- =====================================

       MODAL

  ====================================== -->

  <div

    id="proposalModal"

    class="modal"

    onclick="handleModalBackground(event)"

  >

    <div class="modal-content proposal-content">

      <h2 id="modalCustomer">Proposal</h2>

      <div

        id="modalAddress"

        class="card-sub mt-10"

      ></div>

      <div

        id="modalBody"

        class="mt-18"

      ></div>

      <div class="nav-row mt-18">

        <button

          class="btn-green"

          onclick="setProposalStatus('Accepted')"

        >

          Accept

        </button>

        <button

          class="btn"

          onclick="setProposalStatus('Pending')"

        >

          Pending

        </button>

        <button

          class="btn-red"

          onclick="setProposalStatus('Not Accepted')"

        >

          Lost

        </button>

        <button

          class="btn"

          onclick="closeProposalModal()"

        >

          Close

        </button>

      </div>

    </div>

  </div>

  <!-- =====================================

       SCRIPTS

  ====================================== -->

  <script src="state.js"></script>

  <script src="core.js"></script>

  <script src="inventory.js"></script>

  <script src="crm.js"></script>

  <script src="ui.js"></script>

  <script src="app.js"></script>

</body>

</html>
