<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;padding:16px}
.card{background:#121212;padding:16px;border-radius:14px;margin-bottom:14px}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#1c1c1c;color:#fff}
button{padding:12px;border:none;border-radius:8px;background:#d4af37;color:#000;font-weight:bold;width:100%;margin-top:8px}
.gold{color:#d4af37;font-size:22px}
.alert{padding:6px;margin:4px 0;border-radius:6px}
.low{background:#665500}
.out{background:#661111}
</style>
</head>

<body>

<div class="card">
<h2>Create Job</h2>

<input id="customer" placeholder="Customer Name">

<select id="tier" onchange="applyPremium()">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<select id="strategy">
<option>Balanced</option>
<option>Win Job</option>
<option>Max Profit</option>
</select>

<input id="sqft" placeholder="Square Feet">
<input id="houses" placeholder="# Houses">

<h3>Add Ons</h3>

<label><input type="checkbox" id="grow"> Grow System</label>
<label><input type="checkbox" id="aeration"> Aeration</label>
<label><input type="checkbox" id="compost"> Compost</label>
<label><input type="checkbox" id="bioHum"> Bio/Hum Blend (50/50)</label>
<label><input type="checkbox" id="bio100"> Biochar 100%</label>
<label><input type="checkbox" id="hum100"> Humic 100%</label>

<label><input type="checkbox" id="lime" onchange="toggle('limeAmt',this)"> Lime</label>
<input id="limeAmt" placeholder="Lime Amount" style="display:none">

<label><input type="checkbox" id="sulfur" onchange="toggle('sulfurAmt',this)"> Sulfur</label>
<input id="sulfurAmt" placeholder="Sulfur Amount" style="display:none">

<h3>Schedule</h3>

<label>Quote Date</label><input type="date" id="quote">
<label>Soil Test</label><input type="date" id="soil">
<label>Aeration</label><input type="date" id="aerDate">
<label>Compost</label><input type="date" id="compDate">
<label>Hydroseed</label><input type="date" id="hydroDate">
<label>Install</label><input type="date" id="install">
<label>Removal</label><input type="date" id="removal">
<label>Inspection</label><input type="date" id="inspect">

<button onclick="createJob()">Create Job</button>
<button onclick="clientView()">Client View</button>
</div>

<div class="card">
<h2>Inventory</h2>

<h3>Standard</h3><div id="invStandard"></div>
<h3>Premium</h3><div id="invPremium"></div>
<h3>Add Ons</h3><div id="invAdd"></div>

<button onclick="renderInventory()">Save Inventory</button>
</div>

<div class="card">
<h2>Alerts</h2>
<div id="alerts"></div>
</div>

<div class="card">
<h2>Job History</h2>
<div id="jobs"></div>
</div>

<div class="card">
<h2>Analytics</h2>
<canvas id="revChart"></canvas>
<canvas id="profitChart"></canvas>
<div class="gold" id="totals"></div>
</div>

<script>

let app={
inventory:{
standard:[
{name:"Seed",cost:80,qty:100},
{name:"Fertilizer",cost:40,qty:100},
{name:"Mulch",cost:35,qty:100},
{name:"Tackifier",cost:25,qty:100}
],
premium:[
{name:"Seed",cost:100,qty:100},
{name:"Fertilizer",cost:50,qty:100},
{name:"Mulch",cost:40,qty:100},
{name:"Tackifier",cost:30,qty:100},
{name:"Biochar",cost:25,qty:100},
{name:"Humic Acid",cost:20,qty:100}
],
addons:[
{name:"Lime",cost:15,qty:100},
{name:"Sulfur",cost:20,qty:100},
{name:"Sprinkler",cost:50,qty:50}
]
},
jobs:[]
}

function toggle(id,el){
document.getElementById(id).style.display=el.checked?"block":"none"
}

function applyPremium(){
if(tier.value==="premium"){
aeration.checked=true
compost.checked=true
bioHum.checked=true
lime.checked=true
sulfur.checked=true
toggle('limeAmt',lime)
toggle('sulfurAmt',sulfur)
}
}

function createJob(){

let sqftVal=parseFloat(sqft.value)||0
let housesVal=parseFloat(houses.value)||1

let revenue=sqftVal*2*housesVal
let cost=1000
let profit=revenue-cost

let job={
name:customer.value,
revenue,
profit,
schedule:{
quote:quote.value,
soil:soil.value,
aer:aerDate.value,
comp:compDate.value,
hydro:hydroDate.value,
install:install.value,
remove:removal.value,
inspect:inspect.value
},
materials:{
grow:grow.checked,
aeration:aeration.checked,
compost:compost.checked,
bioHum:bioHum.checked,
bio100:bio100.checked,
hum100:hum100.checked,
lime:limeAmt.value,
sulfur:sulfurAmt.value
}
}

app.jobs.push(job)

renderJobs()
renderTotals()
renderAlerts()
}

function renderJobs(){
jobs.innerHTML=app.jobs.map(j=>`
<div>
<b>${j.name}</b><br>
Revenue: $${j.revenue}<br>
Profit: $${j.profit}<br>
Materials:<br>
${Object.entries(j.materials).map(([k,v])=>k+": "+v).join("<br>")}
</div><br>
`).join("")
}

function renderTotals(){
let rev=app.jobs.reduce((a,b)=>a+b.revenue,0)
let prof=app.jobs.reduce((a,b)=>a+b.profit,0)
let margin=rev?((prof/rev)*100).toFixed(1):0

totals.innerHTML=`
Total Revenue: $${rev}<br>
Total Profit: $${prof}<br>
Avg Margin: ${margin}%
`
}

function renderAlerts(){
alerts.innerHTML=""
app.inventory.standard.concat(app.inventory.premium,app.inventory.addons).forEach(i=>{
if(i.qty<5) alerts.innerHTML+=`<div class="alert out">${i.name} OUT</div>`
else if(i.qty<20) alerts.innerHTML+=`<div class="alert low">${i.name} LOW</div>`
})
}

function renderInventory(){
invStandard.innerHTML=app.inventory.standard.map((m,i)=>`
<input value="${m.name}" onchange="app.inventory.standard[${i}].name=this.value">
<input value="${m.cost}" onchange="app.inventory.standard[${i}].cost=parseFloat(this.value)||0">
<input value="${m.qty}" onchange="app.inventory.standard[${i}].qty=parseFloat(this.value)||0">
`).join("")

invPremium.innerHTML=app.inventory.premium.map((m,i)=>`
<input value="${m.name}" onchange="app.inventory.premium[${i}].name=this.value">
<input value="${m.cost}" onchange="app.inventory.premium[${i}].cost=parseFloat(this.value)||0">
<input value="${m.qty}" onchange="app.inventory.premium[${i}].qty=parseFloat(this.value)||0">
`).join("")

invAdd.innerHTML=app.inventory.addons.map((m,i)=>`
<input value="${m.name}" onchange="app.inventory.addons[${i}].name=this.value">
<input value="${m.cost}" onchange="app.inventory.addons[${i}].cost=parseFloat(this.value)||0">
<input value="${m.qty}" onchange="app.inventory.addons[${i}].qty=parseFloat(this.value)||0">
`).join("")
}

function clientView(){
let w=window.open("")
w.document.write(`
<h1>Client Proposal</h1>
<p>${customer.value}</p>
<button onclick="window.print()">Download PDF</button><br>
<a href="mailto:?subject=Proposal">Email</a><br>
<a href="sms:?body=Proposal">Text</a>
`)
}

renderInventory()
renderAlerts()

</script>

</body>
</html>
