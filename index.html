<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0d0d0d; color:white; font-family:Arial; padding:20px; }
.card { background:#111; padding:20px; border-radius:12px; margin-bottom:20px; }
input, select {
  width:100%; padding:12px; margin:6px 0;
  background:#1a1a1a; border:1px solid #333;
  color:white; border-radius:8px;
}
button {
  width:100%; padding:14px;
  background:#d4af37; border:none; border-radius:10px;
  margin-top:10px;
}
.job { border-left:4px solid #d4af37; padding:10px; margin-bottom:10px; }
#alerts { color:red; font-weight:bold; }
</style>
</head>

<body>

<div class="card">
<h3>Overview</h3>
<div>Jobs: <span id="jobsCount">0</span></div>
<div>Revenue: $<span id="rev">0</span></div>
<div>Profit: $<span id="profit">0</span></div>
<div>Avg Margin: <span id="margin">0</span>%</div>
</div>

<div class="card">
<h3>Log Job</h3>

<input id="name" placeholder="Customer Name">

<select id="size">
<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>
</select>

<select id="type">
<option value="standard">Standard</option>
<option value="premium">Premium</option>
</select>

<button onclick="logJob()">Log Job</button>
</div>

<div class="card">
<h3>Inventory</h3>

<input id="gci" placeholder="GCI TTTF">
<input id="blue" placeholder="GCI Blue">
<input id="basicMix" placeholder="Basic Mix">
<input id="lebanon" placeholder="Lebanon">
<input id="andersons" placeholder="Andersons">
<input id="organic" placeholder="Organic">

<input id="paperMulch" placeholder="Paper Mulch">
<input id="bfm" placeholder="BFM Mulch">
<input id="basicMulch" placeholder="Basic Mulch">

<input id="tackifier" placeholder="Tackifier">
<input id="compost" placeholder="Compost">
<input id="biochar" placeholder="Biochar">

<button onclick="saveInv()">Save Inventory</button>
</div>

<div class="card">
<h3>Inventory Alerts</h3>
<div id="alerts"></div>
</div>

<div class="card">
<h3>Reorder List</h3>
<div id="reorder"></div>
</div>

<div class="card">
<h3>Job History</h3>
<button onclick="clearJobs()">Clear History</button>
<div id="history"></div>
</div>

<script>

// ---------- HELPERS ----------
const $ = id => document.getElementById(id);

// ---------- DATA ----------
let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

let inventory = JSON.parse(localStorage.getItem("inv")) || {
gci:0, blue:0, basicMix:0, lebanon:0, andersons:0, organic:0,
paperMulch:0, bfm:0, basicMulch:0,
tackifier:0, compost:0, biochar:0
};

// ---------- COST ----------
const COST = { seed:80, mulch:60, tack:20, compost:40 };

// ---------- USAGE ----------
const USE = {
small:{seed:1,mulch:1,tack:0.5,compost:0.5},
medium:{seed:2,mulch:2,tack:1,compost:1},
large:{seed:3,mulch:3,tack:1.5,compost:1.5}
};

// ---------- SAVE INVENTORY ----------
function saveInv(){
for(let k in inventory){
inventory[k] = +$(k).value || 0;
}
localStorage.setItem("inv", JSON.stringify(inventory));
updateAlerts();
}

// ---------- LOG JOB ----------
function logJob(){

let name = $("name").value || "Unnamed";
let size = $("size").value;
let type = $("type").value;

let base = {small:1500, medium:2000, large:3000}[size];
if(type==="premium") base *= 1.4;

let u = USE[size];

let cost =
u.seed*COST.seed +
u.mulch*COST.mulch +
u.tack*COST.tack +
u.compost*COST.compost;

let profit = base - cost;
let margin = (profit/base)*100;

// deduct inventory
inventory.gci -= u.seed;
inventory.paperMulch -= u.mulch;
inventory.tackifier -= u.tack;
inventory.compost -= u.compost;

for(let k in inventory){
if(inventory[k]<0) inventory[k]=0;
}

localStorage.setItem("inv", JSON.stringify(inventory));

// SAVE
jobs.push({
name, size, type,
revenue:base,
cost,
profit,
margin,
materials:u,
date:new Date().toLocaleDateString()
});

localStorage.setItem("jobs", JSON.stringify(jobs));

$("name").value = "";

render();
updateAlerts();
}

// ---------- CLEAR ----------
function clearJobs(){
localStorage.removeItem("jobs");
jobs = [];
render();
}

// ---------- ALERTS ----------
function updateAlerts(){
let low=[];
for(let k in inventory){
if(inventory[k] < 5) low.push(k);
}

$("alerts").innerText = low.length
? "LOW: " + low.join(", ")
: "All inventory levels good";

$("reorder").innerText = low.length
? low.join(", ")
: "None";
}

// ---------- RENDER ----------
function render(){

let totalRev=0,totalProfit=0,totalMargin=0;

jobs.forEach(j=>{
totalRev+=j.revenue||0;
totalProfit+=j.profit||0;
totalMargin+=j.margin||0;
});

$("jobsCount").innerText = jobs.length;
$("rev").innerText = Math.round(totalRev);
$("profit").innerText = Math.round(totalProfit);

$("margin").innerText = jobs.length
? (totalMargin/jobs.length).toFixed(1)
: 0;

// SAFE history (fixes your crash)
$("history").innerHTML = jobs.map(j=>`
<div class="job">
<b>${j.name||"Unknown"}</b> (${j.type||"standard"})<br>
💰 Revenue: $${Math.round(j.revenue||0)}<br>
💸 Cost: $${Math.round(j.cost||0)}<br>
📈 Profit: $${Math.round(j.profit||0)}<br>
📊 Margin: ${j.margin ? j.margin.toFixed(1) : "0"}%<br><br>

📦 Materials:<br>
Seed: ${j.materials?.seed||0}<br>
Mulch: ${j.materials?.mulch||0}<br>
Tackifier: ${j.materials?.tack||0}<br>
Compost: ${j.materials?.compost||0}
</div>
`).join("");
}

// ---------- INIT ----------
render();
updateAlerts();

</script>

</body>
</html>
