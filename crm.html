<!-- crm.html -->

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CRM - SoDa Outdoor Designs</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="header">

  <div class="brand">

    <h1>CRM</h1>

    <div class="tagline">Leads • Proposals • Wins</div>

  </div>

</div>

<div class="gold-line"></div>

<div class="row">

  <button onclick="location.href='index.html'">Calculator</button>

  <button onclick="location.href='inventory.html'">Inventory</button>

</div>

<div class="card">

  <div class="section-title">Create Lead</div>

  <label>Customer Name</label>

  <input id="customer">

  <label>Address</label>

  <input id="address">

  <button class="primary full" onclick="createLead()">

    Add Lead

  </button>

</div>

<div class="card">

  <div class="section-title">Pipeline</div>

  <div id="jobHistoryList"></div>

</div>

<!-- Proposal Modal -->

<div id="proposalModal" class="proposal-modal" onclick="handleModalBackground(event)">

  <div class="proposal-content">

    <div id="modalCustomer"></div>

    <div id="modalAddress"></div>

    <div id="modalBody"></div>

    <div class="proposal-actions">

      <button class="accept-btn" onclick="setProposalStatus('Accepted')">

        Accept

      </button>

      <button class="pending-btn" onclick="setProposalStatus('Pending')">

        Pending

      </button>

      <button class="reject-btn" onclick="setProposalStatus('Not Accepted')">

        Reject

      </button>

    </div>

  </div>

</div>

<div id="toastContainer" class="toast-container"></div>

<script src="js/state.js"></script>

<script src="js/core.js"></script>

<script src="js/inventory.js"></script>

<script src="js/crm.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

<script>

window.onload = function(){

  if(window.renderPipeline) renderPipeline();

};

</script>

</body>

</html>
