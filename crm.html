<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SoDa Outdoor Designs | CRM</title>

  <link rel="stylesheet" href="css/styles.css" />

</head>

<body>

  <header class="page-header">

    <h1>CRM Dashboard</h1>

    <p>SoDa Outdoor Designs</p>

  </header>

  <main class="app-wrap">

    <!-- QUICK LEAD ENTRY -->

    <section class="card open">

      <div class="card-title">Create New Lead</div>

      <div class="card-body">

        <label>Customer Name</label>

        <input id="customer" type="text" placeholder="Enter customer name" />

        <label>Address</label>

        <input id="address" type="text" placeholder="Enter address" />

        <button onclick="createLead()">Add Lead</button>

        <button onclick="location.href='index.html'">

          Open Calculator

        </button>

      </div>

    </section>

    <!-- SALES PIPELINE -->

    <section class="card open">

      <div class="card-title">Sales Pipeline</div>

      <div class="card-body">

        <div id="jobHistoryList"></div>

      </div>

    </section>

    <!-- SAVED HISTORY -->

    <section class="card">

      <div class="card-title">Proposal History</div>

      <div class="card-body">

        <div id="jobHistory"></div>

      </div>

    </section>

  </main>

  <!-- PROPOSAL MODAL -->

  <div id="proposalModal" class="proposal-modal" onclick="handleModalBackground(event)">

    <div class="proposal-content">

      <h3 id="modalCustomer"></h3>

      <div id="modalAddress"></div>

      <div id="modalBody"></div>

      <div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">

        <button onclick="setProposalStatus('Pending')">

          Mark Pending

        </button>

        <button onclick="setProposalStatus('Accepted')">

          Mark Won

        </button>

        <button onclick="setProposalStatus('Not Accepted')">

          Mark Lost

        </button>

        <button onclick="convertToProposal()">

          Load Into Calculator

        </button>

      </div>

    </div>

  </div>

  <!-- TOASTS -->

  <div id="toastContainer" class="toast-container"></div>

  <!-- JS -->

  <script src="js/core.js"></script>

  <script src="js/state.js"></script>

  <script src="js/inventory.js"></script>

  <script src="js/crm.js"></script>

  <script src="js/ui.js"></script>

  <script src="js/app.js"></script>

  <!-- PAGE INIT -->

  <script>

    window.onload = () => {

      renderPipeline();

      renderHistory();

    };

  </script>

</body>

</html>
