<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Builder Projects — SoDa Outdoor Designs</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="topbar">
    <div class="brand-wrap">
      <div class="brand-text">SoDa Outdoor Designs</div>
      <img src="logo.png" class="brand-logo" />
    </div>
    <div class="gold-divider"></div>
  </header>

  <main class="container">

    <!-- ===== NAV ===== -->
    <div class="card">
      <button class="btn ghost" onclick="location.href='index.html'">← Calculator</button>
      <button class="btn ghost" onclick="location.href='inventory.html'">Inventory</button>
      <button class="btn ghost" onclick="location.href='crm.html'">CRM</button>
    </div>

    <!-- ===== PAGE TITLE ===== -->
    <div class="card">
      <h2>Builder Project Calculator</h2>
      <p class="muted">
        Estimate large-scale residential projects, subdivisions, and multi-lot contracts.
      </p>
    </div>

    <!-- ===== INPUTS ===== -->
    <div class="card">

      <h3>Project Details</h3>

      <label>Sqft Per House</label>
      <input id="builderSqft" type="number" placeholder="2000" />

      <label>Number of Houses</label>
      <input id="builderHouses" type="number" placeholder="10" />

      <label>Project Start Date</label>
      <input id="builderStart" type="date" />

      <label>Package</label>
      <select id="builderPackage">
        <option value="standard">Standard</option>
        <option value="premium">Premium</option>
      </select>

      <label>Pricing Mode</label>
      <select id="builderPricingMode">
        <option value="balanced">Balanced</option>
        <option value="win">Win Job</option>
      </select>

      <label>Competitor Price (optional)</label>
      <input id="builderCompetitor" type="number" placeholder="0" />

      <button class="btn primary" onclick="calculateBuilderUI()">
        Calculate Builder Project
      </button>
       
      <button class="btn gold" onclick="saveBuilderToCRM()">

  Save to CRM

</button>
    </div>

    <!-- ===== RESULTS ===== -->
    <div id="builderResults"></div>

    <!-- ===== SCHEDULE ===== -->
    <div class="card">
      <h3>Project Schedule</h3>
      <div id="builderSchedule"></div>
    </div>

  </main>

  <!-- ===== SCRIPTS ===== -->
  <script src="./js/state.js"></script>

<script src="./js/core.js"></script>

<script src="./js/ui.js"></script>

<script src="./js/app.js"></script>

<script src="./js/builder.js"></script>
